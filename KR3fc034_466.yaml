body:
  text: 步再置餘角兩面各二十八步折半得一十四步自乘得一角積一百九十六步二角共三百九十二步弧矢得長四分之三解義弧矢即半圓宜田即半方故弧矢亦得直四分之三然在絲半弧矢則合若細半弧矢即不合矣切勿誤也勾股容方容圓歌勾股容方法最良以勾乘股積實詳合併勾股為除法得數便為方面長容圓勾股乘為積勾股併弦合法除得數加倍知圓徑求方求圓兩無疑勾股容方圖今有勾股內容方勾四十二步股五十六步問中容方面若干舊法置勾四十二步乘股五十六步得二千三百五十二步為實以勾股併得九十八步為發除之得中容方面二十四步增求方外餘積法置勾股相乘二千二百五千二步折半得勾股
  hash: sha256:4b6c1d92ee1af264da18365348a639c3c625f2a24df4a339e4261ecd71658bb5
