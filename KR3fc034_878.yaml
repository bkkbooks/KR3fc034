body:
  text: 以闊二尺一寸乘之得五百二十尺零八寸為實以今布闊一尺八寸六分為法除之得該長二百八十尺若以今長二百八十尺問闊即以長為法除之量法歌古法十斗以斛稱六斗四升以釡名一十六斗為一庾一十六斛乘無疑今法一斛止五斗二斛一石竹且久石上十斗下升合勺抄算抄下更有撮圭粟以次相推十之一稻求糙米糙求熟米法今有稻六百五十一石四斗共礲糙米四百一十六石八斗九升六合又春作熟米每斗得八升二合豐問稻礲糙米每斗若干共春熟米若干舊法置糙米四百一十六石八斗九升六合為實以稻為法除之得每稻一斗礲糙米六升四合另置糙米原實以八升二合五勺乘之
  hash: sha256:c73acfeb283e3cfcd58708fe7ca9b7347d4f14b308f6b67cec4d7cde33b110b5
