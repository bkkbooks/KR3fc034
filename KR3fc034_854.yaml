body:
  text: 以銀求斤兩法原有銀七錢五分買墨二斤四兩今有銀二錢四分問該墨若干舊法置今銀二錢四分以原買墨二斤四兩將四兩用截兩法變為二五共二斤二五為法乘之得五十四兩為實以原銀七錢五分為法除之得七二乃合斤之數用加六法加之得今該墨一十一兩五錢二分解義亦同先乘流除法若將墨二四兩用加斤法得三十六兩以今錢二錢四分東之以原銀除之亦得此長者除後再用加法斤兩較解費法今有官役領解顏料甲解大緑一百二十二斤一十三兩靛花五百四十斤乙解銀硃二千一百四十八斤一十二兩錫四千六百八十斤二人移同交納共使費銀六百兩緣定大緑每兩使費銀一錢七分五釐靛花每三十五斤使費銀七錢五分銀硃每斤使費銀六分錫每一十二斤使費銀二錢八分問各該銀若干舊法先置甲
