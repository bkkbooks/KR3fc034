body:
  text: 百步除內圓得外餘方積三千一百八十九步零二分五釐增法外濶各五釐方周比圓周多一十七步六分問方徑田置兩面濶共一分以四因之得四分以減多一十七步六分得內圓徑一十七步二分加兩濶一分得外方面一十七步三分照上法得積增法塘外各濶三分七釐方周比圓周多一十二步一分九釐問方徑田置兩面濶共七分四釐以四因之得二步九分六釐以減多一十二步一分九釐得內圓徑九步二分三釐加兩濶七分四釐得外方面九步九分七釐照上法除得積解義九方內除圓內圓徑以圓外餘濶二倍則外方周適得內圓周二倍首法正方周得圓周二倍故苐倍則得內圓徑若方周比圓周出二倍之外必方濶圓徑有溢幹半倍之外或二倍不足若干即方濶較圓徑不足於半倍之數故即餘數不足數加減濶數乃淂圓徑數共濶數必加倍者因本外方周比內圓周二倍立法故須加倍以合之也餘不足數折半者方周四分問周三分是方周比
