body:
  text: 共泒銀九十九兩以因左一百五十四両得九分之七共出銀七十七両減多一十二両合應差銀匿價雙套帶分子母適足不足適足法今有芝蔴不知數只雲取蔴八分之三糶銀十兩不足二石取蔴三分之一糶銀八両適足問蔴數及毎兩該蔴若干舊法置列右之三左之一互八分淂八通糶十両淂八十三分淂九通糶八両淂七十両八通不足二石淂一十六石二両適足又置列右八十両七十二両互不足十六石淂一適足千一百五十二先以右上之三互左中三分淂九以通糶八両得七十二両次以左上之一互右中八分得八以通糶十両得八十両又以八通不足二石得一十六石卻又將左七十二両再互右一十六石得一千一百五十二卻以之三之一相乗得三除之得三百八十四石為蔴實另以八十両七十二両對減餘八両為法除之得總芝蔴四十八石又
