body:
  text: 二個十五以十四乘之得二百一十另將十三加一個半共十四個半又乘之得二千零四十五又將六個半加半個共七個加入共得三千零五十二為實以四為法歸之得積物七百六十三個又增法置下周加三個共四十二個另置下周加六個共四十五個以四十二個乘之得一千八百九十再以六歸外周得六個半倍之得十三加一個半共一十四個半又乘之得二萬七千四百零九又另將六個半加半個以所加半六整六共九乘之得六十三併二數共二萬七千四百六十八為實以立圓率三十六除之得積物七百六十三個解義舊圓尖垜法今增補六歸外周得七即七層也加倍者每面七層與面即十四層也又加一者便中心共十五層也應周三十九是有零雲者六得六個半倍之得十三加一得十四有半六省無中心十四層此即圓徑求積法也又將十四加二乘十五者原係十五層十四加二即十五層加一也其加一者圓尖垜自上而下每層多三個徑係周三中之一應加一個也又將十五加半個乘
  hash: sha256:0d1d7081c7787ab919b89a3d68cc17c18b8523191d13e6a3b2d94bfc10b31995
