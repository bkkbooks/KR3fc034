body:
  text: 四千一百零七步再以徑七十四步減去中濶二十四步二弧矢各得二十五步另以勾股法置全徑折半得三十七步為斜弦自乘得一千三百六十九步又以半徑三十七步減去矢二十五步餘一十二步為股自乘得一百四十四步減半徑自乘數餘一千二百二十五步以開平方法求之得半弦即勾三十五步加倍得截弦七十步加矢折半以矢乘之得一弧矢積一千一百八十七步五分併二弧矢共積二千三百七十五步以減圓田全積餘得中河積一千七百三十二步圓截今有圓田外截二弧矢中餘濶二十四步中徑長七十四中假步兩面弧弦各七十步問存積若干增法置中徑七十四步圖併加弧弦七十步共一百四十四步折半得七十二步以濶二十四步為法乘之得一千七百二十八步另置七十四步以七十步對減餘四步折半得二步自乘得四步併入
