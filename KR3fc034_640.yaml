body:
  text: 得一千六百八十在乘得一萬一千七百六十併方法八十六萬四千上亷一十五萬一千二百下亷一萬一千七百六十隅法三百四十三尺共一百零二萬七千三百零三尺皆與次啇七尺相呼一七除七百萬二七除一十四萬七七除四萬九千三七除二千一百三七除二十一尺共除七百一十九萬一千一百二十一尺除實恰盡得方西六十七尺解義三乘之法如方西六十七尺一乘淂四千四百八十九尺是一方西再乘淂三十萬零七百六十三尺是六西皆六十七尺即立方三乘得二千零一十五萬一千一百二十一尺是六十七個六西皆六十七尺高計四千四百八十九尺初啇以六十自乘再乘三乘淂一千二百九十六萬既六十個六西皆六十尺小立方高計三千六百尺其以一乘再乘得二十一萬六千本實方西乃以為隅法者因高數遇長一小方止在一隅故言隅也又四因隅法為方法即六十個小立方西方平亷也立方宜用三平亷今四因者其三係平亷其一即一小立方後皆以七因之七因三平亷為平亷之立濶七因一小方又因作七個六十尺一乘再乘三乘之小方也又六因三千六百即六十個小立方之長亷也長亷宜用三亷今六因者其三係長亷其三係一個小立方每西積三千六百尺三個三千六百
