body:
  text: 以不足一十六石為銀該蔴之實亦以前法八除之得每銀一両該芝蔴二石解義取麻八分之三糶銀十両不足二石猶取銀八分之三糶蔴一十石不足銀二両特又糶轉立法使人易地通悟耳然前取銀買物或一盈一適足一不足一適足俱就所買物成數言之此又添賣銀十両賣銀八両之異差數及立法當在十両八両求之一盈一不足合併十両八両求一不足一適足八両是適足當在十両求之前法增法置列右八分左三分互之三得九石之一得八石先以八分三分相乗得二十四次以右八分互乗左之一得八石又以左三分互乗右之三得九石各列位卻另置不足二石為實以右中得九左中得八對減餘一為法除之得毎銀一両該芝蔴二石就以二為通法以二乗左互出八石得一十六石糶銀八両適足以二乗右互出九石得一十八石糶銀十両不足二石以二乗二十四石得總芝蔴四十八石
