body:
  text: 解義將圓積以十二乘者周係圓徑之三倍即係三個方西圓淂方四分之三四個圓積淂三個方積將圓積以十二乘之淂十二個圓積即九方積係三個方西自乘之積故開方得三個方西即三係往為圓天外周之數也開平圓命發今有圓田積五萬四千步問徑若干增法置積四因三歸得七萬二千步為實初啇二百於左自呼除積四萬餘積三萬二千步次啇六十於左二百之次即以六十與二百相呼二六除積一萬二千又以六十與二百六十相呼二六除積一萬二千六六除積三千六百共除積二萬七千六百餘積四千四百步再啇八步於左二百六十之下即以八與二百六十相呼二八除積一千六百六八除積四百八十又以八步與二百六十八相呼二八除積一千六百六八除積四百八十八八除積六十四步共除四千二百二十四步餘積一百七十六步不盡卻將三次所啇二百六十八步倍之再加一步得五百三十七步命之曰圓徑二百六十八步零五百三十七分步之一百七十六
