body:
  text: 兩七錢五分也因歸總歌歸從頭上起因從足下生逢如湏次位言十在本身因法單位曰因九九數單位者俱用此乗法單位曰因位數多曰乗通而言之乗也置所問為實以所求為法皆從實末位而起呼九九相生之数如法次第乗之呼如湏在次位言十就在本身凣因乗不必拘於法實或以法乗實或以實乗法皆可惟歸除不可顛倒錯亂陞積用乗法凣以二為法便一倍乗作二倍以三為法便一倍乗作三倍然其数雖陞而位反降必湏詳定位之法求之減積亦用乗法如十分之八即置原實以八乗得数十分之七即置原
