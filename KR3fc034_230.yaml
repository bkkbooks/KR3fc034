body:
  text: 除一十二下位除六進三於前又除一共七隔位除二也進四除六即九去八進四十四四除一十六也仍是二四歸除法四歸六歸四六亦是二十四飛歸注又按二四歸除立為成法變換直揵耳法維經省兩數以進加屢易不如四歸六歸雖歸二次然一字直呼到底直了快萬無差誤至飛還法又不如直用二四因乘為便無差方田求積求方面歌方田積易明方面自相乘因積求方面開方得其平今有方田一假四面各五十步問積步及田若干舊法置長五十步以濶五十步乘之得積二千五百步以畝法二四除之得田十畝另四釐一毫六絲六忽定位法先從原首位數十趄順下至步止下一位定法首十數逆數上至實首位合得二千順下位即是五百也餘皆做此積求方面置積二千五百步用開平方法
