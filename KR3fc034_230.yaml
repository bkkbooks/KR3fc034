body:
  text: 除一十二下位除六進三於前又除一共七隔位除二也進四除六即九去八進四十四四除一十六也仍是二四帰除法四帰六帰四六亦是二十四飛帰注又按二四帰除立為成法變換直揵耳法維經省兩數以進加屢易不如四帰六帰雖帰二次然一字直呼到底直了快萬無差誤至飛還法又不如直用二四因乗為便無差方田求積求方面歌方田積易明方面自相乗因積求方面開方得其平今有方田一叚四面各五十歩問積歩及田若干舊法置長五十歩以濶五十歩乗之得積二千五百歩以畆法二四除之得田十畆另四厘一毫六絲六忽定位法先從原首位數十趄順下至歩止下一位定法首十數逆數上至實首位合得二千順下位即是五百也餘皆做此積求方面置積二千五百歩用開平方法
