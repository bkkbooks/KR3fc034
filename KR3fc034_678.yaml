body:
  text: 百零二石八斗以斛法二五乘三十六淂九十故省三十六與二五兩次歸出以九十歸之淂米數也席囤求米法今有蘆席二領長濶相同先以席一領作囤較之盛米二石五斗問席二領為一囤盛米若干舊法置席二領自乘得四領為實以較囤米二石五斗為法乘之得盛米十石若以三領作一囤即置三領自乘得九領為實以窖囤米二石五斗乘之得盛米二十二石五斗以四領作一囤即置四領自乘得一十六領為實以二石五斗乘之得盛米四十石五六七領皆做此米求席囤法今有米二十二石五斗欲用席囤盛之以一席較囤盛二石五斗問該用席若干舊法置米二十二石五斗以較米二石五斗為法除之得九領為實以開平方法除之得該席三領解義如席一領作囤長四尺以四西計之每西各長一尺若二領共長八尺以四西計之每西二尺中所各二二得四若三領共長
