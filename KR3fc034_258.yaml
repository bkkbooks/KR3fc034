body:
  text: 得差數二十八歩者共數自乗內有四個積數一個差自乗數除四因積數止存一差自乗數故開方得差數即上法還源一理也今有直田長一十五歩濶一十二歩從一邉截積五十四歩六分大濶截四歩問截小濶若干舊法置截積五十四歩六分為實以原長十五歩為法除之得三歩六分四厘加倍得十步二分八厘以大濶四歩減之餘得小濶三歩二分八厘又法倍截積得一百零九歩二分為實以原長一十五歩為法除之得七歩二分八厘減去大濶四歩得小濶三歩二分八厘亦得觧義直田截積或以濶除積淂長以長除積淂濶皆徑直易無多贅故載此截斜一法為俐餘皆可以類推難題截積㕠搗練長十六濶十五不多不少恰一畆內有八個古墳墓更有一條十字路毎個墓週六歩十字路濶一歩毎畆價銀二兩五除了墓除了路問君該剩多少數舊法置田一畆以畆法通之得二百四十
