body:
  text: 得差數二十八步者共數自乘內有四個積數一個差自乘數除四因積數止存一差自乘數故開方得差數即上法還源一理也今有直田長一十五步濶一十二步從一邉截積五十四步六分大濶截四步問截小濶若干舊法置截積五十四步六分為實以原長十五步為法除之得三步六分四厘加倍得十步二分八厘以大濶四步減之餘得小濶三步二分八厘又法倍截積得一百零九步二分為實以原長一十五步為法除之得七步二分八厘減去大濶四步得小濶三步二分八厘亦得解義直田截積或以濶除積淂長以長除積淂濶皆徑直易無多贅故載此截斜一法為俐餘皆可以類推難題截積㕠搗練長十六濶十五不多不少恰一畝內有八個古墳墓更有一條十字路每個墓周六步十字路濶一步每畝價銀二兩五除了墓除了路問君該剩多少數舊法置田一畝以畝法通之得二百四十
