body:
  text: 四百文減戊不及甲三十三貫六百文餘得戊鈔三十貫零八百文互和甲戊鈔九十五貫二百折半得丙鈔四十七貫六百文又互和甲丙鈔共一百一十二貫折半得乙鈔五十六貫又互和丙戊鈔共七十八貫四百文折半得丁鈔三十九貫二百文解義此五人分法亦尺照上以五人折半得二個半作除法為得知一三五七九得二十五定法二貫九百乃是始總鈔定分法非定確不易出天然本等也前三位四位皆然難題又有甲乙丙丁戊分銀一兩五一歌非此同不贅載六折差分法因指明等書不依古法以十分之六訣為四六十分之七訣為三七十分之八訣為二八故差等考之二位者十六併得十六衰三位者一百六十三十六併得一百九十六衰四位者一千六百三百六十二百一十六併得二千一百七十六衰以上位數加多皆可通融加之
