body:
  text: 方臺方錐互問歌方臺改錐問尖長法乗原高用上方下方又用上方減餘差除實尖難掩方錐改臺問截尖上方乗高下除叅若求截方下方問高減今高乗法順原高又用為除法以求截方端可察截高不離原高凴截方下方減餘乗即用下方除實積先乗後除法總一方臺改方錐問上尖法今有方臺上方六尺下方二十四尺高二十四尺欲改作方錐問接高若干舊法置原高二十四尺以原上方六尺乗之得一百四十四尺為實另以原下方二十四尺內減上方六尺餘一十八尺為法除之得接尖高八尺解義高二十四尺上方尺比下方減退一十八尺是每高加四人方減三尺十八尺者乃高二十四尺內方減退之差數也應
