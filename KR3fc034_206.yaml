body:
  text: 附暗馬式一丨二刀三川四五五六丄七八九文內一二三如重且不拘橫真如十一則用卜十二則用蔔二十三則用是也附一筆錦垜積合總歌巧笑一筆錦為奇垜積合總數可知但看各行末後任乘任除不須疑右法照笑定位布列行數用暗馬直下但丨刀丄可加一畫者加之如五文不加者加馬若本行退盡無存者用一小圖隔之能別洄數扣俱完畢只看各行末下之數憑如有銀一兩錢三分又二兩六錢四分又三兩八錢五分又四兩九錢二分問四共若干舊法先以一兩二錢三分自左而右列作三行闊寫暗馬丨刀川照行加二兩六錢四分改馬作又加三兩八錢五分改馬作又加四兩九錢二分改馬作丨刀丄五得共銀一十二兩六錢四分
