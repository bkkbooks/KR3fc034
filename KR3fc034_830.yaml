body:
  text: 遲疾問日法今有快行者日行九十五里慢行者日行七十五里慢行者先行八日問快行者幾日趕及舊法置慢行者日行七十五里以八日乘之得六百里為實卻以慢行七十五里快行九十五里相減餘二十里為法除之得趕及該三十日遲疾問里法今有甲日行八十里乙日行四十八里乙先行二百四十里甲始後行問幾里可及舊法置先行二百四十里以甲日行八十里乘之得一萬九千二百里為實卻以甲日行八十里乙日行四十八里相減餘三十二里為法除之得趕及處六百里解義先以八十里乘後以行多之里除亦先乘後除法也以三十二除二百四十里得七個半三十二里即七日半可追及以甲日行八十里乘之得七日半共行六百里即趕及之處也
  hash: sha256:8641393a38c7ca5026927e1faf01be8e05713bbece2ab6b0cdaadaef4f34e5df
