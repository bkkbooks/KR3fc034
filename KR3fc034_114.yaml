body:
  text: 隔位乘法言於應乘實位下以法首從隔位挨次至尾順乘而下乘完除實身一位破頭乘法言以法首數將應乘位破身順乘而下也解義四法一理晉頭乘今皆用此掉尾乘但倒記法位明白以次逆上極為宜捷推法位遇多先退數隔實下位坎為煩隔位乘退下一位即自法首乘起極順因乘完除身多此一番為煩然三法皆乘完破身法實照劉不致錯誤破頭乘先將實位改破恐易忘錯歸法單位曰歸凡二歸至九歸法單位者用此歸除法單位曰歸位數多曰歸除通而言之曰歸除置所問率為實以所求率為法皆從實首位而起以次而下以法之首位用歸次位下皆用除歸呼九歸之歌除呼九九之數次第除之故曰歸除降積用除法凡以二為歸便降作二分之一以三為歸便降作三分之
