body:
  text: 六角容圓圖今有六角面各二十步問角正長斜長併容圓積餘角積個若干增法六角面得六角斜長四分八釐一毫六系二忽一微零五沙置角面二十步以四分八釐一毫六系二忽一微零五沙為法除之得斜長四十一步五分二釐六毫四系二忽四微二纖另置斜長四十一步五分二釐六毫四系二忽四微二纖以角正長得斜長八分七釐六毫三系七忽九微為法乘之得角正長三十六步三分九釐二毫九系一忽一微卻置斜長四十一步五分二釐六毫四系二忽四微二纖減角面二十步餘折半加入面長共三十步零七分六釐三毫二系一忽二微一先以角正長三十六步三分九釐二毫九系一忽一微乘之得六角積一千一百一十九步五分六釐二毫八絲四忽另置斜長減圓徑即角正長三十六步三分九釐二毫九系一忽一微餘五步一分三釐三毫五系一忽三微一纖折半得餘角尖長二步五分六釐六毫七系五忽六微六纖再置圓徑即角正長
