body:
  text: 俱係多一故以滿法外多數為物此係少一故以滿法內少數為物也滿法者三數會齊之數或以三十為滿或六十或一百零五或五百零四為滿皆是三數至此俱會齊旡剩惟筭各至滿法數而止滿法以上皆不能筭也盈不足匿價差分法歌筭家欲推盈不足分率互乗物實數併盈不足為人實為法分率相減餘法除物實為物價法除人實人數目今有人買物毎人出銀五両盈六両毎人出銀三両不足四両問人與物價各若干舊法置列右出五両左出三両互盈六両不足四両先以右出五両互乗左下不足四両得二十両又以左出三両互乗右下盈六両得一十八両併二位共三十八両為物價實另併盈六両不足四両共十両為人實卻以出五両出三両對減餘二両為法除人實十両得五人除物價實三十八両得物價一十九両又法併盈六両不足四両為
