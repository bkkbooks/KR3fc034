body:
  text: 得五十八尺五寸又以深二尺四寸乗之得積一百四十尺零四寸以斛法二尺五寸為法除之得盛米五十六石一斗六升解義倍腰廣者即三廣田兩頭各取一廣中倍二廣之法每頭各置四廣各以四帰乃兩頭各自折平也將各四帰之數合併折半又將兩頭交互折平也增法合併兩頭各四廣之數共互十二尺亦合併各四帰淂八以除之可四帰二次及合併再折半之煩尖堆求積米歌堆法下周自乗均以高乗之除法分平地圓尖三十六倚壁外角念七數直壁半推一十八內角歸用九為法得數各以斛法除因積得米理不殊求平地圓尖堆積米法今有平地圓尖堆米下周四十八尺高一十二尺問積米若干舊法置下周四十八尺自乗得二千三百零四尺以高一十二尺乗之得二萬七千六百四十八尺卻以圓堆率三十六除之得積七百六十八尺以斛法二五
