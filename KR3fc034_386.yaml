body:
  text: 平圓一十二立圓三十六皆不遇取其大較耳或曰宻率徑七圕二十二徽率徑五十週一百五十七何不取二術酌之以立一定之法曰二術以圓為方以方為圓非不可但其還源與原數不同數多則散漫難收故筭暦者止用徑一圔三亦勢之不得巳也或曰曆家以徑一圔三之説立法數似未精然郭守敬之法至今行之無弊何也曰曆家以萬分為度杪以下皆不錄縱有小差不出於一度之中況所謂黃赤道弧背度乃測驗而得止以徑一圕三定其平差立差耳雖然行之日又安保其不差也竊甞思之天之道陰陽而已方圓天地也方象法地靜而有質故可以象數求圓象法天動而無形故不可以象數求方體本靜而中斜這乃動而生陽圓體本動而中心之徑乃靜而根陰天外陽
