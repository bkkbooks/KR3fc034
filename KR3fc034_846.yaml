body:
  text: 十六除之得一二五猶十六人分銀二兩每人分一錢二分五釐皆十六分中一分也兩是十分斤是十六分將十分截作十六分乃可化兩為斤也六二五是以位下起故曰退一二五以下俱本位下起故曰晉曰是者斤下位曰晉者斤本位也又挨位歸除截兩成斤歌一退十五二退十四三退十三四退十二五退十一六退十七退九八退八九退七十退六十一退五十二退四十三退三十四退二十五退一程賓渠曰算法遞下帶兩多將兩隔位置算豫觀算盤梁之上二子為十梁之下五十為五共有十五之數論一斤該數十六即將斤下位作兩假如五斤十五兩不必以下位作十又下位作兩只於斤下一位梁之上加二子梁之下加五子卻為十五兩若兼歸除為法為實如呼十五留九三七五就於本身梁之上除去一子梁之下除去一子餘九另
