body:
  text: 今有方內容圓方長十步問圓積四隅積各若干舊法置方十步自乗得方積一百步三因四歸得圓積七十五步四隅長各五步折半得二步五分自乗得一隅積六步二分五厘四隅共積二十五步圓的方四分之三四隅得圓三分之一解義以十分為圖圓七分五厘四隅二分五厘列慈四分之三伴人易晄此圖方內容圓之內又容方圓內方外容弧矢方內圓外容四隅以發互相考較庻無差誤求方內容圓法今有方面五十六步問內圓及四隅積各若干舊法置方面五十六步自乗得方積
