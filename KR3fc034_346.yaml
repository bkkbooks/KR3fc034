body:
  text: 今有圭田長七十五步濶三十步問積若干置長七十五步為實以濶三十步乗之得二千二百五十步折半得積一千一百二十五步增法置濶三十步自乗得九百步以長七十五步乗之得六萬七千五百步以濶三十步除之得二千二百五十步折半得積一千一百二十五步增法置長七十五步自乗得五千六百二十五步以濶三十步乗之得一十六萬八千七百五十步以長七十五步除之得二千二百五十步折半得積一千一百二十五步觧義濶縮長盈以乗盈折半得本積以七十五步自乗湏成捐至七十五分之三十分合積故以三十乗以七十五步除始合七十五分之三十以三十步自乗湏增加至三十分之七十五分合積故以七十五乗以三十除始合三十分之七十五分方圓三因四烯四因三烯一說也截圭小頭求截長截濶之法皆本此
