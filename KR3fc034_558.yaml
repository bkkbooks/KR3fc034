body:
  text: 數右定一法相呼乘法以除績數除數不盡又用次商廉即方外曆如之直謂一方帶兩邊直以的共壯取名曰庶一方不盡而後兩面加益故廉用倍法次商是方外再加之瀾廉即初方雨面之長相呼除績兩邊俱興初商方齊尚缺一角故即用次商相呼成一小方以浦雨庶之角所謂隅法也如啇除不盡再用三啇或終有不盡以法命之此為一乘方法曰乘者呼乘法而除積也再以方面自乘之積以方面乘之為二乘方又以方面乘二乘之積為三乘方二乘方即成立方上下六面俱同一方面如骰子樣是也三乘者立方之上再加高如窖深之類是也求立方其啇除之數須依一乘再乘約略定數如平方四步至八步啇二步立方八步至二十六步俱啇二步等是也三乘四乘以止只其
