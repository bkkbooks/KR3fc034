body:
  text: 筽來都是一除一乘都是鵝八隻雞三十隻鴨六十隻半五隻是乘都是雞二十隻鴨九十隻羊二隻是除該乘者總共乘之該除者總乘為法除之真通變大法也原每今有俱是同所換供是同以同者通乘為實以同者通乘為法除實故曰同運通乘通除相乘自乘法謂法實不同以法乘實曰相法實同數猶以實乘實曰自拙翁論曰自乘不特方田用之凡推求諸數多用自乘一法須從此研究洞徹如一自乘得一二自乘比一自乘多三三自乘比二自乘多五四自乘比三自乘多七每加一數所多漸加二數者各數內多出一個一自乘得一相同如三自乘又多兩個一乘三比二自乘兩個一乘二多二數四自乘兩個一乘四比三自乘兩個一乘三又多二數也互萬數始於一一自乘得一將一加作二倍則乘數得四倍二二得四也加作三倍則乘數得九倍三三得九也加作四倍則乘數得十六倍四四一
