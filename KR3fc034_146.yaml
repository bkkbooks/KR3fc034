body:
  text: 筽來都是一除一乗都是鵝八隻鷄三十隻鴨六十隻半五隻是乗都是鷄二十隻鴨九十隻羊二隻是除該乗者搃共乗之該除者搃乗為法除之真通變大法也原毎今有俱是同所換供是同以同者通乗為寔以同者通乗為法除寔故曰同運通乗通除相乘自乗法謂法實不同以法乗實曰相法實同数猶以實乗實曰自拙翁論曰自乗不特方田用之凢推求諸数多用自乗一法湏從此研究洞徹如一自乗得一二自乗比一自乗多三三自乗比二自乗多五四自乗比三自乗多七毎加一数所多漸加二数者各数內多出一個一自乗得一相同如三自乗又多两個一乗三比二自乗两個一乗二多二数四自乗两個一乗四比三自乗两個一乗三又多二数也互萬数始於一一自乗得一將一加作二倍則乗数得四倍二二得四也加作三倍則乘数得九倍三三得九也加作四倍則乘数得十六倍四四一
