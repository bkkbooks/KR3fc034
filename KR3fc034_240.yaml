body:
  text: 今有方田一叚從中心截一圓田作塘塘外四面濶各十歩方周此圓週二倍問外方圓徑及內外田各若干増法置兩面外方內餘濶二十歩倍之得內徑四十歩加外濶二十歩得外方面六十歩內圓徑四十歩自乗得一千六百歩三因四歸得內圓積一千二百歩外方六十歩自乗得共田積三千六百歩除內圓一千二百歩得餘方積二千四百歩増法圓外濶各十五歩方周比圖周兩倍餘四十歩問方徑田置兩面濶共三十歩倍之得六十歩另置餘四十歩折半得二十歩以減倍濶六十歩得內圓徑四十歩加兩濶三十歩得外方面七十歩照上除內圓積得餘方積増法圓外各濶五歩方周比圓
