body:
  text: 今有方田一假從中心截一圓田作塘塘外四面濶各十步方周此圓周二倍問外方圓徑及內外田各若干增法置兩面外方內餘濶二十步倍之得內徑四十步加外濶二十步得外方面六十步內圓徑四十步自乘得一千六百步三因四歸得內圓積一千二百步外方六十步自乘得共田積三千六百步除內圓一千二百步得餘方積二千四百步增法圓外濶各十五步方周比圖周兩倍餘四十步問方徑田置兩面濶共三十步倍之得六十步另置餘四十步折半得二十步以減倍濶六十步得內圓徑四十步加兩濶三十步得外方面七十步照上除內圓積得餘方積增法圓外各濶五步方周比圓
