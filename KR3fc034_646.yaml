body:
  text: 九尺又置初次啇六十七尺以初啇六十尺乘之得四千零二十尺又置初啇六十尺自乘得三千六百尺併三數共一萬二千一百零九尺另置初啇六十尺以次啇七尺乘之得四百二十尺以乘一萬三千一百零九尺得五百零八萬五千七百八十尺併加前初啇三乘一千二百九十六萬共一千八百零四萬五千七百八十尺卻以初次啇六十七尺乘之得一十二萬零九百零六萬七千二百六十尺以初啇六十尺歸之得二千零一十五萬一千一百二十一尺除實恰盡以所啇得方西六十七尺解義前法以初啇六十自乘再乘為立方三乘是乘作六十個立方即以一立方為凖完其平亷長亷隅法亦以六十乘作六十個亷隅共乘全六十個六十七尺方而的立方尚少七個立方卻以六十七一乘再乘三乘淂一個立方又以七因得七個立方以完六十七尺三乘之積後法以初次啇自乘又以初啇乘初次啇又以初啇自乘即兩不用亷隅求立方之法其又以次啇七乘初啇六十為法乘三數者以七乘是完三數之立濶以六十乘是前三數亦止一立方之亷隅故因作六十個立方之亷隅也然原積是六十七濶立方
