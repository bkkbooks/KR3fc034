body:
  text: 九尺又置初次啇六十七尺以初啇六十尺乗之得四千零二十尺又置初啇六十尺自乗得三千六百尺併三數共一萬二千一百零九尺另置初啇六十尺以次啇七尺乗之得四百二十尺以乗一萬三千一百零九尺得五百零八萬五千七百八十尺併加前初啇三乗一千二百九十六萬共一千八百零四萬五千七百八十尺卻以初次啇六十七尺乗之得一十二萬零九百零六萬七千二百六十尺以初啇六十尺歸之得二千零一十五萬一千一百二十一尺除實恰盡以所啇得方西六十七尺解義前法以初啇六十自乗再乗為立方三乗是乗作六十個立方即以一立方為凖完其平亷長亷隅法亦以六十乗作六十個亷隅共乗全六十個六十七尺方而的立方尚少七個立方卻以六十七一乗再乗三乗淂一個立方又以七因得七個立方以完六十七尺三乗之積後法以初次啇自乗又以初啇乗初次啇又以初啇自乗即兩不用亷隅求立方之法其又以次啇七乗初啇六十為法乗三數者以七乗是完三數之立濶以六十乗是前三數亦止一立方之亷隅故因作六十個立方之亷隅也然原積是六十七濶立方
