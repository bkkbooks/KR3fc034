body:
  text: 之得五錢以十因之得上等毎戶則例銀五両另置五錢以八因之得下等毎戶則例銀四両解義將上下戶各以十與八因之乃毎戶分作十分筭也將一百二十戶一百二十四戶對減餘四戶即一戶之四分也將両不足對減餘二両是人戶相差一戶之四分銀上下差二両以四除二両淂五錢乃人戶毎戶十分之一淂五錢故以十分乗之淂上戶例以八分因之淂下戶例又法今有二甲裏戶泒貼差銀両趙甲上十一戶下八戶泒銀出五分之四多銀四両六錢錢甲上七戶下一十六戶泒銀出九分之七多一十二両只雲下戶比上戶十分之八問應差銀數若干及各甲出銀若干各戶泒銀及各共泒銀若干增法置趙甲上十一戶以十因之得一百一十戶下戶八戶以八因之得六十四戶併之共一百七十四戶置錢甲上七戶以十因之
