body:
  text: 五十裏丁縣一萬三千三百三十八戶粟石價一兩七錢遠輸二百五十裏戊縣五千一百三十戶粟石價一兩三錢遠輸一百五十裏內甲縣自輸本縣無僦裏乙丙丁戊四線皆有之問各輸粟若干舊法置甲縣二萬零五百二十戶以粟價二兩為法除之得一千零二十六衰另置乙縣行道二百里以每車載二十五石除之得八錢併粟價一兩共一兩八錢為法除戶一萬二千三百一十二得六百八十四衰又置丙縣行通一百五十裏亦以二十五石除之得每石六錢併粟價一兩二錢共一兩八錢除戶七千一百八十二得三百九十九衰又置丁縣行通二百五十裏亦以二十五石除之得每石一兩併粟價一兩七錢共二兩七錢為法除戶一萬三千三百三十八得四百九十四衰又置戊縣行通一百五十裏亦以二十五石除之得六錢併粟價一兩三錢共一兩九錢為法除戶五千一百三十得二百七十衰併五衰共得二千八百七十三衰為法却置輸粟二萬為實
