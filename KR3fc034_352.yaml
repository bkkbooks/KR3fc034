body:
  text: 解義圭田梯田相表梯田大小有二濶用相減餘步為涸差圭田止一濶上尖無濶如長七十五步將濶三十步減盡則原濶便是濶差故以原長原濶相乘除即同以相減濶差相乘除一理也圭田截尖仍是圭法故將倍積濶長反復乘除開方得長得濶截大頭即係梯田將倍積濶乘長除減濶自乘積開方得截濶仍是梯田截大頭得濶要求截長須得徔截濶原濶求出濶差乃可得故與截上尖因長符濶因濶得長俱用原濶原長乘除之法不同看增法相減濶差之説理自明矣大截圭上尖仍是截長截濶本數相乘折半得本積故倍積以原長原濶乘除開方俱可得截長截濶截大頭則係大小濶折平以截長得積故也求出濶差乃可得截長圭梯互求廣縱歌圭求中廣要思量廣乘長除在尖長梯求尖長在上廣梯上乘之差除想圭問梯長減廣餘尖長乘之上廣除通長可問梯下濶上廣乘之尖除約今有上圭下梯通長一十二尺廣一十二尺八寸上截圭尖長一尺五寸問截中廣若干舊法置尖一尺五寸以下廣一十二尺
