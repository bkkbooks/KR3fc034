body:
  text: 爐原鐵礦二百三十二斤五兩問今熟織若干舊法置原鐵礦二百三十二斤五兩將斤用加六法通之併入零五兩共三千七百一十七兩另置每入爐十分之七自乘得四分九釐再乘得三分四釐三毫為法乘之得一千二百七十四兩九錢二分一釐用截兩為斤法通之得七十九斤六八三一八七五將斤不動六八以下用加六法通之得十兩九錢三分一釐併斤共得熟織七十九斤一十兩九錢三分一釐又法將原鐵礦化兩數以七乘三次亦得解義七斤自乘非以七斤為法乃以十分之七為法一次入爐十分存七分二次入爐十分上存四分九釐三次入爐十分止存三分四釐三毫每乘俱是備積田以七自乘得四十九再乘得三百四十三為法亦誤今俱改正鎔鋉分等問原兩法今有煉銀礦為銀初次入爐每三兩煉得二兩第二次入爐每七兩煉得五兩第三次入爐每五兩煉得四兩凡三次入
