body:
  text: 十五為衰除實得首尾甲戊二人數互和首尾數折半得中丙數又互和丙戊數折半得丁數互和甲丙數折半得乙數如位數多者皆以空位取之併而為法除實得首尾數四位者將多數用三歸六位者用五歸之解義互和減半換次差分或三位五位不等皆中一人得本數首尾二人共得二數首次位與尾次位亦共得二數就中差等自首至尾各挨次減若干也如三位不用一三五用三五七者與一三五七九皆以五居中兩頭三七成十一九亦成十也然如三位三五七衰數得十五以十五除一百八十石應得十二石非一百二十石四位二四六八衰併二十以二十除二百四十兩應得一十二兩非一百二十兩五位一三五七九併衰得二十五乃以二十五除二百三十八貫六百應得九貫五百二十非九十五貫二百則知三位為法當以一五非一十五四位為法當以二非二十五位為法當以二五非二十五乃是各逆位折半三位折半得一五四位折半得二五位折半得二五也譬如五位以五除原實是五人每人一分以折半二五除原實是每人二分便是首尾共和之數法當用位數折半為宜
