body:
  text: 率六折事淂三也方每層加八故以八歸八個作一個算每層加六故以六歸六個作一個算其與舊法互相又法三歸外周以周三㷌之也又加一者三歸外周如圓徑數易外周三個二徑連中心淂十三加一乃合個數徑也今有箭一圓束外周三十三根問總積若干增法置外周三十三根以六歸餘三得內周亦三加入外周共三十六自乘得一千二百九十六為實以圓束率十二除之得總積一百零八根又增法置外周三十三以六歸得五五亦置內周三以六歸得五併之共得六自乘得二十六為實以六折半得三為率乘之得總積一百零八根又增法置外周三十三以圓三歸之得十一加一得十二自乘得一百四十四三因四歸得總積一百零八根解義前國各曾層俱整六內周以六圓一有中心此內周半六半每層俱有半六無中心有中心者除中心在外乘除完外加之無中
