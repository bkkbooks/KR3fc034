body:
  text: 十步不知幾畝及分釐舊法置廣斜相併五十步自乘得二千五百步另以長三十步自乘得九百步以少減多餘一千六百步折半得八百步為實以廣斜五十步為法除之得濶一十六步以乘長三十步得積四百八十步以畝法二四除之得田二畝解義此即勾弦和求勾法解見勾股章難題長濶差步問長濶西江月假有坡地一假中間一賣安塋總皆一畝二分平更有八厘相應只要縱多二堵每堵八尺無零築墻選日雇工與幾許封堆可定此言有地一假計一畝二分八厘周圍築墻每堵八尺長比濶多墻二堵問長濶各若干墻若干堵舊法置田一畝二分八厘以畝法二四通之得積三百零七步二分為實另置縱多墻二堵以八尺乘之得一十六尺以步法五尺歸之得三步二分為縱方以開平方帶縱法
