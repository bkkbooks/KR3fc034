body:
  text: 十歩不知幾畆及分釐舊法置廣斜相併五十歩自乗得二千五百歩另以長三十歩自乗得九百歩以少減多餘一千六百歩折半得八百歩為實以廣斜五十歩為法除之得濶一十六歩以乗長三十歩得積四百八十歩以畆法二四除之得田二畆觧義此即勾弦和求勾法觧見勾股章難題長濶差歩問長濶西江月假有坡地一叚中間一賣安塋總皆一畆二分平更有八厘相應只要縱多二堵毎堵八尺無零築墻選日僱工與幾許封堆可定此言有地一叚計一畝二分八厘周圍築墻毎堵八尺長比濶多墻二堵問長濶各若干墻若干堵舊法置田一畆二分八厘以畆法二四通之得積三百零七歩二分為實另置縱多墻二堵以八尺乗之得一十六尺以歩法五尺歸之得三歩二分為縱方以開平方帶縱法
