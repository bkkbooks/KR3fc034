body:
  text: 千舊法置深七尺五寸以每尺二根計之得一十五根即倍法也又以濶四丈七尺倍作九十四根相乘得一千四百一十根為實另置長九丈以每根長一丈五尺除之得六根為法乘實得八千四百六十根又以深七尺五寸加之得木一萬四千八百零五根增法置濶四丈七尺以深七尺五寸乘之得三百五十二尺五寸再以長九丈乘之得三萬一千七百二十五尺再以每尺四根乘之得一十二萬六千九百為實以每根長一丈五尺為法除之得八千四百六十根卻以深七尺五寸為法加之得一萬四千八百零五根解義濶深加倍者木以方五寸為一根濶一尺深一尺俱應作二根故俱用加倍合一根之徑長一丈五尺為一根故以一九五尺除長合木每根之長以便乘除得木根數再用加倍增法濶以深乘再以長乘又用四乘之即一尺乘作四根卻以十五除卻每十五尺除作一根一理也具先用四乘後用十五除卻後除法也或先用加法完後以長十五尺除之亦得方梱法今有方梱深七尺濶五丈長六丈問木若干舊法置深七尺倍
