body:
  text: 七十日以每日四百尺乘之得二萬八千尺為實卻以乙日開三百五十尺為法除之得八十日與甲同並工求積法原有一夫日耕田三畝日種田七畝日耘田五畝今令一夫兼耕種耘三事俱相等問治田若干舊法置田為分母夫為分子以母互乘子先以三畝乘七畝得二十一畝又以五畝乘之得一百零五畝為實另以三畝乘七畝得二十一畝又以三畝乘五畝得一十五畝又以七畝乘五畝得三十五畝併三數共七十一畝為法除實得並耕種耘田一畝四分七厘不盡六十三命曰零七十一分之六十三解義三五七遞乘得一百零五乃三數會齊之數也三數聯絡互通如以七乘五得三十五以三除一百零五正得三十五以三乘五得二十五以七除一百零五正得一十五以三乘七得二十一以五除一百零五正得二十一是耕三畝者三十五個夫耕得一百零
