body:
  text: 高如股以多二尺為股弦較二數相乗得八尺倍之得一十六尺以開平方法除之得四尺即弦和較加多豎之二尺得門廣六尺加多廣之四尺得門高八尺全加多廣多豎共六尺得竿長即門斜十尺餘股求股弦歌餘股之法理冝明勾自乗之除法行餘股即為股弦較加減折半總相同餘股求股長弦長圖今有牆高一丈有二木齊長斜倚一木於牆木杪與牆頭齊卻將木一根平臥於地木根抵牆根腳木杪則過斜木一尺問木長並去牆若干舊法置牆高十尺為勾自乗得一百尺以過斜木根一尺為股弦較除之如故得一百尺加較一尺共得一百零一尺折半得斜木如弦長五十尺零五寸減臥木過
