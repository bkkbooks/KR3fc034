body:
  text: 初啇二百於左自呼除實四萬餘實一萬七千六百石次啇四十於左初啇二百之下即以次啇四十與初啇二百相呼除實八千又以四十與初啇二百相呼除實八千又次啇四十自呼除實一千六百恰盡得舡二百四十隻每舡裝糧二百四十石解義開方此法最者便後載此二法以見開方之法旡事不可推筭不止田畆一節今有直田積四百六十四步只雲濶不及長一十二步問長濶各若干舊法置積八百六十四步於盤中為實以不及一十二步列於右為縱方初啇二十步於左第一位亦置二十步加於縱十二之位共三十二皆與上啇二十相呼除實六百四十餘實二百二十四步卻將下法初啇二十倍之倍法不倍縱共五十二次啇四步於初啇二十之次下法亦
  hash: sha256:d733554631c37bf9d3d7e8ce739f786cd687db01970e915e0f8df1a05db8bc39
