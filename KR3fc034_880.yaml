body:
  text: 得熟米三百四十三石九斗三升九合二勺照沠納樋法今有官沠樋八百四十石令四戶照依田畝多寡納之甲田五十六畝乙田四十四畝丙田三十二畝丁田二十八畝問各該納若干舊法置糧八百四十石為實併四戶田共一百六十畝為法除之得五石二斗五米以各田數分乘之得甲應納二百九十四石乙應納二百三十一石丙應納一百六十八石丁應納一百四十七石或分置各田數各以官沠糧八百四十石乘之以併四戶田一百六十畝除之亦得照例納倉法今有糧三千六百石只雲每石則側令三倉上納東倉二斗三升四合南倉四斗二升一合四倉三斗四升五合問各倉該米若干舊法置總糧三千六百石為實以各倉則例乘之以二斗三升四合乘得東
