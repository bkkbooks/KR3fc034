body:
  text: 解義斜尖田雖尖偏兩邊長短不一然以濶為圭長與長折半短與短折半數自無差今分作二假以濶乘二十步折半得一百六十步以濶乘十步折半得八十步仍合原田積也今有三角田每面一十四步問中徑及積若干舊法三角徑得面七分之六以面求徑六因七歸以徑求面七因六歸置靣一十四步以六因之得八十四步以七歸之得中徑一十二步以乘面一十四步得一百六十八步折半得積八十四步解義三角田將六因七淂徑面淂七步徑得六步然以勾股法求之則面七步徑六步零六釐不盡徑六步九分有零以圖容三角考之則又靣七徑六為準解詳後圓容三角下今有梭田中長五十二步中廣一十二步問積若干舊法置中長五十二步以中廣一十二步乘之得六百二十四步折半得
  hash: sha256:638b825997438c0c6a68cf2e09d6cb6d305cb59f873e3d39f378c1db0e6877d5
