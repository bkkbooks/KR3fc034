body:
  text: 觧義斜尖田雖尖偏兩邊長短不一然以濶為圭長與長折半短與短折半數自無差今分作二叚以濶乗二十步折半得一百六十步以濶乗十步折半得八十步仍合原田積也今有三角田每面一十四步問中徑及積若干舊法三角徑得面七分之六以面求徑六因七歸以徑求面七因六歸置靣一十四步以六因之得八十四步以七歸之得中徑一十二步以乗面一十四步得一百六十八步折半得積八十四步觧義三角田將六因七淂徑面淂七步徑得六步然以勾股法求之則面七步徑六步零六厘不盡徑六步九分有零以圖容三角考之則又靣七徑六為準觧詳後圓容三角下今有梭田中長五十二步中廣一十二步問積若干舊法置中長五十二步以中廣一十二步乗之得六百二十四步折半得
  hash: sha256:660958343ace0475cbd63d47a6b7fff1dff26e6adb52fa625949ffeb9f515cba
