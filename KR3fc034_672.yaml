body:
  text: 為縱方用帶縱開平方法除之得上方九尺又法以上下方問深即置米以斛法二五乗之再以三因之得四千三百二十九尺為實另置上方自乗六十一尺下方自乗一百四十四尺上方乗下方得一百零八尺三共三百三十三尺為法除實淂深一十三尺解義因米求窖即以窖求積法次還源將三因之積以深除之合上下方自乗互乗之積內除減上方自乗止存下方自乗與下方乗上方如同濶十二尺長十二尺又加九尺減下方自乗止存上方自乗與上方乗下方如圓通濶九尺長九尺又加十二尺故用九與十二帶開方可淂上方下方也長窖求米法今有長窖上長一十九尺廣一十一尺下長二十一尺廣一十三尺深一十二尺問積尺及米若干舊法置上長一十九尺加倍得三十八尺加入下長二十一尺共五十九尺以上廣一十一尺乗之得六百四十九尺另置下長二十
