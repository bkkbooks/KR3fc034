body:
  text: 步之十二然減之十二分合成四十二長仍十三屬止十二自乗毎分仍有零餘十三分之一以一乗十二得十二即十二自乗較十二乗十三所差之十二加入乃合本數也周得徑九積法與徑同除法用分母自乗數者毎步分作母數母自乗乃廣縱皆一步也通分求環積法今有環田內週六十二步四分步之三外週一百一十三步二分步之一徑一十二步三分步之二問該積若干舊法置內外周併共一百七十五步另以內周之三乗外周分母二分得六分又以外周之一乗內周分母四分得四分併之得十卻以分母二分四分相乗得八為法除十得一步二分五厘併前步共得一百七十六步二分五厘折半得八十八步一分二厘五毫為實卻置徑十二步以分母三通之得三十六加分子二共三十八為法乗之得三千三百四十八步七分五厘以分母三除之得積一百一十一步六分二厘五毫解義以外周之一乗內週四分淂四即以內週四分乗外周之一淂四乃將零二分之一俱以四分之也以內周之三乗外週二分
