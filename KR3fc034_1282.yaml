body:
  text: 因分母六千五百六十二得一萬九千六百八十三為法除之得六寸一萬九千六百八十三寸之一萬二千九百七十四隔八下生仲呂仲呂屬陰律長六寸一萬九千六百八十三分寸之一萬二千九百七十四卻以分母通六寸加分子共得一十三萬一千零七十二寸以空圍九分因之得一千一百七十九萬六千四百八十分以分母一萬九千六百八十三為法除之得積五百九十九分一萬九千六百八十三分寸之六千三百六十三其候小滿統紀歷年度分地裏今有一元統十二會一會統三十運一運統十二世一世積三十年問一元該年若干置十二會以乗三十年得三百六十又以十二世乗之得四千三百二十再以毎世三十年為法乗之得一元共該一十二萬九千六百年今有周天三百六十五度四分度之之一毎度經地二千九百二十裏零二
