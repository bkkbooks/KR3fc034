body:
  text: 天之多少為平舊法置繩斜長九十五尺如弦自乘得九千零二十五尺又繩頭量至上下相應七十六尺如股自乘得五千七百七十六尺以減弦積餘三千二百四十九尺為是以開平方法除之得高五十七尺又股弦求勾難題歌池河八分下釣釣魚吞中底是根由勾繩五十岸齊並使盡機關無法籌縱橫源流雖辨認水深幾尺數難求舊法置圓池八分以畝法二四通之得一百九十二步四周三歸得二百五十六步以開平方法除之得池徑一十六步折半得八步以每步五尺乘之得池半面加股四十尺自乘得一千六百尺鉤繩五十尺如弦自乘得二千五百尺相減餘九百尺為實以開平方法除之得水深三十尺解義難題諸法不過即求弦求股求勾正法但皆借事設喻故修列以助思悟
