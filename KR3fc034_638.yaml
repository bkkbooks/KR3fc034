body:
  text: 開三乘立方法今有三乘立方積二千零一十五萬一千一百二十一尺問方西及高各若干舊法置積二千零一十五萬一千一百二十一尺為實於中用開平方法除之得四千四百八十九尺又為實用開平方法除之得方六十七尺自乘得高四千四百八十九尺又法置積為實於中初啇六十於左下法亦置六十於右自乘得三千六百再乘得二十一萬六千尺為隅法與上啇六十相呼二六除一千二百萬一六除六十萬六六除三十六萬共除一千二百九十六萬餘實七百一十九萬一千一百二十一尺乃以四乘隅法二十一萬六千得八十六萬四千為方法另置初啇六十自乘得三千六百尺又以六因之得二萬一千六百尺為上亷又以四乘初啇六十得二百四十為下亷次啇七尺於左六十之次下法亦置七尺自乘得四十九尺再乘得三百四十三尺為隅法又以次啇七尺乘上亷二萬一千六百得一十五萬一千二百又以七尺乘下亷二百四十
