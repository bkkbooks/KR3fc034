body:
  text: 若逢隔位須隔位一位乘完一數成如有四長六十五步六分二釐五毫濶二十步零二分八釐八毫問積數若干舊法置長六十五步六分二釐五毫自首上寅位定實首位六十以次定邜五步辰六分巳二釐午五毫以濶二十步零二分八釐八毫為法從實首起逐位挨乘先以手掯搯在掯搯辰位上以法首數與實二位相呼二五成一十再應以法苐二位與實首相呼因法二位空無呼即於邜位二數加一成三又以掯搯巳位上以法首數與實辰位六相呼二六一十二再以法二位空無呼隔辰前邜一位却以法苐三位二與辰前三位即實首寅位相呼二六一十二併二呼共二十四就於辰位上定二巳位上定四又以掯搯午位
