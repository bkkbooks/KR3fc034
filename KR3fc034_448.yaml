body:
  text: 矢乘餘徑與半弦自乘亦不合如前圓所面正七步以勾膠弦求之七步自乘得四十九步正長即股自乘得三十六步半弦即勾自乘得一十二步二分五厘合二數比角面即弦自乘數少七分五厘若步數增多知圓徑八七五十六步三角西訣七七四十九步中長訣六七四十二步以此算積亦合然以四十九步為弦自乘得二千四百零一步半面如勾以二十四步五分自乘得六百步零二分五厘中長四十二步即除自乘得一千七百六十四步合二數共二千三百六十四步二分五厘比弦積少三十六步七分五厘其差少者何也三角之整面半面無可疑自係中長不是故也如一個七步自乘中長六步自乘得三十六步併半面數數斜面少七分五厘是每三十六步少七分五厘也將四十二步自乘之一千七百六十四步以三十六步除之得四十九以七分五厘乘之即得三十六步七分五厘可見數始於一積而至多所差必遠以此知三角弧矢之數未可為準也且以前截圖中半法求之一面弧矢二步弦七步正對再截弧矢二步中餘四步將弦七步併中徑八步折半得七步五分以四步乘之得三十步另將中徑八步減弦七步餘一步折半得五分自乘得二分五厘共該積三十步零二分五厘併二弧矢十八步比圓積多二分五厘則弧矢之數必多三角之數必少可知也然面以求諸圓皆合者何也曰圓容三角將圓以十六分之弧矢得九分三角得七分以施之諸圓皆可以十六分分之面合故亦無不合也其實
