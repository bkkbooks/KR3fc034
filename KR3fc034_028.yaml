body:
  text: 五月餘值使旌不乃巳那項友損方憂無術而邑南之江寧鎮復罹劫鞘之異鎮浸專訊友遠之里六十屬鞭長雞及行且受地方嚴下賠銀檄矢戌之七月謝邑務那項尚穎抵未三月而先嚴凡向縮地繇比震慟義欲
