body:
  text: 五月餘值使旌不乃巳那项友损方憂無術而邑南之江寕镇復罹刼鞘之異鎮浸耑讯友遠之里六十属鞭長雞及行且受地方嚴下赔銀檄矢戌之七月谢邑務那项尚颖抵未三月而先嚴凢向缩地繇比震慟義欲
