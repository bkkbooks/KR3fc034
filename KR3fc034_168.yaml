body:
  text: 長濶加數乗除法如原濶原長為法乗除以求本積或有餘或不足即就本數尋出加添法或加入後乗或乗完另加一合本實堆垜法多用此然皆因法以加非臆造也商除法謂酌量積是多寡心意相商而除之開方法用此矢徑較法謂如圓田截作弧矢徑相乗半弦自乗較量分數勾股弦法勾股法無數不可推求勾自乗股子乗合併與弦自乗同積求直求方求斜湏以此為準加法歌加法仍從下位先法首不動次位添得數使湏在本位不用法前法後黍九法首有一數者置所有物為實以所求價為法本身步動只浖零數于次住挨次加之亦從求為加起
