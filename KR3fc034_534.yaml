body:
  text: 三尺餘二丈七尺乘之得一千三百五十丈為實另置後表退行六十二丈減去前長退行六十丈餘二丈為法除之得六百七十五丈加入表高三丈共六百七十八丈以釐法一百八十丈為法除之得島高三裏一百三十八丈另置表問五百丈以前表退行六十丈乘之得三萬丈為實亦以減餘二丈為法除之得一萬五千丈以裏法一百八十丈為法除之得前表至島遠八十三裏六十丈解義此與望木同法雖立四竿二短竿即人目處猶二表法也前後表得八分之三此得六十二分之二前六十分後二分二表餘勾股窺定攻守圖今有城頭禦寇砍求寇營遠近未知城高計城頭垜口高三尺三寸於中口垜牆一尺內立表竿四尺退行八尺又立望竿四尺二寸人自窺望二竿末正與寇營斜對另退卻一十七尺
