body:
  text: 石二斗五升各以原價乘之得各共價合率算支法今有鰥寡孤獨四貧民共給米二十四石其鰥者四分寡者五分孤者七分獨者九分問四民各該若干舊法置米二十四石為實另置鰥四寡五孤七獨九合得二十五為法除實得九斗六升為一衰之數以鰥四因之得鰥該三石八斗四升以寡五因之得寡該四石八斗以孤七因之得孤該六石七斗二升以獨九因之得獨該八石六斗四升難題合麻問布法歌趙嫂自言快績麻李宅張院雇了他李宅六斤十二兩二斤四兩是張家共織七十二尺布二人分布鬧喧謙借問鄉中能算士如何算得無爭差舊法置布七十二尺為實另以李六斤十二兩將斤加六得李率一百零八兩張二斤四兩將斤加六得張率三十六兩合併得一百四十四兩為
  hash: sha256:45b84afdcf4cc361180985d27cabd78ccee4a0b73b60267235d654f41a2d8ba3
