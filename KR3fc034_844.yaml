body:
  text: 三留八一二五十四留八七五十五留九三七五如有銀四百三十二兩問該斤若干舊法置銀四百三十二兩為實以截兩法通之得二十七斤或以十六除之亦得算盤定位只認十兩位上得斤依次求之今列算式於後先呼加五次呼加五共成十進前位空先呼加二次呼加七共九併下位進一成十進前位空呼先呼二留一二五變本身二為一更於下位加二又下位加五起次呼加八連先呼一共九併下位進一成十進前位空次呼三留一八七五變本身三為一更於下遞加八七五又呼加五連次呼一共六併下位進一得七尺呼四留二五變本身為二併於下位加五成七得全二百七十斤解義一退六二五者將一兩以十六除之得六二五猶以十六人分一兩每一人應分六分二厘五毫二一二五者將二以
