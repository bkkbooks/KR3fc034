body:
  text: 而內陰地外陰而內陽陰陽交錯而萬物化生其機正合於畸零不齊之處上智不能測巧曆不能盡者也向使天地之道俱可以限量求之則化機有盡而不能生萬物矣拙翁論曰方中之徑為陰中包陽圓中之徑為陽中包陰以五七一三為法方與徑不足斜與周有餘陰常處縮陽常處盈此天地至理也化無方體惟有畸零天地之數所以不測若蕳直可了則天地亦易窮矣惟是天地之數無盡古人立法以盡之非真能盡之也可盡者以可盡了之不可盡者立法以盡其無盡則不可盡者亦盡是數法之多畸零亦勢之不得不然也蓋數至畸零難齊雖推索至終究難窮盡如歷年之有歲差巧算亦難齊一但相差微者立法以減其差如後斜七方四
