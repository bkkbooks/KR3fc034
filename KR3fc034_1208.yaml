body:
  text: 解義此與上例同法先以正馬一互左行借馬一淂馬一正驢三淂驢三載四石二斗仍四石二斗以借馬一互乗右行正馬一六馬一借騾一淂縲一錢四石二斗仍四石二斗一邊是一馬一騾是載四石二斗一邊是一馬三驢共載四石二斗両下對減旡餘乃是除一馬徹平外三匹驢所載適合一匹騾所載両平旡剩也再以騾為法以正騾二乗負騾一淂騾二乗驢三淂驢六乗四石二斗得八石四斗以負騾一乗正騾二淂騾二乗借驢一淂驢一乗四石二斗仍四石二斗一邊是二騾一驢共載四石二斗一邊是二馬六驢共載八石四斗對減去二騾一驢所載共四石二斗尚餘四石二斗乃六驢所載對減去一驢二馬所載對減去二騾仍餘二驢合減餘五驢共成七驢所載故以六驢一驢合併淂七驢為法除之淂驢毎匹載六斗然此惟再以騾為法可淂驢力若以驢為法則不可淂騾力與上法可互求者不同所以然者因驢三匹與騾一匹所載相當旡零餘可以減除故也又法今有賣二牛五羊買十三豬剩銀五両賣一牛一豬買三羊適足賣六羊八豬買五牛少銀三両問牛羊豬各價若干右正牛二正羊五負豬十三正五両
