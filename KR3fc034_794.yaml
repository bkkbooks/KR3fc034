body:
  text: 高二十一尺倍之得四十二尺加東高九尺共五十一尺卻以西頭上廣二十尺下廣二十二尺合併得四十二尺乗之得二千一百四十二尺折半得一千零七十一尺二數相併共一千五百尺再以長九十六尺乗之得一十四萬四千尺為實以六歸之得積二萬四千尺觧義前長窖長臺高是兩頭均平長廣不等故將長廣立法相乗取平卻以高乗此堤長是上下均平高廣不等故將高廣立法相乗取平後以長乗前窖臺長廣雖不等只是上典下不等其上廣上長下廣下長兩頭俱均平通筭止二長二廣故用倍上長加下長以上廣乗倍下長加上長以下廣乗便可通融取平此東西上下共二高四廣故又合併二廣乗之始可通融取平其將聚數折半即將上廣下廣合併折半乗之一也然田法用五歸得積二萬八千八百尺多積四千八百尺今考騐宜作六歸併原歌改正其冝作六歸何也歸法因乗法立所以歸其多乗之數也九筭積只是一長一一高田乗為本等信東高加兩高倍西高加東高是六萬矣又各合併上下廣乗又是二廣便是十二個乗法將積各減半即是二廣析作一廣仍是六個乗法自應同六歸田用五歸為無據只分析筭之典積不合今併圖於後成令覽者瞭然洞了不為前說所惑亂也
