body:
  text: 錢六百文得毎尺價二十文以毎疋長四十尺乗之得毎疋價一千二百文難題因借知原西江月甲乙隔講牧放二人暗裏參詳甲雲得乙九個羊多你一倍之上乙説得甲九隻両家之數相當二適同坐細商量盡地筭了半晌此言甲乙二人各牧羊甲借乙羊九隻淂乙二倍乙借甲羊九隻邊等問甲乙各羊若干添乙羊九个多乙羊一倍為二十分却减借乙羊九个為一分得十九分另以乙羊添甲羊九個兩家相當為十分內減借甲九個為一分得十九分俱以借羊九隻乗之以九乗十九分得一百七十一以九乗九分得八十一二數對減餘九十折半得乙羊四十五隻另置甲一百七十一內減乙羊四十五隻餘一百二十六折半得甲羊六十三隻增法置甲借乙羊九個多乙羊一倍甲二分乙一分共得三分另置乙借甲羊九隻相當甲一分乙一分共得二分二數相乗得六以借羊九隻乗之得五十四隻加入九隻
