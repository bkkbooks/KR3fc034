body:
  text: 得一萬卻置總物總價對減餘物五個以梨九乗之得四十五併入共一萬零四十五以總平法四十一除之得二百四十五為賤物桃與價平法以桃七乗得桃數以桃價四文乗得桃價又以多桃三個互乗總價四千九百九十五文得一萬四千九百八十五卻以總物總價對減不及價三文以桃價四文乗之得二十以減一萬四千六百八十八餘一萬四千九百六十五為實以總平法四十一除之得三百六十五為貴物貴價平法以梨九乗得梨數以梨價十一乗得梨價解義貴賤差分設如貸十一文買梨一個錢四文買桃一個貴賤價數不等物數卻相等只用上差分法變貴物或賤物乗總價求之將是貴賤價數不等物數又不等物將不等物數價數等量平法求之物互乗對減除的十一為法者何也錢十一文買梨九個是多錢二文錢四文買桃七個是多少物三個即以二三為法乗價以二乗四文淂八文以三乗十一文淂三十三文併之共淂四十一以二三為法乗物二乗桃七淂一十四三乗梨九淂二十七併之亦淂四十一乃三倍錢十一文買三倍梨九個二倍錢四文買二
