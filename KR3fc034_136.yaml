body:
  text: 五得二十再以一十二乘之得二百四十就置實用二歸四除以代三次歸除異乘同乘法如原每人一日織錦八尺二寸五分今有五十六人共織二十七日間共織錦若干舊法置五十六人乘二十七日得一千五百一十二工再以日織錦八尺二寸五分乘之得共織錦一萬二千四百七十四尺解義興即通乘法又以共同言者原人今人原日今日原錦今錦為異原人原日原錦為同今人今日今錦為同以今五十六人乘今二十七日是同乘以乘原日織錦八尺二寸五分是異乘故曰異乘同乘七若以原五十六人織錦二十七日共織一萬二千四百七十四尺同沒人每日織錦若干則富罡共錦以五十六人二十七日相乘為法除之又却通除法矣異除同除法如有客一十五人住一十二日公用米三石六斗問每日每人用米若干舊法置米三石六斗為實另以一十五人乘一十二日得一百八十人為
