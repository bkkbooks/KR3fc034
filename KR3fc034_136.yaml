body:
  text: 五得二十再以一十二乗之得二百四十就置實用二歸四除以代三次歸除異乗同乗法如原毎人一日織錦八尺二寸五分今有五十六人共織二十七日間共織錦若干舊法置五十六人乗二十七日得一千五百一十二工再以日織錦八尺二寸五分乗之得共織錦一萬二千四百七十四尺解義兴即通乗法又以共同言者原人今人原日今日原錦今錦為異原人原日原錦為同今人今日今錦為同以今五十六人乗今二十七日是同乗以乗原日織錦八尺二寸五分是異乗故曰異乗同乗七若以原五十六人織錦二十七日共織一萬二千四百七十四尺同沒人毎日織錦若干則富罡共錦以五十六人二十七日相乗為法除之又却通除法矣異除同除法如有客一十五人住一十二日公用米三石六斗問毎日毎人用米若干舊法置米三石六斗為實另以一十五人乗一十二日得一百八十人為
