body:
  text: 中硯四右乗墨六得墨一十八筆七得二十一價九錢九分得二両六錢七分左硯五右乗墨七得墨二十一筆八得二十四價一両六分得三両一錢八分舊法先以右上硯三為法通乗中行墨六得十八筆七得二十一價八錢九分得二両六錢七分即以中上硯四通乗右行墨五得二十筆九得三十六價八錢一分得三両二錢四分對減右墨餘二筆餘十五價餘十五價餘五錢七分次復以右上硯三為法通乗左行墨七得二十一筆八得二十四價一両零六分得三両一錢八分即以左上硯五通乗右行墨五得二十五筆九得四十五價八錢一分得四両零五分對減右墨餘四筆餘二十一價餘八錢七分另將減過餘數分置右左墨二四筆十五二十一價五錢七分八錢七分先以右行墨二通乗左行筆二十一得四十二價八錢七分得一両七錢四分所以左行墨四為法通乗右行筆十五得六十價五錢七分得二両二錢八分又對減右行筆餘一十八枝
