body:
  text: 一千七百二十八步得積一千七百三十二步今有圓田從中心後一邊截一十二步中徑七十四步截弦七十步問積若干增法置中徑七十四步加截弦七十步共一百四十四步折半得七十二步以截濶一十二步為法乘之得八百六十四步另置徑七十四步以弦七十步對減餘四步折半得二步自乘得四步再折半得二步加入八百六十四步得積八百六十六步解義圓田截中假將中徑外弦折平以濶乘之另將弦長減徑長餘步折半自乘加入合積截中心一邊中假將徑長弦長折平以濶乘之另將弦長減徑長餘步折半自乘再折半加入合積其用餘步折半加之者以補弧皆之餘也截中心一邊則折半自乘又折半者備中係正中一半添積亦應一半故再折半以合之也再如圓徑二十六步圓積得五百零七步設如兩面各截矢一步弦得十步中濶二十四步將徑二十六步與弦十步折平得十八步以濶二十四步乘之得四百三十二步另將弦十步二十六步餘折半八步自乘得六十四步併之得積四百九十六步再加每弧矢五步五分二弧矢共積十一步圓積五百零七步若截中心一邊濶一十二步
