body:
  text: 股弦和一丈餘九尺一寸折半得折處高四尺五寸五分勾弦和股弦和求勾股弦法今有勾股如止言勾弦共一百尺股弦共一百二十八尺問勾股弦各若干什麼法置股弦共一百二十八尺以勾弦共一百尺乘之得一萬兩千八百尺加倍得兩萬五千六百尺為寶以開平方除之得一百六十尺為勾股弦共數減勾弦和共一百尺餘得腰長六十尺又將一百六十尺另以股弦和一百二十八尺減之餘得勾瀾三十二尺又將一百六十內減勾三十二尺股六十尺共九十二尺餘得弦長六十八尺解義數勾股弦生将勾股弦併合自乗其中所包仍是勾股弦如勾股弦共一百六十尺自乗以勾股弦分之内中是一勾自乗一侗股自乗一侗弦自乗兩個勾股相乗両個勾弦相乗兩個股弦相乗共九個數在内以勾弦一百尺乗股弦一百二十八尺内中是一個勾股相乗一個股弦相乗一個勾弦相乗一個弦自乗共四個数共三相乗数俱較上二分之一弦自乗数同然較上少一勾
