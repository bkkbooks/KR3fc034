body:
  text: 四除四千萬尺四六除二千四百萬尺共除六千四百萬尺餘實三千八百五十萬零三千二百三十二尺卻將右下十六萬尺以三因之得四十八萬尺為法歸除之呼四三七十二將餘三千萬改作七下位八百上添二共十猶不足除呼四歸起一下還四於七上去一餘六於下位十再添四呼六八除四十八即於六之下位除四又除一九存下位添二成七便將實首位六除去置六十尺於左初啇四百之次位下法另置初啇四百尺以次啇六十尺乘之得二萬四千尺以三因之得七萬二千尺為長亷法又置次啇六十尺自乘三千六百尺為隅法二共七萬五千六百尺皆以次啇六十相呼除之六七除四百二十萬尺五六除三十萬六六除三萬六千餘實五百一十六萬七千二百三十二尺再將方法四十八萬併入兩個七萬二千亷法淂一十四萬四千三個三千六百尺隅法得一萬零八百尺二共六十三萬四千八百尺為法歸除之呼六五八十二即將實首
