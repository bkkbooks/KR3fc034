body:
  text: 作十四根又以濶五丈亦倍作一百根相乘得一千四百根為實另置長六丈以一丈五尺除之得四根為法乘實得五千六百根又以濶五丈加之得木八千四百根荒排法今有荒排深二丈一尺濶四丈四尺長六丈問木若干舊法置深二丈一尺以三歸之得七尺加倍作一十四根又以濶四尺倍作八十八根相乘得一千二百二十二根為實另置長六丈以一丈五尺除之得四根為法乘得四千九百二十八根又以深二丈一尺亦用三歸得七尺加之得木八千三百七十七根六分解義攢直問拼為方順拼無旗為一封書配拼為荒又用加法者大小頭倒正相錯每尺二根內仍有容餘也一封書荒排皆加深方拼簡加濶者積立相間深無餘餘在濶也或先乘後卻先加後乘一理然方梱倍濶加原濶以倍深乘再以長四根乘即得八千四百根一封習倍濶另將倍深以原深乘得十一尺二寸五分卻入相乘再以長六根乘乃得一萬四千八百零五根止加原深七尺五寸則不合原積矣以此恩之數以十為成五為中倍五止成十五乘十仍得五若倍七五得十五以七五乘十五加數必多五以下如數少
