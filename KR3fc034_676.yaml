body:
  text: 一尺以深一十二尺乘之得一萬八千二百五十二尺用圓率三十大除之得積五百零七尺以斛法二五除之得盛米二百零二石八斗增法置上周下周各以三歸之得上徑七尺自乘得四十九尺下徑八尺自乘得六十四尺上下徑相乘得五十六尺併三數共一百六十九尺以深一十二尺乘之得二千零二十八尺以四歸之得積五百零七尺以斛法二五除之得米數或即將二千零二十八尺以十歸之積得米二百零二石八斗解義窖周求積用三十六為除法者圓係三個圓徑即三個方西自乘淂九個方西積有上下周自乘互乘又是三倍三九共淂二十七個方西積以高乘之即二十七各方窖積四因三歸淂三十六個圓窖積故以三十六為法除之淂積增法以自乘互乘再以高乘是三個方窖積即四個圓窖積故用四歸其問米即將深所乘之積二千零二十八尺以十歸之得米數者八四二淂一十故省四二五歸除以十歸之西即合也若將深所乘圓周自乘互乘之積一萬八千二百五十二尺以九十為法歸之米二
