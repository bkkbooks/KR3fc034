body:
  text: 位本數為子合併為法以除毋數子毋維乘乘相乘除法二位則以相乘之數為毋本位為子三位四位則以維乘之數為毋以每兩位連環相乘合併為子以除毋數因數立法難以槩盡子毋維乘乘相乘除法如有本銀六十兩為啇初次每銀二兩連利得三兩二次每銀三兩連利得四兩三次每銀四兩連利得五兩問三次連本利共得銀若干法置原本六十兩以連利三兩乘連利四兩得一十二兩再以連五兩乘之得六十兩為法乘之得三千六百兩為實另以每銀二兩乘每銀三兩得六兩再以每銀四兩乘之得二十四兩為法除實得三次連本利共得銀一百五十兩如以總問原本即置總銀一百五十兩以每銀維垂乘為實
