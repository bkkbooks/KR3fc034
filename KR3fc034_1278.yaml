body:
  text: 零四隔八下生大呂大呂屬陰律長八寸二百四十三分寸之一百零四卻以分母通八寸加分子共得二千零四十八寸空圍九分因之以分母二百四十三為法除之不盡一百二十六分法實皆三約之得積七百五十八分八十一寸寸之四十二其侯大寒卻以通寸二千零四十八寸以二因之得四千零九十六寸為實另以三因二百四十三得七百二十九為法除之得五寸七百二十九分寸之四百五十一隔八下生夷則夷則屬陽律長五寸七百二十九分寸之四百五十一卻以分母通五寸加分子共得四千零九十六寸以空圍九分因之得三十六萬八千六百四十分為實以七百二十九為法除之不盡四百一十四分法實皆九約之得積五百八十一分寸之四十六其候處暑卻以通寸四千零九十六以四因之得一萬六千三百八十四寸另以三因七百二十九得二千一百八十七為法除之得
