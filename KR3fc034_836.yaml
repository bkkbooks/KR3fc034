body:
  text: 以里問車輪法今有車輪高六尺推行二十里問輪轉若干舊法置二十里以里率一千八百尺乘之得三萬六千尺為實另以輪高六尺三因得周一十八尺為法除之得輪轉二千次難題以山問黍米歌廬山高八十里山峰上一黍米黍米一轉止三分幾轉了到山腳底舊法置山高八十里以每里三百六十步乘之得二萬八千八百步以每步五十寸乘之得一百四十四萬寸為實以米轉三分為法除之得四百八十萬轉難題以里問魚歌三寸魚兒九里溝口尾相腳直到頭試問魚有多少數請君當面説因由舊法置九里以每里一萬八千寸乘之得一十六萬二中為實以魚三寸為法除之得魚五萬四千箇
