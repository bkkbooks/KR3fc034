body:
  text: 步五分九釐二毫九絲二忽九微一纖一沙二塵五一漠三一四七不盡另置角中假長一十六步八分九釐九毫有零以角面七步乘之得一百一十八步一分九釐六毫四絲六忽四微五纖五沙六二埃八渺一漠六五七三九不畫又置角中長併加旁長即旁角面七步共二十三步八分九釐九毫四絲九忽四微九纖三沙六塵六埃一渺一漠六六五三四約二以餘方四步九分四厘九毫七絲四忽七微四纖有零乘之得一百一十八步二分九釐六毫四絲六忽四微五纖五沙六塵二埃八渺一漠六五七三九不畫即兩旁二假共積併角中假共得八角積二百三十六步五分九厘二毫九絲二忽九微一纖一沙二五埃六渺三漠三一四七不畫又置餘方長四步九分四厘九毫七絲四忽七微四纖有零自乘得二十四步五分折半得餘方積一十二步二分五釐以四因之得四隅共餘方積四十九步併八角積合方積又將方面一十六步有零以七步因之以四步九分四厘七絲四忽七微四纖六沙八三埃零五漠八三二六七約一除之
