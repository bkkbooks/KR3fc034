body:
  text: 差率卻分列各節數各差率數各盛米數互相乘減列右左四三互差六差別二十一得一十八得八十四三升三升九合得九分得一十五分六釐先以右上四互乘左中二十一得八十四又乘三升九合得十五分六釐次以左上三互乘右中六得一十八又乘右下三升得九分卻以右中一十八減左中八十四餘六十六為法又以右下九分減左下一十五分六釐餘六分六釐為一節之差數乃置下三節盛米三升九合為實以法六十六乘之得二百五十七分四釐以三歸之得八十五分八釐是第二節數加六分六釐為第一節數減六分六釐得七十九分二釐為第三節數又減去六分六釐除七十二分六釐為第四節數又減六分六釐得六十六分為第五節數又減六分六釐得五十九分四釐為第六節數又減六分六釐得五十二分八釐為第七節數又減六分六釐得四十六分二釐為第八節又減六分六釐得三十九分六釐為第九節數各以法六十六除之除三十
