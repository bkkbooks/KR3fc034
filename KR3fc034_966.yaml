body:
  text: 差率卻分列各節數各差率數各盛米數互相乘減列右左四三互差六差別二十一得一十八得八十四三升三升九合得九分得一十五分六厘先以右上四互乘左中二十一得八十四又乘三升九合得十五分六厘次以左上三互乘右中六得一十八又乘右下三升得九分卻以右中一十八減左中八十四餘六十六為法又以右下九分減左下一十五分六厘餘六分六厘為一節之差數乃置下三節盛米三升九合為實以法六十六乘之得二百五十七分四厘以三歸之得八十五分八厘是第二節數加六分六厘為第一節數減六分六厘得七十九分二厘為第三節數又減去六分六厘除七十二分六厘為第四節數又減六分六厘得六十六分為第五節數又減六分六厘得五十九分四厘為第六節數又減六分六厘得五十二分八厘為第七節數又減六分六厘得四十六分二厘為第八節又減六分六厘得三十九分六厘為第九節數各以法六十六除之除三十
