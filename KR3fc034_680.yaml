body:
  text: 一十二尺以四西計之每西三尺中所零三三淂九四只五尺以上皆然船倉求積米法今有船倉小頭西廣六尺腰廣六尺五寸底廣五尺大頭西廣七尺腰廣七尺五寸底廣六尺計長九尺深二尺四寸問積米若干舊法置小頭腰六尺五寸倍之得一十三尺併入西廣六尺底廣五尺三共二十四尺以四歸之得六尺另置大頭腰廣七尺五寸倍之得一十五尺併入西廣七尺底廣六尺三共二十八尺以四歸之得七尺併上六尺共一十三尺折半得六尺五寸以長九尺乘之得五十八尺五寸又以深二尺四寸乘之得積一百四十尺零四寸以斛法二尺五寸為法除之得盛米五十六石一斗六升增法置小頭腰廣七尺五寸倍之得一十三尺加入西廣六尺底廣五尺共二十四尺另置大頭腰廣七尺五寸倍之得一十五尺加入西廣七尺底廣六尺共二十八尺併二數共五十二尺以八歸之得六尺五寸以長九尺乘
