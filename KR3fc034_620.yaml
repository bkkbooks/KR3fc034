body:
  text: 法一百得三百為方法列位次啇二十於左初啇一百之次下法亦置二十於初啇一百之次共一百二十就以次啇二十乗之得二千四百為亷法再以方法三百乗亷得七十二萬除實訖餘實二十三萬三千一百二十五尺卻以次啇二十自乗再乗得八千為隅法除實訖餘實二十三萬三千一百二十五尺另以三乗下法一百二十得三百六十又為方法列位再啇五尺於左初次啇一百二十之下共一百二十五尺就以五尺乗之得六百二十五尺又為亷法再以方法三百六十乗亷法六百二十五尺得二十二萬五千尺除實訖再以再啇五尺自乗再乗得一百二十五尺又為隅法除實恰盡得立方而一百二十五尺解義以三四初啇為方法乃三西方之長也以次啇二十乗初啇次啇共一百二十即一西通長之立濶也又以方法三百乗之即三西方之橫濶也合之共成長一百二十橫濶一百立濶二十之三亷止少一隅故用次啇自乗再乗為隅法除之以完立方與上法通屬一理特変換其文耳
