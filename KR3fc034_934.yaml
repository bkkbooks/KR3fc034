body:
  text: 該米一百九十石零三斗二升又另以四因一衰得丙下等每戶該納四石八斗八升即以四十戶乘之得丙共該米一百九十五石二斗難題四商分利歌一萬六百八兩銀六分本銀利四分四個商人四六得本將六折瞞人舊法置總銀一萬零六百零八兩以四乘之得利銀四千二百四十二兩二錢為實另置甲十三零五分乙九丙六丁四併四位共得三十二衰五分為法先以甲十三衰五分乘實得五萬七千二百八十三兩二錢以共三十二衰五分除之得甲該利銀一千七百六十二兩五錢六分另以乙九衰乘實得二萬八千一百八十八兩八錢以共三十二衰五分除之得乙該分銀一千一百七十五兩零四分又另以丙六衰乘實得二萬五千四百五十九兩二錢以共三十二衰五分除之得丙該分銀七百八十三兩三錢六分又另以丁四衰乘實得一萬六千九百七十二兩八錢以共三十二衰五分除之得丁該分銀五百
