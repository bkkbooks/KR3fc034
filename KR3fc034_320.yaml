body:
  text: 六步五分乗之得八十四步五分另以矢六步五分自乗得四十二步二分五厘併二數共一百二十六步七分五厘折半得積六十三步三分七厘五毫解義以知乗弦又以矢自乗併二數折半淂積者正法弦加矢折半是以矢乗半矢半弦以矢乗弦是矢乗両半弦矢自乗是矢乗両半矢合淂両個積數故併二數折半淂積了矢求弦積弦求矢二法已將圓田截積下故不復贅弧矢截積歌整半弧矢截細半細半弧矢法不變截餘二長相折平以濶乗之數可騐另將二長差步求折半自乗再折半二數相併即餘積整半弧矢任合筭弧矢今有弧矢田弦長一十三步矢長六步五分從弧背截矢四截積步問截弦截積餘積各若干增法置弦一十三步減去截矢四步圖餘九步以截矢乗之得三十六步用開平方法除之得六步加倍得截
