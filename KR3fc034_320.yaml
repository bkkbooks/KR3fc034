body:
  text: 六步五分乘之得八十四步五分另以矢六步五分自乘得四十二步二分五釐併二數共一百二十六步七分五釐折半得積六十三步三分七釐五毫解義以知乘弦又以矢自乘併二數折半淂積者正法弦加矢折半是以矢乘半矢半弦以矢乘弦是矢乘兩半弦矢自乘是矢乘兩半矢合淂兩個積數故併二數折半淂積了矢求弦積弦求矢二法已將圓田截積下故不復贅弧矢截積歌整半弧矢截細半細半弧矢法不變截餘二長相折平以濶乘之數可驗另將二長差步求折半自乘再折半二數相併即餘積整半弧矢任合算弧矢今有弧矢田弦長一十三步矢長六步五分從弧背截矢四截積步問截弦截積餘積各若干增法置弦一十三步減去截矢四步圖餘九步以截矢乘之得三十六步用開平方法除之得六步加倍得截
