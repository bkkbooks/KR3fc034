body:
  text: 酉位酉前申位未俱无实法首位倂次空位无呼法三位二与实午位五相呼二五成一十法四位八与实已位二相呼二八一十六法五位八与实辰位六相呼六八四十八倂三呼共七十四就于申位二加七成九酉位定四又以掯搯戌位戌前酉申未三位无实法首次三位无呼法四位八与实午位五相呼五八得四十法五八与实已位二相呼二八一十六倂二呼共五十六就于酉位四加五成九戌位定六又以指搯亥前戌酉巾未无实法首二三四位无呼法五位八与实午位五相呼五八得四十就于戌六加四成十除讫归一于酉位九成十歸一于中位九又成十归一于未位九亦成十归一于午位三戌四得共一千三百十一少四分
