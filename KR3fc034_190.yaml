body:
  text: 酉位酉前申位未俱無實法首位並次空位無呼法三位二與實午位五相呼二五成一十法四位八與實已位二相呼二八一十六法五位八與實辰位六相呼六八四十八並三呼共七十四就于申位二加七成九酉位定四又以掯搯戌位戌前酉申未三位無實法首次三位無呼法四位八與實午位五相呼五八得四十法五八與實已位二相呼二八一十六並二呼共五十六就于酉位四加五成九戌位定六又以指搯亥前戌酉巾未無實法首二三四位無呼法五位八與實午位五相呼五八得四十就于戌六加四成十除訖歸一于酉位九成十歸一于中位九又成十歸一于未位九亦成十歸一于午位三戌四得共一千三百十一少四分
