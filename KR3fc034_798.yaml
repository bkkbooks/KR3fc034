body:
  text: 折半得積一萬四千一百一十二尺乃或以二假翻轉相背難以對合為疑愚曰將前圓設立二堤分截各二假左對左右對右翻轉可合成二假易他推之同理也斜截東高圖此即上又截去二假東西高俱二十一尺東頭下廣一十四尺無上廣西頭上廣二十尺下廣二十二尺墨點界者即東頭截高一十二尺得上廣八尺餘高九尺斜截至西頭上頂合原堤之數也分截上東頭高一十二尺下廣八尺無上廣西頭廣二十尺無高求積法置東高一十二尺併西廣折半十尺共二十二尺以東下廣折半四尺乘之得八十八尺又以長折半四十八尺乘之得積四千二百二十四尺併合先截二假積二千零一十六尺又截二假積一萬四千一百一十二尺又原垜積二萬四千尺總合共法四萬四千三百五十二尺合前直長方堤全積毫忽無差且就此圓未截東頭上半全形算之倍東高二十一加兩高亦二十一共六十三尺以東下廣一十四尺折半七尺乘之得四百四十一尺倍西高加東高亦六十三併西上下廣共四十二折半得二十一乘之得一千三百二十三尺併二數共一千七百六十四尺以長九十六尺乘之得一十六萬九千三百四十四尺以六歸之止得二萬八千二百二十四尺又截去東頭上半為
