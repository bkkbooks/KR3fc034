body:
  text: 長三十二步以勾濶十步折半五步乗之得積一百六十步三共併積一千三百六十步或截一勾股餘以截斜田筭亦得古法以斜弦丈量差積必多凣遇歪斜不等湏截量為正今有彎斜五面各不等截分二叚四角斜長三十六步徑至斜中上十二步八分下十五步二分三角長二十二步徑一十二步問積若干舊法先置四角斜長三十六步併二徑共二十八步折半淂一十四步乗芝得積九百零四步又置三角長二十二步以徑一十二步乗芝折半得積一百三十二步二叚共併積六百三十六步解義田以斜量多差今四角以斜長斜徑量者四角之形與梭田等如二相併二徑雖長短不一相併折半即是長亦淂半短亦淂半以長乗芝即是以長各乗而圭半徑分數旡差田坐山凸江滩河岸及崖坡過亥等処必多彎缺歪斜難取方直湏扣察形勢以
