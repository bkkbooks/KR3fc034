body:
  text: 信數折半得五寸自乘得二十五寸為實以深一寸為股弦較除之如故得二十五寸為股加深一寸共得木徑二尺六寸解義此典圖田以弧弦問餘徑同法半弦自乘即矢乘餘徑之數故以矢除半弦積得餘徑加矢得全徑以深一寸為餘股較以除二十五寸仍得二十五寸此乃股弦共數也圖形勾股泛中心起將二十五寸減餘股一寸折半得一十二寸即半圓之股加餘設折半得一十三尺即半圓之弦全圓係二倍故不折半加餘股一寸即得全徑二尺六寸也弧矢法亦本此故法相同凡自乘同方四面皆同如五寸自乘得二十五寸乃四面皆五寸每長濶皆一寸共得二十五寸若以尺求則四面皆當一尺將五寸自乘止得二分五厘矣故知此圖止以寸論不可以尺論也餘勾餘股求方圖今有邑不知大小四面居中開門西門外三十步有木一根出南門外七百五十步見木問邑方若干舊法置出西門三十步為餘勾出南門
