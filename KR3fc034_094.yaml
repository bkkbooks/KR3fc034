body:
  text: 訣曰遇十身上違如下位加法皆小數在上大數在吹湏熟記九歸歌歸法用此一歸不湏歸其法故不立二一添作五逢二進一十三一三十一三二六十二逢三進一十四一二十二四二添作五四三七十二逢四进一十五一倍作二五二倍作四五三倍作六五四倍作八逢五进一十六一下加四六二三十二六三添作五六四六十四六五八十二逢六進一十
