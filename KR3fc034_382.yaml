body:
  text: 解義箭扇形田是弘矢之半可以弧矢法筭此猶大早弧矢难以弧矢决求湏分哉求之解義此即形田圓田臷去二细半弧矢筭法當圓田中叚法筭或分哉作一直二弘矢无不可解義以上圓皆六十一二以餘大相形截分有盈有缺則酌量以盈補無盈則將缺筭除如牛角減弧矢光筭牛角全積次將內缺弧矢積筭而減除無論方圓等田有缺皆可類惟只以勾股圭弧等形而筭之或或減以求寔積其他形狀不必盡到至地畆步分或有畸零步盡湏用帶分母子法約而命之法俱載衰分章通分子母法下以上偹列諸形推晰截叚巳極詳盡然諸數以方圓為母測驗以勾
