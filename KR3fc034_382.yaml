body:
  text: 解義箭扇形田是弘矢之半可以弧矢法算此猶大早弧矢難以弧矢決求須分哉求之解義此即形田圓田臷去二細半弧矢算法當圓田中假法算或分哉作一直二弘矢無不可解義以上圓皆六十一二以餘大相形截分有盈有缺則酌量以盈補無盈則將缺算除如牛角減弧矢光算牛角全積次將內缺弧矢積算而減除無論方圓等田有缺皆可類惟只以勾股圭弧等形而算之或或減以求實積其他形狀不必盡到至地畝步分或有畸零步盡須用帶分母子法約而命之法俱載衰分章通分子母法下以上偹列諸形推晰截假巳極詳盡然諸數以方圓為母測驗以勾
  hash: sha256:5839d70b9a9b9cb669a3e6320605eead04467f0c3d1d36be564d4744934f9139
