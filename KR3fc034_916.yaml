body:
  text: 一百二十五中等四十戶以每戶三分因之得一百二十下等六十戶得六十合併三率共三百零五為法除實得下等戶每戶該米二斗四升三因得中等戶每戶七斗二升五因得上等每戶一石二斗各以戶數乘之以二十五戶乘一石二斗得上等戶共米三千石以四十戶乘七斗二升得中等戶共米二十八石八斗以六十戶乘二斗四升得下等戶共米一十四石四升解義下等戶一分上等戶五分每戶得下戶五倍中等得下戶三倍即用五因三因如每戶分作五戶三戶與下等戶一倒也分縣運糧均例法今有五縣輸粟二萬石照人戶多少道裏遠近價值上下而均輸之每車載二十五石行道一裏與僦裏銀一錢甲縣二萬零五百二十戶粟石價二兩乙縣一萬二千三百一十二戶粟石價一兩遠輸二百里丙縣七千一百八十二戶粟石價一兩二錢遠輸一百
