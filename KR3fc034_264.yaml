body:
  text: 九分之五共得九分計三個圓積故用三歸得積半徑自乘上得方積四分之一故用三因得積若將徑三因四歸符四十二步以乘徑五十六步亦正得圓田本積大抵圓內方求以徑自乘三因四歸此正法也凡自乘數一邊減半一邊增半積數較原自乘數得四分之三半徑乘半周是也一邊不加一邊加作三倍積數較原積亦三倍徑乘周是也兩邊各加作三倍則積數得九倍三三成九周自乘是也各加半倍則積數較原積得二倍零二分半半周自乘是也各一半則積數得四分之一半徑自乘是也李者須推明自乘數理則大槩瞭然矣積求圓徑今有圓田積二千三百五十二步問圓徑若干舊法置積二千三百五十二步四因三歸得積三千一百三十六步為實用開平方法除之得圓徑五十六步解義圓田徑即方田而其積數原本方積三因四歸而得故以積後仍將圓積四因三歸還原復合方積用開方得徑難題問半徑欹曠野之地有個椿椿上繫著一羫羊團踏遍三畝二款問羊繩幾丈長此借物比言圓田三畝二分問周至中心半徑若干舊法置田三畝二分以畝
