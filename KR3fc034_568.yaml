body:
  text: 解義左位約啇方西之數也右位加亷隅求方西之法故除寔恰盡即以左位所淂之數為方西倍亷成百則次啇之六步下法即置隔位凣啇位法位積寔位或千或百或十湏紀認明白開除無錯誤今有方田積七萬一千八百二十四步問平方一西若干舊法置田積於中為實初啇二百步於左位亦置二百步於右為方法以左二對右二相呼二二除實四萬步餘實三萬一千八百二十四步就以方法二百步倍作四百步為亷法次啇六十於左初啇二百之下亦置六十於亷法四百之下為隅法共四百六十皆與次啇六十相呼先以左六對右四呼四六除積二萬四千步又左六對右六呼六六出積三千六百步餘實四千二百二十四步又將右位次啇六十倍加六十共五百二十又為亷法再啇八步於左初次啇二百六十之下置八
