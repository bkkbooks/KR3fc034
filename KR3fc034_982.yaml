body:
  text: 併四位共八萬四千二百四十四衰為法除實得二合為一衰之數以一千因之得第一等每戶訣二石以二十二戶乘之得共訣四十四石以七因二石得第二等每戶訣一石四斗以三十六戶乘之得共訣五十石零四斗再以七因一石四斗得第三等每戶訣九斗八升以四十二戶乘之得共訣四十一石一斗六升再以七因九斗八升得第四等每戶訣六斗八升六合以四十八戶乘之得共訣三十二石九斗二升八合八折差分法俱定首位十分以下通用八因以生各衰二位者十八併得十八衰三位者一百八十六十四併得二百四十四衰四位者一千八百六百四十五百一十二併得二千九百五十二衰今有官米二百二十五石三斗六升令五等人戶作十分之八出之甲等
  hash: sha256:1804370d6425198fcb38a5b96031bdbd7ecf6878c94d38b2b53f1d0840331eeb
