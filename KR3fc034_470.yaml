body:
  text: 三十二步以二十四步乘之得七百二十八步折半得三百八十四步此股餘積也再將內方積五百七十六步折半平分之得二百八十八步併入餘勾積二百一十六步倍之得一千零八步正合二十四乘四十二之積併入餘股積三百八十四步加倍得一千三百四十四步正合二十四乘五十六之積此數之瞭然可驗者也論積內方得勾股四十九分之二十四然勾有濶繞不同然有長短不一只以方面為定如此圖內方是以二十四乘二十四餘勾股是以二十四乘二十五便是方二十四分餘勾股二十五分合成四十九分是也求餘勾股積將餘勾餘股合併折半以二十四步乘之即分勾股以二十四步乘之折半一法也勾股容圓圖今有勾股內容圓勾四十二步股五十六步弦七十步問中容圓徑若干增法置勾股相乘得二千三百五十二步為實併勾四十二步股五十六步弦七十步共一百六十八步為法除之得三面至圓心各一十四步加倍得圓徑二十八步另置勾股相乘折半得勾股積一千一百七十六步置圓徑二十八步自乘得七百八十四步三因四
