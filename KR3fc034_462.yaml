body:
  text: 直濶一半九步零九釐八毫二系二忽七微七織五沙以角面一邊餘角濶五步三分八釐一毫六系零六微零五沙乘之得二角積四十八步九分六釐三毫零七忽七微五織零三塵六埃七渺七漠八八七五加倍得四角餘積九十七步九分二釐六毫一絲五忽五微零七塵三埃五渺五漠七七五併六角積合直田積解義詳前二圖則舊法之差可知若作濶十八步亦可用六角法求長求面長亦不止二十步面又不足十步矣拙翁復論曰餘立此截就法考究圓容六角六角容圓與直容六角庶幾有合無誤矣其中雖仍有忽微不齊皆因細微不差大數姑截而就之以便布算如直容六角以角面用法求得尖長數已多零又用法以長求濶未免零餘愈多但至忽微織沙之外細微無關大數亦可截而就之庶不為法所窮則法原甚活變也倘或圓或直或六角加至千百步
