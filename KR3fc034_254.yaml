body:
  text: 除之得濶一十六步加入多墻三步二分得長一十九步二分另將每堵八尺以步法五尺歸之得一步六分為法除濶得該墻十堵除長得該墻一十二堵解義即以積問長濶法又多八畝數及墻尺數待通求耳多墻二堵即勾股較解詳勾股章難題長濶和並差步問長濶積歌今有直田用較除一百二十步無餘長濶相和該一百問公三事幾何如更法置較二十步以減相和一百步餘八十步折半得濶四十步較二十步得長六十步以長乘濶得積二百四十步解義長濶一百即勾股和較除二十即勾股較或言斜若干或言積若干俱可以較與斜數積數相求因不言斜與積故以較和並言之內一百二十步無餘一百即相和一百步言一百步內差二十步舊法又增出一百二十步為較除卻以相和一百步減之餘二十為較此無所本今更正三事即長濶與積三件事也難題長濶和並差步問積歌今有直田不知畝長濶相和十七步濶不及長草五尺請問田該多少數更法置相和一十七步減不及長二十五尺以步法五尺歸之得五步餘一十二步折半得六步為濶加不及五步得十一步為長相乘得積六十六步以畝法二四除之得該田二分七釐五毫解義此與上法同苐加入不及草五尺改步言尺示人知除算耳長十一步濶十二步乃得不及五步舊法以相和十七步減不及五步為濶十二步為長相乘淂積六十步淂田二分五釐斘矣今更正前法今有直田一假積一千九百二十步長多濶二十八步問原田長濶各若干舊法置積一千九百二十步以四因之得七千六百八十步另以相差二十八步自乘得七百八十四步併二數共八千四百六十四步為實用開平方法除之得長濶相和共九十二步減相差二十八步餘六十四步折
