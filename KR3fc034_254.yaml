body:
  text: 除之得濶一十六歩加入多墻三歩二分得長一十九歩二分另將毎堵八尺以歩法五尺歸之得一歩六分為法除濶得該墻十堵除長得該墻一十二堵觧義即以積問長濶法又多八畆數及墻尺數待通求耳多墻二堵即勾股較觧詳勾股章難題長濶和並差歩問長濶積歌今有直田用較除一百二十歩無餘長濶相和該一百問公三事幾何如更法置較二十歩以減相和一百歩餘八十歩折半得濶四十歩較二十歩得長六十歩以長乗濶得積二百四十歩觧義長濶一百即勾股和較除二十即勾股較或言斜若干或言積若干俱可以較與斜數積數相求因不言斜與積故以較和並言之內一百二十歩無餘一百即相和一百歩言一百歩內差二十歩舊法又増出一百二十歩為較除卻以相和一百歩減之餘二十為較此無所本今更正三事即長濶與積三件事也難題長濶和並差歩問積歌今有直田不知畆長濶相和十七歩濶不及長廿五尺請問田該多少數更法置相和一十七歩減不及長二十五尺以歩法五尺歸之得五歩餘一十二歩折半得六歩為濶加不及五歩得十一歩為長相乗得積六十六歩以畆法二四除之得該田二分七厘五毫觧義此與上法同苐加入不及廿五尺改歩言尺示人知除算耳長十一歩濶十二歩乃得不及五歩舊法以相和十七歩減不及五歩為濶十二歩為長相乗淂積六十歩淂田二分五厘斘矣今更正前法今有直田一叚積一千九百二十歩長多濶二十八歩問原田長濶各若干舊法置積一千九百二十歩以四因之得七千六百八十歩另以相差二十八歩自乗得七百八十四歩併二數共八千四百六十四歩為實用開平方法除之得長濶相和共九十二歩減相差二十八歩餘六十四歩折
