body:
  text: 一通得一百四十九兩二錢五分得該利銀二十九兩五錢五分零五毫九絲零乘錢二通得一百八十五兩四錢一分六厘六六不尽得該利銀三十六兩七錢一分一厘一毫一絲零乘孫三通得一百六十五兩六錢六分六厘六六不尽得該利銀三十二兩八錢零七毫六絲零乘李四通得一百零五兩七錢五分得該利銀二十兩零九錢三分七厘七毫一絲零放債計月扣算本利法今有人借本銀一十五兩每月加利二分五厘經六個月還遇銀九兩言定本利除扣未還者仍照原日起利問本利各該若干仍存原本若干舊法置還銀九兩為實另置六個月以月利二五通之得一錢五分加原本一兩本利共一兩一錢五分為法除定得該除本銀七兩八錢二分六厘零以通得每兩利一錢五分乘之得該利銀一兩一錢七分三厘
