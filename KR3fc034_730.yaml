body:
  text: 求積湏將田週六因七歸得數與周相乗用十八除之得積束周求積將三稜周加三照角田法求之然周各長短不齊六因七歸多有畸零不盡且以勾股較角田面七則徑六有餘故從前不立田周求三角之法木梱法西江月梱有封書模樣深濶各倍相乗丈五除長再乗行書梱加深為定方梱湏知加濶荒深三折倍成濶長倍除與前同三折深加相應解義木梱有一封書方梱荒梱三等木以徑五寸長一丈五尺為一根三等梱長皆以一丈五尺除之一封書梱深濶皆加倍梱乗又以一丈五尺所除之長乗之後再以深為加法加之方朗與一書同後再以濶為加法加之排長與濶同前法深同三易後加倍乗之後亦用深三折為法加之一封書相法今有一封書梱深七尺五寸濶四丈七尺長九丈問木若
