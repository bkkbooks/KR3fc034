body:
  text: 二尺五寸為法除之得盛米一千零八十石因米求方倉法今有米一千零八十石欲作方倉盛之只雲方一十五尺問需高若干舊法置米一千零八十石以斛法二尺五寸乘之得二千七百尺為實另置方一十五尺自乘得二百二十五尺為法除之得高一十二尺又前法只雲高一十二尺問方西若干舊法置米一千零八十石以斛法乘之得二千七百尺以高一十二尺除之得二百二十五尺為實以開平方法除之得方西各一十五尺解義以二尺五寸為一石皆以古斛法言也今斗各有參差當前較法算之後俱做此長倉求米法今有長倉長二十八尺濶一十八尺高一十二尺問盛米若干舊法置長二十八尺以濶一十八尺乘之再以高一十二尺乘之得六千零四十八尺
  hash: sha256:5c68e8e7cce8b9e4ae357074749eb556deef7ac8aee1efe0982c621e81aa4a01
