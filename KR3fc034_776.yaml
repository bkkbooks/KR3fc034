body:
  text: 歸得積與方窖法同或倍上長加下長用長臺法亦得築方錐問積法今有方錐高三十二尺下方二十四尺問積若干舊法置下方二十四尺自乘得五百七十六尺以高三十二尺乘之得一萬八千四百三十二尺為實以三歸之得積六千一百四十四尺解義下方自乘以高乘之即立方也求方錐用三歸者方錐得立方三分之一也今得立方分析列圖考較俾人死惑此即立方下方又以高三十二二十四尺自乘尺乘計積一萬八千四百三十此從中心斜分二尺外二假顛倒配合中心亦中分二十四濶十二顛倒配合各長高三十二此即外斜分之一假增求積法置長二十四尺以濶一十二尺乘之得二百八十八尺以高三十二尺乘之得九千二百一十六折半得四千六百零八尺為主方積四分之一外二假共得積一半
