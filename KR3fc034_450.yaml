body:
  text: 弧矢不足二十七步三角二十一步有餘何也三角中長短則積數積虛也三角容圓圖今有三角容圓角面七步問圓積餘積各若干置三角面七步六因七歸得中長六步以乗面七步得四十二步折半得角通積二十一步另以角中心離尖三分之二將中長六步二因三歸得中心離角尖四步以減長六步得離面二步倍之得圓徑四步自乗得一十六步三因四歸得圓積一十二步再置中長六步減圓徑四步餘得尖長二步又置一角餘面各三步五分六因七歸得中長三步折半得一步五分以尖長二步乗之得餘角積三步三角得共積九步併圓積合三角積圓得三角七分之四觧義求餘角用角面半長三步五分者一角容圓起至面中心自中心以上皆有空餘數也角西三步五分橫濶亦三步五分乃不
