body:
  text: 舊法置銀二十三兩為實另置布七十五匹以每匹四丈通之得三十尺以濶二尺乘之得六千尺為法除實得尺價三厘八毫三絲二三不尽另以濶二尺減去一尺六寸餘四寸以乘三千尺得一千二百尺以尺價三厘八毫三絲三三不尽乘之得該退銀四兩六錢增扶置布七十五尺以每匹四丈通之得三千尺以闊二尺乘之得六千尺另以闊一尺六寸乘三十尺得四千八百尺二數對減餘一千二百尺以銀二十三兩乘之得二萬七千六百兩為實以六千尺為法除之得該退銀四兩六錢又法將銀二十三兩以狹布四千八百尺乘之得一十一萬零四百以闊布六千尺除之得狹布該價銀一十八兩四錢以減銀二十三兩亦得難題二丈四長尺八闊一與此同故不載以闊狹問加長法原買布共長二百四十八尺闊二尺一寸今無原布以闊一尺八寸六分狹布抵之問該加長若干舊法置原布二百四十八尺
