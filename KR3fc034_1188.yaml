body:
  text: 七十文對減餘七百五十文為實以法十五除之得筆毎枝錢五十文將右行原餘錢一百八十文加原筆九枝以筆價五十文乗之得四百五十文併二數共六百三十文為實以硯七除之得硯毎個錢九十文解義此即上法也上以硯換筆是一邊少價一邊多價故兩邊乗出之價合併為實此両邊都是多故両價相減餘存為寔三色方程歌三色方程各不同物價三行右左中右與中左各乗通對減再分左右乗又減餘物即為法餘價為實法可通今有硯三個墨五錠筆九枝共價八錢一分又硯四個墨六錠筆七枝共價八錢九分又硯五個墨七錠筆八枝共價一両零六分問硯墨筆價各若干右硯三中左乗墨五得墨二十墨二十五筆九得三十六四十五價八錢一分得三両二錢四分四両零五分
