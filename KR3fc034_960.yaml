body:
  text: 九衰一二三四五六七八九內減末一位九餘共得三十六為法乗多三嵗得一百零八嵗以減總二百零七嵗餘九十九嵗以九子為法除之得第九子十一嵗另置九子減一餘八以三嵗乗得二十四加小兒十一嵗得長子三十五嵗通減三嵗得各子數難題依等筭銀歌甲乙丙丁戊己庚七人銀本不均平甲乙念三七錢鈔念六一錢戊己庚惟有丙丁無銀數要依等第數分明此言七人挨次出錄作本甲乙二人共二十三兩七錢戊己庚二人共二十六兩一錢要依次分筭問連丙丁各訣銀若干舊法先用衰前測差法置戊己庚除庚為本數外己第二位多一差戊自末第三位多二差併之得三為下差率又置甲乙乙是自下六位多五差甲是自下七位多六差併之得十一為上差率卻分列人數差率數各共銀數交互乗減列右甲乙左戊己庚二三互差十一得三十三差三得六二十三丙七錢二十一兩一錢得七十一兩一錢得五十二兩二錢
  hash: sha256:fc9ad4b1e73b4a3166edb3df9acaa8d4babeb50df46690e39d5cd3ddc5a26f02
