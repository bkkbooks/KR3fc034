body:
  text: 將徑弦折半十八步以濶一十二步乘之得二百一十六步另將弦減徑餘一十六步折半得八步自乘得六十四步折半得三十二步加入共二百四十八步得截中假一半之積無不皆合此物理有一形狀即有一數具內可測乃數法天然之妙也圓田今有圓田內截方田一假外圓周二十七步內方周一截內十二步問截方餘圓積各若干增法置圓周二十七步自方圖乘得七百二十九步以圓法十二除之得通圓積六十步零七分五厘另置內方周一十二步自乘得一百四十四步以方周法十六除之得內方積九步以減通圓積餘得剩圓積五十一步七分五厘解義問自乘用十二歸除淂積者圓法徑一周三一自乘淂一三自乘淂九將九四四三歸淂十二是每周自乘比圓徑自乘淂九倍該圓積十二倍故用十二為圓周法淂本積方周自乘用十六歸除淂積者方面是一面方周是四面一自乘淂一四自乘淂十六是方周自乘淂方面自乘十六倍故用十六為方周法淂本積馬係算內方作積十六步將外周每面三步連角作四步此算方束法
