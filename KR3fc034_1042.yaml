body:
  text: 難題多少相和差分歌肆中聽得語吟吟薄酒名醨厚酒醇酒一瓶醉三客薄酒三瓶醉一人共同飲瓶一十九三十三客醉醺醺試問高明能筭士幾多醨酒幾多醇舊法置列右一瓶左三人互三瓶一人共十九瓶共三十三瓶先以右上一瓶互左中一人得一以左上三人互右中三瓶得九對減除八為法次以右上一互左下三十三人仍故以左上三互右下十九瓶得五十七瓶對減餘十十四瓶以法八除之得三瓶以薄酒三瓶因之得薄酒九瓶另以右中三互左下三十三人得九十九人以左中一互右下一十九瓶仍故對減餘八十瓶以法八除之得好酒十瓶解義一瓶三人沋貴價貴物三瓶一人沋賤價賤物同法也舊更前法以左上三人互左中三瓶淂九以乗右下十九瓶淂一百七十七人又以右中三瓶互乗左下三十三人淂九十九人對減餘七十一人為實以法八除之淂薄酒九瓶以減總酒淂好酒此杜撰
