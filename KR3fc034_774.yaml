body:
  text: 一十萬零九千一百零四尺得總積六百二十一萬二千七百八十四尺解義法是分內牆外臺各算內牆上長止減四尺者以四圓算上長比下長每面各短四尺四面應短一十六尺將四隅燭牆分截上濶俱一十四尺則橫截之上長多餘一面二尺以補直項之短欠二尺四面截割伸直中俱斜項以多補少止短兩頭上濶各二尺故就下長減四尺即上長也此如得四圓截割仲直作一長臺故用長臺法算積抱角臺將隅截割直項典牆隅一理故上長亦止短四尺與每面臺同將臺以上長少下長四尺乘之折半以減下長即上長下長合併折半一理也築直長臺問積法今築長臺一所上廣八尺長二丈下廣一丈八尺長三丈高一丈八尺問積若干法用倍上長加下長以上濶乘又倍下長加上長以下濶乘併二數以高乘六歸得積與長窖法同氣方臺問積法今築方臺一所上方六尺下方八尺高一十二尺問積若干法用上方自乘下方自乘又上方乘下方併三數以高乘以三
