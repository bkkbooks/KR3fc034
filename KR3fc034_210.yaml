body:
  text: 二鬥下呼二六一十二本位作丨下呼三四一十二加作刀呼三六一十八上加一本八退二除盡三石下呼三六一十八變三作丨加下進一作刀下呼四五二十加二作五五十下呼五六三十變五作川暗馬歸除法如有銀一十二兩九錢九分五厘買布二十三匹問每匹價若干法置銀為實以布為法寫除得每匹價五錢六分五厘法五厘呼三五除一十五除拾盡三匹二十九分呼三六除一十八去八作丨下呼三五除一十五本位去丨盡九錢呼五三除一十五上位除一本位存五呼除二進一作刀下呼除一作丨呼二一添作五作二兩下呼五三一十五除一存丨呼二一添作五下呼進二進一十作丄幹起呼二一添作五變一作
