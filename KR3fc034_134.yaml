body:
  text: 如原有小珍珠五十顆重一兩價銀一十二兩今有大珍珠三十顆重一兩問該價銀若干舊法置原有珍珠五十顆以原價十二兩乘之得六百兩為實以今珍珠三十顆除之得該價銀二十兩解義興即以價十二兩用五因三歸之法猶同小珍珠一顆得大珍珠五分之三將大珠價二十兩三因五歸得小珠價將小珠價五因三歸淂大珠價皆是先同乘後異除他可類推通乘法謂如應四乘之又應五乘之再又應七乘之者却變法以四乘五得二十再以七乘之得一百四十就以一百四十為法乘之以免三次相乘之煩此約繁歸蕑之法無論同乘異乘皆相通為法乘之後圓堆半堆等用三十六率十八率等類皆此法也通除法謂如應四歸之又應五歸之又應十二除之者却變法以四乘
