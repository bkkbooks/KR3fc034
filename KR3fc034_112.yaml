body:
  text: 實以七乘得數之如有八五金十兩求足色金即置十兩以八五為法乘之得八兩五錢是也蓋以八五乘十兩升積則得八十五兩降積則得八兩五錢可以通用餘可數推折半用乘法折半當用五歸而位及升今變用五因於下位得數而位不升為便留頭乘法歌因乘之法用此真起手先從二位因三四相連俱乘遍後將首位破其身言留法首一位先將法第二位數順次從實下隔位乘起至尾完半後將法首位破應乘實身之位也掉尾乘法言於應乘實位下按法位數若干從法尾位以次掉捲逆乘至實身止也
  hash: sha256:a03dfc585b188340e1fdaf0d9cb266cf67332725faf53dd465c3e01d5dbdfab8
