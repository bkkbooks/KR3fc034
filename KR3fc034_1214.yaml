body:
  text: 若干乃以互乗而合者物價各有一定共價同偍各價合出多價少價亦偍各價合出一理也如右行中行牛二牛一互乗両邊各二牛減盡乗出二數相併共十一羊十五豬剩價五両以羊豬價計之十一羊該價二十七両五錢十五豬該價二十二両五該羊比豬正多價五両以右行左行牛二牛五互乗両邊各十牛或盡乗出二數相對共三十七羊二數對減餘四十九豬二價相減餘銀一十九両以羊豬價計之三十七羊該價九十二両五錢四十九豬該價七十三両五錢羊比豬正多價一十九豬是多少價原偍一買一賣合出乃將牛對減去其多少價即在羊豬價內此數理天然之妙也至將餘數又分左右互乗則不論就為正負止就物價之多寡五乗對減以得餘價然他處對減餘物餘價俱在一邊此則一邊餘豬十六一邊餘價二十四両適合一十六豬之價者餘價原位多價少價互出一邊餘價即多價一邊餘物即少價若俱在一邊則非多少矣此數之自然也米將中行豬十五以豬價乗加多五両以羊十一除之者正以羊十一隻比豬十五隻多價五両也再以羊為法互乗後物與價俱用對減先以牛為法互乗後或用對減或用合併之不同者大抵數分買賣有出有入賣出者即我所備之價故以為正買入者為價所買之物故以為負凣係二正為法所乗物係一正一負皆用合併係二正皆用或除價除一餘一適足一不足一適足無可合減如係一餘一不足六用合併二餘二不足六用減除若係一正一負為
