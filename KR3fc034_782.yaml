body:
  text: 以差數除原高得每方減一尺高加若干卻以上方乘之即得再減六尺高加若干為臺上高尖之數諸法皆用先乘後除下俱類此方錐改方臺問截尖法今有方錐下方二十四尺高三十二尺欲改作方臺只用上方六尺問截去高若干舊法置原高三十二尺以今截上方六尺乘之得一百九十二尺為實以下方二十四尺為法除之得截去高八尺方錐改方臺問上方法今有方錐下方二十四尺高三十二尺欲改作方臺只用高二十四尺問上方若干舊法置下方二十四尺另置原高三十二尺減今截高二十四尺餘截尖八尺乘之得一百九十二尺為實以原高三十二尺為法除之得上方六尺方錐改方臺問截高法今有方錐下方二十四尺高三十二尺欲改作方臺只用上方六尺問今截臺高若干舊法置原高三十二尺以下方二十
