body:
  text: 一斤十兩又加秤錘一斤四兩八千稱得六十七斤問平秤該正數若干舊法置原錘一斤十兩計二十六兩又加錘一斤四兩八錢計二十兩零八錢共四十六兩八錢以共稱豬六十七斤乗之得三千一百三十五斤六為實另以原秤錘二十六兩為法除之得一二隔位六乃一百二十斤實數六乃斤下零數用加六法加得九兩六錢共得豬該一百二十斤九兩六錢解義正法將加錘共四十六兩八錢以原法二十六兩除之得一兩八錢乃帶加錘比原錘十分外多出八分卻將今你六十七斤以一兩八錢乗之每一分俱加作一分八厘便得本等正數將六十七斤以四十六兩八錢乗以二十六兩除亦然大抵除法難於更移乗法無論以六十七斤乗四十六兩八錢與以四十六兩八錢乗六十七斤一也此猶求圓求方將方三因四歸得圓將圓四因三歸即得方將帶如端所稱徹以帶加錘除以原錘乗即得原錘所稱本數優將原錘所稱數以原錘除以帶加錘乗即得後稱之數至原錘帶加錘俱以兩筭而六十七斤乃以斤筭不破斤為兩者因為法同是兩一乗一除皆是乗除斤數故以斤筭與以兩筭一也
