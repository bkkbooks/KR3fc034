body:
  text: 一斤十兩又加稱錘一斤四兩八千稱得六十七斤問平稱該正數若干舊法置原錘一斤十兩計二十六兩又加錘一斤四兩八錢計二十兩零八錢共四十六兩八錢以共稱豬六十七斤乘之得三千一百三十五斤六為實另以原稱錘二十六兩為法除之得一二隔位六乃一百二十斤實數六乃斤下零數用加六法加得九兩六錢共得豬該一百二十斤九兩六錢解義正法將加錘共四十六兩八錢以原法二十六兩除之得一兩八錢乃帶加錘比原錘十分外多出八分卻將今你六十七斤以一兩八錢乘之每一分俱加作一分八厘便得本等正數將六十七斤以四十六兩八錢乘以二十六兩除亦然大抵除法難於更移乘法無論以六十七斤乘四十六兩八錢與以四十六兩八錢乘六十七斤一也此猶求圓求方將方三因四歸得圓將圓四因三歸即得方將帶如端所稱徹以帶加錘除以原錘乘即得原錘所稱本數優將原錘所稱數以原錘除以帶加錘乘即得後稱之數至原錘帶加錘俱以兩算而六十七斤乃以斤算不破斤為兩者因為法同是兩一乘一除皆是乘除斤數故以斤算與以兩算一也
