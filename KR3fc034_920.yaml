body:
  text: 以甲縣一千零二十六衰乘得二千零五十二萬以共衰二千八百七十三除之得甲縣該七千一百四十二石三斗五升九合九勺不盡另以乙縣六百八十四衰乘之得一千三百六千八萬以共衰除之得乙縣該四千七百六十一石五斗七升三合二勺六八不盡又另以丙縣三百九十九衰乘得七百九十八萬以共衰除得丙縣該二千七百七十七石五斗八升四合四勺零又另以丁縣四百九十四衰乘得九百八十八萬以共衰除得丁縣該三千四百三十八石九斗一升四合零又另以戊縣二百七十衰乘得五百四十萬以共衰除得戊縣該一千八百七十九石五斗六升八合三勺九抄不盡解義僦呈銀即運價也每一車二十五石每二十五石行道一裏運價一錢以二十五石除裏數得二十五分之一故得每石之運價如乙縣輸遠二百里每二十五石該運價二十兩以二十五石分之每石得八錢是也運進腳作價各貧貴賤不以乘得除戶數
