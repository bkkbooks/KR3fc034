body:
  text: 一文一邊列九文少借多一文両邊各十文多借少一文一邊両個四共八文一邊三個四共十二文甲銀七両一錢五分十一個六錢五分也乙銀五両八錢五分九個六錢五分也前法是以九隻作一個後法是以六錢五分作一個二分三分相乗淂六二分五分相乗淂十即二數之平法也俱當以此為正舊以加倍為二十分相當為十分各減借一分立法亦合然合後法推筭則一倍有半應作十五分內減借一分作十四分以前法求之併旡合處固知舊法亦未當也難題設雞鳳樓梧甲趕群羊逐草茂乙拽單羊一隻隨其後戲問甲及一百否甲雲所説無差謬若將這般一群湊再添半群小半群得你一隻湊方勾玄機奧妙誰參透此言甲原羊一群再添一群又添牛群又添小半群併羊一隻始足一百問原羊若干舊法置羊一百隻減乙羊一隻餘九十九隻為實併原一群又一群再添半群即五分小半群即二分半共二群七分半為法除之得甲原羊三十六隻難題竿索較長歌一條竿子一條索索比竿子長一托愯折索子卻量
