body:
  text: 恰盡得方西二百六十八步解義此如一假田分作五假初啇自乘是方田次啇呼初啇是二層短直田次啇呼初次共啇是二層長直田三啇呼初次啇是三層短直田三啇併呼初次三啇是三層長直田兩短直各一亷之積兩長直各一亷一隅之積此法更覺捷便又啇位開平方命法今有平方積四百九十步問每西若干舊法置積四百九十步於盤右見實四百啇二十步於左自對呼二二除實四百步餘實九十步次啇二步於左二十步之下即以二步與初啇二十步相呼二二除實四十步又以二步與二十二步相呼除實二二除四十步二二除四步共除八十四步餘六步不盡卻以所啇二十二步倍之又添一步共得四十五步為分母命之曰方西得二十二步零四十五分步之六解義積四百九十步方西二十二步一分三釐五毫不盡數有難盡設以法命之其雲四十五分步之六者因在淂四十五步便
