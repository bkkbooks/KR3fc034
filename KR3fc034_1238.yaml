body:
  text: 斤價銀三錢三分又葡萄六斤榛仁八斤價銀五錢五分六厘又榛仁四斤松子七斤價銀三錢二分七厘又松子九斤杏仁三斤價銀二錢八分五厘又冰糖三斤杏杜八斤價銀四錢問各色價若干冰糖二白糖四得一十二空空空空負十六白二乗淂三十二價四両冰三乗淂一両二両與六行減餘四錢空白糖二葡桃五淂六十空空空負三十二六乗淂一百九十二價三錢三分一行十二乗淂三両九錢六分與一行減餘三両一錢六分六乗淂十八両九錢六分空互乗空葡桃六榛仁八淂四百八十空空負一百九十二榛四乗淂七百六十八價五錢五分六淂六十乗淂三十三両三十六分與二行減餘十四両四錢榛四乗淂五十七両六錢空法空空榛仁四松子七淂三千三百六十空負七百六十八乗淂六千九百一價三両二錢七榛四百八十乗淂一百五十六両九錢六分與三行減餘九十九両六錢六分榛九乗淂八百九十四両錢四分五次法對減餘三千一百六十八為法空空空空松子九杏仁三三千三百六十八十乗淂一萬價二錢八分五三千三百六十乗淂九百五十七次六錢與四行減淂六十三両三錢六分為實
