body:
  text: 五十餘實二百步另以下法初商一十倍之得三十五步次商五步於左下法亦置五步加於縱方之位併倍初商共得四十步與上再商五相呼五四除實二百恰畫得矢一十五步加不及十五步得弦長三十六步解義以不及十五步帶縱積用四田三歸者矢十五步弦三十步矢合法一平半矢加弦折半淂二十二步五分較弦三十步止四分之三將積四因三歸三分歸作四分乃合矢乘全弦之積故以不及帶縱開方可得矢此猶求圓徑法全圓淂方田四分之三弧矢即半圓亦是半方四分之三故皆用四因三歸法還源此恆整半弧矢矢淂弦一半乃合以求細半弧矢弦矢參差不齊則不合矣梯田今有梯田長九十步小廣二十步大求積廣三十八步問積若干舊法置大圖廣小廣共五十八步折半得二十九步以乘長九十步得積二千六百一十步
