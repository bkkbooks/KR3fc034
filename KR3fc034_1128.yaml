body:
  text: 二十以三數之餘二加倍二十得四十以三數之餘一即以四十為三數剩一之衰卻將三數剩一下一個四十又將四數剩一下一個四十五又將五數剩三下三個三十六共一百零八併三數共一百九十三減去三個滿法數共一百八十餘得共物一十三個此即上法無異若以三乗四得一十二加倍得二十四以五數之少一即以二十四為五數剩一之衰以三乗五得一十五以四數之少一即以十五為四數剩一之衰又以四乗五得二十以三數之少一即以二十為三數剩一之衰卻將三數剩一下一個二十將四數剩一下一個一十五將五數剩三下三個二十四共七十二併三數共一百零七減去一個滿法數六十餘四十七與滿法數六十對減餘得共物一十三個解義一數而備二法見數之可惟多滿各法俱以滿法餘數為物數此又將滿法餘數與滿法數對減所餘為共物者之乗
  hash: sha256:ac91aad495ff5d2f454ad5d5cf667758cfdaa9a93befd20d3dcdec6995d8c269
