body:
  text: 問原本若干舊法置三年倍利一二四併三位共七衰以乗五斗得三石五斗折半三遭得原本四斗三升七合五勺又法今有客三次出外為商俱得倍利每次歸還銀三百兩三次本利怡盡問原本若干舊法置還銀三百兩折半得一百五十兩又加三百兩得四百五十兩又折半得二百二十五兩又加三百兩得五百二十五兩又折半得原本銀二百六十二兩五錢觧義置銀三百兩即第三次本利還盡之三百兩也折半得一百五十將末次三百兩以本利合倍如末次拿出本銀一百五十兩也再加三百者二次所還之三百也二次四還銀三百餘三次本一百五十共四百五十以本利合得知二次拿出本銀即四百五十折半之二百二十五兩也又加三百者初次所還之三百也初次還銀三百兩仍餘二次木銀二百二十五兩共五百二十五兩以本利合倍則一半為本一半為利故折半得原本銀二百六十二兩五錢也
