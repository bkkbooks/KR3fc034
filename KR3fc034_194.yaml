body:
  text: 位寅位相對寅三邜五此是有對加雙呼三五一十五再呼三五一十五共成三十就於邜位九加三起十進一於寅位邜位存二又以指搯已位以前寅位辰位相對辰空寅無對呼中邜單位五自乘呼五五二十五即於辰位定二已位定五以指搯午位以前已位與寅位相對寅三已八此是有對加變呼三八二十四再呼三八二十四共四十八次中辰位邜位相對辰位空邜無對呼就於已位五加四成九午位定八又以指搯未位以前午位與寅位相對寅三午二此是有對加雙呼二三如六再呼二三如六共十二次中已位與邜位相對邜五已八此是有對加雙呼五八十再呼五八四十共八十次中辰位空無呼並十二八十兩數共九十二就於午位八加九進一於已位九亦成十進一於辰位二
