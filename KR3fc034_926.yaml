body:
  text: 難題五商分銀歌三千四百十兩五個為商照本分原銀挨遍二八出本將八折誤瞞人舊法戊二丁八丙三十二乙一百二十八甲五百一十二併五數共得六百八十二衰為法却置總銀三千四百一十兩為實以法除之得五兩為一衰之數各以各衰乘之以甲五百一十二乘得甲該分銀二千五百六十兩以乙一百二十八乘得乙該分銀六百四十兩以丙三十二乘得丙該分銀一百六十兩以丁八乘得丁該分銀四十兩以戊二乘得戊該分銀十兩解義將原銀以共衰除之以各衰乘之此先除後乘正法也若置原實以各衰乘之以共衰除之即先乘後除法矣三七差分法各以三為首或以三因或又三因或再又三因務求得宜為首衰却用三歸七因以求各衰二位者首位三坎位七三位者以三因三得九為首衰却將九用三歸七因得二十一為中衰又將二十一用
