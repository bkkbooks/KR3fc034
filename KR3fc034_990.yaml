body:
  text: 因得二十六萬二千一百四十四文七日再八因得二百零九萬七千一百五十二文八日再八因得一千六百七十七萬七千二百一十六文又法置物日本利八文自乗得六十四文又置六十四自乗得四千零九十六文又置四千零九十六自乗得共一千六百九十七萬七千二百一十六文八倍除本問利法今有錢一文每日除本生利八文共計八日問本利若干增法置錢一文八因得八文再八因得六十四文三八因得五百一十二四八因得四千零九十六五八因得三萬二千七百六十八六八因得二十六萬二千一百四十四七八因得二百零九萬七千一百五十二八因得一千六百七十七萬九千二百一十六文卻再以二乗二百零九萬七千三百五十二得四百一十九萬四千三百零四文以三乗二十六萬二千一百四十四得七十八萬六千四百三十二文以四乗三萬二千七百六十八得一十三萬一千零七十二文以五乗四千零九十六文得二萬零四百八十文
