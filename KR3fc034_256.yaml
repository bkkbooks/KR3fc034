body:
  text: 半得濶三十二步加入相差二十八步得長六十步今有直田一假積一千九百二十步長濶共九十二步問長濶各若干舊法置積一千九百二十步四因得七千六百八十步另以長濶共九十二步自乘得八千四百六十四步內減四因積七千六百八十步餘七百八十四步為實用開平方除之得長闊相差二十八步以減長濶共九十二步餘六十四步折半得濶三十二步加相差二十八步得長六十步解義以積與差問長闊將積用四因又加差自乘積者一個積數係一個長濶相乘數每一積數長多濶二十八步因作四濶積數如前圓四面互項每一面一個長項一個闊四圓項合內中四面三塊二十八步一小方故加八二十八步自乘實卻用開平方法除之得九十二步為長濶共數也就九十二步除去相差二十八步是長多之數餘六十四步是長濶兩平之數故除差數折平得濶加入差數得長最直舊法將二十八加入九十二折半得長覺煩贅至以積數並長濶共數問長濶將共數自乘減除四因積數餘數開方
