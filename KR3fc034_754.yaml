body:
  text: 自乘得四十九個另置下周四十二個以六歸得七倍之得一十四個再加一個共一十五個自乘得二百二十五個又將上周七個乘下周一十五個得一百零五個併三數共三百七十九個再將高九層折半得四個半加入共三百八十三個半以高九層乘之得三千四百五十一個半以四歸之得八百六十二箇八分七厘五毫箇物無零得積八百六十三個又增法置上周一十八個外加三個共二十一個自乘得四百四十一個另置下周四十二箇外加三個共四十五個得二千零二十五個又以二十一乘四十五得九百四十五個再將高九層折半得四個半以整六半六共九乘之得四十零半個併四數共三千四百五十一個半以高九層乘之得三萬一千零六十三個半為實用立圓率三十六除之得八百六十二個八分七厘五毫個物無零得積八百六十三個圓半垜上下周一整六一半六求積法今有圓半垜物上周二十七個
