body:
  text: 併二衰共得十衰三位者四六九併三衰共得十九衰四位者四六九十三十併四衰共得三十二衰五分五位者四六九十三零五二十零一分五釐併五衰共得五十二衰七分五釐今有米五百八十三石一斗六升令三等人戶從上四六出之甲上等十八戶乙中等二十六戶丙下等四十戶問各若干舊法置米五百八十三石一斗六升為實另置甲九乙六丙四三位將甲一十八戶以九因之得一百六十二衰將乙二十六戶以六因之得一百五十六衰將丙四十戶以四因得一百六十衰併三數共得四百七十八衰為法除實得一石二斗一升為一衰之數以九因得甲上等每戶納十石零九斗八升即以一十八戶乘之得甲共該米一百九十七石六斗四升另以六因一衰得乙中等每戶應納七石三斗二升即以二十六戶乘之得乙共
