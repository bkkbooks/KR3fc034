body:
  text: 周兩倍不足六十步問方徑田置兩面濶共十步加倍得二十步另置不足六十步折半得三十步加入倍濶二十步得內圓徑五十步加兩面濶十步得外方面六十步照上除內圓積得餘方積今有方田一假從中心截作圓塘餘外四面各濶五分方周比圓周兩倍不足二百一十四步問外方內徑及內外田各若干增法置兩面濶共一步加倍得二步另置不足二百一十四步折半得一百零七步加入倍濶二步得內圓徑一百零九步加入兩面濶一步得外方面一百一十步內徑自乘得一萬一千八百八十一步三因四歸得圓塘積八千九百十步零七分五釐外方自乘得共一萬二千一
  hash: sha256:906587176ae7f2d63858cb4fa7cc5c383d24a93dfc64dfc5de31a1fb421986e0
