body:
  text: 十八乘二十八自乘之數故以多步自乘減斜自乘數折半淂合原積也難題問積歌三十八萬四千步正長端的無差誤六絲二忽五微濶不知共該多少畝舊法置長三十八萬四千步為實以濶六系二忽五微為法乘之得積二百四十步以畝法二四除之得田一畝解義此即以長乘濶求直田法無異也苐加從太長縮廣太細以起人思耳難題問長濶歌直田七畝半長濶爭一半今特問高明此法如何算舊法置田七畝五分以畝法二四通之得積一千八百步折半得九百步用開方法除之得濶三十步再加一倍得長六十步解義因長是濶兩倍將積折半便是長一半與濶相同之方積故用開平方法除之得濶再加倍得長也難題濶斜和問積歌昨日丈量田地面記得長步整三十廣斜相併五
