body:
  text: 十八乗二十八自乗之數故以多歩自乗減斜自乗數折半淂合原積也難題問積歌三十八萬四千歩正長端的無差誤六絲二忽五微濶不知共該多少畆舊法置長三十八萬四千歩為實以濶六系二忽五微為法乗之得積二百四十歩以畆法二四除之得田一畆觧義此即以長乗濶求直田法無異也苐加從太長縮廣太細以起人思耳難題問長濶歌直田七畆半長濶爭一半今特問高明此法如何筭舊法置田七畆五分以畆法二四通之得積一千八百歩折半得九百步用開方法除之得濶三十歩再加一倍得長六十歩觧義因長是濶両倍將積折半便是長一半與濶相同之方積故用開平方法除之得濶再加倍得長也難題濶斜和問積歌昨日丈量田地面記得長歩整三十廣斜相併五
  hash: sha256:afd6d48a18be395d178d1f9c7936ebbbdbddac56bda0bfa662ef252a660f906e
