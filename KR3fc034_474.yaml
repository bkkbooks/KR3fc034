body:
  text: 濶狹長短不一亦未可以為定只以圓徑為半其亦以圓徑為準者何也如此圓圓徑二十八步將徑三因四歸得二十一步以二十八步乘之即得圓積餘勾股亦是以二十八乘二十一故兩下得積皆同是也求餘勾股積亦用餘勾餘股折半以圓徑乘之與方同者何也方面實面以外皆餘積易見也容圓如餘股二十八步積濶上二十一步餘勾一十四步直長止十八步六分六釐不盡皆用圓徑二十八步乘之者有圓外三隅零以補之其數邊合此則數理天然之妙驗之不差系黍者也又勾股容圓法今有勾股內容圓勾三十二步股六十步弦六十八步問容圓徑積各若干增法置勾股相乘得一千九百二十步以勾股弦共一百六十步除之得圓半徑一十二步加倍得全徑二十四步將二十四步三因四歸得一十八步以圓徑二十四步乘之得內圓積四百三十二步另將勾三十二步減圓徑二十四步餘股六十步減圓徑二十四步餘三十六步併二數共四十四步折半得二十二步以圓徑二十四步乘之得餘勾股積五百二十八步併內圓積共九百六十步合勾
  hash: sha256:74200ce8d79e77134c245a2dac45137a11422235d6c6cd6e13a3664a70423558
