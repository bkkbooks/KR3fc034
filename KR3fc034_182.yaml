body:
  text: 二字句訣歌有除隔位進無除挨身進凡因乘從實尾位起除去一隔一位而加原數凡歸除從實首起除去一亦隔前一位而加原數只用一原法而無倍數除盡則挨身進一位再加除唯除實盡以得本數解義起以加倍實應以七分乘實故用減實增法猶乘法也所以洐尾位起加以除倍實應以九十人除實故以法減實猶除法也所以從首位起二句字訣仍是上法又止用原數無加以除倍法耳然亦皆小智之術不如乘除之便柚中定位訣歌掌中定位法為奇從寅為主是根基因乘順從尾位起歸除還從上位施法多原實上數法少原實降下知乘除大小從術化釐毫絲忽不差池此法位為首以此順下或步尺貫總之類俱浖大數自寅上起頭因乘亦洐末位歸除亦洐首位記定位數因洐每下得術烯洐法前得令一如算盡定位
