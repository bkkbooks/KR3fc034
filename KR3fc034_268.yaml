body:
  text: 減去半矢止存半弦故加倍淂全弦一理也法俱本弧矢即弦步源法也圓田以積與截長問截濶法今有圓田從一邊截弦長二十四步計截積一百二十八步問截矢濶若干舊法置積一百二十八步加倍得二百三十六步為實用帶縱開平方法以弦長二十四步置於右為縱方約啇八步於左亦置八步於右縱方二十四步之下位共三十二步皆與左啇八相呼三八除實二百四十二八除實一十六步除實恰盡得截矢濶八步增法置積一百二十八步為實另將弦長二十四步折半得一十二步為縱方約商八步於左卻折半加四步於縱方之下位共一十六步皆與左啇八相呼一八除實八十六八除實四十八步除實恰盡亦得截矢八步解義倍積用帶縱開方法求之得矢者原積係以矢乗半矢半徑倍積便是矢乗全矢全徑之數開方法係自乗之數帶入弦長
