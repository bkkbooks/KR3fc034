body:
  text: 喑馬垛積因乘合總共三條河圈九位乘法圖計一條增添排九笑位圖觶計一條一掌金定位圖計一條第二卷區章丈量曰畝各形總歌計一條丈量篾車式樣圖解計一條求獻求積乘除等法共三條方圜求積截積等法共十三條直田求積截積等法共十二條圓環孤天等田法共三十二條梯斜圭勾股等田法共二十一條角梭各形不等田法共二十三圈方五斜七盈不足解共四條方容圓容錠欖八角共七條圓容方圓與六角三角相容圖解共七條三角容四三角三四角圖解共二條直容六角弧矢圖解共四條勾股容圓圖解共三條
