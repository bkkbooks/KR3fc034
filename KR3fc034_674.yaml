body:
  text: 一尺加倍得四十二尺併入上長一十九尺共六十一尺以下廣一十三尺乘之得七百九十二尺併二數共一千四百四十二尺以深一十二尺乘之得一萬七千三百零四尺以六歸之得積二千八百八十四尺以斛法二五除之得盛米一千一百五十三石六斗解義倍上長加下長又倍下長加上長共六長折平故後用六歸方窖四西上下雖不一然上止一方西下亦止一方西故用上自乘下自乘上下相乘作三廣可折共平長窖上長上廣下長下廣各不一須用交互折平其加倍合併互乘乃是以上廣乘下長下廣乘上長即同二中長故須用兩個下廣乘下長兩個上廣乘上長與中二長相均乃可平若倍上廣加下廣以上長乘同一理也或上長加下長之半以上廣乘下長加上長之半以下廣乘併二數以高乘之用三歸亦得本積圓窖求米法今有圓窖上周二十一尺下周二十四尺深一十二尺問積米若干舊法置上周二十一尺自乘得四百四十一尺另置下周二十四尺自乘得五百七十六尺又置下周二十四尺以上周一十一尺乘之得五百零四尺併三數共一千五百二十
