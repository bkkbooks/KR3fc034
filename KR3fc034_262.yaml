body:
  text: 置徑自乗積以七五乗之得本積又法置周一百六十八歩折半得八十四歩又置徑五十六歩折半得二十八歩以乗八十四歩得本積此半周半徑問積又法全周徑問積置周一百六十八歩以徑五十六歩乗之再以四歸之亦得又法以周問積置周一百六十八歩自乗得二萬八千二百二十四歩以十二歸除之亦得又法半周問積置半周八十四歩自乗得七千零五十六歩以三歸之亦得又法半徑問積置半徑二十八歩自乗得七百八十四歩以三因之亦得觧義圓田徑即方田面方面自乗合一方田積圓得方積四分之三故用三因四帰合圓積其用七五乗者四分之三得十分中七五分厘也半徑乗半周因半周是全徑有半以半徑乗之是一個半徑乗全徑得方積四分之二一個半徑乗半徑得方積四分之一合之得方積四分之三也全徑乗全周是一個徑乗三個徑得三個方積即四個圓積故用帰得積全周自乗是三個徑互乗三個徑共九個徑自乗得九個方積即十二個圓積故用十二帰除得積半周自乗是一個半徑自乗一個徑自乗是四分加一半自乗積數多出
