body:
  text: 置徑自乘積以七五乘之得本積又法置周一百六十八步折半得八十四步又置徑五十六步折半得二十八步以乘八十四步得本積此半周半徑問積又法全周徑問積置周一百六十八步以徑五十六步乘之再以四歸之亦得又法以周問積置周一百六十八步自乘得二萬八千二百二十四步以十二歸除之亦得又法半周問積置半周八十四步自乘得七千零五十六步以三歸之亦得又法半徑問積置半徑二十八步自乘得七百八十四步以三因之亦得解義圓田徑即方田面方面自乘合一方田積圓得方積四分之三故用三因四歸合圓積其用七五乘者四分之三得十分中七五分釐也半徑乘半周因半周是全徑有半以半徑乘之是一個半徑乘全徑得方積四分之二一個半徑乘半徑得方積四分之一合之得方積四分之三也全徑乘全周是一個徑乘三個徑得三個方積即四個圓積故用歸得積全周自乘是三個徑互乘三個徑共九個徑自乘得九個方積即十二個圓積故用十二歸除得積半周自乘是一個半徑自乘一個徑自乘是四分加一半自乘積數多出
