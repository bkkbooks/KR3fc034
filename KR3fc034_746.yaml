body:
  text: 少十尺六六不盡第三層方十尺少九尺六六不盡推而上之至十層方二尺少一尺六六不盡求尖一尺垜物得一個方雖之三三不盡比垜物少六六不盡共少積七十四尺故必加一加半遞乘合積不可與雖法個求也四面半垜求積法今有四面半垜物上方六個下方一十二個問積物若干增法置上方六自乘得三十六另置下方十二自乘得一百四十四又上方六乘下方十二得七十二併三數共二百五十二再以上下方相減餘六加一得七又乘之得一千七百六十四又將七以三因之得二十一併入共一千七百八十五為實以三為法歸之得積五百九十五個解義舊無方半垜法增補以偏考較其以上下方減餘加一乘者方垜自下麵上減一個是二層減二個是三層今餘六個乃是七層故將減加一為乘法即以高乘之也因不言高故以上下方梱減得高也又將七三因併入者上係方窖法求方半垜每層少積一個七層共少七個後用三歸故將七層三因併入總實三歸合積或將前實三歸以七加之亦得
  hash: sha256:ddbbcf8ed120a8ac3154aa8689d48dffa31da4c6f53cdc3bbed74115d857206f
