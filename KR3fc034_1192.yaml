body:
  text: 為法價餘五錢四分為實以法除實得筆毎枝價銀三分就將筆價三分以右餘筆十五乗之得四錢五分以減右行餘價五錢七分餘一錢二分以右行餘二為法除之得墨毎錠價銀六分卻於原右行價八錢一分內減原墨五錠價三錢原筆九枝價二錢七分共減去五錢七分餘價二錢四分以原硯三為法除之得硯毎箇價銀八分解義法用疊乗疊除者因硯墨筆係三等一次乗減止減餘一等故疊乗疊減求之先以右硯與中左二行各互乗對減將硯價都減盡重分左右二行右行所餘價五錢七分乃所餘墨二定塰十五枝之價左行所餘價八錢七分乃所餘墨四錠筆二十一枝之價又以墨為法互乗對減將墨價都減盡止餘價五錢四分即所餘筆一十八枝之價故以十八為法除之得筆價也然湏三行各有參差不齊如硯三四五墨五六七筆則九七八與上顛倒錯落互乗中問有不齊之數乃可疊次對減餘出一宗之數若將筆亦右行挨次順作七八九則右行硯三墨五筆七共價七錢五分中行硯四墨六八共價九錢二分左行硯五墨七筆九共價二両零九分以左與中
