body:
  text: 為實卻以借乙二分互併借甲之三得五以借甲四分互併借乙之一亦得五就以五為法除實二百文得四十為分法以借甲四分乗之得甲原錢一百六十文以借乙二分乗之得乙原錢八十文解義酒錢二百即用為實不必又用分乗對減一畨除法宜用母互併子若以二母為法後法二分之一四分之三以四分二分則六矣又將作何減合乎固知舊法僅一復偶合搃後人誤用故併舊法列載難題因稅知價歌昨日街頭乾事畢閒稅局門前立見一客持三百布毎疋必湏稅二尺貼回銅錢六百文收布十五又半疋不知毎疋價幾何只言毎疋長四十此言客布三百疋毎疋長四十尺內扣稅錢二尺與過稅布一十五疋半貼四錢六百文問毎疋價若干舊法置布三百疋以稅二尺乗之得六百尺另置與過稅布一十五疋半以毎疋四十尺因之得六百二十尺減該稅六百尺餘得多稅二十尺為法以除貼回
