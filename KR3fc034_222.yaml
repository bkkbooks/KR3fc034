body:
  text: 白下隱吏古齊陽丘足軒強恕居士李長茂拙翁甫輯著軌區章此章四疇之形狀極積實之尋廣縱截割互明折併減增各異以五容較其分數以毫釐分共細微區畝詳盡斯篇諸法由此原本丈量田畝總歌方田自乘積步明宜田長澗以相乘圓田乘求有便法周徑各半適其中徑乘七五乘再加三因四歸法一同周徑相乘四歸得乘歸同法碗丘名澴田內外周相併折半乘以徑步行弧矢弦長加矢步折半矢乘積實呈
