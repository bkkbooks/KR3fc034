  text: 一掌金右圖以九數置於左手各指各分三行偹列九數從大指起為百二指為十以次挨下用時於袖中用左右兩手五指各相配合對照每指上定數一二三三指尖在左指左旁四五六右指尖在左指中行七八九右指尖在左指右旁五指皆同如遇位數多二足底亦當二位平立為五平指歌前為四平跟歌後為六於東南為三側於西南福九歌於東
