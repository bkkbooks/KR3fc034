body:
  text: 股為定須考相容之數後可研索幾微免於舛誤故乘圖于後方圓説問方問斜古法用方五斜七然以方五求斜則斜七有餘以斜七求方則方五不足此楊輝用開方法求方求斜理明以合本積張丘建用方五斜七難以合數問圓古法圓徑一尺周圖三尺微術圓周一百五十七尺徑五十尺周求徑以五十因周用一百五十七除之徑求周以一百五十七乘徑以五十除之密術周二十二尺徑七尺智術周百尺徑三十二尺程實渠總論曰習算者鹹以方五斜七徑一圖三為準殊不知方五則斜七有奇徑一則圖三有奇故古人立法有勾三股四弦五之輪而不能使方斜為一定之發有割圓矢弦之輪而不能使方圓為一定之法凡
