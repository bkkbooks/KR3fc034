body:
  text: 上即立三角截分三假之一下又角錐中分小三角之一徑俱四尺長一十四尺三角錐所分小三角徑尖至上尖俱有脊如三角扁錐上假下至刀仍長十四尺而平剛無脊以餘補虛兩俱齊同求積法置長十四尺折半得七尺以徑四尺折半得二尺乘之得十四尺以高二十四尺乘之得積三百三十六尺三因得一千零八尺合錐積是內分三個小三角得一錐積外三假得一錐故曰三角錐得立三角一半也築堤求積歌築堤之法最蹊蹺東高倍之加西高東廣上下併乘折西高西廣算同說折半二數併為實長乘六歸積無疑築堤問積法今有長堤一所東頭上廣八尺下廣一十四尺高九尺西頭上廣二十尺下廣一十二尺高二十一尺東至西長九十六尺問積尺若干增法置東高九尺倍之得一十八尺加西高二十一尺共三十九尺卻以東頭上廣八尺下廣一十四尺合併得二十二尺乘之得八百五十八尺折半得四百二十九尺次以西
