body:
  text: 十三尺問圓周若干舊法置米七百六十四石四斗以斛法二尺五寸乗之得一千九百一十一尺再以圓法十二乗之得二萬二千九百三十二尺為實以高一十三尺為法除之得一千七百六十四尺以開方法除之得圓倉週四十二尺又前法只雲圓週四十二尺問高若干舊法置米以斛法乗之再以圓法十二乗之得二萬二千九百三十二尺為實另以圓周四十二尺自乗得一千七百六十四尺為法除之得高一十三尺解義圓周自乗用十二除之者即前圓曰以周問積用十二歸除淂積之法也解見前圓田下方圓長窖求積歌方窖求積法最良上方下方自乗詳又併上下五乗推以高乗之用三歸圓窖二周乗法同三十六除法宜明惟有長窖法另啇上長倍之加下長又用上廣相乗訖下廣下
  hash: sha256:ce20bdd3ddd919602f641f2c64234746446e36f5ea476dc29ca0ab904c4288d5
