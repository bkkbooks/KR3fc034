body:
  text: 十三尺問圓周若干舊法置米七百六十四石四斗以斛法二尺五寸乘之得一千九百一十一尺再以圓法十二乘之得二萬二千九百三十二尺為實以高一十三尺為法除之得一千七百六十四尺以開方法除之得圓倉周四十二尺又前法只雲圓周四十二尺問高若干舊法置米以斛法乘之再以圓法十二乘之得二萬二千九百三十二尺為實另以圓周四十二尺自乘得一千七百六十四尺為法除之得高一十三尺解義圓周自乘用十二除之者即前圓曰以周問積用十二歸除淂積之法也解見前圓田下方圓長窖求積歌方窖求積法最良上方下方自乘詳又併上下五乘推以高乘之用三歸圓窖二周乘法同三十六除法宜明惟有長窖法另啇上長倍之加下長又用上廣相乘訖下廣下
  hash: sha256:2fed233691d7fb9b7249ec7361d2f8e451b84de5729ef9fa8940f9e34758fd4d
