body:
  text: 積三百一十二步解義梭形將中十字分之便是四小勾股網轉方配成一直四故用折半法與勾股等田同今有欖形田中長四十步中濶一十六步問積若干舊法置中長四十步另將濶一十六步折半得八步併之得四十八步以半濶八步乘之得積三百八十四步解義欖田形中分即二細半弧矢其以半濶加長以半濶乘猶以矢加弦以矢乘即弧矢法弧矢弦加矢折半以矢乘是一弧矢積不折半以矢乘得二弧矢即欖田全積也今有形田上周四十步下周三十步中徑八步問積若干舊法置上下二周相併得七十步折半得三十五步為實另置中徑八步折半得四步為法除之得積一百四十步
  hash: sha256:ca535e7809afd76e36138033cc5141022dd164beb32042d0c54a6e886b0496a2
