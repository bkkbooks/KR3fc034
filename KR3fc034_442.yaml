body:
  text: 拙翁辨曰圓容六角角外六弧矢弦平得步多六角容圓圓外六餘角圓背彎數虛得步少此觀其圓形可辨今立法互軟圓容六角七分之六有零六角容圓八分之七有零此確數也舊法通作七分之六與六角容圓相差固屬天淵即於圓容六角亦懸舛雖合如前圓圓徑四十步圓積一錢二百步以七分圓積畸零雞盡設如圓徑八七五十六步自乘再三因四歸得圓積二千三百五十二步用六因七歸六角應得二千零一十六步六弧矢七分之一應得三百三十六步反覆推驗究無合處用增法考求六角得二千零三十五步九分八厘九毫有零六弧矢三百一十六步零一厘不盡較七分之六六角少一十九步有零六弧矢多一十九步有零差誤豈不遠甚哉或以零餘不便為疑不知者
  hash: sha256:467adef4da54a76163a9e6061569b67cb80590f410b8104bb50ddcf3e10a122f
