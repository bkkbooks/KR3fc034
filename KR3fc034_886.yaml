body:
  text: 餘得抽扣顏色紬一十四丈七尺六寸五分六厘二毫五絲難題糴米抽腳價一法與此同解義若先問顏色紬即以顏色紬米紬以紅紬顏色紬枬併為法除之買賣問總貨總價腳價矛用法今有客出外買物每銀七錢五分買物六斤腳加三分矛用每六錢內取二分共用矛銀一百八十兩問共用銀及物價腳價物重各若干舊法置腳價三分以每價七錢五分除之得每錢該四型另以每銀六錢內減於用二分餘五錢八分乗之得每銀六錢該腳銀二分三厘二毫却將矛用一百八十兩以二歸之得九以價連角矛共六錢二分三厘二毫乗之得共用銀五千六百零八兩八錢內減去矛用銀一百八十兩餘五千四百二十八兩八錢以腳銀三分乗之得一千六百二十八兩六錢四分以價腳共七錢八分除之得腳銀二百零
