body:
  text: 合二率求實法今有銀一千二百兩買綾絹議要絹一停綾二停其綾每匹價三兩六錢絹每匹價二兩四錢問綾絹並價各若干舊法置銀一千二百兩為實另置綾價三兩六錢以二因之為率得綾率七兩二錢絹率二兩四錢合併得九兩六錢為法除實得絹一百二十五匹倍之得綾二百五十匹各以原價乘之得綾價九百兩絹價三百兩合三率求實法今有銀一百二十一兩一錢七分五厘糴米麥豆一百九十六石五斗內係米一分麥二分豆三分米每斗九分二厘麥每斗八分五厘豆每斗三分六厘問三色併價各若干舊法置總銀為實另置二兩麥價二因豆價併米原價得米率九分二厘麥率一錢七分豆率一錢八厘合併得三錢七分為法除實得米三十二石七斗五升二因得麥六十五石五斗另三因得豆九十八
