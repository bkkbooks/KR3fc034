body:
  text: 股相乗一半為全勾股本積觧義圓積是以二十四乗一十八餘勾股積是以二十四乗一十二併一十八與二十二共四十即圓得勾股四十分之一十八餘勾股積得四十分之二十二因上是圓積得勾股積平半恐人誤認為定則故復列此互明容方亦做此筭海説詳第二卷終
