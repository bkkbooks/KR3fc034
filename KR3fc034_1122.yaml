body:
  text: 解義一百零五者三五七會斉之數故以為三數滿法七剩一下十五者十五乃三五會斉之數三數五數俱旡剩以七數之剩一個故以十五為七數剩一之衰五數剩一下二十一者二十一乃三七會齊之數三數七數俱旡剩以五數之剩一個故以二十一為五數剩一之衰三剩一下七十者五七三十五乃五七會斉之數以三數之餘二再加一個三十五淂七十以三數之餘一五數七數俱無故以七十為三數剩一之衰然此數不特三數五數七數可推又有二數三數五數或三四五七四七五七八四七九七八九皆可前法推筭今更列三法於後互相發明如雲有物二數剩一個三數剩一個五數剩一個問共數若干增法置二三五維乗二三相乗得六又以五乗得三十為滿法數另以三乗五得一十五為二數剩一之衰又以五乗二得一十為三數剩一之衰又以二乗三得六為五數剩一之衰卻將二數三數五數各剩一各下一衰十五加十再加六共三十一內減滿法數三十餘得共物一個
