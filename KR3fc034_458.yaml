body:
  text: 長四分八釐一毫六系二忽一後零五沙乘之得角面九步六分三釐二毫四絲二忽一微卻置通長二十步以濶十七步五分二釐七毫五系九忽二微乘之得直田積三百五十步零五分五釐一毫八絲四忽另將通長加面長折半得一十四步八分一釐六毫二系一忽零五織以通濶乘之得六角積二百五十九步六分九釐二毫四絲九忽二微六織三沙零一埃一渺六漠又置角外餘長得通濶一半八步七分六釐三毫七系九忽六微以角面一角餘濶五步一分八釐三毫七系八忽九微五織乘之得積折半得一角餘積二十二步七分一釐四毫八絲三怨六微八織四沙二塵四埃七渺一漠四角共得餘積九十步零八分五釐九毫三絲四忽七微三織六沙九塵八埃八渺四漠併六角積合直田積解義以長求面用四分八釐一毫六系二忽一微零五沙即前圓容六角以弧皆求弧弦法也六角弧皆得從一半故弦得皆九分
