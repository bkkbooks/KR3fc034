body:
  text: 置多錢三十六文以綾六尺乗之得二百一十六文加入綾少價三十六文共二百五十二文亦以二尺為法除之得羅毎尺錢一百二十六文又法今有綾毎尺價比羅毎尺多錢三十六文原借羅一文二尺還綾七尺外補錢三百七十八文適等問各毎尺價若干增法置多錢三十六文以借羅一天二尺乗之得四百三十二文加外補錢三百七十八文共八百一十文為實以綾七尺羅一丈二尺對減餘五尺為法除實得綾毎尺錢一百六十二文另置三十六文以綾七尺乗之得二百五十二文加外補錢三百七十八文共六百三十文亦以五尺為法除之得羅價毎尺錢一百二十六文貴價有餘差分法今有綾毎尺價比羅毎尺多三十六文原借綾六尺還羅七尺仍欠錢九十文問各毎尺價若干增法置多錢五十六文以羅
