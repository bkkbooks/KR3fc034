body:
  text: 法置積七十八根以十八乗之得一千四百零四根為實以三為縱方用帶縱開平方法除之得三十六減去三根餘得外週三十三根積六十六根外周三十根亦同法倍積帶縱法與有中心亦同三稜束三角田異所徑圖三稜束亦論之每面七個個數以面計徑亦七層以外周計之三三角田亦論分六一十八個數以面角論每面七步外週三面徑論面七步七二十一步以徑止六步拙翁論曰三稜束三角田與方束方田同束周除根計個數田周連根每一角作二數方田周比方束周多四四角多四也三角田周比三稜束周多三三角多三也方田係方面自乗得積以周求亦周自乗法故方束周加四合田周即可以田法求三角田徑面各異相乗得積若以周
  hash: sha256:dae4c3beb88ccdee5ed0cc1394aecafd9a1adbb0c79bf2421e891304236bb7bf
