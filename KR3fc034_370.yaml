body:
  text: 解義眉田矩有彎背如弧矢形而內周亦宆內外周折半如罔伸直戌二杢大頭相須故用中徑折半乘之今有牛角田自尖之下濶中心依彎長十七步五分濶八步問積若干舊法置中長一十七步五分以濶八步折半得四步乘之得積七十步解義牛角田如眉田之半取中彎一長同內外宆長合併折平一也今有車輞形田外彎長四十五步內彎長三十六步濶六步問積若干舊法置外長內長併之得八十一步折半得四十步零五分以徑六步乘之得積二百四十三步解義車輞田如同割截圎田或割三分四分之一或割五分六分之一皆烯圓田內周為周折半之法以徑乘之圓田徑步外周比內周多六步前圓如四分圓田徑一步外周多一步五分則五車徑長則為兩一也
  hash: sha256:f1798e25f701f64b69ab24464f7bddf8f442934ef9e85876517c402aefa4a112
