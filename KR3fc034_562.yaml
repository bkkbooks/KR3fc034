body:
  text: 無窮生數無不在一包羅本二生衍故獨合二位數也且二層下每二位生一位正逄兩得生如三層兩一生二兩一皆乗二即二自乗之四四層一三各生四一三各乗四即四自乗之十六五層一各自生五一四各乗五即五自乗之二十五三三生六三皆乗六即六自乗之三十六六七層皆然是自乗亦即包藏在內北埋生率妙合莫可思議故具國出以啓悟程觧似猶未徹併存待考開平方認啇欹一百一十定無疑一千三十有零畸九千九九不離十一萬作一百推方除倍方作亷法次啇除亷並隅除餘數倍亷重啇起啇除不盡命其餘開平方初啇定首位數啇一步積一步起至三步止皆啇一步啇二步積四步起至八步止啇三步積九步起至一十圓步止
