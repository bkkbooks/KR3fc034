body:
  text: 無窮生數無不在一包羅本二生衍故獨合二位數也且二層下每二位生一位正逄兩得生如三層兩一生二兩一皆乘二即二自乘之四四層一三各生四一三各乘四即四自乘之十六五層一各自生五一四各乘五即五自乘之二十五三三生六三皆乘六即六自乘之三十六六七層皆然是自乘亦即包藏在內北埋生率妙合莫可思議故具國出以啓悟程解似猶未徹併存待考開平方認啇欹一百一十定無疑一千三十有零畸九千九九不離十一萬作一百推方除倍方作亷法次啇除亷並隅除餘數倍亷重啇起啇除不盡命其餘開平方初啇定首位數啇一步積一步起至三步止皆啇一步啇二步積四步起至八步止啇三步積九步起至一十圓步止
