body:
  text: 為衰者價多則除戶必多價少則除戶必少譬如甲縣米每石價二兩乙縣運進腳每石個一兩八錢以二兩除戶數每二十戶一石以一兩八錢除戶數每十八戶得一石也積率問價法今有圓木大小二根大者根徑一尺二寸稍徑八寸長二丈五尺小者根徑一尺稍徑七寸長二丈共價銀四十九兩零八分問大小木各價若干舊法置大木根徑一尺二寸自乘得一百四十四寸又將稍徑八寸自乘得六十四寸併之得二百零八寸以長二丈五尺乘之得積五萬二千寸另置小木根徑一尺自乘得一百寸又將稍徑七寸自乘得四十九寸併之得一百四十九寸以長二丈乘之得積二萬九千八百寸併大小積共八萬一千八百寸為法以除原價四十九兩零八分得每寸該價六毫為一衰之數以大積乘之得大木該價銀三十一兩二錢以小積乘之得小木該價銀一十七兩八錢八分
