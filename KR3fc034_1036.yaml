body:
  text: 一百一十六両餘得參草共三千六百二十両零五錢另將人參五錢甘草十一斤以両法齊同人參毎五錢加倍得一両亦將價一両七錢倍之得三両四錢又將甘草毎十一斤以斤両法加之得一百七十六両亦倍之作三百五十二両價四錢倍之得八錢參草共價五十両零七錢倍之得一百零一両四錢參草共三千六百二十両零五錢倍之得七千二百四十一両卻用分位列右人參一両左銀三両四錢互甘草三百五十二両銀八錢共參屮七千二百四十一両共價一百零一両四錢先以右上人參一両互乗左中價八錢得八錢又以左上銀三両四錢互乗右中甘草二百五十二両得一千一百九十六両八錢以少減多餘一千一百九十六両為法次以右上參一両互乗左下共價銀一百零一両四錢仍故又以左上銀三両四錢互乗右下參草七千二百四十一両得二萬四千六百一十九両四錢以少減多餘二萬四千九百一十八両為實以法除之得甘草併價平法二十零五以十一斤乗之得甘草二百二十五斤半以四錢乗之
