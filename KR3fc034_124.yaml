body:
  text: 又撞歸法如有銀一百八十四兩三錢二分共四十八人分之問每人該銀若干置銀一百八十四兩三錢二分為實用四歸以四十八人為法歸除之先呼四一二十二將實首百位一加作一下位加二又呼逢四進一十將次位八十併先呼加二數共十內起四進一於上位共成三本位餘六却於苐三位呼三八二十四苐二位除二餘四苐三位四除空此是見四無除即將苐二位本身作九下位加四八九應除七十二四數仍不數此是無除應再將本身九起一存八下位加四亦成八却於苐四位呼八八六十四苐三位八除去六再除一於苐四位加六餘三位一四位九五位二又於三位呼四一二十二本位加一成二四位加二共十一即於四位呼逢八進二十三位共成四四位餘三五位二却於五位呼
