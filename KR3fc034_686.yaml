body:
  text: 求倚壁外角尖堆積米法今有倚壁外角堆下周三十六尺高一十二尺問積米若干舊法置下周三十六尺自乘得一千二百九十六尺以高一十二尺乘之得一萬五千五百五十二尺以外窖率二十七除之得積五百七十六尺以斛法二五除之得米二百三十石零四斗增法置下周三十六尺以三歸之得一十二尺為大半徑自乘得一百四十四尺以高一十二尺乘之得一千七百二十八尺以三歸之得積五百七十六尺以斛法除得米數又法置下周三十六尺用四因三歸得四十八尺以高一十二尺乘之得積五百七十六尺解義外角積淂圓堆四分之三外角周亦圓周四分之三除率二十七又外窖周四分之三圓周四十八是四分外交周三十六是三分四分自乘淂十六三分自乘淂九是外角淂圓堆法十六分之九所雲十六分之九即一三因四歸在三因四歸之數也將圓周四十八三因四歸淂三十六為外角周將三十六三因四歸淂二十七為除凖之圓淂方四分之三不外四分之三為除法其增法用
