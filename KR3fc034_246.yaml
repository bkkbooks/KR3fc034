body:
  text: 圓周多一分方周加倍比圓周便多二分餘出之數與不足之數皆是二倍故必折半始合本數也末二法不用將餘濶加倍亦不用以圓周二倍較量者乃即以方周多圓周之本數求也方周本數四分多圓周一分其多出之數除去分外多數止存淨多一分之數故四因濶多之數以減周多之數餘得徑數也濶多前法用加倍合圓周二倍之法也此用四因者合方面四面之因也二法總一理因內圓數少外周數過多故加倍求之外周多內周數無幾逺不足圓周兩倍之數故只以本數求之其實二法可互用也今有方圜田一假外方八十步內方六十步濶十步問積田若干法置外方八十步內方六十步併之共一百四十步折半得七十步以四因之得二百八十步為實以濶十步因之得積二千八百步以畝法二四通之得田一十一畝六分六釐六毫六六不盡直田求禮求長濶歌直田長濶不相同長濶相乘積數成積濶問長濶除積問濶長除濶亦明
