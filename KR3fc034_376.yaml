body:
  text: 二步加中濶五十二步共八十四步折半得四十二步以中濶至南濶二十步乗之得八百四十步又浖中濶五十而步加北濶四十四步共九十六步折半得四十八步以中濶至北濶四十步乗之得一千九百二十步合二段共得積二千七百六十步解義此即二頭問既不同長又不一著作三廣筭則折濶得四十五步以長六十步乗之得二千七百步比原積少六十步乃小矩大濶長之故也著大濶短小濶長則積又差多恐用者差誤外錯必多故湏圖此今有四面長濶各不等田右正長五十步左斜尖橫直截直長私事步下截勾股濶十步長三十二步上正濶二十八步豎直截下右勾股長四十步濶四步問共積若干舊法先置截直田濶二十八步乗長四十步得積一千一百二十步又置左勾股長四十步以勾四步折半二步乗芝得積八十步再置下勾股
