body:
  text: 水陸較程法今有大京路至杭州四千二百七十五里馬從京往南日行一百二十里船後杭州往北日行七十里問船馬幾日相會各行差十里舊法置路四千二百七十五里為實卻併船馬日行共一百九十里為法除之得船馬相會二十二日半又為實各以馬行一百二十里乘得相會處行二千七百里以船行七十里乘得相會行一千五百七十五里難題較日會合西江月張家三女孝順歸家頻望勤勞東村大女隔三朝五日兩村女到小女南鄉路遠依然七日一遭何朝齊至飲香鰌請問英賢四報舊法置三五相乘又以七乘得相會一百零五日解義舊法又有甲乙二人應復甲十二日一往乙十五日一往問何日會法用十二十五相乘得一百八十日以二數對減餘三日為法除實得六十日一會然若改作甲十三乙十六或十七十八算俱唯合未可為通法故不載
