body:
  text: 位五添三作八下位添二成三隨呼三八除二十四萬呼四八除三萬二千呼八八除六千四百右下之法不用將實首八除去置八尺於左初次啇四百六十之下卻再將初次啇四百六十以再啇八尺乘之得三千六百八十尺以三因之得一萬一千零四十尺併入八尺自乘得六十四尺二共一萬一千一百零四尺皆以再啇八尺相呼除之一八除八萬又一八除八千又一八除八百又四八除三十二尺除實恰盡左上所啇得立方每靣四百六十八尺解義以初啇四百尺自乘一十六萬尺以三因之淂四十八萬尺即西方三平亷也另置初啇四百尺以次啇六十尺乘之以三因之共七萬二千尺即三長亷也又次啇六十尺自乘淂三千六百尺即一隅也以之作法歸除仍以次啇乘平亷長亷一隅之法七以上已完次啇之法又將方法四十八萬併入兩個亷法三個隅法者方法即初啇三平亷兩個亷法即六個長亷乃每平亷一加二長亷一隅共成四百六十尺之四平亷又為法除淂三啇若干淺焰前法以三啇乘初次啇淂長亷三啇自乘得隅法呼積完三啇
