body:
  text: 方倍今有圓田內截方塘內方得餘徑二徑盈倍不足四分四釐七毫八絲圓周多不足內方周五步九分三釐零四絲問除帶分釐圖徑內方通徑各若干增法置圓周多五步九分三釐零四絲以內方不是四分四釐七毫八絲減之餘五步四分八釐二毫六絲為實另將內方二倍作二步以四因得八步餘徑一倍連內方二倍共三步以三因得九步與方八步對減餘一步為法除實如故得餘徑共五步四分八釐二毫六絲折半得每面餘徑二步七分四釐一毫三絲共餘徑加倍得十步零九分六釐五毫二絲內減不足四分四釐七毫八絲得內方面十步零五分一釐七毫四絲連共餘徑得通圓徑一十六步又今有內方得餘徑一倍有半多六分三釐四毫
