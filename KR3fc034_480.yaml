body:
  text: 一曰勾弦較謂勾弦相減也如勾三十二步弦六十八步相較減餘三十六步曰勾弦較一曰股弦較謂股弦相減也如股六十步弦六十八步相較減餘八步曰股弦較一曰勾股和謂勾股相併也如勾三十二步股六十步和同為一得九十二步曰勾股和一曰勾弦和謂勾弦相併也如勾三十二步弦六十八步和同為一得一百步曰勾弦和一曰股弦和謂股弦相併也如股六十步弦六十八步和同為一得一百二十八步曰股弦和一曰弦較和謂弦與勾股較相併也如勾股相減餘差二十八步併弦六十八步共九十六步曰弦較和一曰弦和較謂弦與勾股併數相減也如勾股相和共九十二步以弦六十相減除二四步曰弦和較
  hash: sha256:029ed1215498d1c6a28c32b9037465b7a5ca6bfab4f36391a3f991e836343c5d
