body:
  text: 除之得每方五十步增法以周求積周自乘以十六除得積解見後方來下解義方田之積由方面自乘而得故因積求方即將積步以開方法除之此即還源注也無論圖直弧角等形因積求長求闊求弦矢勾股等皆同此定法法徔實首頓數至步位止於步下一法定十數如前方舊止五十步矣位下位是步位再下一位定十逆上至十原位即千蓋乘法數本上升而位則下減一升一減湊合本位上當升起二數如實首十則乘數為千位實首百則乘數為萬位但詳實首數明按數升起即不必數至下再逆陛至上可也今有方田一假斜長七十步零七分一厘零六絲捌忽問積步若干增法置斜長七十步零七分一厘零六系八忽自乘得五千步折半得積二千五百步解義方田之斜即勾股之弦斜自乘數內包兩個方自乘數法方五十步斜七十步自乘止得四千九百步不是方自乘加倍之數今改正方五十步斜應得七十步零七分一厘零六繫七忽不要以八忽算者數分不盡數算作法也詳說見後方斜下
