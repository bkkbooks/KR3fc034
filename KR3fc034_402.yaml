body:
  text: 三千一百三十六步三因四歸得圓積二千三百五十二步四隅每隅兩面長俱二十八步俱折半得一十四步自乘得一隅積一百九十六步以四隅因之得共隅積七百八十四步併圓積共合方積解義凡斜尖勾股等形俱以兩面長濶相乘折半淂積或以一面折半一面不折半相乘之合折半之積圭田中往下廣相乘折半河中分作二勾股以長濶相乘折半同圓隅內處兩面俱折半自乃是斜尖形之半較將內方濶積作大方內斜方隅內即與弧矢相對以弧矢淂一百九十六步一隅亦一百九十六步止淂斜尖一半此毫忽無差也求圓內容方法今有圓徑五十六步積二千三百五十二步問內容方面及積各若干增法置圓徑即內方斜長五十六步以方法四步九分五厘乘之得二千九百七十二步以斜法七步除之得內方面法三十九步六分自乘得一千五百六十八步一分六厘以二十四步三分除之得六十四步以二毫五系乘之淂一分六厘以減自乘績得內方正
