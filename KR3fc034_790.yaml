body:
  text: 積若干增法置底面一十四尺以中徑一十二尺乘之得一百六十八尺又以高二十四尺乘之得四千零三十二尺為實以四歸之得積一千零八尺解義徑以十二乘面十四再以高乘即長十四濶十二高二十四一立長方計積四千零三十二尺折半得二千零一十六尺為立三角積再折半得一千零八為三角錐積立三角得立長方一半三角錐又得立三角一半故用四歸舊無三角錐法今補列併偹析分數圖於後立三角得立長方一半圖三角錐得立三角一半圖此即面十四徑十二高二十四一立長方截作立三角共截斜刃二假每假各長十二濶七尺將十二尺以七尺乘再以高二十四尺乘折半的積一千零八尺二假共合立三角積是外二假得一半積二千零一十六尺立三角得一半積二千零一十六尺故曰立三角得立長方之半此即生三角泛中心各三角斜截下俱手刃外三假共得積一半內三角錐得積一半將三角錐亦泛中心截作三個小三角每一小三角與外截一假相等
