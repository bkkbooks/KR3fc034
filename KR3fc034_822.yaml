body:
  text: 曰三十六分之二十二觧義三千五百里五十七十會齊之數也五十個七十里得三千五百里即是空車五十日行三千五百里七十個五十里亦得三千五百里即是重車七十日行三千五百里併五十七十得一百二十是合輕重車共一百二十日徃返三千五百里以一百二十除三千五百得二十九一六不盡即是每一日空重車各行二十九里一六不盡以五日乗之共行室重車各一百四十五里八三三不盡以三徃返除之得一徃返空重車各四十八里六分一不盡即至倉之里數四十八里不盡三十六分之二十二即三百六十分之二百二十亦即茫三分六通之二分二厘葢將不盡二再加一四合成三六便可再加一里也輕重分程計工法原有人負米一石一斗二升行三十步日五十返今負米一石二斗行四十步問日應幾返舊法置負米一石一斗二米以行三十步乗之得三百三十六尺以五十返乗之得一千六百八十為實另以今負米一石二斗以行四十步乗之得四百八十為法除實得日應三十五返
