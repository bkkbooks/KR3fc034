body:
  text: 解義本積開方圓徑應二百六十八步三分二厘八毫不盡周數有難盡故以法命之若問積以二百六十八步自乗得七萬一千八百二十四步加入不盡一百七十六步即合原積今有大小圓田二叚相併共積三百步只雲大圓徑比小圓徑多四步問大小徑併積各若干舊法置共積四因三歸得四百步為實大圓徑多小圓徑四步自乗得六步以減積四百步餘三百八十四步折半得一百九十二步為實另置大圓徑多小圓徑四步為縱方以帶縱開方法除之得小圓徑一十二步加多四步得大圓徑一十六步各以徑自乗三因四歸得大圓積一百九十二步小圓積一百零八步解義即此前大小二方中所客求圖不開方故帶縱與方濶
  hash: sha256:6d50c8954897b5bdd71c97982a52cb6d8b913a582c2e8fd4b5690df15b585b4b
