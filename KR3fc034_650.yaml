body:
  text: 自乘再乘得五百一十二尺為隅法除實恰盡得立圓徑四十八尺此文立圓如圓毬解義平圓不離平方立圓亦不離立方其以十六乘九除淂一十一萬零五百九十二尺即立方積也以開立方法除之淂立方西即立圓徑也其以十六乘九除者立圓淂立方十六分中九分四隅淂七分平圓淂平方四分之三圓得三分四隅淂一分立圓如圓毬四隅所餘如多將十六三因四歸淂十二是平圓數又將十二三個四歸得九是立圓數是十六分之九分乃兩次三因四歸之數猶之一乘再乘之義立方是一乘再乘而得立圓亦本立方一三因四歸再三因四歸而淂將立方西四十八尺一乘再乘得主方積一十一萬零五百九十二尺將一十一萬零五百九十二尺一三因四歸再三因四歸淂六萬二千二百零八尺即立圓之積若因徑問積將徑四十八尺一乘再乘淂積用九因十六除淂立圓積立圓開方問周法今有立圓積六萬二千二百零八尺問立圓周若干增法置積數以四十八尺乘之得二百九十八萬五千九百八十四尺為實以開平方除之初啇一百尺於左自乘得一萬在乘得一百萬除實訖次啇四十於左初啇一百之
