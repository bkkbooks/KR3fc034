body:
  text: 則以五乘四得二十再以六乘得一百二十以此為三位會通就齊之數也四位五位皆凖此分率法謂如各位應得有多有寡難於齊一即各列應得分數合併推求以合本等如後二八三七等分率是也併除分乘法謂如各率分數不同即併諸率分數以除總數求出一物通率仍以名率分乘以得各數分乘併除又分乘法即係上法但各率有紛多頭緒零雜不齊須各乘併歸一各併成一率分數合作除法再用分率乘之以得本數併折法謂如位數挨次增減即以少多二數合併作一折半層數以得本數三角環田內外周皆此等類
  hash: sha256:5f4f9b2addf9eeef7e926df9c310e21da5c06b2effa54fd51985bb83b6eec91d
