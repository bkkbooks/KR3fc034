body:
  text: 末仲補任白不級次署職無職掌而時奔牛馬纍楹粥産陽破丁酋戊戌慚以克公蒙鍳連省署邑之委法地則大力負走人畏棄則屬于每泩增困署江浦二月餘邑小差數寧事後自守浦之人大能言署江寧
