body:
  text: 為一上之三位故乗出之数一千倍得千三位之百萬至一数下四面皆十分乃成整一長十分濶一分是為一分若一分自乗則四面皆一分止得一分中十之一即十分中百之一故得一釐長十分濶一釐是為一釐若一釐自乗則四面皆一釐止得一分釐中百之一即十分釐中千之一故得一絲一下推之皆然然自一至九皆一之等位其乗数又有不同如一自乗得一二自乗得四三自乗得九皆不越本位数四自乗得十六上至九自乗皆進十数一位三十自乗得九百仍不越百数四十自乗得一千六百亦進千数一位凢係四数自乗無論十百千萬與分釐豪絲皆比三数自乗進位一等数之積漸然也又若相乗数內實定若干以二乗則得二倍三乗則得三倍以二十乗則得二十倍
