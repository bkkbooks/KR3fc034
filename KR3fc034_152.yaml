body:
  text: 為一上之三位故乘出之數一千倍得千三位之百萬至一數下四面皆十分乃成整一長十分濶一分是為一分若一分自乘則四面皆一分止得一分中十之一即十分中百之一故得一釐長十分濶一釐是為一釐若一釐自乘則四面皆一釐止得一分釐中百之一即十分釐中千之一故得一絲一下推之皆然然自一至九皆一之等位其乘數又有不同如一自乘得一二自乘得四三自乘得九皆不越本位數四自乘得十六上至九自乘皆進十數一位三十自乘得九百仍不越百數四十自乘得一千六百亦進千數一位凡係四數自乘無論十百千萬與分釐豪絲皆比三數自乘進位一等數之積漸然也又若相乘數內實定若干以二乘則得二倍三乘則得三倍以二十乘則得二十倍
  hash: sha256:06cf436b89a6eac7886db5f2570d4a199e559a6b71005b94669f3f67197f4a23
