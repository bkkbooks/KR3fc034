body:
  text: 多上廣之數截下廣三尺六寸比上廣止多一尺五寸高止六尺七寸五分即已減至二尺安有十一尺二寸五分之高乎故改正穿地求壤土法每穿地方四尺為壤圡五尺以穿地求壤土五因四歸壤土求穿地四因五歸穿地求堅土法每穿地方四尺為堅圡三尺穿地求堅土三因四歸堅土求穿地四因三歸壤土求堅土法每壤土方五尺為堅土三尺壤土求堅土三因五歸堅土求壤土五因三歸壤土即穿所出之浮土堅實土即以穿地之土築堅實也挑土計方法每長濶各一丈深一尺為一方如有田內開土東六丈五尺西七丈五尺南八丈北九丈深四尺問取土若干舊法置東西併共一十四丈折半得七丈又置南北併共一十七丈折半得八丈五尺相乘得五十九丈五尺又
