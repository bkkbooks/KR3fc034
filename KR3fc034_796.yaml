body:
  text: 方長堤截其上廣圖前法堤東頭下廣十四尺上廣八尺高九尺是為得九尺上廣減六尺每高一尺五寸廣減一尺將東高再加一十二尺共二十一尺與西高同則上廣八尺減俱盡此猶東西俱高二十一尺之堤前法西高二十一尺東高九尺猶如全堤截積之法故先從上下同廣同長同高之長堤較起逐假分析考驗庶無差舛同點分界者將上面東西各截廣一尺下廣不截以合兩頭上廣二十尺下廣二十二尺之數也永舊法置長九十六尺以廣二十二尺乘之得二千一百一十二尺以高二十一尺乘之得四萬四千三百五十二尺此總積也分截兩假積兩假上廣各截一尺下解截如斧刃將兩假顛倒配合成一高二十一尺長九十六尺廣一尺之方假置長九十六尺以高乘再以廣乘得積二千零一十六尺再截東上下廣圓此即前堤截去二假東西上廣俱二十尺下廣俱二十二尺又將西頭上廣下廣不減將東頭上廣泛中心兩分斜截至下廣每面各截四尺存廣一十四尺得截至兩頭如刃無廣又分截兩東頭從中心分上廣各十尺下廣各四尺頭如刃無廣將兩假翻配合東頭廣各十四尺置高二十一尺以東廣一十四尺乘之得二百九十四尺又以長九十六尺乘之得二萬八千二百二十四尺
