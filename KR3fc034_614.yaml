body:
  text: 啇七十步積三十四萬三千步起至五十一萬一千九百九十九步止啇八十步積五十一萬二千步起至七十二萬八千九百九十九步止啇九十步積七十二萬九千步起至九十九萬九千九百九十九步止啇一百步積一百萬起至七百九十九萬九千九百九十九步止開立方法歌立方之法要推詳自乗再乗始初啇三因自乗西方法三因初啇三亷長次啇又乗全亷濶次啇自乗隅法當合併三法次啇乗積餘再啇以此啇
