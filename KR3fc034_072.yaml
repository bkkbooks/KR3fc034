body:
  text: 河圈者伏義氏王下龍馬負圈出河者上旋文有自一至十具天地之全數此數自始愛則其文以書八卦天數一三五七九積二十五地數二四六八十積三十共積五十五數求積法置天一地十併得十一以十乘之得一百一十折率得共積河以相生為序左行自此向東而商向中而復於此
