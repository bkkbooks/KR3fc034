body:
  text: 以深四尺乗之得土二百三十八方開渠求工法今有開渠長七千五百五十尺上廣五十四尺下廣四十尺深一十二尺每日工開三百尺問用工若干舊法併上下廣折半得四十七尺以深一十二尺乗之得五百六十四尺又以長七千五百五十尺乗之得積四百二十五萬八千二百尺為實以每工三百尺為法除之得該一萬四千一百九十四工難題筭工歌穿渠二十九里程再加一百四步零上廣一丈二尺六下廣八尺丈八深每日一夫二百尺問該夫數僱工興舊法置二十九裏以每裏三百六十步乗之得一萬零四百四十步加一百零四步共一萬零五百四十四步以每步五尺乗之得五萬二千七百二十尺為長另併上廣一丈二尺六寸下廣八尺共二丈零六寸折半得一十尺零三寸以深一十八尺乗之得一百八十五尺四寸以乗長得九百七十七萬四千二百八十八尺為實以
