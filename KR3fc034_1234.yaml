body:
  text: 卻以五行冰為糖三通乗一行白糖四得一十二乗價四錢得一両二錢與五行九錢三分對減一行餘二錢七分就將五行松子一十八移置一行苐五位立負松子一十八次以一行白糖一十二通乗二行萄五得六十乗價三錢三分得三両九錢六分卻以二行白糖二通乗一行松子負十八得三十六乗餘價二錢七分得五錢四分兩相對減二行餘價三両四錢二分就將一行負松子三十六移置二行五位立負三十六又次以二行葡萄六十通乗三行榛仁八得四百八十乗價五錢五分六厘得三十三両三錢六分卻以三行葡萄六通乗二行負松子三十六得二百一十六乗餘價三両四錢二分得二十両零五錢二分両相對減三行餘價一十二両八錢四分就將二行負松子二百一十六移置三行五位立負二百一十六又次以三行榛仁四百八十通乗四行松子七得三千三百六十乗價三錢二分七厘得一百五十六両九錢六分卻以四行榛仁四通乗三行
  hash: sha256:4fab08f9d25f452d7393fe4ff2eb2c176eaec3e12ef5ebc04b229c094dbe1bde
