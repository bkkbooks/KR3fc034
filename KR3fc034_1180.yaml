body:
  text: 解義以三八相乗為蔴實者或三分或八分搃芝蔴必三八會齊數內也以八分互之一淂八石以三分互之三淂九石即將三八三十四以一因三帰淂八石以三因八帰淂九石也匿價方程法方正也程數也諸價錯襍法求正數必湏佈置行列同異虛實逓互通乗求其有等法實相除得一價以推其餘繁襍多倍者次第求之二色方程歌二色方程筭法真各物共價左右分上物為法互乗完對減得數法實全中餘為法除下實中物價值了無疑先求上物中為法依法求之上可察今有馬三匹牛二頭共價銀一百一十四兩又馬四匹牛五頭共價一百六十二両五錢問馬牛價各若干舊法將二等各物數各價分位
