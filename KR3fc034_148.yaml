body:
  text: 十六也由此而推如一個而自乘得四加倍四自乘得十六是四個四三倍六自乘得三十六是九個四四倍八自乘得六十四是十六個四漸加以上皆然若加半倍自乘則乘數得多九分之五如二自乘得四加半倍三自乘得九乘數多出九分之五四自乘得一十六加半倍六自乘得三十六十六是四個四三十六是九個四亦多九分之五也若一邊加倍一邊本數相乘則乘數加倍如二二得四二四則得八四四一十六四八得三十二是也大抵數始於一自二以上以至無窮奠不由一為本欲推無窮之數亦奠不由一為本如後圓內除方以一步立內方之法則圓周方周可推等類是也再若推求各數各有本位如問步則以步為本位問尺則以尺為本位本位者數之一也自一以上至
