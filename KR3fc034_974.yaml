body:
  text: 得二兩為法除實得一百二十兩乃甲丁首尾二人共數於內減多一十八兩餘一百零二兩折半得丁銀五十一兩加多一十八兩得甲銀六十九兩另置甲多一十八兩以三歸之得六兩加入丁銀得丙銀五十七兩減除甲銀得乙銀六十三兩解義只以四位折半得二為法其捷至將甲多丁一十八兩以三歸之得六兩加入甲丁共和一百二十兩折半即得乙銀六十三兩減除甲丁共和一百二十兩折半得丙銀五十七兩六是互和折半法也五等互和折半挨減法今有鈔二百三十八貫五等人從上胡和減半挨次分之只雲戊不及甲三十三貫六百文問各訣若干舊法置鈔二百三十八貫為實以一三五七九併得二貫五百文為法除之得九十五貫二百文乃首尾二人共數加甲多戊鈔三十三貫六百文共一百二十八貫八百文折半得甲鈔六十四貫
