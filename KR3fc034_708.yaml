body:
  text: 之法除率皆同而田周比束周多四數故但將束周加四個自乘即同田周之法所為移實就虛以合法也如前無中心方束將束周加內周四即與田周相同故自乘亦同有中心方束加內周八以原周乘比四週一邊多四一邊少四總不外加四以就田周之義然相乘之數以率十六除之比田周自乘之數尚待中心一數固未若直將束周加四無論有無中心皆可一例而求也但諸法皆以明數詳釋群法乃可洞徽數理故倘列之徽數理故倘列之此是六個周中包一今有箭一圓束外週三十六根問總積若干舊法置外周三十六根加內周六根共四十二根以外周三十六根乗之得一千五百一十二根為實以圓束率十二除之如中心
