body:
  text: 二二加如四得該銀三百一十三兩六錢五分㝎位只認疋為上㝎兩依次陞解義前法除法首一位止以一錢為法加之此除法首一位尚有二錢七分五厘三位不論位多位少只首位不動以下挨次加之又如有米四萬六千七百九十一石每石加耗七升問連耗共米若干舊法置正米為實以耗米七升為法隔位加之得共米五萬零二十三石五斗七升解義上二法連位加此是隔位加湏勿準誤减法歌减法湏知先定身得其身數始為真法中有一置不用身外除零妙入神凢遇法首有一數者用此所謂定身除抒光定本身之住而後减除也置所有物為寔以所求價為法與身數相呼九九之數言實就身言如次位次苐如法减而除之先洐寔首位起如有銀二百九十四兩八錢買絹每疋價銀一兩一錢問該絹若干舊
  hash: sha256:cd757570b0c6e6d1e83676d831fa1f37468e9b273e75bb6f2e4cd679cc95648a
