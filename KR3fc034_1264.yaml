body:
  text: 九宮連環陣求積法併首一末七十二共七十三以七十二乗之得三千二百五十六折增得共積二千六百二十八以九為法除之得毎環八千為一陣各積二百九十二子多寡相實隣壁相兼此九陣化一十三陣見運用之道也解義毎陣直分一半四子橫分一半四子皆一半積一百四十六子彼此一半相合皆成一陣之數
