body:
  text: 戶問各等每戶及共米各若干舊法置米一千一百三十四石為實以五因一等二十四戶得一百二十戶以四因二等三十三戶得一百三十二戶以三因三等四十二戶得一百二十六戶以因四等五十一戶得一百零二戶五等戶不動仍六十戶併五等數共得五百四十衰除實得第五等每戶米二石一斗以六十二因之得共米一百二十六石另以二因二石一斗得四等每戶訣米四石二斗以五十一戶乘之得共米二百一十四石二斗又以三因二石一斗得三等每戶該米六石三斗以四十二戶乘之得共米二百六十四石六斗又以四因二石一斗得二等每戶訣米八石四斗以三十三戶乘之得共米二百七十七石二斗又以五因二石一斗得上等每戶該米十石零五斗以二十四戶乘之得共米二百五十二石額側挨減俸法今有俸糧三百零五石令五等官依品遞減一十三
