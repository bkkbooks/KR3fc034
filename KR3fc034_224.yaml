body:
  text: 勾股圭梭欖田等長廣相乘折半平梯斜兩廣相併折長乘見積數成二不等併兩廣步折半長乘法相重三廣倍中併二澗四歸再以長乘從牛角眉田兩長併折半還㸹半徑通四五不等須分段廣長不一有同情歌缺形狀多不偹因形截大筻工丈量篾車圖以即十字木也一樣二根合成十字口轉以即前二根交佝合成十字中心一安下轉心四項開口閉拴置鎖上長口是監乃罡蔑之懷口以矩口是橫乃鎖蔑之口上十字即套入此內
