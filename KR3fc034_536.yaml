body:
  text: 重力表竿四尺退行八尺一寸立望竿四尺二寸人目窺望二竿末亦與寇營斜對問寇遠若干增法置表問一十七天以寸通之得一百七十寸以望竿餘二寸即餘勾秉之得三百四十寸以後表退行八尺一寸減前表退行八尺餘一寸為法除之仍三百四十寸以尺通之得城下至表竿如通勾三十四尺即將三十四尺為實另將前表退行八尺以寸通之得八十以乘三十四尺得二千七百二十尺以餘竿二寸除之得前表至寇營遠一千三百六十尺內春墻一尺餘得實遠一千三百五十九尺或以表問積求亦將前退八尺以寸通之得八十以乘一十七尺得一千三百六十尺以後表減餘一寸為法除之仍故得前表至營之遠法再將後表退行八尺一寸以寸通之得八十一卻以餘竿二寸乘表問一十七尺得三十四尺以八十一除之得依後表窺斜弦至營前表竿餘髙四十一分九釐有零
