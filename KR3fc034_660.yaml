body:
  text: 幹定為石法推筭或本地或他處斛斗大小不等俱依此法較之以今尺今斛斗為凖後皆依古度量立法在臨期會通用之方長圓倉求積求倉歌方倉長倉積易知圓周自乗十二除各以高數為乗法斛法除之米可察因米求倉各還源斛法用乗米數先以高求方高除積再用開方方可識以方求高方自乗以除原積高亦明長倉高長可求濶高長相乗除法約問高問長理相同惟有圓積十二乗問周高除重開方問高周乗除積良方倉求米法今有方倉面各一十五尺高一十二尺問盛米若干舊法置方西一十五尺自乗得二百二十五尺以高一十二尺乗之得二千七百尺為實以斛法
