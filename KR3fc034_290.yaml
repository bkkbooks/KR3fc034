body:
  text: 非是方束是論個數周十二則寔有十二闊若以每面計之則各面淂四個非三個方田正而數寔四角數虛每角両面作數周十二步寔此八步何淂帰方束作十二寔步筭此程賔渠所以詳其非也圓田截方餘徑並二周相較求內方餘圓歌圓內截方法可推內方差數用為實徑方約量十分數一倍定位作一步較減餘數即為法除這徑方皆可察徑倍除實先得方方陪除實徑亦彰倍數內外有盈欠加實減實分別筭解義舊法截圓田方池一問然無所求之法今併立法考較大凡餘徑內方盈不同圓周方周亦參差不等將餘徑內方俱以十分為率每一分作一步立法加至一倍半倍二三倍不等或餘徑或內方面多若干倍分數圓周多內方周不齊之數必係若干分數之積數故以餘徑內方減餘之分數為法以除外圓周所多內周之數即可得徑方步數至或餘徑或內方多若干倍內有或盈或不是湏用加減所多之數為實者數以十分為准盈不足皆零餘不齊不合倍之數故湏加減乃舍也其盈不足皆用三因者徑一圓周
