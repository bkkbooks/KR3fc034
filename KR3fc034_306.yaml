body:
  text: 通圓徑一百五十四步三分五釐又今有餘徑得內方五百二十一分釐之二百二十九圓周多方周三步三分二釐問內方餘徑通徑增法置圓周多三步三分二釐以釐通之得三百三十二釐為實另將內方五百二十一釐以四因得二千零八十四釐又將餘徑二百二十九釐連內方五百二十一釐共七百五十釐以三因得二千二百五十釐與方二千零八十四釐對減餘一百六十六釐為法除實三百三十二釐得二釐為平法以因五百二十一釐得一千零四十二釐每百釐一步得內方面一十步零四分二釐以因二百二十幾釐得四百五十八釐每百釐一步得餘徑共四步五分八厘折半得每面餘徑二步二分九釐合餘徑內方得通圓徑一十五步解義內方餘徑數各參差多少不可以一等倍計須周約法較分可以步分者以步分之步不可分則由分釐毫分之皆可立法相求此數理之無不可通也故又列二以備伸縮
