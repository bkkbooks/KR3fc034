body:
  text: 以餘勾六尺乘正股四十尺得二百四十尺以餘股八尺除之亦得表上之高三十尺以表問論之前表至後表十五尺表上高三十尺亦高長遠短表問十五尺是正勾後表退行減前表退行餘三尺是餘勾此乃就前表以後求高股三十尺勾一十五尺勾得股二分之一共餘勾三尺餘股六尺將十五尺以六尺乘以三尺除亦得表上之高三十尺此數理之絛可腍者也然又將十五尺以退五尺乘以三尺除得前表至木之者何也前表至木二十五尺是五五尺後表至前表一十五尺是三個五尺後表得前表八分之三前表得五分後表得三分將表問十五尺五三歸卯將三分因歸作五分故得前表至木事數二表餘勾股窺望海島圖今有海島不知高遠立表竿三丈退行六十丈又立短竿三尺人目望二竿末與島峰頂參合後卻退行五百丈又立表竿三丈退行六十二丈又立短竿三尺人目望二竿末俱與島峰頂參合問海島高遠各若干法置表問相去五百丈以表竿三丈減去短竿
