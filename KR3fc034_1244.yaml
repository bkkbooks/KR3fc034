body:
  text: 附洛書衍數圖洛書圖二七六九五一四三八洛書之數戴九履一左三右七二四為肩六八為足縱橫斜角皆十五數因衍為四四五五六六以至百子各縱橫斜角皆同一數圖各列後易換三三圖三二六一五九四八七易換術曰九子斜排上下對易左右相換四維挺出先以上一對換下九次以左七對換右三換畢將四維二四六八挺出平直到三行即前圖縱橫斜角皆積十五數求積法併上下數一九共十以九乗之得九十折半得共積四十五數以三行為法除之得縱橫斜角皆十
