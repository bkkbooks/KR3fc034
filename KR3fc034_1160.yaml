body:
  text: 物價銀一十五両難題分杏歌牧童分杏各爭競不知人數不知杏三人五個少五枚四人八個十三空舊法置右三人左四人互五個淂二十個八個淂二十四互不足五個不足十三個重法三人乗八個得二十四個又互乗不足五個得一百二十又以四人乗五個得二十個又互乗不足十三個得二百六十二數對減餘一百四十為物實另以三人四人相乗得一十二將不足五個十三個對減餘八個乗之得九十六為人實卻以三人乗八個得二十四又四人乗五個得二十對減餘四為法除人實九十六得二十四人除物實一百四十得物價銀三十五両雙套不足適足匿價法今有買物毎三人出銀五両不足十両毎五人出銀九両適足問人數物價各若干舊法置列右上三人左上五人互中五両九両
