body:
  text: 行九人得二十七以二人互乗空車六人得一十二併之共三十九以法一除之即人數差空車二輛即是不足六人步行九人即是盈九人此等處湏認定前法求之方旡差誤若以二人三人相乗淂六加步行九人淂十五為法故攺作車十四輛二人共車十一人步行三人共車空車一輛仍照原法將空車一輛以三人乗之得三加十一共十四以法一除之淂車十四輛旡不皆合以二人三人相乗淂六加步行十一人則十七矣又何以為求法乎難題盈不足問店客歌我問開店李三公眾客都來到店中一房七客多七客一房九客一房空舊法置盈七客以一房空九人乗之得六十三以九客乗多七客亦得六十三併之得一百二十六為實以盈七不足九相減餘二為法除之得客六十三人內減去多七客餘五十六人以毎房七客除之得房八眼兩盈兩不足匿數差分歌出率兩盈互相乗多少減餘是物情兩盈相減餘人寔出率相減法之名法除物情是物價法降人當
