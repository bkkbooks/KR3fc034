body:
  text: 內趙一貨九十五擔每擔船腳銀六分錢二貨八十五擔每石船腳銀四分孫三貨五十六擔每擔船腳銀二分五厘因中途剝錢貼鐶二兩五錢二分焰侯遠近船腳銀以分問各該若干舊法置銀二兩五錢二分為實另置趙一貨九十五擔以每擔船腳銀六分因之得趙衰五兩七錢又置錢二貨八十五擔以每石船腳銀四分因之得錢衰三兩四錢又置孫三貨五十六石以每擔船腳銀二分五厘乘之得孫衰一兩四錢合併得原船腳銀一十兩零五錢為法除實得二錢四分乃是船腳每兩貼剝一衰之數就以此為法乘五兩七錢得趙一該貼一兩三錢六分八厘乘三兩四錢得錢二該貼銀八錢一分六厘乘一兩四錢得孫三該貼三錢三分六厘分戶算糧法今有官米七十三石二斗令三等人戶出之上等二十五戶每戶五分中等四十戶每戶三分下等六十戶每戶一分問各等戶米若干舊法置總米七十三石二斗為實另置上等二十五戶以每戶五分因之得
