body:
  text: 橫餘勾容直二積皆同一百五十尺以餘股乗正勾二十五尺得一百五十尺此橫積也以餘勾除之得直長三十尺以餘勾乗正股三十尺亦得一百五十尺此直積也以餘股除之得橫濶二十五尺其二積皆同者何也差勾股長短不齊斜弦所界無論通長通濶截長截濶勾股皆長短不齊如表竿十尺去人目四尺餘六尺人目在表竿退後五尺便騐得每直得六尺濶得五尺一隅如此通長遞濶亦是如此即如一直田濶二十五步是五五二十五長三十步是六五三十每長六步濶得五步將直田橫截六步六個二十五步得一百五十步直截五步五個三十步亦得一百五十步勾股之不齊在直六尺橫止五尺以六加橫以五加直則兩邊俱平故得積皆同除餘勾餘股筭典連餘勾餘股筭搃同一理前表外餘勾餘股求正勾通高圖今有因遠求高離高二丈五尺立表竿三尺六寸退行二尺又立表竿三尺人目望其高處俱與叅合問高若干舊法置遠二十五尺加入退行二尺共二十七尺以二表相減餘六寸乗之得一十六尺二寸為實卻以退行三尺為法
