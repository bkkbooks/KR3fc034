body:
  text: 一千四百三十八個同三色菓併價各若干增法置共菓一千四百三十八個以共價一千三百五十文減之餘多菓八十八個另置中菓六個價五文相減餘多菓一個又置下菓七個價四文相減餘多菓三個併之得四個為法以除多菓八十八個得二十二為中下平法以中菓價五文因之得一百一十文以下菓四文因之得八十八文併之共得一百九十八文以減總價餘一千一百五十二文又將平法二十二以中菓六個因之得一百三十二個以下菓七個因之得一百五十四個併之共得二百八十六個以減總菓亦餘一千一百五十二個各為實另置上菓多錢二文中菓多菓一個以二乗中菓六個得一十二以一乗上菓九個得九個併之得二十一菓以二乗中菓價二文得一十文以一乗上乗價十一文得十一文併之亦得二十一文即以二十一為上中菓平法又置上菓多錢二文下菓多菓三個以二乗下菓七個得一十四個以三乗上菓九個得二十七個
