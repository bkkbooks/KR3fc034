body:
  text: 試將深七尺五寸分作深四尺深三尺五寸二排各用前去相差合二數少積三千一百五十八根零固知乘後用加為數不確只冝先加本數騎或深或濶一加倍一三倍無不皆合又無用分加深加濶之異矣冀排止用深本數以免折加似為當存試者各等尖深總歌長濶尖垜要推詳底腳先將濶長餘數折半添半個併入原長濶乘良濶加一個又乘之法用三歸積相當方尖底方亦加一原方乘之數可識又將原方加半乘以三歸之得本積圓周六歸倍為先加一加二相乘看另加個半復相乘不倍加一作實添合併二數為實以四歸之積可參三角底面一數加底面乘之數不差又將底面加二個相乘六歸法為佳三角靠璧一面垜底面加一面乘過折半便為本垜積諸法依求總無錯
