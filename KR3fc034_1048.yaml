body:
  text: 法求之八斗七斗者五人九人所支之未此以五人乗七斗淂三両五斗即是乗為五個九人計四十五人所支次日之米以九人乗八斗淂七石二斗即是為九個五人計四十五人所支初日之未併之共十石零七斗即是四十五人所支二日之米共米三十二石一斗是三個四十五人所支二日之米將共米以四十五乗之得四十五個一百三十五人之米以一百四十五人所支之米為法即是以四十五個一人所支之米為法故除實可淂雪數一百三十五也法乗法除搃是因米數以求人數米以五人乗七斗淂三十五九人乗八斗淂七十二倍之淂一百乗七為法以除一千四百四十四両五斗淂一十三人半不淂一百三十五人矣今俱攺正作十石零七斗於法方合又法今有馬軍六人給襖布九十二尺步軍七人給褲布四十八尺共給布一十二萬五千八百二十尺問馬步軍及襖布褲布各若干舊法置共布一十二萬五千八百二十尺以六人七人相乗得四十二乗之得五百二十八萬四千四百四十四為實卻用母子互乗列右左母六人七人互子九十二尺四十八尺先以右六人乗左四十
