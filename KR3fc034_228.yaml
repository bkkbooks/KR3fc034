body:
  text: 畝問積步二四因乘解義數以十為準因一步止五尺故一尺作二分一寸作二釐合五尺共作十分以便因歸定位問二四婦除此正法此又有飛歸法或用四歸二歸兩次歸法求之問積用幾還法不外二四歸除之意並列於後飛歸法曰一作五下除二見一無除作四隔位生四進一除二四見二無除作八隔位生八進二除四八進三除七二進四除九六以上積步問畝飛還法曰一退二四二退四八三退七二四退九六五留一二六留一四四七留一六八八留一九二九留二一六以上畝問積步解義一作五下除二即二一添作五五四下位除二也一無除隔位生四即二矣添作五無除借一下還二四四除一十六下位除二隔位還四也進一除二四即進二進一十一四而位除四也見二則除作八隔位生八即見二無除作九二無除借一下還二本位留八下位作四四八除三十二下位除三又去一隔位還八也進二除四八即四進二十二四除八也進三除七二即六進三十三四
