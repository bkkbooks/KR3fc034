body:
  text: 名為亷法又再啇若干置右初啇之苐二位下法亦置若干於法之苐二位名為隅法併亷法共得若干皆與再啇相呼除實盡得平方一西之數如不盡仍前再倍次啇作亷重啇之或數不盡以法命之今有平方積三千一百三十六步問方西若干舊法置積三千一百三十六步於中為實約實定初啇五十步於左下法亦置五十步於右左右相呼五五除實二千五百步餘積六百三十六步就將下法五十步倍作亷法一百步次啇六步於左初啇五十步之下位亦置六步於右倍亷一百步隔位之下共得一百零六步皆與次啇六步相呼一六除實六百步又左六對右六相呼六六除實三十六步恰盡得方西五十六步
  hash: sha256:d87a54afec84d30c114a5a1e1d3bae626de26ec917f8ef27111662c0fa29a59a
