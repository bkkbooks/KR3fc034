body:
  text: 半得共積二百二十五以五行為法除之得縱橫斜角皆合六十五數六六圖三十六十八二十三五十九十十三三十一二十一十二二十六八四二十二三三十十七三十五二二十七三十四十五三十三二十九十一二十五十六六二十四二十七九三十二十四二十八一求積法以首數一末數三十六併之共三十七以三十六乗之得一千三百三十二折半得共積六百六十六以六行為法除之得縱橫斜角得一百一十數
