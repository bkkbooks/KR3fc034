body:
  text: 為實另置人夫二百名以每人開一百四十四尺乘之得二萬八千八百尺為法除之得二日開完解義以上二汯上汯得積宜以六百尺除之卻用人夫十名乘之先以人夫乘亦先乘後除法也若以人夫十二名除積六百尺得五十尺為法除積亦得下法得積以每人一百四十四尺除之再以二百人除之亦得難題計工問價歌今有四人來做工八日工價九錢銀二十四人做半月總價幾何作何分舊法置二十四人以一十五日乘之得三百六十又以銀九錢乘之得三千二百四十為實以四人乘八日得三十二日為法除之得訣銀一十兩零一錢二分五釐以二十四人除之得每人該銀四錢二分一釐八毫七絲五忽較日計工法今有甲乙二人開渠甲日開積四百尺乙日開積三百五十尺甲先開過七十日後接令乙開問若干日與甲同舊法置甲開
  hash: sha256:8eda1de88753b5dc599694bb9afef0e421e25c7473246c48c5573fc62a7cecb8
