body:
  text: 難題積併原長濶問截長截濶欹今有梯田長一百小頭十五大草七截賣一百九十二欲從一邊截去積欍法置截積一百九十二步倍之得三百八十四步以原長一百步乘之得三萬八千四百步為實以大濶二十七步減小濶一十五步餘一十二步折平得六步為法除之得六千四百步以開平方法除之得截長八十步又以法六步乘之得四百八十步以原長一百步除之得截濶四步八分增法如先求截濶即置倍積三百八十四步以折半濶差六步乘之得二千三百零四步以原長一百步除之得二十三步零四釐以開平方法除之得截濶四步八分另將四步八分以原長乘半濶差除得長若不倍積求截長將原長加倍求截濶將半差加倍法見圭田下解義此共上同法橫截全用十八步濶差為法豎截濶差十二步止用一半六步者梯差在兩面今逆一邊截積止用一面濶差得
