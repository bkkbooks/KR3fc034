body:
  text: 法除實得五十為每兩之衰以李宅麻數乘之得李該布五丈四尺以張院麻數乘之得張該布一丈八尺難題僧分饅頭歌一百饅頭一百僧大僧三個更無爭小僧三人分一個大小和尚各幾丁舊法置僧一百僧為實另置一大僧三個三小僧一個合併得四個為法除實得大僧二十五人以三因之得小僧七十五人另以三因大僧得饅頭七十五個以三歸小僧得饅頭二十五個難題增錢剝減歌鄰家有客亂爭喧相見問其所以然二百三十六擔貨程途遠近論船錢九十五擔六分算八十五擔四分完更有五十六擔貨二分五釐算為先只因剝減爭船價二兩五錢二分添請問高明能算士作何分沠得相安比如趙一錢二絲三共貨二百三十六石催船一雙各按貨物輕重程途遠近船價不等
