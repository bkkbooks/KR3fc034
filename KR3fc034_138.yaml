body:
  text: 法除實得每日每人用米二升解義本應用遁除浩置共米三石六斗以一十五人除之得二斗四升為每人所用之米再以一十二日除之淂二升為每人一日所用之米以十五人十二日相乘為除法興通除法也著以每人每日用米二升共一十五人住一十二日問共用米若干則以十五人乘十二日淂一百八十人以乘二升得共米三石六斗又即通乘法矣興與上法可以互尜同異通乘通除法難題歌三人二日四升七一十三口要糧實一年三百六十日借問該食幾多粟興言原三人每二日食糧四升七合今有一十三口共食三百六十日問共食糧若干舊法置今與糧三百六十日以十三口乘之得四千六百八十口又以四升七合乘之得二百一十九石九斗六升為實以原三人乘二日得六為法除實得共食糧三十六石六斗六升解義興應以三除一十三口以二日除三百六十日淂數相乘再以四升七合乘之臼一十三口三百六十日四升七合都是乘三
