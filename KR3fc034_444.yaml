body:
  text: 期於便用立法所以推數法可就數而數雖就法數多畸零矣而必無畸零之法槩之其實推驗不合又奚用斯法為乎或曰就增立之法其間忽微亦有相差未遂足為準也愚曰數至忽微所差已細正猶曆家萬分為度雖有小差不出一度之中此無誤於大數者也且差者乃所立截就之法恐位遇多不便立算故於細微小數量加截就法內有截加之數則積數自微有參差非真數之差也若圖角步數過多不妨再加位損減以求有合與方斜同一理也或曰何不再加位以務求歸盡無織差乎曰凡數之無畸零者可盡有畸零者終不可盡如三歸七歸之類終不可盡且奈何譬諸天地之大有可見可知亦有不論不議此天地之所以為大也數有可盡亦有畸零不可盡此數之所以為
