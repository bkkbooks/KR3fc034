body:
  text: 五寸以深十三尺乘之淂一百七十五尺五寸折半得八十七尺七寸五分四西共積三百五十一尺餘四尖角每角下方一尺五寸將四角共合成一尖錐下方計三尺自乘淂九尺以深十三尺乘之淂一百一十七尺開方法三歸淂積三十九尺併三數共得一千四百四十三尺合本積若上下折半淂十尺零五寸自乘淂一千一百零二尺五寸以十三尺乘之得一千四百三十三尺二寸五分較本積少九尺七寸五分故四西濶狹不等之方窖不淂以一西兩濶可折平算也因米求方窖法今有米五百七十七石二斗欲作方窖盛之只雲上方九尺深一十三尺問下方若干舊法置米五百七十七石二斗以斛法二五乘之得一千四百四十三尺以三因之得四千三百二十九尺以深一十三尺除之得三百三十三尺另置上方九尺自乘得八十一尺以減三百三十三尺餘二百五十二尺為實以上方九尺為縱方用帶縱開平方法除之得下方一十二尺又法問上方亦將深一十三尺除三因米積得三百三十三尺內減下方自乘一百四十四尺餘一百八十九尺為實以下方十二尺
