body:
  text: 以法首数兴实已位二数相呼二二如四法次位空隔辰位法三位三機與邜位五数相呼二五成一十法四位八与寅位六相呼六八四十八倂三呼共六十二就于已位上起四成十加一于辰位二数成三於午位上定二又以掯搯未位以法首二与午位五数相呼二五成一十法次位空隔已位法三位二与辰位六相呼二六一十二法四位八与邜位五相呼五八得四十法五位八与寅位六相呼六八四十八倂四呼共一百一十就於未前隔位已上定一午二加一成三又以掯搯申位申前未上实位書法首无呼二位空隔午位法三位二与实已位二相呼二二如四法四位八与实辰位六相呼六八四十八法五位八与实邜位五相呼五八得四十倂三呼共九十二就于未位上定九申位上定二又以掯搯
