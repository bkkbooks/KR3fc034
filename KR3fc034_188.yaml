body:
  text: 以法首數興實已位二數相呼二二如四法次位空隔辰位法三位三機與邜位五數相呼二五成一十法四位八與寅位六相呼六八四十八並三呼共六十二就于已位上起四成十加一于辰位二數成三於午位上定二又以掯搯未位以法首二與午位五數相呼二五成一十法次位空隔已位法三位二與辰位六相呼二六一十二法四位八與邜位五相呼五八得四十法五位八與寅位六相呼六八四十八並四呼共一百一十就於未前隔位已上定一午二加一成三又以掯搯申位申前未上實位書法首無呼二位空隔午位法三位二與實已位二相呼二二如四法四位八與實辰位六相呼六八四十八法五位八與實邜位五相呼五八得四十並三呼共九十二就于未位上定九申位上定二又以掯搯
