body:
  text: 本積一千一百七十六步另置內方面二十四步自乘得內方積五百七十六步又置勾四十二步減內方二十四步得餘勾一十八步置股五十六步減內方二十四步餘三十二步併二數共五十步折半得二十五步以內方面二十四步乘之得餘勾股積六百步併內方積合全勾股積解義以勾股相乘之數用勾股合併除之者乃將乘數用勾股平分也以勾股合除得二十四步勾是二十四個四十二步股是二十四個五十六步如勾股相乘得二千三百五十二步置四十二步以二十四步乘之得一千零八步置五十六步以二十四步乘之得一千三百四十四步合併正合相乘之數四十二五十六者勾股不同之數也二十四者勾股合同之數也合同處正是湊合成方處蓋以勾四十二步除股五十六步勾一步股一步三分三釐不盡以三乘之股得四步勾一步亦以三因之得三步是勾三步股訣四步即勾股斜弦之數也股自下而上四六二十四步勾自尖而內應去三六一十八步以減三十二步亦餘二十四步勾上下二面告二十四股左右二而亦二十四湊成內方試將餘勾一十八步以二十四步乘之得四百三十二步折半得二百一十六步此勾餘積也將餘股
  hash: sha256:8698160ec8b6dbbd2adaa08a95558c3fe384c0b487de24f5ca8364e950a8af52
