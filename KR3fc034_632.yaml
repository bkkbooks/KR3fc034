body:
  text: 每寸一十四兩為法除之得七百一十四寸二分八厘五毫不盡又為實以開立方法除之得每西方八寸九分三厘有零不盡解義將銀一萬兩以十四兩為法除之有不盡四寸該七百一十四寸零十四分寸之四細分之七百一十四寸二分八厘五毫七系一忽四不盡開方除之該每西八寸九分三厘九毫零三忽不盡帶縱開立方法今有立方積一千二百就四六尺只雲方比高多三尺問方高各若干舊法置積一千二百九十六尺為實於中另置方多三尺自乗得九尺為縱方再置三尺倍之得六尺為縱亷約積一千啇十尺今有縱方止啇九尺置於左位另以九尺自乗得八十一尺加入縱方九尺共九十尺為方法另以縱方九尺以縱亷六尺乗之得五十四尺為亷法二法併共一百四十四尺置於右下與所啇九尺相呼一九除實九百四九除實三百六十四九除實三十六尺共除一千二百七十六尺實盡
  hash: sha256:3e3c65b00726bc28c9d4f78750b4076369a6024dae9ee20a38177e57440c6985
