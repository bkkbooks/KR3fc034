body:
  text: 合直田積觧義以中長二十步減五步即中長典角西折平也六角上下二西各十步四斜西以勾股訣求之外餘角長九步為股自乗得八十一步濶五步為勾自乗得二十五步二共一百零六步以開平方法求之得斜面弦十步零二分九厘五毫六系三忽零今以平西十步兩旁五步筭積不差若以此定六角面則差遠矣筭數有長短湊成六角其面濶尖長皆有一定多一分不得少一分不得舊法皆泥孰方五斜七立說故皆差誤不知六角尖長二十步則面正長十七步五分有零不是十八步角面九步六分有零不是十步若六角每面十步則尖長二十步七分有零正濶十八步一分有零不止長二十步濶十八步今併較正千後通長二十步圖今有直田長二十步內容六角尖長與直長齊問直濶角面及角積餘積各若干增法將通長二十步用六角法正長得尖長八分七厘六毫三系七忽九微六織乗之得直濶即角正長十七步五分二厘七毫五絲九忽二微又將通長二十步用六角法角面得尖
