body:
  text: 八尺得二百八十八尺又以左七人乗右九十二尺得六百四十四尺併之得九百三十二尺為法除實得馬步軍各五千六百七十人以九十二尺乗之得五十二萬一千六百四十尺以六人歸之得襖布共八萬六千九百四十尺另將軍數以四十八尺乗之得二十七萬二千一百六十尺以七人歸之得褲布共三萬八千八百八十尺解義此與上同法上是毎一人領二等米此是二等人同數領二等布以六人七人互乗四十八尺九十二尺一邊六百四十尺是馬軍四十二人之布一邊二百八十八尺是步軍四十二人之布本是八十四人共分佈九百三十二尺令卻以四十二乗共布是二人合作一人故以九百三十二除之淂馬步軍各一半若以八十四乗共實以九百三十二除之即淂馬步軍共數一萬一千三百四十矣再若馬步軍不等或馬軍多步軍多又當多寡分數主法求之並列後難題均年載蓋即此法子母不齊差分法今有馬軍六人給襖布九十二尺步軍七人給褲布四十八尺馬軍比步軍四分之三給布三萬七千零八尺問馬步軍
