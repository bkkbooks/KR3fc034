body:
  text: 得二十五両得二十七両互下不足十両適足先以右上三人左上五人相乗得一十五人為乗人率通法次以右上三人互乗左中九両得二十七両以左上五人乗右中出五両得二十五両對減餘二為除人實物實法另除左下適足無互乗外以左中得數二十七両互乗右下不足十両得二百七十両為物實又將右下不足十両以前通法十五乗之得一百五十為人實卻以法二除人實一百五十得七十五人除物實二百七十得物價銀一百三十五両解義一邊三人出五両是不足一邊五人出九両是適足三五相乗淂十五人三乗九淂二十七是三個五人淂一個十五人共出二十七両是適足五乗五淂二十五是五個三人淂一個十五人共出銀二十五両比二十七是不足二両就以二両除不足十両是五個二両即是五個十五人共七十五人若用增法即將二十七二十五對減餘二以除不足十両淂五即以五乗十五人淂七十三人以五乗二十七両淂一百三十五両適足以五乗二十五両淂一百二十五両加不足十両亦適足一盈一適足同
