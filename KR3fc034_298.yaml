body:
  text: 餘徑加內方得通徑一百一十三步二分零六毫又今有餘徑得內方倍半不足一步一分一釐八毫五絲圓周多方周一百五十三步五分六釐七毫問方面餘徑增法照前三因不是共三步三分五釐五毫五絲加入圓周多一百五十三步五分六釐七毫共共一百五十六步九分二釐二毫五絲為實亦將前法三步五分除實得內方同前外餘徑倍半該六十七步二分五釐二毫五絲內減不是一步一分一釐八毫三絲得餘徑共六十六步一分三釐四毫折半得每面餘徑三十三步零六釐七毫共餘徑連內方得圓周徑一百一十步零九分六釐九毫解義以徑方相減餘數除圓周多數即物價貴賤相減相併同法內方圓四田方周四也餘徑同三四圓周三也至不是皆用三因者盈不是徑徑一周三徑比內方幾倍外多若干圓周所多之數必比徑多出三倍幾倍內少若干圓周所多之數必比徑少缺二倍故俱用三因多者減矢少者加入為實以法除乃合內方數也
