body:
  text: 丙三人己庚二人立法下差率止得一以甲乙丙三人乗搃七人二十一減下差率一則上差率度二十矣以甲乙兩寔差率計之止十五非二十也則舊法亦非通確矣今併改正其以三人二人互乗對減除得一差之數者以二乗左三差率得六是二個三人共有六個差率又乗二十六兩一錢得五十二兩二錢是二個三人之銀共有六個每人均平之銀六個差率銀在內又以三乗右差率十一得三十三是三個二人共有三十三個差率又乗銀二十三兩七錢得七十一兩一錢是三個二人之銀亦共有六個每人均平之銀三十三個差率銀在內兩下對減將六個每人均每人均平之銀減去又為舊除之得對減六個差率銀止存二十七個差率銀故以減餘之二十七一差之嵗也難題竹筒容米歌家有七節竹一莖為因盛米不均平下頭三節三升九上稍四節貯三升惟有中間二節竹要將米數次第盛若是先生能筭法教君直筭到天明此言竹九節下三節共盛米三升九合上四節共盛三升九節俱是次第盛貯問各盛若干舊法置上四節除首節外二節一差三節二楚四節三蓋併之得六為上差率又置下三節係七位八位九位約前一位得差六七八併之得二十一為下
