body:
  text: 下為隅法共一百零六皆與上次啇六步相呼一六除積六百六六除積三十六步恰盡得圓徑五十六步解義圓田內方西自乗三因四帰淂積將圓積四因三帰復含方積故開方淂方西即圓徑開平圓問周法今有圓田積二千三百五十二步問圓周若干增法置圓積以十二乗置得二萬八千二百二十四步為實於右初啇一百於左自呼除實一萬步餘實一萬八千二百二十四步次啇六十於左初啇一百之次即以六十呼初啇一百一六除實六千步又以六十呼一百六十一六除實六千六六除實三千六百共除一萬五千六百步餘實二千六百二十四步再啇八步於左一百六十之下即以八步與初次商一百六十相呼一八除實八百六八除實四百八十又以八步與一百六十八步相呼一八除實八百六八除實四百八十八八除實六十四步共除二千六百二十四步恰盡得圓週一百六十八步
