body:
  text: 今有瓜二個梨四個共價四分梨二個榴七個共價四分榴四個桃七個共價三分瓜一個桃八個共價二分四厘問四色各價若干一瓜二梨四淂四空空價四分得四分二空梨二榴七淂二十八空價四分三空空榴四桃七價三分四瓜一空負四空負二十八桃八淂十六價二分四厘得四分八厘減餘八厘增法先以瓜二為法通乗四行桃八得一十六乗價二分四厘得四分八厘即以四行瓜一為法通乗一行梨四得四乗價四分得四分與四行四分八厘對減餘八厘就將一行梨四移置四行二位作負四次以二行梨二為法通乗四行梨負四得八桃六十得三十二餘價八厘得一分六厘卻以四行梨負四為法通乗
