body:
  text: 四十八步為差步以乘倍積五百六十步得二萬七千三百六十步以原徑八步除之得三千四百二十步另置外周七十二步自乘得五千一百八十四步以少減多餘一千七百六十四步為實以開平方法除之得截中周四十二步以減外周七十二步餘三十步以六除之得截徑五步圓田截內歌圓田截內倍積先差乘倍積徑除為加併內周自乘積開方截周指掌看截周內周相減餘六除得徑法同然今有圓田外周七十二步內周二十四步徑八步從內截積九十九步問截中周併徑若干舊法置截積九十九步倍之得一百九十八步卻以外周內問相減餘四十八步為差步以乘倍積一百九十八步得九千五百零四步以原徑八步除之得一千一百八十八步另置內周二十四步自乘得五百七十六步併二數得一千七百六十四步以開平
