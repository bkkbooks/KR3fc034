body:
  text: 二錢再加九兩二錢得第三子訣銀一十八兩四錢再加九兩二錢得次子訣銀二十七兩六錢再加九兩二錢得長子訣銀三十六兩八錢解義族次遞減法以所素除實得數為末一位數即各位遞所之數無論位數多寡皆同一理難公候向子男分金同此故不須挨次製器法今有金八兩四錢欲挨吹造禮樂射禦書數套杯六銅問各重君幹舊法置總金八兩四錢為實列六五二二二一六衰併得二十一衰為法除實得數宇杯重四錢再加四錢得書字杯八錢再加四錢得禦字杯一兩二錢再加四錢得射字杯一兩六錢再加四錢得樂字杯二兩再加四錢得禮字杯二兩四錢挨等計戶納糧法今有糧一千一百三十四石五等人戶挨次上納一等二十四戶二等三十戶三等四十二戶四等五十一戶五等六十
