body:
  text: 位下隔位呼四五除二十除次位二盡餘苐三為四數四位空五位五數此是見四無除即將苐三位四本身作九苐四位加四却於苐五位呼五九四十五除實盡實首是百法首四十是卞就浖實首百順數苐二位是十為法首數却升前一位百上是兩得每人該分銀四兩零九此係作九隔位呼五九除四十五上位除四本位除五除實恰盡原空加除四數下呼除盡此實首隔位呼四五除二十上位二盡下實兩位首位宋兩鈔空呼見四無除作九四本位作九下加四位偍是分首呼加二共成是呼逢八進二十進二于實十位遇法首數十上位成四本位去八餘二下呼盡除去即止前位得令是兩法首四數呼四一二十二本身加作二下原實百為呼百下位加二又下位進二作四至法前首數止
