body:
  text: 八兩八錢以減價腳共銀五千四百二十八兩八錢餘得物價銀五千二百二十兩却以每物六斤乘之以價七錢五分除之得共買物四萬一千七百六十斤解義腳銀論物斤數在物價外矛用論銀分兩在價六錢內亦係物價外即每價五錢八分外取矛用二分也連腳銀算則取矛用不止於六錢內取二分載難題有買參一法以矛用二百兩得共六千兩內減矛用二百餘五千八百兩以參價腳價合併除之是六錢向取用二分合腳銀作數算矣貨有矛用腳亦有矛用乎今特另為改正均平糴買法今有銀三十七兩八錢糴米麥豆三色各要均平每石米價八錢麥價六錢豆價四錢問各該若干舊法置總銀三十七兩八錢為實併米麥豆價共一兩八錢為法除之得三色各糴二十一石又法今有銀二十二兩八錢買黃白蠟各要均平其黃蠟每三斤價銀四錢白蠟每一斤價銀五錢問黃白蠟及總價各若干舊法置總銀
