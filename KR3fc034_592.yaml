body:
  text: 以下為亷法六十併入次啇五步共六十五步皆與上次啇五步相呼五六除實三百五五除二十五步恰盡得濶三十五步加不及十五步得長五十步解義此與上帶縱之法與異又多乗婉積一轉折耳只用帶縱為便直田減縱開方法今有直田積八百六十四步只雲長濶六十步問長濶各若干舊法置積八百六十四步於盤中為實以相和六十步置下法位為縱用減縱開方法上啇二十步於左就將右縱減上啇二十步餘四十步與上啇相呼二四除實八百步餘實六十四步又以上啇二十步再減餘縱二十步仍餘縱二十步次啇四步亦再減餘縱四步仍餘縱一十六步與次啇四步相呼一四除四十步四六除二十四步共除六十四步除實恰盡得上啇二十四步以減相和六十步得長三十六步
