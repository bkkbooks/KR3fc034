body:
  text: 加多步得中方大方西增法置大方西中方西四步自乘得一十六步又置中方多小方西四步自乘得一十六步二共三十二步以減共積八百步餘七百六十八步以三歸之得二百五十六步用開平方法除之得中方西一十六步加四步得大方西二十步減四步得小方西一十二步解義於共積內將大方中方隅積盡減除餘積以大方餘中方外二亷補小方便是三個小方各帶二亷三歸之止餘一小方併二亷初啇一十自乘次啇達初啇又自乘則初三自乘之數在內故減除初啇餘減積四十四步即次啇倍亷法二二呼除四十二二呼除四步一理餘實九十六步又以三因之者先將積七百二十步以三歸之止餘一小方併二亷初次共啇十二除去一百四十四步小方之積又將餘實三因還六亷之本數卻以大方亷多小方八步中方亷多小方四步共十二加倍二十四為法者二西多數也即三小方一方二亷一亷多四步六亷共多二十四步也此皆前人婉轉立法人思悟其實不用三因止用本等二亷共多八步與初次相呼即除實淂盡此用八步帶縱法為正也亷比小方多四步用八步者二亷也至後法以大方多中方中方多小方各四步自乘減積餘二歸
