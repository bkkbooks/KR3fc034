body:
  text: 十三即以五除三百一十五得六十三是長女三百一十五日六十三方錦以五乘九得四十五即以七除三百一十五得四十五是中女三百一十五日繡四十五方錦以五乘七得三十五即以九除一百三十五得三十五是小女三百一十五日繡三十五方錦併六十三四十五三十五共一百四十三是三女連者遲者各三百一十五日共九百四十五日共繡成一百四十三方錦三女同工合三日作一日仍是三百一十五日繡成一百四十三方錦故以錦為法除日得每錦一方得日若干也二人共工法今有趙錢二人繡緞趙四日繡一匹錢五日繡一匹今令趙幾共繡緞一匹問得日若干增法置四日五日相乘得二十日以四五共九為法除之得二日不盡二命曰九分日之二四人共工再除法今有甲乙丙丁四人造車甲六日造一輛乙七日造一輛丙八日造一輛丁九日造一輛令四人共造一車問幾日可完增法置甲六日乘乙七日得四十二日以丙八日乘之得三百三十六日又以丁九日乘之得
