body:
  text: 開加矢濶為圓徑半徑減矢離無疑今有圓田截矢八步弦二十四步問圓徑及矢離徑各若干舊法置弦二十四步折半得一十二步自乗得一百四十四步為實以矢八步為法除之得一十八步再加矢濶八步得圓徑二十六步將徑折半得一十三步減矢八步餘得矢離徑五步圓田弧弦及離徑求圓徑歌弧弦離徑求圓徑弧弦折半自相乗離徑自乗併為實開方加倍為圓徑今有圓田截弧弦二十四步矢離圓徑五步問圓徑及矢若干舊法置弦二十四步折半得一十二步自乗得一百四十四步再以離徑五步自乗得二十五步相併得一百六十九步為實以開平方法除之得一十三步倍之得圓徑二十六步將半徑一十三步減離徑五步得矢八步解義上法半弦自乗即矢乗餘徑數故以矢除得餘徑加矢即全徑下法併二自乗數開方淂半徑即併勾股數開方得弦也
