body:
  text: 四八三十二除實恰盡得每人該分銀三兩八錢四分呼即四八三十二上位除三此位除二除實恰盡呼巴巴六十四上除六又除一本位加六之上呼加二共十一呼逢八進二十餘三呼三八二十四位空二次撞歸成八下呼實兩位首位得兩次共除七餘一呼四一二十二下加二成四位便是錢此位是分首呼二成十呼逢四進一區四下呼去實十位遇法首數十二餘四呼見四旡除作九旡除起一作八即止前位潯令是兩法首四數起呼四一二十二本身加作二原是百位呼百頁下下位加二又下呼進成三至法首數止解義巳有㷌而無不止作九後除數不用之知二歸止有一數呼二一添作五此有歸也因下無除亦一二各做此因歸還源法還源者還原位也將法寶乘除得所問數復將求得之數照法還源兩下覆對始免差誤之失先乘後除法謂先應除法而後用乘法者其除法時有畸零不盡之數
