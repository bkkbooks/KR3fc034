body:
  text: 三十六衰因乃得下等一戶數曰法俱法共衰實得上等每戶七丈八尺以六十零二十八除四千七百零一尺八寸四分止得七寸八分焉有七丈八尺乎今俱改正下俱微此七折差分法俱定首位十分通用七因以生各衰二位者十七併得十七衰位者一百七十四十九併得二百一十九衰四位者一千七百四百九十三百四十三併得二千五百三十三衰位數加多再加一萬為首位今有粟一百六十八石四斗八升八合令四等人戶作十分之七出之內第一等二十二戶第二等三十六戶第三等四十二戶第四等四十八戶間各等每戶及共米各若干更法置總粟一百六十八石四斗八升八合為實另置一等二十二戶以一千因之得二萬二千二等三十六戶以七百因之得二萬五千二百三等四十二戶以四百九十乘之得二萬零五百八十四等四十八戶以三百四十三乘之得一萬六千四百六十四
