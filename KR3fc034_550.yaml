body:
  text: 自乗股自乗即又多一弦自乗数合筭共淂一半故加倍合之開方淂勾股弦共数一百六十也勾股較勾弦和求勾股弦法今有勾股止言股多勾二十八尺勾弦共一百尺問勾股弦各若干增法置勾弦共一百尺加股多勾二十八尺共一百二十八尺即股弦和卻以勾弦和一百尺乘之依上法求勾股弦勾股較股弦和求勾股弦法今有勾股止言股多勾二十八尺股弦共一百二十八尺問勾股弦各若干增法置股弦共一百二十八尺減股多勾二十八尺餘一百尺即勾弦和以乘股弦和一百二十八尺依上法求勾股弦勾弦較股弦和並績求勾股弦法今有勾股績一千九百二十尺弦多勾三十六尺弦股共一百二十八尺問勾股弦各若干增法置股弦共一百二十八尺減弦多勾三十六尺餘九十二尺即勾股和自乘得八千四百六十四尺將績
