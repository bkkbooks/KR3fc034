body:
  text: 次啇五尺相呼四五除二十尺五七除三百五十五五除二十五共除二千三百七十五尺除實恰盡得平西五西皆一十五尺解義平方是四西以一兩自乘即得四西數五方如積子是六西如一西十尺自乘淂一百尺是平方再乘淂一千尺是一層得一百尺十層十一百尺共一千尺乃合上下四旁六西皆十尺平方四西積有不盡須從兩西加增故用兩亷倍法應方六西積有不盡須從三西加增長用三亷三因法平方止加兩邊應方須連西併加故又平亷有長亷平方一層之用一乘左方橫豎皆方須用二乘再乘入平亷用初啇自乘是一乘長亷以次啇乘之是一乘隅法次啇自乘亦是一乘合三法併以次啇乘之是再乘之不離一乘再乘之義又立方問西法今有立方積一百九十五萬三千一百二十五尺問西方若干舊法置積一百九十五萬三千一百二十五尺為實於中初啇一百於左下法亦置一百於右自乘再乘得一百萬除實訖餘實九十五萬三千一百二十五尺卻以三乘下
