body:
  text: 鬲當以積減半開方求之為酌步然步倚以五步為差失驗絶即以四步九分五釐求之方面步多則積微成多亦舛成不可為準今有方田每面長三十步問斜長並積若干增法方自乘得本積加倍得斜積開方得斜長此正法也如以斜較積置方田三十步以斜法七步零七釐一毫一系乘之得二百一十二步一分三釐三毫以方五步歸之得斜法四十二步四分二釐六毫六系自乘得一千八百步零一釐六毫三系八忽七微五纖六沙卻將積一千八百步以五十步除之得三十六步以四系五忽五微二纖一沙乘之即得所多一釐六毫三系八忽七微五纖六沙之數以減自乘之積得斜本積一千八百步以開方法求之得斜長四十二步四分二釐六毫四絲零六微八纖七沙不盡解義每方五步斜淂七步零七釐一毫零六忽七微八纖一沙一塵八埃六渺五漠四六五二四四不盡細數終烯齊故以七
