body:
  text: 少原實降下數法前得令逆上知又歌乘從每下得術歸從法前得令定因乘位乘從每下得術術者乃法首位每下該得之名也先將算盤寫定萬千百十兩錢分釐或頃畝分釐石斗升合之類因乘完從實原首位起往後順數至法首位之數則止却於下位得法首每該之數是兩呼兩是石呼石是錢呼錢巳上十百千萬巳下分釐斗升如有田一百四十五畝每畝科糧四升六合即以田為實以每畝四升六合為法乘實此實首是百法首是每畝四升六合即從實首數百順數至畝位就於畝下位得升向上以畝變斗以十變石以百畝變十石向下以分變合以釐變勺之類是也
