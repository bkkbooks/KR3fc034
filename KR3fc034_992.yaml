body:
  text: 以六乘五百一十二得三千零七十二文以七乘六十四得四百四十八文以八乘首位八併原本一共九得七十二文併上七位俱加入一千六百七十七萬七千二百一十六文得共本利二千一百九十八萬三千零九十六文解義八折是十中減二成八此是一分倍作八分繞將法除六十四營五百一十二陳不係人數其外如由統領一八因生八將仍窗外加統領一將先絲四千零九十六八因生旗頭三萬二千七百六十八仍當外加先鋒四千零九十六以下皆然馬除改吳氏法用八自乘六十四自乘四千零九十六自乘止得所生八因之卻一文錢用八度八因瘦本作美隨己多若一定錢用八度八因除本作算則原本一自一日至八日皆生利八一日利八文自二日至八日皆生利六十四二日利六十四自三日至八日皆生利五百一十二遞推至末皆計日各有生利在內故八度八因完得一千六百七十七萬七千二百一十六文須二米七日利三乘六日利以次逆加乃合額數與統將法止應加本數兼空利者不通列此三法互相考較庶乎無誤訣貴賤輕重多寡差分次差分貴賤法尤精高價先乘共物明原價
