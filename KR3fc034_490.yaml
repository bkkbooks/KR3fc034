body:
  text: 分明勾股求弦勾股圖今有勾股勾二十七尺股三十五尺問斜弦若干舊法置勾二十七尺自乗得七百二十九尺另以股三十六尺自乗得一千二百九十六尺併二數共二千零二十五尺以開平方法除之得弦四十五尺觧義弦自乗數內有一個勾自乗數一個股自乗數故合二數開方得弦勾股數勾三股四弦五如勾三步自乗得九步改四步自乗一十六步二共二十五步弦五步自乗亦二十五步弦自乗數兼勾自乗股自乗數前圓勾三九二十七尺股四九三十六尺弦五九四十五尺天勾三股四弦五也然勾股有長短不一隨長隨短皆弦數員勾自故後復用股六十勾三十二一發明丈求弦難題西江月中有一枯柱丈六全沒根稍尖頭一馬繫難吃盡田中禾稻四腎五厘天地圖吃一周邊索長幾許筭償招不
