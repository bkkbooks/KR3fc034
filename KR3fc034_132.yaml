body:
  text: 乘原價興以原麵今麥即是以今麥乘原麵所謂因乘不拘法實以法乘實以實乘法皆一也又難題西江月白麵稱來四斤使油一斤相和今來有麵九斤多六兩五錢不錯已用香油和合二斤十二無訛再添多少麵來和不會應須問我興言原有麵四斤用油一斤和合今有油二斤六十二兩麵九斤六兩五錢問仍該添麵若干舊法置今有油二斤十二兩先將十二兩化為七五於二斤之次以乘原麵四斤得麵一十一斤為實以原用油一斤為法除之如故仍得麵一十一斤減去已用麵九斤六兩五錢餘得應添麵一斤九兩五錢解義興與上一法但興又多已用麵九斤六兩五錢問添麵若干同乘異除欱同乘異除法可認識原物原價乘為實今物除實求今價今價除實求今值
