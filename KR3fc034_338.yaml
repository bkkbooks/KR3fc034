body:
  text: 稊田以截長截積問截廣原大小廣法前田長九十步徔小頭截長三十五步積八百二十二步五分問截廣原大小廣各差若干增法置截積八百二十二步五分以截長三十五步除之得二十三步五分加倍得四十七步為實另置長三十五步自乘得一千二百二十五步以十除之得一百二十二步五分併入截積八百二十二步三分共九百四十五步以長三十五步除之得截中廣二十七步以減實四十七步得原小廣二十步就將原共長九十步內減截長三十五步餘五十五步為實另將二廣對減餘七步為法乘實五十五步得三百八十五步以截長三十五步除之得一十一步加入截廣二十七步得原大廣三十八步或將一百二十二步五分以減截積即先得原小廣截大頭同解義以長除積得二十三步五分即原積兩廣折平之數加倍即兩廣共數故減一廣得一廣截長自乘數以十除者大小廣各乘截長一多一少之數得長自乘十分之一故以此加入截積以長除得大廣減退截積以長除得小光前解已明
