body:
  text: 主該賠三石難題倍酒問原有歌今攜一壺酒遊春郊外走逢朋添一倍入店飲斗九相逢三處店飲盡壺中酒誠問能筭士如何知原有此古攜酒彩春每飲二次壺中添酒一倍每次飲一斗九升凡飲天次壺酒恰盡問原壺內酒及三次添酒各若干舊法置飲酒一斗九升為實以三處倍添列曰曰併得七衰為法乗之得一石三斗三升折半得六斗六升五合又折半得三斗三升二合五勺又再折半得原帶壺內酒一斗六升六合二勺五抄即將原酒倍之得第一處飲酒添酒一斗六升六合二勺五抄共三斗三升二合五勺除飲去一斗九升存酒一斗四升二合五勺三處飲酒倍添一斗四升二合五勺共二斗八升五合除飲去一斗九升存酒九升五合三處飲酒倍添九升五合共一斗九升飲恰盡又法置飲酒一斗九升以七乗乗之得一石三斗三升為實另以倍酒率七加原酒率一共得八為法除之亦得
