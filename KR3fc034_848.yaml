body:
  text: 於下遞加三七五然後用法乘除即無差成若再加一兩即退梁上十梁下五進一於前以成一斤之數故曰一退十五此法甚捷如除半斤下有零從末用加六法逐位逆上加之至斤下止切不可加於斤上解義截斤法一兩用退二以上用留皆就本位退下一位為退本位為留用算盤上下子無論十兩兩皆置挨斤一位子退留法乃合若分作二位以十置次位兩置隔位則一退六二五六便在第三位九兩以下留在第二位十兩以上留在次位與算以兩求斤帶兩法今有應香一百兩乳香三百三十七兩四錢氷片二百五十九兩四錢八分問各斤數若干舊法置麝香一百兩退作六二五六退百下乃十兩位十上得斤六即六斤不動下二五用加六法從末位逆加至斤下止成四得麝香六斤四兩又置乳香三百三十七兩用截兩法從末位呼七留四三七五本身七變作四下挨次加三七五次呼末二位三留一
