body:
  text: 今有大方面七步內容斜小方問積得大方若呼法置大方面七步自乗得大方積四十九步另置小方斜即大方面七步自乗得四十九不折半得小方積二十四步五分小方積得大方積二分之一解義內容一小斜方外四角湊合六成一小方內方得大方一半外四角一半頭而易明外方自乗淂積內方自乗折半得小方積毫忽無差然若以小方面四步九分五厘自乗淂二十四步五分零二毫蓋系比原積仍多二毫五系是斜七步方仍不足四步九分五厘若再加位求合則數為繁多且雖分晰至盡竊當忍之數以一為源如一個斜七步一個方四步九分五厘積差二毫五乗及以所差為法旡方面若干步自乗之積每二十四步五分內多二毫五系以所差照步減除以合正積另以正積開方得方面細分數無差成之失如以斜七求方斜七步方四步九分五厘七步自乗得四十九步方四步九分五厘自乗淂二十四步五分合斜積一半外多二毫五系就將方自乗積以二十四步除之以二毫五系乗之得數以減乗積的正積另將正積開方淂方而加以方五求斜方
