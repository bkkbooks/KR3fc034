body:
  text: 解義以三十六尺自乘方西也二十三乘之以高乘方也約量積數先啇三十除實不盡又次啇三十六尺是大方約啇故以高比方不及十三尺減除方數以乘方積合除積盡為準也又約縱開立方法今有立方積一千七百八十七萬五千尺只雲高濶相等長多濶三十六尺問高濶及長各若干舊法置積為實初啇約得二百尺自乘得四萬尺再乘得八百萬尺又約啇二百五十尺自乘得六萬二千五百尺再以二百五十尺乘之得一千五百六十二萬五千尺除積訖餘積二百二十五萬尺為實另置所啇二百五十尺自乘得六萬二千五百尺以長多三十六尺乘之得二百二十五萬尺除實恰盡得高與濶各二百五十尺加入長多三十六尺得長二百八十六尺是先取大平方西卻以不及減去乘之此是先將不及一乘完小立方卻將小立方西自乘得小平方西以多三十
