body:
  text: 白下隱吏古齊陽丘足軒強恕居士李長茂拙翁甫輯著衰分章此章因別等因素求例業不一以歸一合不齊以為齊凢貴賤多少輕重以至雜揉參差推義立法求其有等誠筭法之榷興也棄分歌衰分各數不相同湏要分作一分明將此一分為之法以乗各數得均平衰者等也物之混者求其等而分之也合率差分合率者合諸不等之數以為卒也諸數原多不等即合不等之數共為一率以分原實即邊得各應有不等之數前法已經多見今分衰列明俾人易曉
