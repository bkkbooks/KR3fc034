body:
  text: 弦二十八尺自乗得七百八十四尺相減餘三千八百四十尺折半得一千九百二十尺為實以較差二十八尺用帶縱開平方除之得勾三十二尺加入差二十八尺得股六十尺觧義較典和循環相通以較除得和以和除得較前法開方得九十二尺乃勾典股共數減去較差數二餘兩面勾數數折半得勾加入較差數即兩個股數故折半得股其開方得勾股共數者何也勾三十二尺乗股六十尺是三十二個六十尺即是六十個三十二尺計得積一千九百二十尺若勾三十二尺自乗得一千零二十四尺是三十二個三十二尺較本積少二十八個三十二尺以股六十尺自乗得三千六百尺是六十個六十尺較本積多二十八個六十尺二數合併索補得兩個本積數仍多一個二十八乗二十八差數弦自乗內包勾自乗股自乗數即是兩個本積數一個差數加倍是兩個差數四個本積數以較自乗減去一個差數止存四個本積數一個差數四積數四面互頂中填補一個差數長涸皆九十二尺故開方得加十二為勾股共數也後法將弦自乗減去一差自乗止存兩個本積數折半邊得勾股相乗原積故以差步用帶縱法求之得勾也前法即前直田四因積又併入多差積步之法也
