body:
  text: 位立餘一二三四便得十為法以乗十三石更省便再看六位除法六一位餘一二三四五便得十五以乗所多之數同四位者至多三止五位者至多四止六位者至多五止除去末一數除即所多實數也難題八子分綿歌九百九十六觔綿贈分八子做盤經次第每人多十七要將第八數乗言務要分明依次第筭法方堪外人傳舊法置一二三四五六七八內減除末八餘七衰共得二十八為法以乗每多一十七斤得四百七十六斤以減總綿九百九十六斤餘五百二十斤以八子除之得第八子訣六十五斤加十七斤得七子八十二斤以上遞加十七得各子數解義八等除去八併合以上七衰屬法此即前觧所到省用八位減一相乗折半之煩又難題九子筭年歌一個公公九個兒若問生年總不知自長排來年三歲共年二百零七期借問長兒多少嵗各兒嵗數要詳推舊法置
