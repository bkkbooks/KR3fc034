body:
  text: 一千九百二十尺以曰因之得七千六百八十尺以少減多餘七百八十四尺以問平方法除之得二十八尺即勾股較以減九十二尺餘六十四尺折半得勾瀾三十二尺加股多二十八尺得腰長六十尺以減股弦共一百二十八尺餘得弦長六十八尺股弦較勾弦和並績求勾股弦法今有勾股績一千九百二十尺弦多瞳八尺勾弦共一百尺問勾股弦各若干增法置勾弦共一百尺減弦多勝八尺餘九十二尺自乘以四因績相減如上法解義勾股共自乘用四因積相減者其自乘內係四因積一個二十八自乘數故對哉方得股多勾二十八尺也若止以積多勾問即置積為實以二十六帶從方求之即得若以積英勾股和問亦拪減法求孫子度影量竿法今有立木不知高日影在地長五丈隨立一竿長一大日影長一丈二尺五寸問立木高若干增法置立木影長五丈為寶
