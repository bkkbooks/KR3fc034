body:
  text: 九皆一之屬九以上乃另進則乘數加升退則乘數遁減如一步自乘遆得本位數進則乘數加升退則乘數邊減加一步自乘止得一步一尺自乘止得一尺仍本位數本位而上十自乘則前十數一位得一百百自乘則前百數二位得一萬千自乘則前千數三位得百萬每進前一位則乘出之數加進一位以上皆然本位而下如一分自乘則後分數一位得一釐一釐自乘則後釐數二位得一絲一毫自乘則後毫三位得一微一絲自乘則後絲數四位得一沙以下皆然緣自乘者四面之數也一自乘四面仍是一十自乘四面成十個十十為一之次位故乘出之數亦十倍得十次位之百百自乘四面成百個百百為一上之二位故乘出之數亦百倍得百二位之萬千自乘四面成千個千千
