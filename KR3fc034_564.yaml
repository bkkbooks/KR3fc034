body:
  text: 啇四步積一十六步起至二十四步止啇五步積二十五步起至三十五步止啇六步積三十六步起至四十八步止啇七步積四十九步起至六十三步止啇八步積六十四步起至八十步止啇九步積八十一步起至九十九步止啇十步積一百步起至三百九十九步止啇二十步積四百步起至八百九十九步止啇三十步積九百步起至一千五百九十九步止啇四十步積一千六百步起至二千四百九十九步止啇五十步積二千五百步起至三千五百九十九步止啇六十步積三千六百步起至四千八百九十九步止啇七十步積四千九百步起至六千三百九十九步止啇八十步積六千四百步起至八千零九十九步止啇九十步積八千一百步起至九千九百九十九步止啇一百步積一萬步起至三萬九千九百九十九步止置原積實居中左置啇位右照依所啇別置一位於積實之下名曰下法左啇置左第一位得若干下法亦置上啇若干於左法之苐一位與上啇相呼除實名曰方法餘實若干乃將法位上加一倍
