body:
  text: 圓周多方周六十五步五分六釐七毫問餘徑內方通徑增法置圓周多六十五步五分六釐七毫加入內方多六分三厘四毫共六十六步二分零一毫為實另將內方倍半作一步五分以四因得六步餘徑連內方二倍有半作二步五分以三因得五步五分對減餘一步五分為法除實六十六步二分零一毫得餘徑共四十四步一分三釐四毫折半得每面餘徑二十二步零六釐七毫共餘徑加半倍得六十六步二分零一毫加入多六分三釐四毫得兩方面六十六步八分三釐五毫連共餘徑得通圓徑一百一十一步零九分六釐九毫解義前圖俱是餘徑多內方不足今是內方多餘徑不足餘徑多以法除實得內方面內方多以法除實得餘徑前圖餘徑多則減去不足則加入且各三因加減今圖內方多反加入不足反減去且止本數加減者餘徑多與不足是在內方外餘徑多之數故多須減去不足須加入圓周三故須三因加減以法除之始合內方之數內方多與不足是內方多經連方在內亦多內方不足徑連方在
