body:
  text: 筭法九章名義筭法從來分列九章分九章者本河洛九数而立九因九歸之法數以九分故章以九記但多篇章紛錯今按法釐次訛謖者正之雜亂者更之不俩者加增之棠法童撮總網目悉諸法今開卷明大故首之章偹方圓直斜勾股孤矢圭稊欖角等形及方圓圭角相容考較隐徽實諸法之原本故次之勾股諸法依及測高遠測深實有用大法也耽區亦勾股田故次及以便接次考較開方章萬法不離方求諸筭多用開方故次勾股測貯章窑堆垜不外立方立故次開方䑓錐等法有同倉窖而道里奔馳工作故次功程亦便接筧也栗帛銭刀度量椎公私必需故鏡泉次之至推筭諸
