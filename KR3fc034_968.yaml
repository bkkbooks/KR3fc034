body:
  text: 九分六厘得第九節盛米六合除四十六分二厘得八節盛七合除五十二分八厘得七節盛八合乃每節差一合遞加至下節容米一升四合解義以左三乘右下三升得九升以右四乘左下三升九合得一斗五升六合對減餘六升六合為實以左中右中對減餘六十六為法除之得一合為一差之衰此正法也今即以左下減餘六六不言升合而言分厘即以為一節差數後以法除之先除後除一理持又變換其引人思悟耳其將三作九合又用六十六隸之者引緑乘數以便後用除法也互和減半換次差分法以所分物為實照位併而為法除實得首尾共數再用法末中位數列一三五七九為陽位二四六八十為陰位三位者三五七併得十五除實得首尾共數折半得中數四位者二四六八併得二十為衰除實照前得首尾甲丁二人數中有丙丁變位不可折半即置甲多用三歸之加入丁數得丙數再加丙得乙數五位者一三五七九併得二
