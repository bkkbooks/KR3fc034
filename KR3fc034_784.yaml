body:
  text: 四尺今截上方六尺對減餘一十八尺乘之得五百七十六尺為實以原下方二十四尺為法除實得今截臺高二十四尺解義此與梯田圭田花積同法蓋問積則上方下方折平之法不同問方問尖問高則俱同一理築圓臺問積法今築圓臺一所上周一十八尺下周二十四尺高一十二尺問積若干法用上周自乘下周自乘又上下周相乘併三數以高乘以立圓率三十六除與圓窖法同築圓錐問積法今有圓錐高三十二尺下周七十二尺問積若干舊法置下周自乘得五千一百八十四尺又以高乘得一十六萬五千八百八十八尺以立圓率三十六除之得積四千六百零八尺與圓堆同法圓臺改圓錐問上尖法今有圓臺上周一十八尺下周七十二尺高二
