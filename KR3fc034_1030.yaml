body:
  text: 併之共四十一菓以二乗下菓價四文得八文以三乗上菓價十一文得三十三文併之亦共四十一文即以四十一為上下菓平法併二法共六十二為合法除實一千一百五十二個得一十八不盡三十六以分平法較之不足四十一即再除一二十一仍餘不盡一十五即將四十一以二十一加倍對減餘一以除十五得十五便將十八個四十一退一十五個餘三個四十一十八個二十一加二倍十五共三十個又加後再除一個共四十九個卻分列三位一位置四十九以二因之得九十八再加先二十二共一百二十為中菓併價平法以價五文因之得中菓價錢六百文以中菓七個因之得中菓七百二十個一位置三個以二因之得六再加先二十二共二十八為下菓與價平法以價四文因之得下菓價一百一十二文以菓七個因之得下菓一百九十六個一位置中菓共數四十九又置下菓共數三以
