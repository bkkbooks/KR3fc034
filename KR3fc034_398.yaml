body:
  text: 零七厘一毫一系約略為法求用減法合積仍用開方見斜長增法方五自乘二十五步加倍得斜積該五十步以斜七自乘止四十九步是每四十九步少一步如以方求斜將方三十步一自乘得九百步加倍斜該一千八百步以斜四十二步自乘得一千七百六十四步就將積以四十九步歸之得三十六步併入一千七百六十四步得斜積一千八百步斜七步自乘得四十九步折半得方積該二十四步五分以方五步自乘得二十五步是每二十五步多五分照上圖以斜求方置斜四十二步自乘得一千七百六十四步折半該方積八百八十二步乙方三十步自乘得九百步就將積以二十五步除之得三十六步以每多五分乘之得一十八步以減九百步得方積八百八十二步解義方五斜七古人皆舉其大槩而言淂後人變通測驗學者不察數之合否謬成說逐至失之毫釐積謬千裏處
  hash: sha256:8fabc0c0a78ce9e99766251a5c1fa44e5df3b1d6730fbbc2c79993cf03c10e10
