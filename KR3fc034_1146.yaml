body:
  text: 四尺又將繩折作三摺至水亦不及一尺問井深及繩各若干舊法置不及四尺以四摺通之得一十六尺又置不及一尺以三摺通之得三尺各列位分置右四摺左三摺互不及十六尺不及三尺先以右四摺互乗左不及三尺得一十二尺又以左三摺互乗右不及一十六尺得四十八尺二數相減餘三十六尺為繩實再以前通両不及數一十六尺三尺相減餘一十三尺為井實卻以四摺三摺相減餘一為法除井實得井深一十三尺除繩實得繩長三丈六尺解義一盈一不足盈不足皆差數故合併為人寔出數互乗盈不足亦合併為物寔両盈両不足二數相減多出者乃差數相同之數不為差故俱用對減以四折通不及四尺以三折通不及一尺亦優帳幅法也若將不及四尺減不及一尺餘三尺以四摺乗之淂一十二尺以三摺四摺對減餘一為法除之仍故即三摺之尺數與帳幅法亦同理也盈適足不足適足匿數差分歌適足出數與盈乗得數便為物實數
