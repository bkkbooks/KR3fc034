body:
  text: 解義催人負運就石數步數往返數故將原數相乘為實今數相乘為法若以行四十步日三十五返問米即以步與往返相乘馮汯除實以米與日三十五返問步數亦然雇遲問價法原議載重一千二百斤運道一千里腳銀七兩五錢今重一千五百斤運遒九百五十里問該銀若干舊法置今重一千五百斤以今運九百五十里乘之得一百四十二萬五千又以銀七兩五錢乘之得一千零六十八七千五百為實以原運一千里乘原重一千二百斤得一百二十萬為法除之得今該銀八兩九錢零六厘二毫五絲解義按貨物因程價故乘除俱以原今貨程相乘為法此是貨加減或貨減路加或俱加俱減皆同一汯先乘後除因貨定程法原議載重一千二百斤行道一千里價七兩五錢今載重一千六百斤支過銀六兩問今該行道若干舊法置今銀六兩以原行
