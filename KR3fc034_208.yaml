body:
  text: 三分川又加四分作又加五分五去五進一千前位存刀又加二分加連原存二分作五二錢刀又加六錢作又加八錢八退二進一加下位進一作又加九錢九退一進於前存丄一兩丨又加二兩作川又加三兩又加下位進一作又加四兩四退六進一又加下進一作刀左起下位進一作丨暗馬因乘法如有米五十三石二鬥每石銀六錢四分問該共銀若干舊法置米五十二石二鬥自左而右橫列為實以價六錢四分為法乘之左行川二行五三行空四行五五行得共價銀三十四兩零四分八釐法四分六錢起二四如八作二六一十二上伍二作丨本位作刀呼三四一十二前位加一本位作五
