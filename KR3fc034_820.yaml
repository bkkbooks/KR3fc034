body:
  text: 三千零二十四日為實另以甲六日除三千零二十四日得五百零四輛以乙七日除三千零二十四日得四百三十二輛以丙八日除三千零二十四日得三百七十八輛以丁九日除三千零二十四日得三百三十六輛併四數得一千六百五十輛為法除實三千零二十四日得一日八分零不盡一千六百五十分日之五十四解義三人共工則每二數相乘為子二人共工則即以本數為子一理也四人共工共三人共工同法加至五人六人皆然其以甲六日除三千零二十四日得五百零四即以乙七日乘丙八日得五十六再以丁九日乘得五百零四一也著此互相發明輕重往泛計程法今有重車日行五十裏空車日行七十裏令載穀至倉五日三返問至倉程若干舊法置重車五十裏空車七十裏相乘得三千五百里又以五日乘之得一萬七千五百里為實另置重車五十裏空車七十裏併之共一百二十裏以三邊乘之得三百六十為法除實得至倉四十八裏不盡二十二命
