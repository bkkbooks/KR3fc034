body:
  text: 方法除之得截中周四十二步以內周二十四步減之餘一十八步以六除之得截徑三步解義環田外周內周折平以徑乘淂積優梯田大濶小濶折平以長乘之淂積故環田截外截內與梯田截大濶小濶同法解俱詳梯田截積下弧矢田求積求知弦歌弧矢求積矢加弦折半矢乘得積全積矢求弦倍田積矢除減矢弧弦然積弦求矢積亦倍帶弦置縱開方宜今有弧矢田弦長一十三步矢長六步五分問積步若干弧矢舊法置弧弦一十三步加矢六步五分共一十九步五分折半得九步七分五釐以矢求積圖乘之得積六十三步三分七釐五毫又法置弦一十三步以矢
