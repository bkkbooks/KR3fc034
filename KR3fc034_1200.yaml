body:
  text: 乗粉五得七十乗原價六錢四分得八両九錢六分併入左九錢六分共得六両九錢二分為實併七十五十四共一百二十四為法除之得粉價毎斤八分照前法於中原價除粉價得丹價於左原價除丹價得硃價解義此即上法也但上將中行價乗淂之數減除初次左右對減餘價再乗之八錢此乃加併餘價再乗之九錢六分者以左行丹十四乗中行丹六淂八十四斤乗粉五淂七十斤乗價六錢四分淂八両九錢六分乃七十斤粉八十四斤丹之價以中行丹六乗左行丹十四両淂八十四乗粉九淂五十四乗餘價一錢六分淂九錢六分乃六九五十四斤粉內除六個十四斤共除八十四斤丹之價將此併入乃將中行價內八十四斤丹價共加成五十四斤粉價並原乗出七十斤粉價共一百二十四斤粉價故以七十併五十四共一百二十四為法除之淂粉價上是問丹價故湏除去餘價乃止餘丹價此是問粉價故必合入餘價乃丹成粉價也又法今有鵝四只鴨三隻共價七錢五分又鵝三隻雞四隻共價六錢又鴨五隻雞六隻共價八錢一分問三色各價若干
