body:
  text: 舊法置銅七錢五分為實以每兩用銅一錢二分為法除之得八八色銀六兩二錢五分內減原銅七錢五分餘得紋銀五兩五錢難題分色西江月甲釧九成二兩乙釵七色相同李銀舗內偶相逢各欲改成器用其子未詳所以誤將一處銷鎔當時問惱李三翁又把筭師擾動舊法置甲九色金二兩折足色一兩八錢乙七色金二兩折足色一兩四錢併之得足色金三兩二錢以原金甲乙共四兩歸之得八色就以八為法除甲一兩八錢得甲應分金二兩二錢五分亦以法八除乙一兩四錢得乙應分金一兩七錢五分鎔錸銅礦問原觔兩法斤有銅一經入爐每十斤得八斤今三經入爐得七十五斤一十三兩四錢四分問原生銅若干舊法置見銅七十
