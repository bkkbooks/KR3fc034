body:
  text: 一用勾弦較得勾弦和如勾弦較三十六步除股自乘三千六百步即得勾弦一百步一用勾弦和得勾弦較如勾弦一百步除股自乘三千六百步即得勾弦較三十六步一用股弦較得股弦和如股弦較八步除勾自乘一千零二十四步即得股弦和一百二十八步一用股弦和得股弦較如股弦和一百二十八步除勾自乘一千零二十四步即得股弦較八步一弦較和絃較相通如勾股和九十二步自乘得八千四百六十四步減弦自乘四千六百二十四步餘三千八百四十步以弦較較四十步除之得九十六步為弦較和若
  hash: sha256:e3dcf015b056aa48f08e56be4a5cf7d78617b8f7e9349a378f3635fc7830ff89
