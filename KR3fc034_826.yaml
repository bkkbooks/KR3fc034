body:
  text: 一千里乗之得六千里又以原重一千二百斤乗之得七百二十萬為實另以今重一十六百斤以原價七兩五錢乗之得一萬一千為法除實得今應行六百里解義法應置原重一千二百斤原行一千里相乗得一百二十萬以原議價七兩五錢除得一十六萬以今價六兩乗得九十六萬以今重一千六百斤除得今行道六百里或置今銀六兩以原議價七兩五錢除之得八乃今銀得原議價十分之八置原重原相乗一百二十萬以今重一千六百斤除之得七百五十以八乗之將也百五十乗作八分亦得六百里皆是原重原道與今銀是乗今重與原議價是除應乗者通乗之應除者通乗除之卻通乗通除法也因道重法同因程定重法原議載重一千二百觔行道一千里價七兩五錢今行道一千七百里已支銀七兩六錢五分問今該重若干舊法置原重原道相乗得一百二十萬以今銀七兩六錢五分乗之得九百一十八萬為實另置今道一千七百里以原議價七兩五錢乗之得一萬二千七百五十為法除實得該重七百二十觔
