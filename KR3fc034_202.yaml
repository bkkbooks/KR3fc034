body:
  text: 歸除圖解義法寔相呼是直行寫下垜笑積數是紏行上自寔首角是大數至法尾角是大數照斜界書萬千百十每一層為一䒭土位原三前位呼增五作八寫下前位呼增二作十寫左呼逢八進二十去八存二寫上手四五除二十去二給盡寫右二位原三前位呼增二作五寫下呼除五七三十五除四存一寫左下位增五又呼歸四一二十二加一作二寫丄又下位進二作四寫右去位原二前位歸呼增二作四寫下次呼二五除一十捋四去一存三寫左又呼四三七十二本位增三作七寫上下位增二光寔首起呼四一二十二本位原一增一作二更於下位增二如有銀一千二百三十三兩買綾四十五疋問每疋價若干舊法照實位數盡上眼圖軒銀一千二百三十三兩於圖各位中心寫實以綾四千五疋為法除之每圖歸除俱自下左而上至右止各昭圖位呼除寫完止看各
