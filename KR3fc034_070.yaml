body:
  text: 白下隐吏古齊陽丘足軒强恕居士李長茂拙矝甫斬著法章此章椎明理数數源流分晰等筭街網目别法實之定位僃乗除變通立圓撮要有義有言説廣学者開春了然正筭餘法一併次列以僃考稭程實渠曰數法肇自圓書義皇以之盡卦禹王以之序疇列聖以開物成物凢天文地理律曆兵赋以及民生日用織悉杪忽莫不有數則莫不本於苦易數故誰明筭法先刻河洛書以源本義河围出乃有自一至十之數椎彽洐至百千萭億無窮不外自一至十之數為是河者數之可始也也洛書出乃有自一至九之文數離肖十如羡盤定位连十則進前位之一是洛書九數乃九之法由本也故數学以河洛書為祖源設之道出也
