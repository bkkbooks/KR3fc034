body:
  text: 白下隱吏古齊陽丘足軒強恕居士李長茂拙矝甫斬著法章此章椎明理數數源流分晰等算街網目别法實之定位僃乘除變通立圓撮要有義有言説廣學者開春了然正算餘法一併次列以僃考秸程實渠曰數法肇自圓書義皇以之盡卦禹王以之序疇列聖以開物成物凡天文地理律曆兵賦以及民生日用織悉杪忽莫不有數則莫不本於苦易數故誰明算法先刻河洛書以源本義河圍出乃有自一至十之數椎彽洐至百千萭億無窮不外自一至十之數為是河者數之可始也也洛書出乃有自一至九之文數離肖十如羡盤定位連十則進前位之一是洛書九數乃九之法由本也故數學以河洛書為祖源設之道出也
