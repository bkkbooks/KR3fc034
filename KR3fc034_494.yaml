body:
  text: 解義木圖圓三尺閣七邊皆以三尺乘之得二十一尺乃直數也葛纒七邊乃斜纒至稍每直圓一邊有一個斜數在內故將斜星七邊伸直下根即遠木二十一尺如直圓七邊之數驗之不差系黍此皆數理天成之少也勾弦求股法今有勾股勾長二十七尺弦長四十五尺問股長若干舊法置弦四十五尺自乘得二千零二十五尺另置勾二十七尺自乘得七百二十九尺以減弦自乘餘一千二百九十六尺以開平方法除之得股三十六尺解義弦自乘數兼勾自乘股自乘數減去勾自乘數止存股自乘數故開方得股又勾弦求股難題西江月今有坡田一改西高東下曾量十步五寸是斜長南北均長六丈欲要修為平壤東增一丈新牆不知幾許請推詳須要算分停當舊法置斜長十步以每步五尺乘之併加零五寸得五十尺零五寸自乘得二千五百五十尺零二寸五分另以新牆十尺如勾自乘得一百尺相減餘二千四百五十
