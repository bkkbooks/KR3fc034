body:
  text: 尺零二寸五分為實以開平方法除之得平壤東西如股長四十九尺五寸以步法五尺除之得田九步九分以乘南北均長六丈即十二步得平田一百一十八步八分以畝法二四除之得田四分九釐五毫解義東增新牆一丈乃原波西高一丈今東修高一丈過典西平故以牆高一丈為勾股弦求勾法今有勾股股長三十六尺弦長四十五尺問勾濶若舊法置股長三十六尺自乘得一千二百九十六尺另置弦四十五尺自乘得二千零十五尺數相減餘七百二十九尺以開平方法除之得勾濶二十七尺解義法自乘數兼勾自乘股自乘數減去肢自乘止勾自乘數故關方得勾又勾弦求勾難題西江月三月清明氣象蒙童開放風箏托量九十五尺繩被風括起空中望得上下相應七十六尺無零縱橫甚法問先生
