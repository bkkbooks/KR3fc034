body:
  text: 除二十八個七乗八是倍數以商七層乗是四倍積外多五十六個再加兩個五十六共一百六十八又是兩個積數故將七加二共九以乗七八相乗之五十六以六歸乃合本積因數湊積亦法數之自然也又角三央垜再乗求積法今有物一三角尖垜底面一十五個問積物若干舊法置底面一十五個自乗得二百二十五個再乗得三千三百七十五個另置一十五個自乗得二百二十五個以三乗之得六百七十五個又另置一十五個以二乗之得三十個併三數共四千零八十個為實以六為法歸之得積物六百八十個難題以積求三角尖垜底面歌紅桃一垜積可推共該六百八十枚三角乗垜上尖一底面幾何請筭之舊法置桃積六百八十以六因之得四千零八十個為實以二為縱方三為縱廉用開立方法除之初高一十於左下法亦置一十於右自乗得一百為隅法又以上商一十乗縱廉三併方二隅
