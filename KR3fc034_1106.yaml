body:
  text: 舊法置列右六釧左一釧互一釵八釵重四両七錢重四両七錢先以右上六釧互乗左中八釵得四十八釵以左上一釧互乗右中一釵得一釵減左行四十八釵餘四十七釵為法次以右上六釧互乗左下重四両七錢得二十八両二錢以左上一釧互乗右下重四両七錢得四両七錢相減餘二十三両五錢為實以法四十七釵除之得釵毎股重五錢卻將右行重四両七錢內減一釵重五錢餘四両二錢以釧六隻除之得釧毎隻重七錢若先求釧重以左中一釵互乗左下四両七錢得四両七錢以左中八釵互乗右下四両七錢得三十七両六錢對減餘三十二両九錢為實以法四十七除之得釧每隻重七錢將左行重四両七錢內減一釧重七錢餘四両以八釵除之得毎釵重五錢解義用互乗減除者因両等分數互和用交互平法減退一位乃可單淂一位之數也如左行一釧入釵共重四両七錢以右行六釧過乗之乗左上一釧淂六釧乗左中八釵淂四十入數乗左下重四両七錢淂二十八両二錢即六釧四十八釵之共重也又以左
