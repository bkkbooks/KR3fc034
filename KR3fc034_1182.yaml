body:
  text: 置列右上馬三匹左上馬四互中牛二頭淂八下價一百一十四両得四百中牛五頭淂十五下價一百六十二両五錢得五十六両四百八十七両五錢先以右上馬三為法通乗左行中牛五頭得一十五乗左下價一百六十二両五錢得四百八十七両五錢卻以左行馬四匹為法通乗右行中牛二得八減左行乗得牛十五餘七為法又以馬四乗右下價一百一十四両得四百五十六両減左行乗價四百八十七両五錢餘三十一両五錢為實以法七除得牛毎隻價四両五錢卻以右行中牛二乗之得九両以減右行下價一百一十四両餘一百零五両為實以右行馬三匹除之得馬毎匹價三十五両解義左右互乗者徹平之法也以馬數為法互乗則馬數馬價徹平牛數牛價便有多寡不平即將多寡對減餘出之數為法為實淂牛價若以牛為法互乗則牛數牛價徹平馬數馬價有多寡不平對減餘出之數為法為實得馬價一也如右下價一百一十四両是三匹馬二隻牛價以左行馬四淂乗右行則馬淂四三十二牛淂四二八隻價淂四百五十六両乃十二匹馬八隻牛之價左下價一百
