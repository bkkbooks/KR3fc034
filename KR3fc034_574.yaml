body:
  text: 呼除方積次啇呼初除積行又用次啇呼初次除憲鼒隅皆在中三啇四啇同一理惟此省便易為功今有方田積七萬一千八百二十四步問平方一西若干增法置田積七萬一千八百二十四步為實於右約啇二百步於左二二自呼除實四萬步餘實三萬一千八百二十四步次約啇六十步於初啇之下即以次啇六十步與初啇二百步呼除二六除一萬二千步又以次啇與初次啇共二百六十呼除二六除一萬二千步六六除積三千六百步餘寔四千二百二十四步再約啇八步於左二百六十之下即以再啇八步乗初次啇共二百六十步二八除積一千六百步六八除四百八十步又以再啇呼初次再共二百六十八步二八除一千六百步六八除四百八十步八八除六十四步
