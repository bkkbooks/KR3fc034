body:
  text: 寸六十四以二因之得一百二十八寸另以三因分母九得二十七為法除之得四寸二十七分寸之二十隔八下生應鍾應鍾屬陰律長四寸二十七分寸之二十卻以分母二十七通四寸加分子二十共得四百二十八寸以空圍九分因之得一萬一千五百二十分以分母一十七除之不盡一十八分法實皆九約之得積四百二十分三分寸之二其候小雪卻以通寸一百二十八以四因之得五百一十二寸另以三因二十七得八十一為法除之得六寸八十一分寸之二十六隔八下生蕤賔蕤賔屬陽律長六寸八十一分寸之二十六卻以分母八十一通六寸加分子二十六共得五百一十二寸以空圍九分因之得四萬六千零八十分以分母八十一為法除之不盡七十二分法實皆以九約之得積五百六十分九分寸之八其候夏至卻以通寸五百一十二以四因之得二千零四十八寸另以三因八十一得二百四十三為法除之得八寸二百四十三分寸之一百
