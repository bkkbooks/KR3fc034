body:
  text: 林鍾屬陰空圍九分律生六寸以九分因之得積五百四十分其候大暑陰律生陽之法將六寸以四因之得二十四寸三歸之得長八寸隔八下生大簇大簇屬陽空圍九分律長八寸以九分因之得積七百二十分其候雨水陽律生陰之法將八十以二因之得一十六寸三歸之得五寸三分之一隔八下生南呂以上三律皆淂全寸自此以下九律不盡之寸俱用通之南呂屬陰律長五寸三分之一卻以分母三通五寸加分子之一共得一十六寸以九分因之以三歸之得積四百八十分其候秋分卻以通寸一十六以四因之得六十四寸另以三因分母三得九為法歸得七十九分十之一隔八下生姑洗姑洗屬陽律長七寸九分寸之一卻以分母九通七寸加分子之一共得六十四寸以空圍九分因之得五千七百六十分以分母九歸之得積六百四十分其候榖雨卻以通
