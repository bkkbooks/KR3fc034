body:
  text: 子分母以母就子子母約分命法謂如數有畸零難盡則以子母對减互除至子母數同就以此數除積得若干分之幾以此命之帶縱除法縱者長也如長濶不等止言長多濶若干共積若干問長問濶即置積為實用開方法帶入縱長以合本數减積除法即上帶縱法但帶縱是帶入法位隨法呼除减積是浖多若千數於法外另置位每呼除則以實先除多數於積內後法實相呼另除减縱除法如長濶不等不言長多濶若干止言共積若干長濶共若干問長問闊此無多若干可帶除故用减縱法酌量减除至於恰盡以得
