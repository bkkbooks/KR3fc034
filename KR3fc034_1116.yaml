body:
  text: 得甲羊六十三隻減退九隻得乙羊四十五隻因借知原法今有甲乙二人銀不知數甲借乙銀六錢五分比乙一倍有半乙借甲銀六錢五分相等問甲乙各銀若干增法置甲一倍有半甲三分乙二分共得五分又置乙相當甲一分乙一分共得二分以二乗五得一十以借銀六錢五分乗之得六両五錢加入六錢五分得甲原銀七両一錢五分減退六錢五分得乙原銀五両八錢五分解義凣両數不斉少者借多者一個相平必係多二個故借一可平若多者反借少者一個原多二個少者再減一多者又增一必共多四個借一淂二倍必係二四八個減借一個原數必七個七個一邊少二個淂五個借一淂一倍半必借一多出一四還有両下相平之二四共三四一十二個減借一個必一邊十一個一邊少二得九個今將錢十二文一邊到七個一邊五個借多一個両邊皆六借少一個一邊是四個一邊是両個四文甲羊六十三隻七九淂六十三也乙羊四十五隻五個九淂四十五也將錢二十文一邊列十
