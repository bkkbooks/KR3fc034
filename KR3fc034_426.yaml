body:
  text: 將兩尖作二小方各斜七歩共一十四歩中心方七歩斜該二個小方長九歩八分九釐九毫四絲九忽四微九繊三沙六塵六埃一渺一漠六六五四三二合併即通斜之長無差斜自乘得方二倍積乃比方多方外之二廉一隅得方長以二廉共歩乘之又將一隅自乘合二數併方自乘數即斜自乘之積無二比即前方內容小斜方得大方一半小方斜即大方面自乘得小方二倍自易方容八角餘方面五歩圖今有方容八角四隅餘方各五歩問角面長方面長斜長各若干方積角積餘方隅積斜積各若干增法置餘方五歩即小方面八角斜面即小方之斜得角面七歩零七釐一毫零六忽七微八繊一沙一塵八埃六渺五漠四六五三四四不畫截作二五併加二餘方共十歩得方面一十七歩零七釐一毫零六忽七微八繊一沙一塵八埃六渺五漠四六五二約五自乘得方積
