body:
  text: 除之得米三百零七石二斗增法置下周四十八尺以三歸之得一十六尺為圓徑自乘得二百五十六尺以高一十二尺乘之得三千零七十二尺以四歸之得積七百六十八尺以斛法除之得米又增發置下周四十八尺以高一十二尺乘之得五百七十六尺以四因之得二千三百零四尺以三歸之得積七百六十八尺解義圓倉淂方倉四分之三個尖堆與圓雖同又淂圓倉三分之一即淂方倉四分之一圓周是三個圓徑即三個方西自乘淂六個方西以高乘之即九個方倉將每倉四分計之四九淂二十六分圓尖堆止三十六分中一分故用三十六除之得本積與圓窖法增法三歸下周即圓徑即方西也自乘再以高乘即方倉也圓堆淂方倉四分之一故用四歸淂本積又法以高乘周用四因三歸淂本積者原周四十八是四個十二除率三十六是三箇十二係原周四分之三原周自乘以三十六除之乃將原以四箇十二乘之以三個十二除之仍是四因三歸之法故不用自乘只四十八四因三歸淂六十四尺以高乘之即淂本積以高乘積四因三歸乃先乘後除法也然周四十八此圓堆率多四分之以乃可合非此亦不合矣
