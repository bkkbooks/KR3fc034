body:
  text: 二百九十一步四分二釐一毫三絲五忽六微二纖三沙七塵三埃零九漠不畫另置角中長一十七步零七釐一毫有零以角面七步零七釐有零乘之得一百二十步零七分一釐零六絲七忽八微一纖一沙八塵六埃五渺四漠五一一一六不畫又置中長加旁角面長得二十四步一分四釐二毫一絲三忽五微六纖二沙三塵七埃三渺零九三零五以餘方五步乘之得兩旁積一百二十步零七分一釐零六絲七忽八微一纖一沙八塵六埃塵渺四漠六五二五併角中假得八角積二百四十一步四分二釐一毫三絲五忽六微二纖三沙七塵三埃零九漠不畫餘方五步自乘得二十五步折半得一餘方積一十二步五分四因得四隅共五十步併入八角積與通方積合另將方面以角面七步有零乘之五步歸之得通斜長二十四步一分四釐二毫一絲三忽五微六纖二沙三塵七埃三渺零九三零五自乘得斜積五百八十二步八分四釐二毫七絲一
