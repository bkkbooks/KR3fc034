body:
  text: 二百九十一歩四分二釐一毫三絲五忽六微二繊三沙七塵三埃零九漠不畫另置角中長一十七歩零七釐一毫有零以角面七歩零七釐有零乘之得一百二十歩零七分一釐零六絲七忽八微一繊一沙八塵六埃五渺四漠五一一一六不畫又置中長加旁角面長得二十四步一分四釐二毫一絲三忽五微六繊二沙三塵七埃三渺零九三零五以餘方五歩乘之得兩旁積一百二十歩零七分一釐零六絲七忽八微一繊一沙八塵六埃塵渺四漠六五二五併角中叚得八角積二百四十一歩四分二釐一毫三絲五忽六微二繊三沙七塵三埃零九漠不畫餘方五歩自乘得二十五歩折半得一餘方積一十二歩五分四因得四隅共五十歩併入八角積與通方積合另將方面以角面七歩有零乘之五歩㱕之得通斜長二十四歩一分四厘二毫一絲三忽五微六繊二沙三塵七埃三渺零九三零五自乘得斜積五百八十二歩八分四釐二毫七絲一
