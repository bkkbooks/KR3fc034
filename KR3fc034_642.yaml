body:
  text: 尺即一小立方之三平亷也後又以七因再七因之再因三長長亷之立相濶再因一小方之三平亷一因為平亷之立濶再因即因作七個小立西之平亷也又以四因六十尺為下亷即下七個小生方之長亷也長亷亦止用三亷又四因者其三為一小方之三長亷其一即上六十個小立方之數也後皆以七因再以七因三以也因三次七因長亷二次為長亷之立濶橫濶一次為因作七個小方之長亷三次七因一個六十因上六十個小方內平亷長亷俱各缺一七尺小隅將六十以七因再以七因三以七因即是以七尺自乘再乘淂一七尺小立方以六十乘之得六十個小立方以完各隅也下其各小立方平亷長亷六止缺七隅其將七尺自乘再乘為隅法即一個小方之隅也後又以七乘即乘作七個小隅以完七小方也此皆前任規算乘數立法高妙然令人思索難到今依立方正法偹列於後伴覽者易了前法將積兩度開方即得方西者鏽兩度自乘與三乘同積故也增法置積二千零一十五萬一千一百二十一尺為實初啇六十於左亦置六十於右法自乘得三千六百尺為平方再乘得二十一萬六千為小立方三乘得一千二百九十六萬為六十個小立方除積一千二百九十六萬訖餘積七百一十九萬一千一百二十一尺次啇七尺於左初
