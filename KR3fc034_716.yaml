body:
  text: 六用胡平方法除之得六自乘得三十六減內周三餘得外周三十三根又增通法置積四因三歸得一百四十四用開方法除之得十二減一得十一以三乘之得外周三十三根解義有中心圓束將積一百二十七根四因三歸得一百六十九仍餘一不不個物無零故將零數不用此圓圓田法解見後圓束畝異周圓圓束亦論箇得六個中心數外周實數亦一整個共積七個外周上圓因六六徑得三步積三步下圓徑三步積六步步因得九七分五厘拙翁論曰圓束每外一層周多六根圓畝每外一步周亦多六步其理一也以圓束物一個抵圓田一步圓束外周六個內中心一個徑得三個積得七個圓田外周六步徑止二步除中心一步兩邊各止半步積止
