body:
  text: 歸得內圓積五百八十八步又置勾四十二步減圓徑二十八步餘二十四步置股五十六步減圓徑二十八步餘二十八步併二餘數共四十二步折半得二十一步以圓徑二十八步乘之得餘勾股積五百八十八步併內圓積共一千一百七十六步合全勾股積解義容方合併勾股為除法容圓又加弦者方圓四止勾股各二面湊合成方圓圓三必三面湊合成圓也其併勾股弦為除法亦即將勾股相乘數用勾股弦平分也以勾股弦除積得十四步勾是十四個四十二步股是十四個五十六步弦是十四個七十步置四十二步以十四步乘之得五百八十八步置五十六步以十四步乘之得七百八十四步置弦七十步以十四步乘之得九百八十步併三數共二千三百五十二步合勾股相乘之積四十二五十六七十者勾股弦不齊之數也十四者勾股弦會同之數也會同處正是湊合成圓起然容方併勾股為除法即得方面容圓勾股弦為除法止得圓半徑何也容方勾與股是二面合在角故得一面全數容圓是三面合在心十四步者乃三面湊合圓中心處各十四步也每面斜合中心處止半徑加倍乃得全徑故用加倍法得全徑二十八步舊將積加倍以勾股弦除之得全徑亦合然特倍數以鈔全徑耳立法之原令人雖於是索故改正之論積圓得勾股二分之一然勾股有
