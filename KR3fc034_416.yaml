body:
  text: 餘方面四步九分五釐乘之得五十九步一分五釐二毫五絲加倍得二面積共一百十八步三分零五毫併中假積得六角積二百三十六步六分零五毫又置餘方隅答四步九分五釐自乘得二十四步五分零二毫五絲折半得一隅積一十二步二分五一毫二絲五忽以四因之得四隅共積四十九步零五毫併六角積共二百六十五步六分一釐另置通方一十六步九分自乘得方積二百八十五步六分一釐合六角四隅積解義圓方而十七步角面七步仍以方五斜七作算通方積與八角四隅得積二百八十九步算積亦合其合者只也角隅分數掦從方面共數分定通算分算自皆符合但方十七步以七因五歸得斜長二十三步八分自乘得五百六十六步四分四釐折半得二百八十三步二分二釐每一半較方自乘二百八十九步少五步七分八釐相差已違今改正以斜七步方四步九分五釐主法算積亦合然斜七步方四步九分五釐算積每二十四步五分內仍多二毫五絲今有隅自乘得二十四步五分零二毫五絲零數自宜除去第除去又與方積不合且隅面差多角面亦有多數在內以此算積差今更左圓較減於後須知止於方斜相較獨可以四步九分五釐
