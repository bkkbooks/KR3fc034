body:
  text: 今有主方積三千三百七十五尺問西方若干舊法置積三千三百七十五尺為實於中約實千尺定十尺初啇一十於左亦置一十於右為下法自乗得一百再以十乗一百得一千尺除實訖餘實二千三百七十五尺卻以三因初啇自乗得三百為西方平亷法又以三因初啇一十得二十為亷長次啇五尺於左初啇一十之次下法亦置五尺於右即以次啇五尺乗三亷長三十得一百五十為長亷法又以五尺自乗得二十五尺為隅法併平亷三百長亷一百五十隅法二十五共四百七十五尺皆與
  hash: sha256:4ac5b763d6b9b104ff260877ba04e44ebe43db0903aa8622b7be2663ea4fd7f0
