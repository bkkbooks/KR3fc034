body:
  text: 下者然今兩之下惟用錢分壓毫絲忽其斜素黍寺俱不用拜原十五斤今二十斤或三十斤不等鈞二拜三十斤石四釣引兩百斤以上是自斤而上者畝所以分別田地步方五尺也分五年一尺為二分也釐半寸一寸為二釐也毫絲忽同畝撗一步直二百四十步為一畝每步止五尺若以大訃即撗一表長六十丈以尺計長撗計積六千尺分二十四步為一分十分為一畝分之下亦有釐毫絲忽然上是之分釐毫絲分是步十分之一此是畝之釐毫絲忽分是十分之一頃百畝為頃角一畝分為四角每角六十步里三百六十步為一里計一百八十丈釣人行一千步諸物輕重數長澗高皆方一寸為則金重十六兩銀重十四兩玉重十二兩鉛重九兩五錢銅重七兩五錢鐵重六兩青石重三兩
