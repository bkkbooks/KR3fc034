body:
  text: 解義此即明舊法減縱之義首圖是列明初啇次啇所除積實二圖是將長濶共步伸直以明相除之理大抵長濶相和共六十六初啇是將積實以十步均略之濶亷二十步長應四十步以濶乘長除實不盡卻將縱亦減二十步是濶矢二十步長亦去二十步餘二十步是長濶共數又以步約略除實六十四步將餘縱二十步以長濶分之以四步乘十六步除實恰盡便是長濶各二十步外濶加四步得二十四步長加一十六步得三十六步古人立為法其理在此或長加盈濶過或長與濶位數多寡如長幾百幾十幾步止几十几步几十几步長几十步濶几十步長幾十幾步的啇步數皆一實難易今再圓於後今有直田積五千八百三十二步只雲長濶相和共二百六十七步問長濶各若干增法置積五千八百三十二步於中以左上為橫方右法為縱方將相和二百六十七步列于法位為縱約略積實啇二十步為橫濶于左下法除縱二十步餘二百四十七步與左橫二十步相呼二二除四十
