body:
  text: 人二日訣是除故將應乗者先達乗之應除者相乗為法除之內以十三口乗三百六十是同乗又以四升七合乗是異乗以三人乗三日是同乗為法除寔除四升七是因除除一十三口三百六十日是異除同異互乗互除法如有夏布四十五疋欲換棉布只云夏布三疋共價二錢棉布七疋共價七錢五分問换棉布若干舊法置今有夏布四十五疋以原布價二錢因之得九两又以棉布七疋因之得六十三疋為實另以夏布三疋因棉布價七錢五分得二两二錢五分為法除實得應換棉布二十八疋解義兴應將夏布四十五疋以三歸之淂一十五疋以價二錢因之淂夏布估價銀三十两却以棉布價七錢五分除之淂四是四個七两五錢便該四個七疋布故以棉布七疋乗四淂換棉布二十八疋固夏布價二錢是乗棉布七疋是乗夏布三尺是除棉布價七錢五分是除應用乗者搃乗之應用除者抇乗為法搃除之凣煩為蕑搃不外先乗後除內價二錢乗夏布是同乗又以棉布七疋乗是與與互乗夏布三疋因棉布價是與異互乗以兴為除法两边互有所除故同互乗互除
