body:
  text: 人二日訣是除故將應乘者先達乘之應除者相乘為法除之內以十三口乘三百六十是同乘又以四升七合乘是異乘以三人乘三日是同乘為法除實除四升七是因除除一十三口三百六十日是異除同異互乘互除法如有夏布四十五匹欲換棉布只云夏布三匹共價二錢棉布七匹共價七錢五分問换棉布若干舊法置今有夏布四十五匹以原布價二錢因之得九兩又以棉布七匹因之得六十三匹為實另以夏布三匹因棉布價七錢五分得二兩二錢五分為法除實得應換棉布二十八匹解義興應將夏布四十五匹以三歸之淂一十五匹以價二錢因之淂夏布估價銀三十兩却以棉布價七錢五分除之淂四是四個七兩五錢便該四個七匹布故以棉布七匹乘四淂換棉布二十八匹固夏布價二錢是乘棉布七匹是乘夏布三尺是除棉布價七錢五分是除應用乘者總乘之應用除者抇乘為法總除之凡煩為蕑總不外先乘後除內價二錢乘夏布是同乘又以棉布七匹乘是與與互乘夏布三匹因棉布價是與異互乘以興為除法兩邊互有所除故同互乘互除
