body:
  text: 臺中方積者大方除隅積餘二亷各長十六步中存一中方中方除隅積餘二亷各長十二步中亦一小方將大中方長短四亷分配二小方各成二中方共得三中方積三帰止存一中方積故開方得中方西十六步難題船缸均載歌三百六十一隻缸任君分作幾舡裝不許一舡多一隻不許一舡少一缸舊法置缸二百六十一隻為實以開平方法除之初啇一十於左自呼除一百餘實二百六十一次啇九於左初啇之次即以九呼初啇十除實九十又以呼初啇十除實九十又呼次啇九除實八十一恰盡得一十九舡每舡載缸一十九隻難題糧船均載歌今歲都要納秗糧雇舡裝載去上倉五萬七千六百石河中漏溫一舡糧每舡負帶一石去舡仍剩得一石糧秌糧納米也有數不知原用幾舡裝舊法置米五萬七千六百石為實於右用開平方法
