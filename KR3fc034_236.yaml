body:
  text: 餘二百步以四歸之得內方五十步外方加入四十步得二百八十步以四歸之得外方七十步將外方自乘得原田四千九百步除存內方五十步自乘二千五百步計截外圜二千四百步又方田截環以濶問內方及積法今有方田外方六十步從四圜截濶三尺六寸問內方及及內外積各若干增法置方面六十步四因得外周二百四十步另置截濶三尺六寸以每尺二分通之得七分二釐以八因之得五步七分六釐以減二百四十步餘二百三十四步二分四釐以四歸之得內方面五十八步五分六釐自乘得積三千四百二十九步二分七釐三毫六將以二四除之得該田一十四畝二分八釐八毫六絲四忽另將外周二百四十步併內周二百三十四步二分四釐折半得二百三十七步一分二釐以七分二釐乘得一百七十步零七分二釐六毫四系該田七分一釐一毫三絲六忽
