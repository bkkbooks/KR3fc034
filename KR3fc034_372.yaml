body:
  text: 今有扇形田而斜直各十三步問積若干增法置斜長一十三步另將斜長折半得六步五分相併共一十九步五分為實以折半六步五分為法乘之得積一百二十六步七分五厘解義扇形田乃圓四分之一即整半圓弧矢之半求積亦即弧矢法如弧矢全弦淂二十六步加矢十三步共三十九步折半淂半矢半弦一十九步五分以半長加全長亦一十九步五分合弧矢半弦半矢以全矢十三步乘得弧矢積以半矢六步五分乘得扇田積今有三廣田南廣二十六步北廣五十四步中廣一十八步正長八十六步問積若干舊法置南北二廣共八十步折半得四十步加中廣一十八步共五十八步再折半得二十九步以乘長八十六步得積二錢四百九十四步又法倍中廣得三十六步加南北二廣共一百一十六步以四歸之得二十九步以乘長八十六步亦得
