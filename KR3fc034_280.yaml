body:
  text: 另以啇八自乘得六十四步以乘餘下廉六十四步得四千零九十六步併上廉共八千一百九十二步為法除實六萬五千五百三十六步得六八步另置倍積照上法得弦解義以積自乘為實者將積開方後可以數求也以矢乘積者本積係以矢乘得數又以矢乘積即一乘再乘法也又以矢乘一二五虛隅除徑卻以矢自乘了餘徑者即以矢乘餘徑再以矢乘餘徑亦一乘再乘法也凡自乘再自乘淂數另將原數一乘再乘三乘數即相同如四自乘得十六再將十六自乘淂二百五十六另以四乘四淂十六再以四乘十六淂六十四又以四乘六十四即淂二百五十六又如五自乘淂二十五再用二十五自乘淂六百二十五另以五乘五淂二十五再以五乘二十五得一百二十五又以五乘一百二十五亦得六百二十五此是方自乘兩邊數合一故無參差若以短長不等相乘四乘六得二十四再用二十四自乘得五百七十六另以四乘六淂二十四再以四乘二十四淂九十六又再以六乘九十六即淂五百七十六皆是以三乘積合一乘再自乘積啇入即所啇之矢原以矢乘得積又再以矢乘積又以矢乘餘徑再以矢乘餘徑俱是再乘法尚少一個矢乘合原積自乘之數故以之為法除實可得矢也其以一二五為虛隅法何也圓淂方四分之三即淂方七分五釐四隅虛二分五釐弧矢係半圓止二虛隅應淂一分二釐
