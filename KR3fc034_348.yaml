body:
  text: 圭田截小頭大頭歌圭尖倍積求截長長乘濶除開方詳截濶倍積亦可索濶乘長除開方得截大亦用倍積求濶乘長除為因由以減原濶自乘積開方截濶得見矣截濶減濶長乘之濶除截長亦在茲圭截小頭法今有圭田長七十五步濶三十步自尖頭截積四百零五步問截長截濶各若干舊法置截積加倍得八百十步以原長七十五步乘之得六萬零七百五十步以濶三十步除之得二千零二十五步為實以開平方法除之得截長四十五步就將截長以原濶三十步乘之得一千三百五十步為實以原長七十五步為法除之得截濶一十八步增法置倍積八百一十步以原濶三十步乘之得二萬四十
