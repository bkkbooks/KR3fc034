body:
  text: 以所啇得高九尺加方多三尺得方一丈二尺解義以所啇九尺自乗淂八十一尺平方西也縱亷六尺每亷三尺共二亷也加入縱方九尺小隅方也縱多三尺隅應三三淂也尺也合之共成每西一十二尺卻以所啇九尺呼十二尺平方之積以除原積恰盡者益原積是十二尺自乗淂一百四十四尺以高九尺乗之得一千一百九十六尺若以一百四十四尺除原積即得高九尺今以九尺與一百四十四尺合除是除九個一百四十四尺故除積恰盡二所啇九尺即高也此乃先開平方卻以高尺數乗之除積也約縱開立方法今有立方積二萬九千八百零八尺高比方不及一丈三尺問高方各若干舊法置積二萬九千八百零八尺為實約實二萬七千餘啇三十尺自乗得九百再乗得二萬七千尺尚有餘積又約啇三十六尺自乗得一千二百九十六尺另置三十六尺減不及一十三尺餘二十三尺乗之得二萬九千八百零八尺除實恰盡得高二十三尺方三十六尺
