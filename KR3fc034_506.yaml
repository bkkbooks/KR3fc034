body:
  text: 解義以勾弦較除股自乘得勾弦和以較減和折半得勾加較折半得弦股弦較同勾弦較股弦較求勾股弦法前數不言勾股弦若干止言弦多勾三十六尺多股八尺問勾股弦各若干舊法置弦多勾三十六尺以弦多股八尺乘之得二百八十八尺加倍得五百七十六步以開平方法除之得二十四尺為實加弦多股八尺得勾濶三十二尺加弦多勾三十六尺得股長六十尺全加弦多股八尺多勾三十六尺得弦長六十八尺增法置弦多勾三十六尺多股八尺併之共四十四尺自乘得一千九百三十六尺另置三十六尺自乘得一千二百九十六尺又置八尺自乘得六十四尺二共一千三百六十尺以減一千九百三十六尺餘五百七十六尺以開平方法除之得二十四尺加八尺得勾加三十六尺得股加四十四尺得弦解義弦多八多三十六者參差不齊之數也以八典三十六相乘又加倍者多少互截取平之法也乘數加倍即是將八尺以三十
