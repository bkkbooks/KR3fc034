body:
  text: 法五千六百七十八大因先以法與五疋位相呼五五二十五五六三十五七三十五五八四十填寫格內乘次以法與三十相呼三五一十五三六一十八三七二十一三八二十四亦填寫格內圖買罟又以法與四百相呼四五二十四六二十四四七二十八四八三十二倂寫格內如有絹四百三十五疋生疋價五千六百七十八文問共錢若干法照上格眼圖置絹四百三十五疋橫寫圖上為實另以每疋錢五千六百七十八文宜寫圖右為法從末行起法實相呼填寫格內卻從右下角斜道上下角空二層共十三即進一於上本位三三層共八加進一共九四層共二十九進二於上本位九五層共十四加進二共十六進一於上本位六層共三加進一共四七層二得共該錢二百四十六萬九千九百三十文
