body:
  text: 五畝田種七畝者十五個夫種得一百零五畝田耘五畝者三十一個夫耘得一百零五畝田併三十五一十五二十一共得七十一是田一百零五畝共得七十一個夫乃耕種耘俱全故以七十一為汯除一百零五得一夫耕種耘俱全之畝數也一百零五者田也為母者多為母也七十一者失也為子者少為子也遲疾共工法原有三女各繍錦一方長女五日完中女七日完小女九日完今令三女共繍錦一方問得日若干舊法以日為分母錦為分子先以三母相乘以五日乘七日得三十五日又以九日乘之得三百一十五日為實以母互乘子法另以五日乘七日得三十五日又以五日乘九日得四十五日又以七日乘九日得六十三日併之得一百四十三日為法除實得該工二日不盡二十九命曰零一百四十三分日之二十九解義此與上同一法互相發明上是一人兼三人工此是三女並一女工三百一十五者日也一百四十三者也以零九得六
