body:
  text: 除之得八尺一寸加入後表竿三尺得高一丈一尺一寸解義此典前圖同法其併退行二尺作算者即前又法加退後五尺共三十尺以六尺乘之一也前表三尺六寸即前圖表竿後表三尺即前圖人目處四尺前圖遠二十五尺是正勾退後五尺是餘勾併之是通勾高三十尺是正股表竿除人目餘六尺是餘股連人目併之是通股此圖前表離高二十五尺是正股退行二尺是餘股併之是通股高八尺一寸是正勾前表減後表三尺餘六寸是餘勾併之加後表三尺是過勾前求股高此求勾高通一理也表外餘勾餘股求股遠圖今有立竿求遠前立表竿三尺退行一尺八寸又立表竿三尺六寸人目望其二表俱對遠處參合問遠若干舊物置後表竿三尺六寸以退行一尺八寸乘之得六十四寸八分為實卻以二表相減餘六寸為法除之得遠一十尺零八寸又法置前表竿三尺以退行一尺八寸乘之得五尺四寸為實卻
