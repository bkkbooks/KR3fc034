body:
  text: 每人一日開二百尺為法除之得該工四萬八千八百七十一人不盡八十八尺不足一人一日開渠共作求工法今有穿渠上廣二丈四尺下廣二丈一尺深九尺長三百八十四尺每用人工一十二名開積六百尺問該人夫若干舊法置上下廣併得四十五尺折半得二十二尺五寸以深九尺乗之得二百零二尺五寸又以長三百八十四尺乗之得七十七萬七千六百尺再以人夫一十二名乗之得九百三十三萬一千二百尺為實以日開積六百尺為法除之得共用人夫一萬五千五百五十二名開漆問日法今有開濠上廣九尺下廣七尺深四尺長一千八百尺每人日開一百四十四尺今用人夫二百名問幾日完工舊法置上下廣併折半得八尺以深四尺乗之得三十二尺又以長一千八百尺乗之得五萬七千六百尺
