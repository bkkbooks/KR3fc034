body:
  text: 算海說詳自序數理著也家儒獍者先强拙更數天行上道也形下器也數金六三一九算又數之一治其遠有大者遺小奚譏孔子聖少也都事不辭游一枝苟免終日之訾聖人寧賢之矢余質艻而負且癖
