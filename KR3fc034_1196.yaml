body:
  text: 一錢二分與左行得數五両九錢六分對減餘一錢六分次以中行粉五為法通乗左行粉負九得負四十五丹十四得七十餘價一錢六分得八錢即以左行負粉九為法通乗中行粉五得四十五與左行負粉對減盡乗丹六得五十四異加左丹七十共一百二十四為法乗中下原價六錢四分得五両七錢六分減左餘價八錢餘四両九錢六分為寔以法除之得丹毎斤價四分於中行價六錢四分內減原丹六斤共價二錢四分餘價四錢為實以粉五斤除之得粉毎斤價八分又於右行原價二両零四分內減原粉三斤共減價二錢四分餘價一両八錢為寔以原硃二斤除之得硃毎斤價九錢解義上硯墨筆三色共價此亦三色止二色共價右行有硃粉旡丹中行有粉丹旡硃左行有硃丹旡粉先將右左硃為法互乗徹平両邊都是硃六斤右邊乗出粉九斤乗出硃六斤粉九斤之價卻有硃價旡丹價左邊乗出丹一十四斤乗出硃六斤丹一十四斤之
