body:
  text: 白下隱吏古齊陽丘睡足軒強恕居士李長茂拙翁角勾股章此章以勾股求弦之斜勾弦求股之長股弦求勾之濶三數互根推此彼應凡望高測深索廣驗遠較圓度方皆本乎此乃諸法之準要實萬算之綱維勾股弦名義橫濶謂之勾直長謂之股斜長謂之弦所今木五曲尺是尺股是尺稍自尺頓至稍尾斜去是弦也勾股弦循相求其名有十其列於後一曰勾股較謂勾股相減也如後勾三十二步股六十步弦六十八步勾股相較減八步曰勾股較
