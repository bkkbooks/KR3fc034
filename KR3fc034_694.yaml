body:
  text: 率六十七尺五寸除之得米半堆率以周自乗又以高乗以率四十五除得米內角堆率以周自乗又以高乗以率二十二尺五寸除之得米各處塩場散堆量筭引法今有塩一堆長一丈五尺濶一丈二尺高六尺五寸問該觔引各若干舊法置長一丈五尺以濶一丈二尺乗之得一百八十尺又以高六尺五寸乗之得一千一百七十尺又以每尺四十斤乗之得塩重四萬六千八百斤為實以每引三百斤為法除之得一百五十六引若論包以包數除之束法問積問周總歌方束每週添八數三稜添九圓添六周加添數以周乗除率三等各不同十二圓率十六方三稜之率十八當各加中心得原積以積問周減心一各率乗之帶縱求八六九數不相猶無心方四圓內三周加四三自乗叅稜內或三
