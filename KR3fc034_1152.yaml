body:
  text: 對減用盈與適足單用盈不足適足一樣行單套隻搃同筭觀明單套思過半雙套捷法歌雙套之法有捷法人率出率互乗啇二數對減餘為法併盈不足法除察得數又為乗法宜人率相乗即人實以法乗實人數得欲問物實出率索人率出率互乗明以法乗之數兩行多者減之得本物少者加之亦同數両不足両盈同適足不足適足盈用減用單猶前法以類推之不用訝雙套盈不足匿價法今有人買物毎八人出銀七兩盈四両五錢毎九人出銀六両不足三両問人數物價各若干舊法右左両行置位分列右上八人左上九人互中出七両淂六十三両中出六両淂四十八両互下盈四両五錢得二百一十六両下盈不足三両得一百八十九両
