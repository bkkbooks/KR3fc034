body:
  text: 三百步以原長七十五步除之得三百二十四步以開平方法除之得截濶一十八步將截濶以原長乘原濶除得截長解義二法皆圭還源法也可以參悟圭田截大頭法今有圭田七十五步濶三十步從大頭截積七百二十步問截長截濶各若干舊法置截積加倍得一千四百四十步以原濶三十步乘之得四萬三千二百步為實以原長七十五步為法除之得五百七十六步再以濶三十步自乘得九百步以少減多餘三百二十四步為實以開平方法除之得截濶一十八步併原濶三十步共四十八步折半得二十四步為法除截積七百二十步得截長三十步又法照前法得濶一十八步以減原濶三十步餘一十二步以原長七十五步乘之得九百步以原濶三十步除之得截長三十步
