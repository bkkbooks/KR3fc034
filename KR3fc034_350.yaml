body:
  text: 三百步以原長七十五步除之得三百二十四步以開平方法除之得截濶一十八步將截濶以原長乗原濶除得截長觧義二法皆圭還源法也可以叅悟圭田截大頭法今有圭田七十五步濶三十步從大頭截積七百二十步問截長截濶各若干舊法置截積加倍得一千四百四十步以原濶三十步乗之得四萬三千二百步為實以原長七十五步為法除之得五百七十六步再以濶三十步自乗得九百步以少減多餘三百二十四步為實以開平方法除之得截濶一十八歩併原濶三十歩共四十八歩折半得二十四歩為法除截積七百二十步得截長三十步又法照前法得濶一十八步以減原濶三十步餘一十二步以原長七十五步乗之得九百步以原濶三十步除之得截長三十步
