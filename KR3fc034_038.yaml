body:
  text: 第一卷法章河圈洛書卦位图觯共八圈黄鍾萬数根本觯共四條諸物数名目詳共八條九九呼筭秉除歌共三章分别法賽左右分立訣計一條乘除位法觯共十七條有無除撞艜法二歌二條問原還原法觶共二條同異先後乘除諎法共十五條自秉互秉維秉歧併倍折分合诸法共十七條子母互维通約乘除諸法共五條带咸縱積弧勾加减等法共十三條金蝉脫殻因乗法共四條袖中掌上定位圖訣共一條增添相乗自乗掌訣共二條鋪地錦冪笑因乗法共三條
