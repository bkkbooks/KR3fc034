body:
  text: 再以用過布分母六通之得一百三十八另置用過布一疋以分母六通之得六加分子一共七又以原布分母九通之得六十三以減原布一百三十八餘七十五為實卻以二分母九分六分相乗得五十四為法除之得一疋餘不盡實二十一法實皆以三約之得餘布一疋零十八分疋之七解義上豆九石六斗六分斗之四價銀二錢三分錢之一兩邊分母各不同求法止將價豆各用分母分子通之豆與價原各不同也此用過布與原布是一物故各用母子通之又以分母互通之不盡實二十一法實皆以三約者即法實對減至同淂三就以三約法五十四淂十八三約實一十一得七為十八分疋之七即下雲約分法也約分子母差分法約分者如數之不能盡或物之不可分用除法多畸零不盡必以法而約之數多為母數少為子子毋之數両列可半者半之不可半者豆相減損至盡淂子母數有等齊同就以此為法各以法
