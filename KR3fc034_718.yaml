body:
  text: 三步如照求徑三個作田徑三步外周得九步比束周多三步積六步七分五厘共不同何也圓田論分數外周就周外盡處算圓物論個數以物徑分數計之外周當在各物中半即合物徑分數周外各餘半物圓束每一層加六半層即應加三則算至物外盡處束周六個實係九個分數所以於田周九步同積以周問積但將束周外加三個用自乘十二除即同圓周問積法至增法三歸束周加一者田周三歸即徑束周比田周少三以三歸加一乃合圓田徑故用自乘三因四歸亦即圓徑求積之法以此言之圓束求積總不外圓田求積之法然有中心圓束本圓田法求之積少二分五厘何也圓田論分數將田以尺計束物亦作每徑一尺如圓田外周九尺除中心一尺四因三歸止得七寸五
