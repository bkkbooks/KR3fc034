body:
  text: 所換羊二隻乘之得三千六百隻為法除實得該換鵝二十隻解義二法一義前是三位後事四位前置今麥以麻乘自下而上後將乘鵝以原雞乘自上而下乘法不拘法實應用乘者或自上乘自下乘一也正法原應一除一乘如置鵝八隻以雞二十隻除之淂四乃每隻雞應換四分雞將四分雞以三十隻雞之淂一十二乃三十隻雞該換十二隻鵝將十二隻以九十隻鴨除之淂一三三不尽乃每隻鴨應換鵝一分三厘三毫不尽將二三不尽以鴨六十隻乘之得八乃六十隻鴨應換八隻鵝將八隻鵝以二羊除之淂四乃一隻羊該換四隻鵝將四隻鵝以羊五隻乘之得二十却五隻羊該換二十隻鵝若將羊五隻為實以羊二隻除之得二五乃是一隻羊作二隻半將二隻半羊以鴨六十隻乘之淂一五是將六十隻鴨都加作二隻半得一百五十隻乃五隻羊應換一百五十隻鴨也將一百五十隻鴨以九十隻鴨除之得一六六不尽乃每一隻鴨加作一隻六六不尽也將一六六不尽以雞三十隻乘之淂五乃將三十隻雞每隻加作一六六不尽共得五十乃五隻羊該換五十隻雞也將五十隻雞以二十隻雞除之得二五乃是每一直雞作二隻半將二隻半以八隻鵝乘之淂二十乃將八隻鵝各加作二隻半共得二十隻正五隻羊該換二十隻鵝也達八隻雞乘除起到底是乘除個鵝數共五隻半乘除起故首是五隻半應換之鴨雞鵝數顛時
