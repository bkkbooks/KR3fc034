body:
  text: 定歸除位歸從法前得令令者斤兩貫個石等數是也亦從實上原皆位起數至法首位之數則止却升上一位得法首應得之數巳上十百千萬以下釐毫合勺然有二等一等實多法少從實首順數至法首之數則止升上前一位得令一等法多實少亦從實首位起往上逆升數至法首之數則止亦升前一位得令如有來四百四十二在五斗每銀一兩糴米三石問共銀若干此是實多法少置米為實以每兩糴米三石為法除之實首數是百法首數是石便從實有位有石起頓數至石是法首數也升前一位得令是兩又前一位是十兩以次逆上向下一位是錢以次順下如有麥四百五十石賣銀三十二兩四錢問每石該銀若干此是法多實少置銀為實以麥為法歸除之得七二法首
  hash: sha256:307d21823dccd56d894ceabdc3f1cdca7557ee41b9cc42e99983313fe0820c0d
