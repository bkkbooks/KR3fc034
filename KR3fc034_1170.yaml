body:
  text: 多入分子一乗亦多用分於一除恰合本數此思理荅人通語故於母互乗之法所不可應特為拈普分明庻悟者旁通有淂匿價雙套帶分子母両盈両不足法今有官泒銀不知數依例令丄等八戶下等五戶納之不足五両復令上等六戶下等八戶納之亦不足三両只雲下戶例如上戶例十分之八問泒銀數及各戶出銀若干舊法置上等八戶以十分因之得八十戶下等五戶以夊八因之得四十戶併之得一百二十戶又置上等六戶以十分因之得六十戶下等八戶以之八因之得六十四戶併之得一百二十四戶卻列位右一百二十戶左一百二十四戶互不足五両不足三両先以右一百二十戶互乗左不足三両得三百六十両又以左一百二十一戶互乗右不足五両得六百二十両二位相減餘二百六十両為銀寔卻以戶數一百二十一百二十四相減餘四為法除之得官泒銀六十五両另以両不足五両三両對減餘二両為則例寔仍以前法四除
