body:
  text: 五毫加入啇矢以減原徑乃減去矢八步之二處隅以合圓法也本法以一二五虛隅乗矢以減圓徑餘十六步遭與矢乗弦加矢折半之數合一邊矢乗積是以八乗一百二十八一邊矢自乗了餘徑是以六十四與十六相乗八淂十六一半一百二十八淂六十四二倍故乗出之數邊同至圓有大小截矢弦有長短或矢過短弦通長以矢乗積所淂之數不足一半以虛隅乗矢減徑所餘之徑必多以矢自乗了餘徑所淂之數必一半有餘多少湊合遺符一再乗之錄此則數理天然符合之妙也但矢係八步無零優易約啇如矢步有零餘則勢費啇求且啇者不過初界啇求如啇八步又不如直以八陰原積或倍積用前積矢求弦法騐其合否之為矣又法將原積加倍自乗之數較原積自乗淂四倍故亦四因原積四田徑以就之其以五為虛隅亦四倍一二五淂五分與上同一法也圓截難題西江月今有圓田一所不知頃畝端的直河一二弧道正中穿圓分弧矢両叚通田七十四步二十四步河矢圖寬除河見在幾多田水占如何得見此言圓徑七十四步中去河二十四步問中與二弧矢各若干舊法置圓徑七十四步自乗得五千四百七十六步三因四歸得圓積
