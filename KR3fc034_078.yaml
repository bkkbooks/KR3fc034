body:
  text: 之老少岄萬法不出河圖也洛書之數即河圖之數五居中者太極也河圖廬五與十為太極洛書用五而去十者陽以主陰之義也然九為從皆十五則十寓于五謂陽以統陰十亦在其內也十五老陽九與老陰六配合得十五少陽七與少陰八配合得十五以從撗斜角言之一得五而為老陰之六配以老陽之九四得五而為老陽之九配口老陰之六二得五而為少陽之七配以少陰之八三得五而為少陰之八配以少陽之七皆成十五即以曰旁言之二四為老陰之六配以老陽之九一八鳥老陽之九配以老陰之六二六為少陰之八配以少陽之七三四為少陽之七配以少陰之八皆成十五時陰陽玄通之至理也八卦乾一兌二離三覆四巽五坎六艮七坤八時先天立卦之庫八卦之本數也乾坎艮震巽離坤兌者後天流行之卦序也洛書為動用之數故將後天之卦拼入九位增入中五而為九宮坎一坤二震三巽四中五乾六兌七艮八離九者洛書之卦數也五居中為太極太極無為增入八卦為玥者兩謂靜有太極動亦有太極也凡川皆洛書數理具然洛書之九位一本于河之數故河圖洛書為九九數法之宗而不能外也黃鐘萬數根本解黃鐘生度黃鐘之管其長積秬黍中者九十粒一粒為一分十分為寸
