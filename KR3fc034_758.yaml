body:
  text: 之得二百七十四個一分二厘五毫箇物無零得積二百七十四個解義九層者上下周皆整六六層者上下周一整六一有半六三層者上下周皆有半六求積總同一法但一整六一有半六者積數邊合無零皆整六者不是一分二厘五毫皆有半六者多餘一分二厘五毫以周求皆同故三列備考尖垜半垜俱用四歸者圓不高方方尖得立方三分之一圓尖得方尖四分之三即立方四分之一故方尖垜用三歸圓尖垜用四歸三角尖垜物求積法今有物一三角尖垜底面七個問積物若干舊法置底面七個加一個共八個以十個乘之得五十六個再將七個加二個共九個乘之得五百零四個為實以六為法歸之得積八十四個解義三角尖垜與三角錐法不同三角錐面七徑六此面徑俱七維求積論分數法應以徑乘面再以高乘以法歸之垜之垜求積論個數面七加一即加應層尖一個合二層折平之法此應以七折半得三個半乘之即和應層之積以七乘之是二倍數化同角錐以徑乘面未折半之數角錐得立三角積一半角垜論個數以底層二十八七層皆二十八計之立三角垜積共一百九十六個陰兩個垜積尚
