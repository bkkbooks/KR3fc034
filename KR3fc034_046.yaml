body:
  text: 方圓三稜各東法共十五條商木各等梱梆法共三條長方圓角尖半徑求積法共十五條磚帮以長高深開積法計一條第六卷程童章築造城堡開積法計一條方長圓方圓三角錐問積法共十五條築堤築墙問積法計九條穿地挑土求土方法共四條開梁濠問工問日問銀法共六條並日益人共工求工法共四條輕重計程計工法共二條億運問價問程法共三條疾較程問里法共七條輪黍魚金問里物共五條第七卷截两化觔求積法共九條以觔問引石约秤秉两分苛倍計一條
