body:
  text: 步另置墓周六步自乘得三十六步以二十除之得三步以八墓乘之得二十四步又十字路濶一步直長一十六步橫長一十五步內除中心一步共三十步加八墓二十四步得五十四步以畝法二四除之得截去占地二分二厘五毫以減田一畝得實存田七分七厘五毫以每畝價二兩五錢乘之得該價銀一兩九錢三分七厘五毫解義墓以周自乘用十二除之者以圓周求積用十二除之也法見圓田下圓田求積求徑歌圓徑自乘法有因三因四歸得積真積加四因三歸法開方求之徑尋今有圓田徑五十六步周一百六十八步問積步及田若干舊法置徑五十六步自乘得三千一百三十六步三因四歸得積二千三百五十步以畝法二四除之得田九畝八分又法
