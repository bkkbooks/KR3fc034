body:
  text: 二千三百寸即餘股立木五尺橫容之積也以餘勾四寸容直談四疊共容二千三百寸故以四寸除得五百七十五寸即水深也二表求高遠歌測高測遠兩竿竒兩竿長短一般齊相去若干前後立退望遠近有差池竿減人日餘勾股用乘表間得積實前望後望相對減除實加竿高無疑另將前望乘表間後望減餘法除馬求得前表至高遠加後表望遠亦全二表餘勾餘股求高遠圖今有隔水望木竿不知高立二表各長一丈前後對直相去一十五尺從前表退行五尺人目窺高四尺望表末與木杪斜平從後表退行八尺窺望表末亦與木杪斜平問竿高並至竿遠若干舊法置兩表相去一十五尺以表高十尺減人目四尺餘六尺為
