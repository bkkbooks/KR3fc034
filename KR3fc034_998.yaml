body:
  text: 八錢六分減多一錢三分五厘得麥價七錢二分五厘解義此同上法還源將差多價以米石數減除止到麥一則價以麥石數加入通成麥一例價故或減或加因米可求麥價因麥可求米價也輕重差分法今有石中有玉不知分寸輕重石方三寸高三寸共重一十二斤一十五兩只雲玉方一寸重一十二兩石方一寸重三兩問玉石各重若干舊法置石方三寸自乘得九寸再乘得二十七寸以玉率重一十二兩乘之得三百二十四兩減共重一十二斤十五兩即二百七兩餘一百一十七兩為實以玉重一十二兩內減石重三兩餘九兩為法除之得石一十三寸以三兩乘之得石重三十九兩另置原石共二十七寸內減一千三寸餘得立一十四寸以一十二兩乘之得玉重一百六十八兩各以斤法通之得斤數
