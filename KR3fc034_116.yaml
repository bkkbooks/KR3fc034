body:
  text: 一共數雖降兩位反升亦須詳定位之法求之陛積亦用除法如有足色金銀十兩欲銷八色即置十兩以八為法歸之得一十二兩五錢是也蓋以八為法出十降積則得一兩二錢五分陛積則得一十二兩五錢可以通用他俱類此加倍亦用歸法加倍當用二而位反降令改用五歸陛上的數而位不降為便撞歸法歌歸除之法要周知是數盈進上歸成十有歸若是無除數作九下將歸數施或仍無除再起一下加歸數以除之有歸數無除數歌下法見一無除作九一本位作九下位作一見二無除作九二本位作九下位作二
