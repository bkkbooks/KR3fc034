body:
  text: 共八千五百六十七兩為實以價八釐九毫為法乘之得該銀七十六兩二錢四分六釐三毫以斤求斤下帶兩價法今有大青四百三十二斤一兩每斤價二兩問該銀若干舊法置大青四百三十二斤不動將斤下一兩用截兩為斤法通之作退位六二五併得四百三十二斤零六二五為實以斤價二兩為法乘之得該銀八百六十四兩一錢二分五釐以斤兩求價法原有銀二錢三分置白銅一十三兩今欲買五斤二兩問該銀若干舊法置今買銅五斤二兩以斤求兩法加之加斤不加兩共得八十二兩以原銀二錢三分乘之得一十八兩八錢六分為實以原銅一十三兩為法除之得該銀一兩四錢五分零七毫七絲
