body:
  text: 共八千五百六十七兩為實以價八厘九毫為法乗之得該銀七十六兩二錢四分六厘三毫以觔求觔下帶兩價法今有大青四百三十二觔一兩每觔價二兩問該銀若干舊法置大青四百三十二斤不動將觔下一兩用截兩為觔法通之作退位六二五併得四百三十二斤零六二五為實以觔價二兩為法乗之得該銀八百六十四兩一錢二分五厘以觔兩求價法原有銀二錢三分置白銅一十三兩今欲買五觔二兩問該銀若干舊法置今買銅五斤二兩以斤求兩法加之加斤不加兩共得八十二兩以原銀二錢三分乗之得一十八兩八錢六分為實以原銅一十三兩為法除之得該銀一兩四錢五分零七毫七絲
