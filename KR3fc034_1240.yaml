body:
  text: 冰糖三空空空空杏仁八價四錢冰二乗淂八錢增法先以一行冰糖二通乗六行杏仁八得十六乗價四錢得八錢卻以六行冰糖三通乗一行白糖四得一十二乗價四錢得一両二錢兩價對減一行餘四錢就將一行六位立負杏仁一十六次以一位白糖一十二乗二行萄五得六十乗價三錢三分得三両九錢六分卻以二行白糖二乗一行負杏仁一十六得三十二乗餘價四錢得八錢両價對減二行餘三両一錢六分就將一行乗出杏仁三十二移置二行六位立負杏仁三十二次以二行萄萄六十乗三行榛仁八得四百八十乗價五錢五分六厘得三十三両三錢六分卻以三行葡萄六乗二行負杏仁三十二得一百九十二乗餘價三両一錢六分得一十八両九錢六分両價對減三行餘價一十四両四錢就將二行乗出杏仁一百九十二移置三行立負杏仁一百九十二次以三行榛仁四百八十乗
