body:
  text: 十四尺欲改作圓錐問接高若干舊法置高二十四尺以上周一十八尺乗之得四百三十二尺為實另置上周一十八尺下周七十二尺對減餘五十四尺為法除之得接尖高八尺二觧義圓臺改錐圓錐改臺皆與方臺方錐同法只蛁上歌求之即得皆用先乗後除法圓錐改圓臺問截尖法今有圓錐下周七十二尺高三十二尺欲改作圓臺只用上周一十八尺問截尖高若干舊法置原高三十二尺以今截上周一十八尺乗之得五百七十六尺為實以下周七十二尺除之得截上尖八尺圓錐改圓臺問上周法今有圓錐下周七十二尺高三十二尺欲改作圓臺只用高二十四尺問今截上周若干舊法置下周七十二尺另置原高三十二尺減今截高二十四尺餘截尖八尺乗之得五百七十六尺為實以原高三十二尺為
