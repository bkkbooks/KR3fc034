body:
  text: 難題較程分乗歌今有程途二千七十八人騎馬七匹言定十里騎輸轉各人騎行請詳題舊法置程途二千七百里為實以一十八人為法除之得每人一百五十里以馬七匹乗之得騎馬一千零五十里以減程途二千七百里餘得人徒行一千六百五十里增法置二千七百里為實以七匹乗之得一萬八千九百以一十八人除之得騎馬一千零五十里另以一十八人內減馬七匹餘十一乗實得二萬九千七百亦以一十八人除之得步行一千六百五十里難題車輪問里歌二人推車忙且若干半徑輪該尺九五一日推轉二萬遭問君里數有幾許舊法置半徑輪一尺九寸五分倍之得全徑三尺九寸以周三因之得輪轉一遭一百一十七寸以二萬遭乗之得二百三十四萬寸為實另以每里三百六十步以每步五十寸乗之得一萬八千寸為法除實得行一百三十里
