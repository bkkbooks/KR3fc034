body:
  text: 得二百一十為法除實得三錢三分三釐三毫三三不盡乃每年每兩之利也就以此為法以乘甲通八十四得甲利二十八兩又乘乙通七十二得乙利二十四兩再乘丙通五十四得丙利一十八兩解義甲本是七數乙本是八數丙本是九數以十二月乘七十兩只以十二乘七得八十四衰以九月乘八得七十二衰以六月乘九得五十四衰乃各分法也書本作八十四兩七十二兩五十四兩非是若作兩算如以十二乘七十當是八百四十非八十四矣合本分年月問利法今有趙錢孫李四人同商本銀前後付出趙一於甲子年正月初九日付出本銀三十兩錢二於乙丑年四月十五日付出本銀五十兩孫三於丙寅年八月十八日付出本銀七十兩李四於丁卯年十月二十七日付出本銀九十兩四共本銀二百四十兩至戊辰年終共得利銀一百二十兩問各該利銀若干舊法置利銀一百二十
