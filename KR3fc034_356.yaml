body:
  text: 實以尖長一尺五寸為法除之得梯下廣一十二尺八寸增法置梯長十尺零五寸以上廣一尺六寸乘之得一十六尺八寸以尖長一尺五寸乘之得一十一尺二寸加入上廣一尺六寸得梯下廣一十二尺八寸解義圭求梯下外尖長中廣仍以圭法求梯求圭必二廣相減仍以梯法測今有圭田長五十六步下廣四十四步八分從一邊截積四百零五步問截長截濶各若干增法置截積四百零五步以原長五十六步加倍得一百一十二步乘之得四萬五千三百六十步為實以原濶四十四步八分折半得二十二步四分為法除之得二千零二十五步以開平方法除之得截長四十五步就將長四十五步以折平二十二步四分乘之得一千零八步以原長五十六步乘之得截濶一十八步增法置截積四百零五步以
