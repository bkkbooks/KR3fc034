body:
  text: 七百五十步為餘股相乗得二萬二千五百步以開平方法除之得一百五十步為一隅方得方面一半倍之得全邑方三百步又方求餘勾股法止言方一百五十步方外餘勾三十步問餘股若干即置方一百五十步自乗得二萬二千五百步以餘勾三十步除之得餘股七百五十步求餘勾即以餘股除得餘勾觧義此亦即容方法也前容方是以全勾股求此是以餘勾餘股求餘勾股所剩之積較容方四倍有餘但以餘勾典餘股相乗得積典內方相同故開方可得容方之面此數理互根無物不可測騐也表竿求高深遠歌高深與遠測表竿正勾正股表末叅竿至人目勾股餘橫直容積同無疑求股餘股乗正勾餘勾出併表竿收餘勾乗股餘股除得勾併加退步冝
