body:
  text: 同通乘同通除法難題梅氣清三石五斗粟魯換芝麻三石足又有五斗五升麻換來小麥量八斗今有小麥換粟米九石六斗無零數興言有粟米三石五斗換芝麻三石有芝麻五斗五升換小麥八斗今有小麥九石六斗問換粟米若干舊法置今有小麥九石六斗以芝麻五斗五升乘之得五石二斗八升再以乘米三石五斗乘之得一十八石四斗八升為實另置所换芝麻三石以所換小麥八斗乘之得二石四斗為法除之得該換粟米七石七斗又如原每鵝八隻換雞二十隻每雞三十隻換鴨九十隻每鴨六十隻換羊二隻今有羊五隻換鵝問該換若干舊法置原鵝三十隻乘之得二百四十隻又以原鴨六十隻乘之得一萬四千四百隻再以今有羊五隻乘之得七萬二千隻為寶另以所換雞二十隻以所換鴨九十隻乘之得二千八百隻再以
  hash: sha256:66bd7ba7121a1b1f9c71ae2dc700e2ed21f41a89cf8d4422d17243bddbc422f5
