body:
  text: 多餘數逢雙是女隻生兒今有孕婦行年二十八歲八月有孕問所生男女置四十九加孕月八共七減年二十八餘二十九減天除一地除二八除三四時除四五行除五六律除六七星除七不盡竒為男偶為女也如數多再以八風除八凣一三五七九皆竒二四六八十皆偶筭海説詳苐九卷終
