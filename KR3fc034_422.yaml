body:
  text: 得通斜二十三歩八分九釐九毫四絲九忽四微九繊三沙六塵六埃一渺一漠六六五三四二自乘得斜積五百七十一歩一分八釐五毫八絲五忽八微二繊二沙五塵一埃二渺六漠六二不畫合方二倍積觧義前較方斜方用四歩九分五厘立法將方積以二毫五絲乘之二十四歩五分除之得積正較此又截分數加位筭者前係整方整斜可以法減方容八角四隅即係小方中角有角面七歩多數不可以前法減退且以求方面餘方面俱差也方比斜多二毫五絲者即開方兩廉一隅多出之知餘方自乘該積二十四歩五分除四歩自乘得一十六歩餘外二廉一隅止該九分四釐九毫七絲四忽七微四繊六沙八塵三埃零五漠八三二六七一一隅自乘得九分零二毫零二忽零二繊五沙三塵五埃五渺三漠二七六五七不畫以九分五釐自乘得九分零二毫五絲多四絲七忽九微七繊四沙六塵四埃四渺六漠七二三四一不畫兩廉較九分五厘每歩多二絲五忽二微五繊三沙一塵六埃九渺四漠二一六七三不畫以兩面各四歩共八歩乘之多二毫零二忽零二繊五沙三塵五埃五渺三漠七三三八六不畫合前一隅多共二毫五絲也餘方雖係求方兩廉一隅俱全每隅多二毫五絲四出共多一方面每面
