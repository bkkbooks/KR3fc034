body:
  text: 五毫一系五忽八微折半得十步零三分六釐七毫五系七忽九微加入角面一十九步二分六釐四毫八系四忽二微得二十九步六分三釐二毫四系二忽一微以正長三十五步零五釐五毫一系八忽四微乘之得六角積一千零三十八步七分六釐九毫九系七忽零另將圓徑四十步減正長十三五步零五釐五毫一系八忽四餘四步九分四釐四毫八系一忽六微折半得弧矢二步四分七釐二毫四系零八微加弦即角面折半得十步零八分六釐八毫六系二忽五微以矢乘之得一弧矢積二十六步八分七釐一毫六系七忽三纖九沙九塵以六弧矢因之得六弧矢共積一百六十一步二分三釐零五忽二微三纖四塵併六角積合圓田積外多二忽零六角得圓積七分之六零五九四九一三約五解義因徑求角長因弧背求弧弦俱言截就法者因各有不盡之數故於沙塵微數不復再推截而就法以求大數無誤則相差忽微無礙分數亦數雉盡立法盡數之意六角七分之六不盡後雲約五因不盡故約截止以便驗也舊法斜差甚達見後辨
