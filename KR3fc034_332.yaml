body:
  text: 減原小廣得截廣二十七步增法置截本積以原差十八步乘一萬四千八百零五步原長九十步除得一百六十四步五分為實另置截長以十除得三步五分為法除實一百六十四步五分得四十七步內減原小廣得截廣二十七步截大頭法俱同梯田截廣問截長法前田小廣二十步大廣三十八步長九十步徒大頭截中廣一十七步問截長若干舊法置大廣三十八步以截廣二十七步減之餘一十一步以原差九十步乘之得九百九十步為實以原小廣大廣對減餘一十八步為法除之得截長五十五步截小頭法同梯田截長問截廣法前田小廣二十步大廣三十八步長九十步徒大頭截長五十五步問截中濶若干舊法置截長五十五步以原大小廣濶差一十八步乘之得九百九十步為實以原長九十步為法除之得濶差一十一步以減
