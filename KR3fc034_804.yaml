body:
  text: 今欲加築至上廣一尺問接高若干舊法置原高一十八尺以原上廣二尺內減今上廣一尺餘一尺乘之仍一十八尺另以原下廣六尺內減原上廣二尺餘四尺為法除之得今增高四尺五寸築牆截下廣問今高歌今有原築牆上廣二尺下廣六尺高一丈八尺今只築下廣三尺五寸問今高若干增法置原築牆高一十八尺以今下廣三尺五寸內減上廣二尺餘一尺五寸乘之得二十七尺為實另以原下廣六尺內減原上廣二尺餘四尺為法除之得今築高六尺七寸五分解義原築高一十八尺廣減四尺是廣減一尺高得四尺五寸將原高十八尺以四尺為除法得四尺五寸即每廣減一尺得高之分數上廣比今下廣止減一尺五寸一尺減四尺五寸五寸減二尺二寸五分今高止應六尺七寸五分故宜以今下廣內減原上廣作乘法為得舊法以原下廣內減今下廣餘二尺五寸為乘法得今高一十一尺二寸五分誤矣蓋二尺五寸乃今下廣截去之數非今下
