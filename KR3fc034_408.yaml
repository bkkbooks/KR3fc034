body:
  text: 者何也是弦自乘得一千六百歩每百歩中多一歩該多一十六歩或每弧矢內減去四歩只該一百八十八歩因是細半箇圓田弦長矢短故虛數多不准拙翁辨曰此即前圓歩數也圓容方內方得圓三分之二圓積二千三百五十二歩二因三歸方積該一千五百六十八歩以四十歩自乘得一千六百歩多三十二歩四弧矢得圓三分之一應內方二分之一該七百八十四歩今四弧矢共七百六十八歩少一十六歩其多少者何也正泥方五斜七之差也斜五十六歩是八個七以八乘五故得方四十歩斜七自乘四十九歩折半得方積該二十四歩五分方五自乘得二十五歩正前雲二十五歩內差多五分之説也將一千六百歩以二
