body:
  text: 者何也是弦自乘得一千六百步每百步中多一步該多一十六步或每弧矢內減去四步只該一百八十八步因是細半箇圓田弦長矢短故虛數多不准拙翁辨曰此即前圓步數也圓容方內方得圓三分之二圓積二千三百五十二步二因三歸方積該一千五百六十八步以四十步自乘得一千六百步多三十二步四弧矢得圓三分之一應內方二分之一該七百八十四步今四弧矢共七百六十八步少一十六步其多少者何也正泥方五斜七之差也斜五十六步是八個七以八乘五故得方四十步斜七自乘四十九步折半得方積該二十四步五分方五自乘得二十五步正前雲二十五步內差多五分之說也將一千六百步以二
