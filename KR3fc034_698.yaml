body:
  text: 此是八箇周中包一今有箭一方束外周三十二根問總積若干舊法置外周三十二根加內周八根共四十根以外周三十二根乘之得一千二百八十根為實以方束率十六為法除之得八十加入中心一根得總積八十一根增法置外周三十二根以八歸之得四另置內周八亦以八歸得一併外周四得五以外周四乘之得二十又將八折半得四為法以乘二十得八十加入中心一得總積八十一根又增法置外周三十二加內周八共四十另置三十二以八歸得四折半得二為法乘之得八十加中心一得總積八十一根又增通法置外周三十二根以四歸之得八再加一根得九自乘得總積八十一根外周加四共三十六自乘得一千一百九十六以十六除之得總積八十一跟
