body:
  text: 六尺乗之成三十六個八尺又將三十六尺以八尺乗之成八個三十六尺兩下皆得積二百八十八尺合併得五百七十六尺乃兩下通平之數故開方得二十四尺此二十四尺即是勾股弦均平之數三下皆由此通所以加多股之八得勾加多勾之三十六得股全加得弦增法兩多數合併自乗又以兩多各自乗減之者兩多各自乗是兩下多少本等不齊之數也八乗三十六三十六乗八兩下邊中取平之數也二數合併得四十四尺自乗數內有一個八尺自乗數一個三十六尺自乗數兩個八與三十六相乗數減去兩個自乗數止存兩個相乗邊中之數計五百七十六尺舊法同一理也如以股少弦八尺多勾二十八尺為問則將二十八尺加弦多股八尺共三十六尺以八尺乗之或以勾少弦三十六尺少股二十八尺為問則將三十六尺以二十八尺對減餘八尺與三十六尺相乗搃以弦多股多勾之數為準葢弦泛勾股得弦乃勾股聯絡之數入勾股差二十八尺筭則雖合矣勾弦較股弦較求勾股弦難題西江月今有門廳一座不知門廣高低表竿橫進使歸室爭奈門狹四尺隨即豎竿過去亦長二尺無疑兩隅斜去恰方齊請問三色各舊法置門廣如勾以多四尺為勾弦較門
