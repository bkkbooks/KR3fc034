body:
  text: 二十二兩二錢四分解義此則先乘後除法也先以共衰除實後以各衰乘之司法不若先以共衰除實得一衰之數各以分衰乘之數莟若畝餘實有零難尽宜以各衰乘折半差分法法俱挨次折半為衰二位者二一併二衰共得三衰三位者併三衰共得七衰四位者一三五六併四位共得一十五衰五位者十併五位共得三十一衰今有銀六百七十二兩令三等人折半分之問各若干舊法置總銀為實以甲乙丙併得七衰為法除實得丙該分銀九十六兩以二因得乙分銀一百九十二兩再以二因得甲分銀三百八十四兩加倍問織法今有織綃匠初日織甚次日加倍苐三日又倍苐四日
