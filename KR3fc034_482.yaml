body:
  text: 一曰弦和和謂弦與勾股和相併也如勾三十二步股六十步弦六十八步為弦和和一曰弦較較謂弦與勾股較相減也如勾三十二步股六十步相減餘二十八步以減弦六十八步餘四十步曰弦較較勾股較和相求通義一用勾股較為法得勾股和如弦六十八步自乘得四千六百二十四步加倍得九千二百四十八步減勾股較二十八步自乘七百八十二步餘八千四百六十四步平方關之得勾股和九十二步一用勾股和為法得勾股較如前倍弦實九千二百四十八步減勾股和自乘八千四百六十四步餘七百八十四步平方關之得勾股較二十八步
