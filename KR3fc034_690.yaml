body:
  text: 解義半堆周係圓週一半積亦圓堆一半故除率率一半凣數加一倍其自乗積數淂四倍半周自乗淂五百七十六尺較全周自乗止四分之一若仍以圓全率三十六除之淂一百九十二尺亦即圓堆積四分之一以半週四分之三十八為法正合圓率一半以半自乗亦以半率除淂積亦一半此天然妙合也增法用二帰者圓堆淂方倉四分之以半徑自乗淂全徑自乗四分之一全徑自乗又以高乗是四個圓堆積半徑自乗又以高乗是一個圓堆積折半乃合半堆故用二帰得積求倚壁內角堆積米法今有倚壁內角堆下週一十二尺高一十二尺問積米若干舊法置下周一十二尺自乗得一百四十四尺以高一十二尺乗之得一千七百二十八尺以內角率九除之得積一百九十二尺以斛法二五除之得米七十六石八斗增法置下周一十二尺以三歸之得四尺自乗得一十六尺以高一十二尺乗之得一百九十二尺以一歸之仍故得積一百九十二尺以斛法除之得米數又增法置下周一十二尺四因三歸得一十六尺以高一十二尺乗之得積一
