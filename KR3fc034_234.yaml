body:
  text: 今有方田四面各十五步從一邊截一直形祭三十二步計截濶四步問截長若干法置截積三十二步為實以濶四步為法除之得截長八步如以長問濶即以長除積得濶舊法前田從一角斜截勾股形積三十步問截濶即置截積三十步加倍得六十步為實以方面十五步為法除之得濶四步解義方田直曰截積易曉截直形則以長得濶以濶得長截勾股圭角等形則倍積求之因勾股等田皆本直積折半亦以倍積還源稊鈄寺回皆大小二折平求積截此寺形將原積以長乘之得平濶或以小闊問大大濶問小將平濶加減可得今有方田一丘從四圍截田十畝四面濶各十步問外方內方及原田各若干增法置截田十畝以畝法二四通之得截積二千四百步以濶十步為法除之得二百四十步內方減退四十步
