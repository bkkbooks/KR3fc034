body:
  text: 白下隱吏古齊陽丘睡足軒強恕居士李長茂拙翁肖輯著功程章此章分別築濬綜核工作辨方土之實虛較途程之往邁方長圓角欹亥尖斜發前章所未盡分合先後輕重疾遲要諸類所難齊築城問積法今有築造城堡除四門修建臺門併壅城女牆城樓等另工外計城腳外周一千零八十丈牆高三丈六尺濶一丈八尺上濶一丈四尺四隅加幫抱角臺四座每面臺二座各厚一丈下長二丈二尺上長一丈八尺今欲計積算工問共積若干增法置城腳外周長一萬零八百尺內減四門各三丈共一百二十尺又每角應減一丈八尺以四因之得
