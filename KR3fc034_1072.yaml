body:
  text: 八十盞以四十二乗得小燈一百六十八盞將大燈數七因四歸得共油三百七十八両將中燈數六因五歸得共油二百一十六両將小燈數二因三歸得共油一百一十二両若問共燈數置共油為實以併三等衰共一百四十一乗之以併三數一百七十六両五錢除之即得大中小燈共五百六十四盞四位分子母法今有大小燈四等苐一等毎五盞油九兩苐二等毎六盞油七両苐三等毎七盞油五両苐四等毎八盞油三両內三等燈比四等燈少六分之一二等燈比四等燈少七分之三一等燈比四等燈少八分之五共用油三百八十八両錢問各等燈及油各若干增法一等燈少八分之五即係八分之三二等燈少七分之三即係七分之四三等燈少六分之四
