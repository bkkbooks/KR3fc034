body:
  text: 方一步周得四步又置餘徑三倍得三步連內方共四步周得一十二步兩數相減餘八步為法除實二十四步得內方三步外餘徑三倍得九步折半得每面餘徑四步五分加內方三步得通徑一十二步解義首圖即舊難題載分數也舊未立內方餘徑較周法止言方外餘田三分餘徑各三步解法以每面三步釣圓徑一十二步諟如圖每面餘徑四步五分依然前圖分數又作何約法故立二圓考較其首圓內方餘徑均平每內方一步圓周多方週二步者內方一步餘徑亦一步連內方一步則二步方週一四淂四圓週二二淂六故多二步次圓餘徑得內方三倍圓周多方周八步者內方餘徑均平圓徑係餘徑連方寔淂二倍餘經再加一倍圓徑一圓三則圓周加淂三步再加一倍則圓周多六步以圓係餘徑淂內方三倍故較內方餘徑均平圓周多二步又加両個三步共多八步以至四倍五倍皆可類推至內方餘徑盈縮無定或餘徑多內方若干步有半或餘徑少內方若干或餘徑多內方若干倍零若干分厘或餘徑多內方若干倍不是若干分厘實餘減少內方若干步零若干分厘或餘徑少內方若干步不是若干分厘數有不齊各因內外圓方減除並分晰立圖備考
