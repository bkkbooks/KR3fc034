body:
  text: 後故以多屬甲者分物之序也以甲置末位者從生出之序列住也凡三位四位以上首位必用三因或又三因再又三而者因七位用三歸七因零雖尽不可立法故加三因以合之將首位三用一次三因則可多得一次三歸七因故三位者首必三因四位者三因又三因五位者三因又三因再又三因以上推之皆然今有銀四百九十七兩七錢令甲乙丙三人三七分之問各若干舊法置總銀四百九十七兩七錢為實列丙九乙二十一甲四十九併三位共得七十九衰為法除實得六兩三錢為一衰之數以乘甲四十九衰得甲分銀三百零八兩七錢乘乙二十一衰得乙分銀一百三十二兩三錢乘丙九衰得丙分銀五十六兩七錢四六差分法各以四為首用加五以求各衰首位四就身加五得六為苐二位又加五得九又加五得十三衰五分又加五得二十衰零二分五厘再位數多者各加五以生各衰或用四歸六因亦得二位者四六
