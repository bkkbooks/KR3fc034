body:
  text: 績一千五百六十八步合圓田三分之二另將績開方得內方四三十九步五分九厘七毫九絲七忽不盡或以斜自乗折半得績開方求方面亦便求圓內方外榮弧矢法今有圓徑五十六步內容小方問圓內方外四弧矢績及矢弦各若干增法用前斜求內方面法淂弦長法三十九步六分折半得一十九步八分自乗得三百九十二步零四厘以二十四步五分除之二毫五系乗之得多四厘另置圓徑五十六步減弦長法三十九步六分餘一十六步四分折半得矢法八步二分以乗弦長併一矢長餘徑四十七步八分得三百九十一步九分六厘加入半弦自乗所多四厘共三百九十二部與半徑自乗同卻置弦長法三十九步六分加矢長法八步二分共四十七步八分折半得二十三步九分以矢法八步二分乗之得一百九十五步九分八厘另將半徑多四厘折半
