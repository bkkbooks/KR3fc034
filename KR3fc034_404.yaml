body:
  text: 績一千五百六十八步合圓田三分之二另將績開方得內方四三十九步五分九釐七毫九絲七忽不盡或以斜自乘折半得績開方求方面亦便求圓內方外榮弧矢法今有圓徑五十六步內容小方問圓內方外四弧矢績及矢弦各若干增法用前斜求內方面法淂弦長法三十九步六分折半得一十九步八分自乘得三百九十二步零四釐以二十四步五分除之二毫五系乘之得多四釐另置圓徑五十六步減弦長法三十九步六分餘一十六步四分折半得矢法八步二分以乘弦長併一矢長餘徑四十七步八分得三百九十一步九分六釐加入半弦自乘所多四釐共三百九十二部與半徑自乘同卻置弦長法三十九步六分加矢長法八步二分共四十七步八分折半得二十三步九分以矢法八步二分乘之得一百九十五步九分八釐另將半徑多四釐折半
