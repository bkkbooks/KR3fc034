body:
  text: 圓環今有圓田中心除去圓池外餘環田外周四十八步內田求周二十四步環徑四步問積若干舊法置外周四十八步積圓併內周二十四步共七十二步折半得三十六步為實以徑四步為法乘之得環積一百四十四步又法置環徑四步以三因之得一十二步以減外周四十八步餘三十六步以徑四步乘之或將一十二步加入內周二十四步共三十六步以徑乘之俱得入法置外周四十八步自乘得二千三百零四步另以內周二十四步自乘得五百七十六步二數相減餘一千七百二十八步以圓周法十二除之亦得或以通徑十六步自乘三因四歸得圓田積另以內徑八步自乘三因四歸減內圓積得外環積亦得解義外周內周折平以徑乘即斜田二長折平以濶乘之同理又法三周弦往以減外周或加內周因圓法以六圓一每徑一步外
