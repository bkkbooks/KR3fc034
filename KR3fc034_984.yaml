body:
  text: 四戶乙等八戶丙等十五戶丁等四十一戶戊等一百二十戶問各等每戸及共米各若干更法將五等各列衰甲等定衰一萬乙等定衰八千丙等定衰六千四百丁等定衰五千一百二十戊等定衰四千零九十六卻置總米二千二百五十三斗六升為實另置甲等四戸以一萬衰因之得四萬戸乙等八戸以八千衰因之得六萬四千戸丙等一十五戸以六千四百衰乗之得九萬六千戸丁等四十一戸以五千一百二十衰乗之得二十萬零九千九百二十戸戊等一百二十戸以四千零九十六衰乗之得四十九萬一千五百二十戸併五位共九十萬零一千四百四十衰為法除實得二勺五擬為一衰之數以甲衰一萬因之得甲等每戸訣二石五斗八因得乙等每戸訣二石再八因得丙等每戸訣一石六斗再八因得丁等每戸訣一石二斗八升再八因得戊等每戸訣一石零二升四合各以戸數乗之得甲等四戸共米一十石乙等
