body:
  text: 四戶乙等八戶丙等十五戶丁等四十一戶戊等一百二十戶問各等每戶及共米各若干更法將五等各列衰甲等定衰一萬乙等定衰八千丙等定衰六千四百丁等定衰五千一百二十戊等定衰四千零九十六卻置總米二千二百五十三斗六升為實另置甲等四戶以一萬衰因之得四萬戶乙等八戶以八千衰因之得六萬四千戶丙等一十五戶以六千四百衰乘之得九萬六千戶丁等四十一戶以五千一百二十衰乘之得二十萬零九千九百二十戶戊等一百二十戶以四千零九十六衰乘之得四十九萬一千五百二十戶併五位共九十萬零一千四百四十衰為法除實得二勺五擬為一衰之數以甲衰一萬因之得甲等每戶訣二石五斗八因得乙等每戶訣二石再八因得丙等每戶訣一石六斗再八因得丁等每戶訣一石二斗八升再八因得戊等每戶訣一石零二升四合各以戶數乘之得甲等四戶共米一十石乙等
