body:
  text: 勾弦較勾股較二十八步加勾股和九十二步共一百二十折半即股勾股和九十二步減勾股較二十八步餘六十四步折半即勾股弦較八步加股弦和一百二十八步共一百三十六步折半即弦股弦和一百二十八步減股弦較八步半之即股勾弦和一百步減勾弦較三十六步半之即勾勾弦較三十六步加勾弦和一百半之即弦弦和和一百六減弦和較二十四步餘一百三十六步弦較較四十加弦較和九十六步亦一百三十六步皆半之即弦弦和較二十四步加弦和和一百六十共一百八十四步半之為勾股和弦較和九十六步減弦較較四十餘五十六步半之為勾股較反覆相通此數之可以法求也勾股求弦求股求勾歌勾股求弦各自乘相併開方弦見成勾弦求股自乘取以少減多開方主股弦求勾法相同
