body:
  text: 置四步於法之次位共五十六皆與左次啇四步相呼除實恰盡得濶二十四步加不及一十二步得長三十六步解義倍法不倍從者法是取方要兩亷俱加故用倍發縱是長多濶一定之數覌圖列次啇方二亷縱一亷槩可見矣以濶長差問長濶四因積併差自乗開方淂長濶共步以差步加減淂長濶法見直田並勾股下故不濩贅直田減積開方法今有直田積一千七百五十步只雲濶不及長一十五步問長濶各若干舊法置積一千七百五十步於盤中為實另置不及十五步扵右法位為減積初啇三十於左位下法亦置三十於右為實方法以乗減積一十五步得四百五十步以減中實餘實一千三百步卻以初啇三十與下法三十相呼三三減積九百餘積四百步就將下法三十倍作六十為亷法次啇五步於左三十之次下法亦置五步以乗減積十五步得七十五步以減中實仍餘積三百二十五步卻
