body:
  text: 百九十二尺解義半周自乗淂內角周自乗四倍全周自乗又淂半周自乗四倍是內角周自乗直積正全周積十六分之一將內角自乗以圓率三十六除之止淂圓堆積十六分之以圓內角週四分之三淂九為率即圓率四分之一以除積實邉淂圓堆積四分之一合內角積故用九為率增法用一帰者以內角週三帰徑淂四尺止全徑四分之一自乗之積淂半徑自乗四分之一淂全徑自乗十六分之一全徑自乗又以高乗是四個圓堆積半徑自乗又以高乗是一個圓堆積內角徑自乗邉淂一圓堆積四分之一故用一帰合積諸圓飛歸問米法如原法以周自乗又以高乗或以深乗再用圓率除之又以斛法除之得米今併圓率斛法作一率為法除之圓倉率以周自乗又以高乗以率三十除之得米數圓窖率以周折平自乗又以高乗以率九十除之得米數平地尖圓堆率以周自乗又以高乗以率九十除之得米數倚壁外角堆積以周自乗又以高乗以
