body:
  text: 百九十二尺解義半周自乘淂內角周自乘四倍全周自乘又淂半周自乘四倍是內角周自乘直積正全周積十六分之一將內角自乘以圓率三十六除之止淂圓堆積十六分之以圓內角周四分之三淂九為率即圓率四分之一以除積實邉淂圓堆積四分之一合內角積故用九為率增法用一歸者以內角周三歸徑淂四尺止全徑四分之一自乘之積淂半徑自乘四分之一淂全徑自乘十六分之一全徑自乘又以高乘是四個圓堆積半徑自乘又以高乘是一個圓堆積內角徑自乘邉淂一圓堆積四分之一故用一歸合積諸圓飛歸問米法如原法以周自乘又以高乘或以深乘再用圓率除之又以斛法除之得米今併圓率斛法作一率為法除之圓倉率以周自乘又以高乘以率三十除之得米數圓窖率以周折平自乘又以高乘以率九十除之得米數平地尖圓堆率以周自乘又以高乘以率九十除之得米數倚壁外角堆積以周自乘又以高乘以
