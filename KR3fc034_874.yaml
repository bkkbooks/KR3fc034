body:
  text: 解義古以四丈為一匹五丈為一端今世傛尺度不匹端亦長短不一端時較箕可也以丈尺求匹價法原有羅二丈四尺價銀一兩二錢今羅一匹長四丈問該銀若干舊法置原價銀一兩二錢以今羅四丈乘之得四十八為實以原羅二丈四尺為法除之得該銀二兩以匹求尺價法今有紗每匹四丈二尺共一十二匹零二丈六尺共價鈔二百六十五貫問每尺該鈔若干舊法置鈔二百六十五貫為實另置一十二匹以匹法四丈二尺乘之加入零二丈六尺共得五百三十尺為法除之得每尺鈔五百丈以長短濶狹問價法原有銀二十三兩議買布七十五匹每匹長四丈濶二尺今改要狹布七十五匹長四丈濶一尺六寸問應和價若干
