body:
  text: 數即上廣以二高減餘乘是自上而下之差數故如原上廣今截廣此猶方窖方臺截積典雖改臺不同築牆以截廣問今高法今有原築牆上廣二尺下廣六尺高一丈八尺今已築上廣三尺六寸問今高若干舊法置原高一十八尺以原下廣六尺內減今築上廣三尺六寸餘二尺四寸乘之得四十三尺二寸為實以原下廣六尺內減原上廣二尺餘四尺為法除之得今築高十尺零八寸築牆加高問上廣法今有原築牆上廣二尺下廣六尺高一丈八尺今欲加高二丈二尺五寸問上廣若干舊法置原下廣六尺內減原上廣二尺餘四尺另以今加高二十二尺五寸內減原高一十八尺餘四尺五寸乘之得一十八尺以原高一十八尺為法除之得一尺以減原上廣二尺餘得今上廣一尺築牆加高以廣問高法今有原築牆上廣二尺下廣六尺高一丈八尺
