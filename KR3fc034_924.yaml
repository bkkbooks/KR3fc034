body:
  text: 二八差分法法各以二為首用四因以求各衰首位二以四因二得八衰又四因八得三十二衰又四因三十二得一百二十八衰又四因一百二十八得五百一十二衰位數再多各以四因以生各衰或用二歸八因亦得不如四因捷徑如二位者二八併得十衰三位者一十二併三衰共四十二衰四位者三十二一百二十八併四衰共得一百七十衰五位者三十二一百二十八五百一十二併五衰共得六百八十二衰以上各以共衰為法除實得一衰之數以各衰乘之今有金三千兩令二等人戶二八納之問各該若干舊法置總金三千兩為實分別上戶八下戶二為法各乘原實以八乘三千兩得上戶該納二千四百兩以二乘三千兩得下戶該納六百兩
  hash: sha256:b9f73514af3d811ae00f39f522fe01b7e8bdbd7a695e409d60472940630e38c6
