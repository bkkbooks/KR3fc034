body:
  text: 如有珍珠二百六十八顆每顆價銀一兩一錢問價若干舊法置珍珠二百六十八顆為實除價首一兩只以一錢為法從末於次位加起八下位加八六下位加六二下位加二得該價二百九十四兩八錢只認本位定兩十顆上定十兩百顆上定百兩所謂加減只須認本位也解義加法首位不動即浖首位作法首位乘法自本身下位起故滋每下得術除法自本身上位起故法前得兮加法是本身故即就本位得數大約加法減法唯價係一數則物數即是價數本身可以不動價首非一數便用加石淂又如有羅二百四十六匹每匹價銀一兩二錢七分五釐問共該銀若干舊法置羅二百四十六匹為實以每匹價除價首一兩不動只以二錢七分五釐為法加之從末為六匹加起六七加四十二五六加三十二六加一十二又四七加二十八四五加二十四二加如八又二七加一十四二五加一十
