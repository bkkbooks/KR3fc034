body:
  text: 表竿外餘勾餘股求正股通高圖今有木不知高從木根量遠二十五尺立表竿一丈表後退行五尺用窺穴望表末與木末斜平人窺穴高四尺問木高若干舊法置表竿去木二十五尺為勾以表高十尺減去人目四尺餘六尺為餘股乘之得一百五十尺以退行五尺為餘勾除之得三十尺加表高十尺得木高四十尺又法置表竿去木二十五尺加退後五尺共三十尺以表高十尺減人目四尺餘六尺乘之得一百八十尺以退後五尺除之得人目以上木高三十六尺加人目四尺得木高四十尺解義用表竿測高測深則遠總不外餘勾餘股如前面引葭至岸引蒹過肱等類離未知弦長股長皆是引股作弦驗得股餘若干即是弦多股若干故即可以較求此則並未知弦多股若干故立表竿測餘勾餘股以得正勾正股入表竿退步得通勾通股其餘股容
