body:
  text: 十三盞以五分乗一百九十二得二等燈九十六盞以五分乗二百八十得三等燈一百四十盞以五分乗三百三十六得苐四等燈一百六十八盞各照等以盞數歸之油數因之得一等燈共油一百一十三両四錢二等燈共油一百一十二両三等類目共油一百両四等燈共油六十三両解義苐四等燈也上三等或六分是或七分是或八分是故浖三數互乗滿數為四等之衰苐三等以七互乗五又以八乗為衰者四等六個七八五十六三等五個七八五十六也苐二等以六互乗四又以八乗為衰者苐四等七個六八四十八苐二等四個六八四十八也苐一等以七乗三又以六乗為衰者苐四等八個六七四十二苐一等三個六七四十二也與三位皆同一加至五位六位亦然大抵各等以六分七分八分數分數則各等之數皆不外六七八互乗之數或多或少皆可類稚如以燈油衰除共油淂五分乃止淂六七八五乗之數一半上以油衰除共油淂四乃淂六分五九分七互乗之數四倍也通分子母差分法通分者通以分母約以分子也數之有盡者不必通
