body:
  text: 則乘法無由而施故變而先用乘法後用歸除或有有畸零不盡者可以法命之法有同秉異乘同除異除不等皆用先乘後除異乘同除歌異乘同除法何如原物原錢作例推先將原錢乘今物却將原物法除之圖歌此法有四隅內有一隅空異名斜乘訖同名末後除如原有米五石八斗四升賣銀四兩三錢八分今只有米一石七斗二升問該銀若干置今有米一石七斗二升以原賣銀四兩三錢八分乘之得七兩五錢三分三厘六毫為寶却以原有米五石八斗四升為法除之得該價銀一兩二錢九分
