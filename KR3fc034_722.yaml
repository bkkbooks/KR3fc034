body:
  text: 中心一根得總積九十一根增法置外周三十六根以九歸之得四亦以九歸內周九得一併外周四共五以外周四乘之得二十另以九折半得四五為率法乘之得九十加中心一得總積九十一根又法置外周加內周共四十五另以九歸外周得四折半得二為法乘之加中心亦得總積又增通法置外周以二歸之得十二加一得十三另置十二加二得十四二數相乘得一百八十二根折半得總積九十一根或三歸外周得十二加二得十四另以十二加一折半得六五乘之亦得解義三稜束是九個周中包一自內之外每層加九自外之內每層成九以九歸外周即知層數三十六是四層內外圓折併宜以四層折半得二乘之得積即第三法今以三十六乘是十八個二故因十八歸除用十八者九加倍得十八增法用四五為率九折半得四五與方圖法一理通法三歸外周以三面歸之也三角三面通分加一合一面數加二即面加尖一二層折半法也十三折半面一
