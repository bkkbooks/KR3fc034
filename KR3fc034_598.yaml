body:
  text: 二四除八百二七除一百四十共除四千九百四十步餘實八百九十二步即以左橫濶二十步亦除縱長二十步餘縱二百二十七步仍為長濶共步卻約畧餘積將二百二十七步分別長濶次啇橫四步即扵縱位除四步餘縱二百二十三步與次啇四步相呼四二除八百四二除八十四三除一十二共除八百九十二步恰盡於左位先啇二十次啇四步得濶二十四步於右法餘縱二百二十三步加後除縱二十步得長二百四十三步解義長濶共二百六十七步若啇橫三十則積不足若啇十步則積遇餘所啇之數皆一定唯易故復此發若長三十四步濶三十步長濶相和六十四步積一千零二十步約積定啇三十與餘徑三十四步除恰盡即為直濶之數矣今有直田積八百六十四步長濶共六十步問長濶各若干舊法置積八百六十四步為實以相和六十步為減縱於右先啇三十步於左以減縱六十步餘縱三十步與上啇三十步
