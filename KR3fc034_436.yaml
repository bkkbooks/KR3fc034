body:
  text: 勾股弦徑互較圖增法再以角面角長斜長勾股法考較置斜長四十步如弦自乘得一千六百步另置角正長三十五步零五厘五毫一系八忽四微自乘得一千二百二十八步八分六厘五毫九系零又置角面即弧弦一十九步二分六厘四毫八系四忽二微自乘得三百七十一步一分三厘四毫一系零併二數合斜自乘一千六百步外多六忽不尽增法此以弧矢法用矢乘餘徑興半弦自乘考較置弧弦折半得九步六分三厘二毫四系三忽一微自乘得九十二步七分八厘三毫五系三忽四微零另置圓徑四十步減矢二步四分七厘二毫四系零八微得餘徑三十七步五分二厘七毫五系九忽二微以矢乘之得九十步七分八厘三毫五系一忽八微零解義截六角中長方一假如一左田用角長如股面長如勾斜長如弦較之再以六面一面弧矢半弦自乘矢乘餘徑較之二法互較合齊乃可得角長角面清數其仍有零餘微差則截就法內備有多截之纖沙在內七若如舊法謂六角得圓七分之六則六弧矢應得圓七分之一將圓積以七歸之六弧矢應得一百七十一步四分有零今六弧矢積止一百六十一步有零不相差達甚
