body:
  text: 互乗對減右行墨餘二筆餘四價餘二錢四分以右與左互乗對減右行墨餘四筆餘八價餘四錢八分再將餘數分右左二行以右餘墨二互乗左餘筆八得一十六以左餘墨四互乗右餘筆四亦得一十六以右墨二乗左餘價四錢八分得九錢六分以左墨四乗右餘價二錢四分亦淂九錢六分將餘墨價值終無可分析矣另將墨先為法或筆先為法皆然此又不可不知又法今有硃二斤粉三斤價二両零四分又粉五斤丹六斤價六錢四分又硃三斤丹七斤價二両九錢八分問三色各價若干右硃二為法起先乗右行粉三得九空價二両零四分得六両一錢二分中空粉五得四十五丹六得五十四價六錢四分得五兩七錢六分左硃三空負九得負四十五丹七得十四得七十價二両九錢八分得二両九錢六分舊法先以右行硃二為法通乗左行丹七得一十四價二両九錢八分得五両九錢六分即以左行硃三為法通乗右行粉三得九左亦置負九價二両零四分得六両
