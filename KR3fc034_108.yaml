body:
  text: 數是百實首數是十即從實首十逆上一位是百為法首數於百前一位得令是兩降下数至實是七分次位即二厘也解義寔多法少是以每問搃故法少寔少法多是以搃問每故法多曰術令術者求數之法令者數視為令搃皆所求法首之數目也因乗是降位順退故以所問之應得者于下位宄之歸除是陞位逆進故以所問之應得者于上位定之然若乗除兼用則又當于本位定之緣用歸法則逆升一位再用乗法又願退一位邊還本位故也舊法求偉併補列于後定乗除兼用位一乗一除相兼法從本位可定如有米四百四十二石五斗每銀二兩五錢糴米三石問共銀若干置米為實以糴米三石為法除之再以二兩五錢為法乗之或先乗後除皆是一乗一除得數三六八七五此實首是百法首是畆是兩從實首百順數至畆本身即是兩身位以次逆上是十是百以次順下是錢是分乃三百六十八
