body:
  text: 數是百實首數是十即從實首十逆上一位是百為法首數於百前一位得令是兩降下數至實是七分次位即二釐也解義實多法少是以每問總故法少實少法多是以總問每故法多曰術令術者求數之法令者數視為令總皆所求法首之數目也因乘是降位順退故以所問之應得者于下位宄之歸除是升位逆進故以所問之應得者于上位定之然若乘除兼用則又當于本位定之緣用歸法則逆升一位再用乘法又願退一位邊還本位故也舊法求偉併補列于後定乘除兼用位一乘一除相兼法從本位可定如有米四百四十二石五斗每銀二兩五錢糴米三石問共銀若干置米為實以糴米三石為法除之再以二兩五錢為法乘之或先乘後除皆是一乘一除得數三六八七五此實首是百法首是畝是兩從實首百順數至畝本身即是兩身位以次逆上是十是百以次順下是錢是分乃三百六十八
