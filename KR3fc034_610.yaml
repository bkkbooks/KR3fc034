body:
  text: 解義圓淂方四分之三一方積一圓積共七分四因七歸即歸或一個四分邉合一方田四分之數故開方淂方西即圓徑又法四因積是四個方積四個圓積四圓積折三方積共七個方積用七馬隅法以七除七方田之積止存一方因之積與上一理也開立方法認啇歌一千啇十定無三萬終為三十餘九十九萬不離十百萬方為一百推初啇定首位數此言因積㝎初啇自乘再乘之數次啇用發不同啇一步積一步起至七步止皆啇一步啇二步積八步起至二十六步止啇三步積二十七步起至六十三步止啇四步積六十四步起至一百二十四步止啇五步積一百二十五步起至二百一十五步止
