body:
  text: 勾弦和求勾弦今有勾股止言股六十尺勾弦共一百尺開勾弦各若幹薦法置股六十尺自乘得三千六百尺以勾弦和共一百尺為法除之得三十六尺即勾弦較以減勾弦和一百尺餘六十四尺折半得勾三十二尺加入三十六尺得弦六十八尺又法置勾弦共一百尺自乘得一萬尺另以股六十尺自乘得三千六百尺以此減多餘六千四百尺折半得三千二百尺為實以勾弦共一百尺為法除之得勾三十二尺以減勾弦共一百尺餘得弦六十八尺解義後法以自乘成勾弦和自乘餘以勾弦和除之得勾者和自乘數內有一個勾自乘一個弦自乘兩個勾乘弦數其弦自乘數內是一個勾自乘一個股自乘數減去股自乘數止存勾自乘數合之是兩個勾自乘兩個勾弦自乘數折半止存一個勾自乘一荀勾弦自乘數勾自乘是三十二尺乘三十二尺勾弦自乘是三十二尺乘六十八尺合之共成三十二個一百尺故以勾弦共一百尺為法除之得勾三十二尺以股弦和求股亦為
