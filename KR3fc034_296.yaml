body:
  text: 徑占今有圓田內截方塘餘徑得內方面方盈一倍有半多一步一分一釐八毫五不足絲圓周多方周一百六十步零二分帶分釐圖七釐八毫問內方餘徑各若干增法置餘徑多一步一分一釐八毫五絲以圓周三因之得三步三分五釐五毫五絲以減圓周多一百六十步零二分七釐八毫餘一百五十六步九分二釐二毫五絲為實另將內方一倍以方周四因得四步餘徑一倍有半該一步五分連內方共二步五分以圓周三因得七步五分與內方四步對減餘三步五分為法除實一百五十六步九分二釐二毫五絲得內方面四十四步八分三釐五毫外餘徑倍半該六十七步二分五釐二毫五絲加入多一步一分一釐八毫五絲得餘徑六十八步三分七釐一毫折半得每面餘徑三十四步一分八釐五毫五絲共
