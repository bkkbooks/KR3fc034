body:
  text: 內無餘碗請君布筭莫差爭舊法以二人乗三人得人又以四人乗之得二十四人以乗總碗六十五隻得一千五百六十為實另列三數維乗以二人乗三人得六以二人乗四人得八又以三人乗四人得一十二併之得二十六為法除實得共客六十人各以二歸得飯碗三十隻三歸得羹碗二十隻四歸得肉碗十隻解義上二位此三位二位者以二位相乗為平數三位者以三位互乗為平數如二三四遁乗淂二十四為三數合一之數將二十四以四歸淂肉碗六個三歸淂羹碗八個二歸淂飯碗十二個是二十四人只用羹肉碗二十六個人淂二十六分之二十四故將搃碗二十四乗二十六除淂人數優將搃人數二十六乗二十四除淂碗數也難題管套取齊歌八萬三千短竹竿將來要把筆頭安管三套五為期定問君多少配成完此言共有短竹八萬三千竿毎一竿截作筆管三個毎一竿截作筆套五個問各該用竹若干截配若干舊法置竹八萬三千竿為實以管三套五併作八為法除之得一萬零三百七十五另
