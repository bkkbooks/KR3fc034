body:
  text: 解義因比上毎人出銀若干多八人九人之不等湏又多法一屬前人劉氏通明吳氏比類增法名曰雙套人率雲毎八人毎九人則人數必在八九會通數內故用八九相乗淂七十二人以合會通之數卻又以八乗出六両淂四十八是八個九人共七十二人出八個六両共四十八両以九乗出七両淂六十三是九個八人共七十二人出九個七両共六十三両両數對減差十五両原盈不足共七両五錢止十五両一半人必是七十二人一半銀亦必是六十三両一半內多四両五錢四十八両一半內少三両故增法以十五両為法除合併盈不足淂數以乗人數銀數無不皆合其以六十三四十六對減為法猶以出率相減為法也舊法以四十八六十三互乗盈四両五錢不足三両仍是出率互乗盈不足本法也但固多八人九人互乗出率一餘將出率乗作四十八両六十三両又即用互乗盈不足是盈不足俱乗作八九七十二分為物寔用四十八六十三對減為法亦是八九乗出七十二分對減為法故將盈不足共七両五錢亦用七十二乗之法實俱是七十二分相乗相除與單套法搃一理也雙套兩盈兩不足匿價法今有人買物毎六人出銀九両多銀三両毎四人出銀七兩多銀六両問人數物價各若干舊法左右置位分列
