body:
  text: 若餘數不折半即得倍積梯田下倍積求長濶之法本此求斜日同今有斜田長三十二步小廣四步大廣一十二步從斜邊截積五十步問截長截濶各若干舊法置截積加倍得一百步以原長三十二步乘之得三千二百步為實以大濶減小闊餘八步為法除之得四百步用開平方法除之得截長二十步又以濶差八步乘之得一百六十步以原長三十二步除之得截濶五步增法如先求濶即置倍積一百步另將濶差八步以原長三十二步除之得二分五釐以乘倍積一百步得二十五步用開平方法除之得截濶五步將五步以濶差除原長得四步乘之得截長二十步解義梯截勾股濶差用半斜截勾股用全者梯差在二面斜差在一面也積截或大頭小頭皆同梯法故不再
  hash: sha256:295ce691eaa7c83c6ba792d1ebac03c3af4ed1a9f2f962913433e2e8a975dcb2
