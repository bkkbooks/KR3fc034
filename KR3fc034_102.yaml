body:
  text: 為實人為法或以總物總數為實以分物分數為法或以分物分數為實總物總數為法或一實二法如一實而用一法除之又用一法乘之是也或二實一法如人物或銀物各實以法除人實得人除物實得物除銀實得銀除物實得物是也或分實分法如物有貴賤輕重不同兩邊互乘對減以貴與重為實為法得賤與輕者以賤與輕為實為法得貴與重者是也或疊實疊法如所問多位參差不齊互乘對減得各物平法以乘實位又得每物平法以乘物實得物數乘價實得價數是也各因所問以定法實未可拘一乘除定位歌數家定位法為竒因乘俱向下位齊歸除另須尋上位上下總從本位推法多實逆上法位前得令順下冝法
