body:
  text: 為實人為法或以縂物縂數為實以分物分數為法或以分物分數為實縂物縂數為法或一實二法如一實而用一法除之又用一法乗之是也或二實一法如人物或銀物各實以法除人實得人除物實得物除銀實得銀除物實得物是也或分實分法如物有貴賤輕重不同兩邊互乗對減以貴與重為實為法得賤與輕者以賤與輕為實為法得貴與重者是也或叠實叠法如所問多位參差不齊互乗對減得各物平法以乗實位又得每物平法以乗物實得物數乗價實得價數是也各因所問以定法實未可拘一乗除定位歌數家定位法為竒因乗俱向下位齊歸除另湏尋上位上下縂從本位推法多實逆上法位前得令順下冝法
