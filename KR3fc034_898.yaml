body:
  text: 兩為實另置各年月日如兩求斤法趙一計四年十一個月二十一日先將二十一日以三歸得七置十一月之次又將十一月併下七以十二除併月如年得四九七五以乘原本三十兩通得一百四十九兩二錢五分錢二計三年八個月一十五日將一十五日以三歸得五置八月之次共八五又以十二除八五得七零八三三不尽置年之次共得三七隔位八三三不尽以乘原本五十兩通得一百八十五兩四錢一分六厘六六不尽孫三計二年四個月一十二日將一十二日以三歸得四併月共四四又以十二除四四併年共得三三六六不尽以乘原本七十兩通得一百六十五兩六錢六分六厘六六不尽李四計一年二個月零三日先以三歸三日得一併入月共二一又以十二除二一併入年共得一一七五以乘原本九十兩通得一百零五兩七錢五分併四數共六百零二兩零八分三厘三毫三三不尽為法除實一百二十兩得一錢九分七厘九毫九絲二忽六微不尽乃每年每兩之利也就以此又為法以乘各人通得之數乘趙
