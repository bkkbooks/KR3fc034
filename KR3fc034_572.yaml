body:
  text: 五萬四千七百五十六步於盤中為實見實五萬約啇二百於左亦置二百於右為下法左右相呼二二除實四萬步餘實一萬四千七百五十六步即以右法二百步倍之得四百步為亷法歸除之呼四一二十二逢四進一十得次啇三十步就置三十步於右法四百之下相呼三三除實九百步餘實一千八百五十六步又將右法三十步倍之得六十步共四百六十步為法歸除之呼四一二十二逢八進二十得三啇四步亦置四步於右法六十步之下相呼四六除實二百四十步又呼四四除實一十六步恰盡以左上所啇得方西二百三十四步解義歸除開方與啇除一理共用倍亷為法歸除即同以倍亷與次啇呼除故歸除之後直以次啇隅法相呼不用倍亷呼除也若倍有二位如四百六十四作歸除止用一位六十次啇呼除然若於歸除特將併六十除去則後止用隅法相呼除一理也啇除本位開方法歌啇位開方法尤糒不用亷一隅稱初啇自
