body:
  text: 接勾股長若干增法置上廣下廣對減餘十步以除斜長四步得四步以乘上闊八步得勾股尖長三十二步如以通長夏闊從上尖截三十二步問上廣即置下廣一十八步以通長七十二步除之得二分五厘為法乘上尖三十二步得中廣八步如以尖長中廣問下斜田長及下廣即置中廣八步以尖長三十二步除之得二分五厘置尖長三十二步以中廣八步除之得四步為法以尖長中廣並下廣問斜長即將下廣一十八步減上廣餘十步以四因之得斜長四十步問下廣將斜長四十步以二分五厘乘之得十步加中廣八步得下廣一十八步下問尖長中廣斜長下廣將通長大十步以下廣三十二步除之得一步八分七厘五毫以四乘之得七步五分是濶差四步長七步五分又將濶三十二步以六十步除之得五分三厘三毫不盡以三通之得一步六分是長三步濶差一步六分問尖長則將中廣八步以七步五分
