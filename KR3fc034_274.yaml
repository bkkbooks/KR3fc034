body:
  text: 半亦自乘得數用減半徑積剩積開方見餘徑以減半徑餘即矢今有圓田不言截積步若干止言中徑二十六步從一邊截弦長二十四步問截矢濶若干舊法置中徑二十六步折半得一十三步自乘得一百六十九步為實另以弦二十四步折半得一十二步自乘得一百四十四步以減實一百六十九步餘實二十五步用開平方法除之得五步以減半徑一十三步餘得截矢八步又法置全徑自乘得六百七十六步為實另以全弦自乘得五百七十六步減之餘一百步用開平方法除之得十步以減全徑二十六步餘一十六步折半得截矢八步解義前徑矢求弦是以股積減弦積餘得勾此徑弦求矢是以勾積減弦積餘得股股乃半徑減去矢之餘徑即下法所雲離徑也如以徑與弧弦問矢離中徑若干即餘積開方所得若是舊法復利求離徑法即上求矢之法故不復贅圓田弦矢求圓徑併離徑歌弦矢可將圓徑推半弦自乘矢除之
