body:
  text: 倉應納八百四十二石四斗以四斗二升一合乘得南倉應納一千五百一十五石六斗以三斗四升五合乘得西倉應納一千二百四十二石分限納稅法今有夏稅麥二百七十四石三限催徵初限五分中限三分半末限一分半問各限該納若干舊法置夏麥二百七十四石為實以五分乘得初限一百三十七石以三分半乘得中限九十五石九斗以一分半乘得末限四十一石一斗照糧應後法今有甲乙丙以糧多寡夥克一年差役甲糧三石五斗乙糧二石五斗丙糧二石問各該值月若干舊法置一年計三百六十日為實併甲乙丙三人糧共八石為法除之得每石應值役四十五日以乘各人糧數得甲該五個月零七日半乙該三個月二十二日半丙該三個月
