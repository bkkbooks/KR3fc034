body:
  text: 解義此用勾股法也半徑即弦半徑減矢淂餘徑即股半弧弦即勾以半徑減去矢自乘得積以減半徑自乘之積餘積開方得勾乃以股積減弦積止存一勾積故開方得勾解詳勾股章又法乃加倍法全徑是半徑兩倍全徑成倍矢餘十步亦股兩倍餘積開方得全弦亦即勾兩倍一理也又圓田徑矢求截弦歌徑矢求弦法最良以矢減徑存餘長復用矢濶乘為實開方倍之弦可詳今有圓田不言截積步若干止言中徑二十六步從一邊截矢八步問截弦若干舊法置圓徑二十六步減矢八步餘一十八步以矢八步乘之得一百四十四步以開平方法除之得一十二步倍之得弧弦二十四步解義矢乘餘徑與半弦自乘之數相合故以矢減徑復以矢乘之開方淂半弦加倍即全弦也圓田徑弦求截矢歌圓徑與弦求截失半徑自乘積數推弧弦折
