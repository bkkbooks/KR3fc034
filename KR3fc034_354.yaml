body:
  text: 八寸乘之得一十九尺二寸為實以通長一十二尺為法除之得中廣一尺六寸梯求圭尖法前圭梯上廣一尺六寸下廣一十二尺八寸梯長十尺零五寸問圭尖長若干舊法置上廣一尺六寸以梯長十尺零五寸乘之得一十六尺八寸為實另將下廣一十二尺八寸減上廣一尺六寸餘差一十一尺二寸為法除之得圭尖長一尺五寸圭求梯長法前圭梯尖長一尺五寸中廣一尺六寸下廣一十二尺八寸問梯長若干舊法置下廣一十二尺八寸減去上廣一尺六寸餘一十一尺二寸以圭長一尺五寸乘之得一十六尺八寸為實以上廣一尺六寸為法除之得梯長十尺五寸圭求梯下廣法前圭梯通長一十二尺圭尖長一尺五寸上廣一尺六寸問梯下廣若干舊法置通長一十二尺以上廣一尺六寸乘之得一十九尺二寸為
