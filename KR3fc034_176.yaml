body:
  text: 又如有金八十九兩三錢八分令金戶一百零九人辦納問每人該納若干舊法置金八十九兩三錢八分為實以金戶一百零九人除首位一不用只以九人為法定身隔位除之實首是八隔位八九除七十二次位九除七餘二又次位三除二餘一末位八在浖次位身二不動隔位除二九一十八除實恰盡得每戶該約金八錢二分解義上挨身成此開位减除法遇隔位在本身苐四位减法在苐三位各有不同减法難云本身不動若减除不是湏破身就减絹法二位除二餘七下位四與七可除又將本身七去一餘六下住除六來法寔首一千下位空無除浖一退下作十留六下位除六七四十二頭緒多紛不如除法之便附金蚲胲殻訣歌其雙下加倍見一只還原倍一挨身下餘皆隔位邊此法不用乗除只以此歌二十字代之
