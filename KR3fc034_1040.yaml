body:
  text: 右上麝六錢互乗左中貝價一百二十五錢得五百錢以左上四十五錢互乗右中貝母二千四百錢得十萬零八千以少減多餘十萬零七千五百為法次以右上四錢互乗左下共價九千六百二十五錢得三萬八千五百以左上四十五錢互乗右下共五萬五十八百錢得二百五十一萬一千以少減多餘二百四十七萬二千五百為實以法除之得貝母併價平法二十三以三斤乗之得貝母六十九斤以價二両五錢乗之得貝母價五十七両五錢另以右中二千四百互乗左下得二千三百一十以左中一百二十五互乗右下得六百九十五萬七千以少減多餘一千六百一十二萬五千為實亦以法十萬零七千五百除之得麝併價平法一百五十以八分乗之得麝十二兩以九錢乗之得麝價一百三十五両解義上是三位此是五位各物斤両錢分各不等故加錢退斤各成両或加分退斤各成錢各求淂本數也然呈法或用加倍或用五倍五綇乗除求淂價物平沃則仍以本寺或斤或錢或分乗之者主法加則俱加如合準差分任有加增仍淂本等分數也
