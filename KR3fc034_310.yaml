body:
  text: 同多六步環徑四步外周多內周上六二十四步將徑用六數之半以三因之得多數一半以減外周便減去所多一半以加內周便補入所少一半亦內外折平之法也又法外周自乘減去內周自乘以十二陰之者圓田外周自乘以十二除之可淂全積減去內周自乘即減內圓止剩外環數故以十二除之邊淂環積即圓田以周問積法也環田周徑相求法以周問徑今有環田外周四十八步內周二十四步問徑若干舊法置外周四十八步以內周二十四步減之餘二十四步以圓法六除之得徑四步以徑與內周問外周舊法置徑四步以六因之得二十四步加入內周得外周四十八步以徑與外周問內周置徑以六因之得二十四步以減外周餘得內周二十四步難題二周相和併積問經周歌一假環田徑不知二周相併事幽徵共計一百六十步田積一畝無零餘三般可以見端的二周一徑莫差池
