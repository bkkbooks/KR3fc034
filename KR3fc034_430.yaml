body:
  text: 忽二微四纖七沙四塵六埃一渺八漠不畫解義上是以角面七步求餘方通方不是十七步此是以餘方五步求角面通方十七步有零上圖八角中假積與兩旁共積均平且漠佐以下兩旁積較中假微多者乃角面求位二四四截作二五中旁角面餘方各乘截就多數微有參差也然所差俱在漠位以下此無病相較大數漠後仍加的五位立筽者以此故也圓方方容圭較斜方圖今有圓內容方方內容四圭圓徑五十六步問圭長及中徑並積若干增法置方斜即圓徑五十六步折半得圭斜二十六步自乘得七百八十四步折半得三百九十二步以開平方法求之得圭徑法一十九步八分加倍得圭濶法三十九步六分相乘得七百八十四步零八釐仍用二十四步五分除之二毫五絲乘之減去差多八釐餘折半得一圭積三百九十二步每一圭得兩方四分之一得圓六分之一得一弧垁三
