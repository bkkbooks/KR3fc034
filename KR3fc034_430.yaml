body:
  text: 忽二微四繊七沙四塵六埃一渺八漠不畫觧義上是以角面七歩求餘方通方不是十七歩此是以餘方五歩求角面通方十七歩有零上圖八角中叚積與兩旁共積均平且漠佐以下兩旁積較中叚微多者乃角面求位二四四截作二五中旁角面餘方各乘截就多數微有參差也然所差俱在漠位以下此無病相較大數漠後仍加的五位立筽者以此故也圓方方容圭較斜方圖今有圓內容方方內容四圭圓徑五十六歩問圭長及中徑並積若干增法置方斜即圓徑五十六歩折半得圭斜二十六歩自乘得七百八十四歩折半得三百九十二歩以開平方法求之得圭徑法一十九歩八分加倍得圭濶法三十九歩六分相乘得七百八十四歩零八釐仍用二十四歩五分除之二毫五絲乘之減去差多八釐餘折半得一圭積三百九十二歩每一圭得兩方四分之一得圓六分之一得一弧垁三
