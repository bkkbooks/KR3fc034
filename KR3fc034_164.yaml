body:
  text: 以連利維乗為法除之若問每次損折如云初次每三兩除用止存二兩二次每四兩除用止存三兩三次每五兩除用止存四兩以原銀問現存銀即置原銀六十兩以止存二兩三兩四兩維乗乗之得一千四百四十兩為實以每銀三兩四兩五兩維乗得六十兩為法除實得現存銀二十四兩後鎔鐵三次入爐即此法解義問連利本法應置本銀六十兩以初次每銀二兩除之得三十兩以連利三兩乗之得初次本利銀就是兩二次以每銀三兩除九十兩得三十兩以連利四兩乗之得二次本利銀一百二十兩三次以每銀四兩除一百二十兩得三十兩以連利五兩乗之得三次本利銀一百五十兩亦是一除以乗先除後乗維乗維除與前通乗通除皆一理步外先乗後除問厘每銀是母連利是子問折每銀是母止存是子皆是子乗母除子母通分乗除法謂如數有畸零即以畸零分總數通徹乗除此為以
