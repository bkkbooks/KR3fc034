body:
  text: 解義方束是八個圓中包一自內之外每層加八自外之內每層減八以八歸外周即知層數如外周三十二是四八即是以層外層內層共四十二層三層亦共四十外周加內周者折平之法也將二層折併一層法應以四層折半淂二乘之合積今以三十二乘之以八十歸之便是十六個後數用十六係之十六者八加倍為法也外周多一八即多一層每二層折併作一即是多半層淂五分以五除八淂一十六故用十六為法如外周三十而是四層折半淂二層以二除三十二淂一十六若減一八淂外周三八二十四是三層折半得一層半以一五除二十四亦是一十六若外周四十是三層折半得二層半以二五除四十亦淂一十六進堆為減兩下皆然此率之不可易也增法將外周內周俱以八歸相併淂五以外周四乘之前法一也前法以一為一併內外周以外周乘淂積十六倍故以十六為率除之後法以八為一併內外周八分之以外周八分之一乘淂積四分之一故以四為率乘之十六為率八加倍四為率者八折半也前法是有餘故用除法後法是不是故用乘法一理也又法外周以八歸淂層數折半為法乘內外周相併之數此正法也前二法皆不外各法乘除加中心一合積以一不在八數內也又還法將外周以四歸者以四西歸之也淂數又知一者以四歸外周每西各分一角加入一根乃合二角淂一方西全數故自乘即淂總積也又法外周加四合圓田周法也釋見下
