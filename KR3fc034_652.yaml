body:
  text: 次位就於下法置初次啇共一百四十在成得一萬九千六百又置初次共啇一百四十以初啇一百乗之得一萬四千又置初啇一百自乗得一萬併三數共四萬三千六百以次啇四十乗之得一百七十四萬四千除實訖餘積二十四萬一千九百八十四尺再啇四尺於左初次啇一百四十之下亦置四尺於下法共一百四十四尺自乗得二萬零七百三十六尺又置初次三啇一百四十四尺以初次啇一百四十尺乗之得二萬零一百六十尺又置初次啇共一百四十尺自乗得一萬九千六百併三数共六萬零四百九十六尺以三啇四尺乗之得二十四萬一千九百八十四尺除實恰盡得週一百四十四尺解義問周將積以四十八乗之者一個圓周係三個圓徑即三個方西以三個方西自乗橫豎皆三個淂九個平方再以三個方西乗之高俱三個每一個平方因作三個立方共三九二十七個立方立圓得立方十六分之九將二十七以一十六因之得四百三十二以九帰之得四十八是四十八箇立圓積合二十七個立積故以四十八乗立圓積淂二百九十八萬五千九百八十四尺百七
  hash: sha256:8e07a41431382a41c0acebb5c26e55250a3b198b8dce70840e5a2b43370cc5bd
