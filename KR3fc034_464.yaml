body:
  text: 之多則所差忽微必積少成著便將前法再為減損推合加位布算如角正長得尖長八分七釐六毫三絲七忽九微五織九沙一塵五埃五渺六漠二九角面得弧背九分六釐三毫二絲四忽二微零四沙九塵五埃四渺六漠二八則步數雖長所差止在微細終無差於大數此在因步多寡而約量截就用之耳乃不悟者或以數零位多不便為疑試思算位設至塵埃渺忽以至虛空清淨夫何為乎政因數多零餘立此多位推晰思及此亦可豁然無疑於其説矣直容弧矢圖今有直田長五十六步濶二十八步內容弧矢問弧矢積餘積各若干舊法置直田長濶相乘得積一千五百六十八步另置弦加矢折半以矢乘之得弧矢積一千一百七十六
