body:
  text: 中正牛一負羊三淂負六正豬一淂正二空適足左負牛五正羊六淂正十二正豬八淂正十六負三両淂六両舊法以賣為正以買為負以多剩為正以少為負先以右行牛正二為法通乗中行羊負三得負六豬正一得正二適足空即以中行牛正一為法通乗右行羊正五得正五異加中行羊負六共得羊負十一乗豬負十三得負十三異加中行豬正二共得豬正十五乗價正五両得五両次以右行牛正二為法通乗左行羊正六得正十二豬正八得正十六負三両得負六両即以左行牛負五為法通乗右行羊正五得羊正二十五同名加左羊正十二共得三十七乗豬負十三得豬負六十五異減左行豬正十六餘得豬負四十九乗剩七文得二十五両異減左行負六両餘得一十九両再將乗得之數分列二位左右羊十三十七
