body:
  text: 十五步除之得六十四步以五分乘之得三十二步此即方自乘多數也弦差長則矢差短故每弧矢少四步四弧矢共少一十六步將內方兩多三十二步折半得一十六步以四弧矢歸之每弧矢加補四步乃合正積猶前法半弦自乘兩多之數折半補一弧矢合積全弦自乘兩多之數折半補四弧矢合積一理法謂多十六步乃內方及弧矢合筽比圓田積少十六步其實方積差多三十二步不止十六步也弧矢積尚少十六步乃欲於每弧矢去舟四步合數豈不悮後學哉以此思之知方五斜七乃古人立法之大槩膠柱刻舟失不攻自破矣又謂細半弧矢丨短弦長數不准將弧矢一法止可筽半圓遍此則無用矣又何用立弧矢法乎
