body:
  text: 解義三廣四或大廣居中如南廣二十六步北廣一十八步中廣五十四步典前法同筭然湏中濶居正長之中兩頭相去均停乃可以三廣發筭蓋兩頭廣雖大小不一而去中抣停則可以三廣縱平火大廣長小廣短則積差少大廣短小廣長則積差多湏截二段作二梯田筭為得通長六十歩今有並梯田中濶三十步兩頭去中抣停廣各二十步問積若干增法置長六十步另以中廣三十步加兩頭廣通止作二十步共五十步折半得二十五步乗長六十步得解義此兩頭廣同不用再折故只用二廣訣四廣用四烯同旡兩場同與不同皆可用此今有長廣各異並梯田南廣三十二步北廣四十四步中廣五十二步通長六十步內中濶至南廣二十步中廣至北廣四十步問積若干舊法置南濶三十
