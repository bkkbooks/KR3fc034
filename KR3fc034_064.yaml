  text: 物或列多等貴賤輕重多寡近參差不須因數别等隨差立法故衰分章次之著多位參差等分桗或多或寡魚盈兼歉法問彼此立形區數待椎有同射覆算至此鈎深索隱研幾通至矣書矣故以區覆章終馬外著諸家多有發明正法未尚者類分列各章以便考重者不録别有算則附録九章之末
