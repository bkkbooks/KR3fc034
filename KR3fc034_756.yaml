body:
  text: 下周四十二個高六層問積物若干增法置上周以六歸得四個半倍之得九個加一共十個自乗得一百個另置下周以六歸倍之加一共十三個自乗得二百二十五個又以上一乗下十五得一百五十個併三數共四百七十五個再將高六層折半得三個加入共四百七十八個以高六層乗之得二千八百六十八個以四歸之得積七百一十七個圓半垜上下周皆有半六求積法今有圓半垜物上周二十七個下周三十三個高三層問積物若干增法置上周以六歸得四個半加倍再添一共十個自乗得一百個另置下周以六歸得五個半加倍添一共一十二個自乗得一百四十四個又以上十乗下十二得一百二十個併三數共三百六十四個再將高三層折半得一個半加入共三百六十五個半以高三層乗之得一千零九十六個半用四歸
