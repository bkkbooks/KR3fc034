body:
  text: 七十二尺二共減一百九十二尺餘一萬零六百零八尺為下長再以上濶一十四尺減下濶一十八尺餘四尺減之餘一萬零六百零四尺為上長卻倍上長加入下長共三萬一千八百一十六尺以上濶一十四尺乘之得四十四萬五千四百二十四尺另倍下長加入上長共三萬一千八百二十尺以下濶一十八尺乘之得五十七萬二千七百六十尺併二數共一百零一萬八千一百八十四尺以高三十六尺乘之得三千六百六十五萬四千六百二十四尺以六歸之得六百一十萬零九千一百零四尺再另置抱角臺下長二十二尺每角二面共四十四尺內減折角十尺餘三十四尺以四角因之得一百三十六尺又置每面臺下長二十二尺以四面臺共八座乘之得一百七十六尺併之共三百一十二尺又置抱角臺四四面臺八共一十二以下長二十二尺內減上長一十八尺餘四尺乘之得四十八尺折半得二十四尺以減三百一十二尺餘二百八十八尺以厚十尺乘之得二千八百八十尺又以高三十六尺乘之得十萬零三千六百八十尺併上六百
