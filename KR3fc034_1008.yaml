body:
  text: 價物分明皆得全總內減賤餘為貴如先求貴賤乗先依法求之貴先見總內減貴賤亦傳今有錢四千九百九十五文共買梨桃五千個只雲毎錢一十一文買梨九個每錢四文買桃七個問梨桃及價各若干舊法將價物左右分列右梨九個左錢十一互桃七個淂七十七錢四文淂三十六共梨桃五千個淂五萬五千共綬四千九百九十五淂四萬四千九百五十五先以右上梨九互乗左中錢四淂三十六次以左上錢十一互乗右中桃七淂七十七二數對減餘四十一為總法又以右上貴物梨九互乗左下總價四千九百九十五文得四萬四千九百五十五次以左上貴價十一互乗右下總梨桃物五千個得五萬五千二數相減餘一萬零四十五為實以總法四十一餘之得二百四十五為賤物賤價平法以桃七個乗之得桃一千七百一十五個以錢
