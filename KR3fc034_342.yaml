body:
  text: 一半也增法六即前截大頭小頭法但橫截是分為二梯仍有兩頭大小二濶自乘相減餘數以長乘差除得倍積故用梯選源法求之豎截有下濶無上濶即以濶自乘再用長乘差除六得倍積故將倍積以差乘長除餘數開方即濶即用圭勺股還源法也法見圭田下今有斜田長三十二步大濶一十二步小濶四步問積若干舊法置長三十二步為實以二濶相併折半八步為法除之得積二百五十六步增法置大濶一十二步自乘得一百四十四步又置小濶四步自乘得一十大步二數相減餘一百二十八步折半得六十四步為實另將長三十二步以大濶小闊相減餘八步為濶差除之得四步以乘實六十四步得積二百五十六步解義斜田梯田同理增法大濶小闊各自乘相減餘數折半用濶差除長得四步乘之得積即將折半餘數以長乘以濶差除得積
