body:
  text: 步九分五釐積數仍多二毫五絲即以此為法減自乘積差以合原積等類是也相差遠者加位以求其合縱分晰難盡務減損至微期與本數不謬猶曆家萬分為度雖有小差不出一度之中如圓容六角六角容圓七分之六不合則加分釐毫絲以合之是也若必以數多散漫為疑一槩拘以成格是強數就法非以法推數究之舛錯巳甚又何以為數之準乎且算家設絲忽微纖等為正以推究無盡之數使數位不宜多加則絲忽等可不立矣至圓發徑一周三雖雲周三有奇然以之求圓數無差失易曰天圓圖三三天數也故算曆不外一三為則此無俟紛鑒以滋頻碎故仍以古法為正蓋差必不合了則無差圓法徑周縱有微差亦同圓與六角雖微差難盡究與本積無戾也
