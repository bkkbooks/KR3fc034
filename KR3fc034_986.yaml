body:
  text: 八戶共米一十六石丙等一十五戶共米二十四石丁等四十一戶共米五十二石四斗八升戊等一百二十戶共米一百二十二石八斗八升難題四容分絲歌三百六十九斤絲出錢四客要分之原本皆是八折出奠教一客少此兒舊法置絲三百六十九斤為實另列置甲丙一千九一八百六百四十丁五百一十二併四位共二千九百五十二衰為法除實得一二五為一衰之數以各衰乘之以一千衰乘得甲訣一百二十五斤以八百衰乘得乙訣一百斤以六百四十衰乘得丙訣八十斤以五百一十二衰乘得丁訣六十四斤解義將所除一衰之數不言斤兩錢分止雲一二五者因原實是斤斤下十六所始為一斤故止以一二五分數約之若將原實用加六法破斤為兩共得五千九百零四兩以共衰除之得二兩為一衰之數一二五者即斤法二著一二五即二兩也難題八陳相生歌諸葛統領八員將每將又分八個營每營裏面排八
