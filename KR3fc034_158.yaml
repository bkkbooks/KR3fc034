body:
  text: 倍乗法数湏本方推求如物積上方一半湏加倍為實開方以得本数如勾股圭斜求長求濶法是也加倍再加倍法如後折半差分各数加倍不等合諸数除縂得其最少数以漸加倍得其倍数是也折半再折半即同上法先得多数以次折半而得少数自乗再自乗法九原法自乗之数再以原法乗之為再乗法自乗之数再用自乗㪽淂之数與三乗之数同如二自乗得四四自乗得十六此是自乗再自乗二自乗得四二再乗四得八二又乗八得十六此是三乗二数相同後法錢一文日増一倍倍至三十日問本利其法以六度三十二乗得本利数用三度三十二乗得数自乗亦得正以自乗之数
