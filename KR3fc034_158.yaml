body:
  text: 倍乘法數須本方推求如物積上方一半須加倍為實開方以得本數如勾股圭斜求長求濶法是也加倍再加倍法如後折半差分各數加倍不等合諸數除總得其最少數以漸加倍得其倍數是也折半再折半即同上法先得多數以次折半而得少數自乘再自乘法九原法自乘之數再以原法乘之為再乘法自乘之數再用自乘㪽淂之數與三乘之數同如二自乘得四四自乘得十六此是自乘再自乘二自乘得四二再乘四得八二又乘八得十六此是三乘二數相同後法錢一文日增一倍倍至三十日問本利其法以六度三十二乘得本利數用三度三十二乘得數自乘亦得正以自乘之數
