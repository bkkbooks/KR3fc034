body:
  text: 以一五乗亦然千文百鷄價十倍於均然千文百個數果齊同與百文員百物同故不另贅又按雄鷄十二隻母鷄四隻小鷄八十四隻亦千文百鷄又雄隻四隻母鷄一十八隻小鷄七十八隻亦千文百鷄三位價物不等相和差分法今有上菓毎九個錢一十一文中菓毎六個錢五文下菓毎七個錢四文共用錢一千三百五十文買上中下菓一千四百三十八個只雲下菓淂價上中菓共價四分之一多錢一十二文半下菓比中菓二倍仍多三十四菓問上中下菓及價各若干增法置共價一千三百五十文另列上中價四分下菓價之一共五為法除之得二百七十又置多錢十二文半以四分因之得五十以共五分艜之得一十併入二百七十得下菓價二百八十文以下菓七個因之以價四文歸之得下菓四百九十個即將四百九十以二倍歸之得二百四十五另將多菓三十四亦以二倍歸之得一十七以減二百四十五得
