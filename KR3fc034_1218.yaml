body:
  text: 乗左少銀三両得三両左牛五乗中空此是一不足一適足無合亦無減再又變作羊為法三行各有多少置列左正羊五正牛二負豬十三剩銀五両中右負羊四正羊六正牛一負牛五正豬三正豬八剩銀五錢少銀三両先以右正羊五中負羊四為法互乗此是一正一負為法右正羊五乗中正牛一得五中負羊四乗右正牛二得八合併五與八得十三此是二正一正一負為法過二疋合併又右正羊五乗中正豬三得一十五中負羊四乗右負豬十三得五十二兩下對減去中一十五得右餘三十七此是一正一負凣一正一負為法過一正一負則對減又右正羊五乗中剩銀五錢得二両五錢中負羊四乗石剩銀五両得二十両合併得二十二両五錢此是両邊俱餘剩凣一正一負為法過両邊俱餘用合併両不足亦同以牛合併得十三計之該價銀七十八両以豬對減餘三十七計之價銀五十五両五錢牛價比豬價正多二十二両五錢次以右正羊五左正羊六為法互乗此是二正為法右正羊五乗左負牛五得二十五左正羊六乗右正牛一得一十二合併
