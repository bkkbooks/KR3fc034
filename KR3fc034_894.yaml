body:
  text: 銀三十兩利出本銀四十兩貞出本銀五十兩共本一百四十兩至年終共得利銀七十五兩六錢問各該利銀若干舊法置利銀七十五兩六錢為實以共本一百四十兩為法除之得五錢四分為每兩之利以乘各原本得元該利銀十兩零八錢亨該利銀一十六兩二錢利該利銀二十一兩六錢貞該利銀二十七兩合本計月日問利法今有甲乙丙三人合夥同商本銀不齊前後付出甲於正月付出本七十兩乙於四月付出本八十兩丙於七月付出本九十兩共本二百四十兩至年終得利七十兩問各該利銀若干舊法置利銀七十兩位為實另置甲本七十兩以十二月通之得八十四又置乙本八十兩以九個月通之得七十二再置丙本九十兩以六個月通之得五十四併三數共
