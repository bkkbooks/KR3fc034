body:
  text: 較求勾股弦歌勾股較求勾股冝弦自乘之倍為實較亦自乘相對減勾股共數開方齊減較折半是為勾加較折半股無疑勾弦股弦較另言或勾或股自乘先不用對減開方法以較險之共數全減較折半為勾股加較折半即為弦較求勾股弦圖勾股較求勾股法今有勾股不言勾股若干止言弦六十八尺股多勾二十八尺問勾股長濶各若干舊法置弦六十八尺自乘得四千六百二十四尺加倍得九千二百四十八尺另以勾股較二十八尺自乘得七百八十四尺以少減多餘八千四百六十四尺以開平方法除之得九十二尺減較二十八尺餘六十四尺折半得勾濶三十二尺加較差八尺得股長六十尺又法置弦六十八尺自乘得四千六百二十四尺另以股多
