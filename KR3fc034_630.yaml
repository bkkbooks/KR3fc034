body:
  text: 之法以三次所啇淂立方西也開立方命法今有立方積四千一百五十尺問立方每西若干舊法置積為實初啇一十自乘再乘得一千尺除實訖餘實三千一百五十卻以三因下法一十得三十為方法列位次啇六尺於左上初啇一十之次共一十六就以六尺乘之得九十六為亷法再以方法三十乘亷法九十六得二千八百八十除實訖又以次啇六尺自乘再乘得二百一十六尺為隅法除實餘實五十四尺不盡卻以所啇立方一十六尺自乘得二百五十六尺又以三因得七百六十八尺另將十六尺以三因之得四十八尺再加隅法一尺併三數共得八百一十七尺命之曰每方一十六尺零八百一十七分尺之五十四立方問銀法今有銀一萬兩問方若干舊法置銀一萬兩為實以銀率
