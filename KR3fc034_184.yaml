body:
  text: 解義掌上定位之法算家所不可廢如偶得數無算盤可用即于掌上定位求之但或位數遇多烯除法洐實前以次烯除猶易若乘法洐尾位逆乘大數在前數無頭緒易于忘失令立自首位挨乘之法㝎首一位乘光開挨以乘下應乘光以住記明一位止數不至外錯紀然有州乘自乘二等今各到增法于後新增掌上相乘歌相乘掌上法宜明法首實首一順行法首挨身逐位下次位又向身前乘三位四位以次逆得數俱向本位增
