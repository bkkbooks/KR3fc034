body:
  text: 解義未言縱多若干無縱可帶故即就相和共步過作縱論用減縱法除之但舊圖共理未明今另立圖解於後今有直田積八百六十四步只雲長濶相和六十步問長濶各若干增法置積於中以左上為橫方右法為縱方將相和六十步列於法位為縱約略積啇二十步為橫於左下法除縱二十步餘四十步即以橫二十與縱四十相呼除實八百步餘實六十四步卻將橫二十步亦減縱二十步餘二十步為縱與橫共步又約略餘積啇四步於左為橫縱方亦除四步餘縱一十六步與次啇四步除實恰盡於左位先啇二十次啇四步得濶二十四步于右法餘縱一十六步加後除縱二十步得長三十六步
