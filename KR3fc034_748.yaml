body:
  text: 圓尖垜物求積法今有物一圓尖垜下周四十二個問積物若干增法置下周四十一以六歸之得七倍之得十四加一得十五另將十四加二得十六以十五乘之得一百四十又將十五加半個共十五個半乘之得三千七百二十再將七個加一共八個加入共三千七百二十八為實以四為法歸之得積九百三十二個又增法置下周加三個共四十五個另將下周加六個共四十八個以四十五個乘之得二千一百六十再將六歸外周得七倍之得十四加一個半共十五個半又乘之得三萬三千四百八十又另將七加一得八以所加三六共九乘之得七十二併二數共三萬三千五百五十二以圓錐率三十六除之得積九百三十二個圓尖垜物有零下周求積法今有物一圓尖垜下周三十九個問積物若干增法置外周以六歸得六個半信之得十三再加一個得十四另將十三加
  hash: sha256:b60b8183c8ca6d209c7e975386cd09e7b04a2a51d8f5f78c238780daf2cd3028
