body:
  text: 一根得總積一百二十七根增法置外周三十六根以六歸得六內周六以六歸得一併之得七以外周六乘之得四十二以六折半得三為法乘之得一百二十六加入中心一根得總積一百二十七根又增法置外周三十六根加內周共四十二另置三十六以六歸得六折半得三為法乘之得一百二十六加中心一得總積一百二十七根又通法置外周以三歸得十二加一得十三自乘得一百六十九三固四歸得一百二十六七分五裏個物無零得總積一百二十七根又法外周加三自乘得一千五百二十一以十二除得總積解義圓東是六個周中包一自內之外每層加六自外之內每層減六以六歸外周即知層數三十六是六層內外周折併宜以六層折半三層乘一得積即三法是也今以三十六乘是十二個三故用十二為半十二亦六加倍淂十二也外周一六即多一層每二固併一點如方東多半層以五除六淂一十二外再再皆然增法與方東一理舊法以十二為率六加倍淂十二此用三為
  hash: sha256:8762c399718f3c5fdf11888c135b8ab1558f6da13addc001fcdae7eb4dc0d4f1
