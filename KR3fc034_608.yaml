body:
  text: 今有方田一假圓田一假共積二百五十二步只雲方西圓徑邉等問西徑各若干舊法置共積以四因之得一千零八步併方四圓三共七為法除之得一百四十四步為實以開平方法除之得方西圓徑各一十二步又置共積以四因之得一千零八步為實另併方四圓三共七置於右為隅法用帶隅開方除之初啇一十於左以於七乘得七十與上一十相呼一七除實七百餘實三百零八步另倍方法七十得一百四十為亷法次啇二步以隅七乘得十四入亷發一百四十共一百五十四步與次啇二步相呼一二除實二百二五除實一百二四除實八步恰盡得方西圓徑各一十二步
