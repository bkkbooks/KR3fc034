body:
  text: 三歸者圓堆淂方倉四分之一外角堆又圓堆一分內四分之三將方倉四分各再分作四分淂一十六分是外角堆積淂方倉十六分之三分至外交徑十二尺止圓徑大半自乘淂圓徑自乘十六分之九分以三歸之合十六分之三故淂本積也又法先將周三十六尺周四因三歸後以高乎此正法也先以高乘後四因三歸同此理求倚直壁半堆積米法今有倚直壁堆米下周二十四尺高一十二尺問積米若干舊法置下周二十四尺自乘得五百七十六尺以高一十二尺乘之得六千九百一十二尺以倚壁半圓率一十八除之得積三百八十四尺以斛法二五除之得米一百五十三石六斗增法置下周二十四尺以三歸之得八尺為半徑自乘得六十四尺以高一十二尺乘之得七百六十八尺以二歸之得積三百八十四尺以斛法除之得米數又增法置下周二十四尺用四因三歸得三十二尺以高一十二尺乘之得積三百八十四尺
