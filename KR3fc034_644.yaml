body:
  text: 啇六十之次下法亦置七尺於六十之次卻以三千六百尺為一立方西以三因之得一萬零八百尺為一小方平亷又以六十尺為一方西長以三因之得一百八十尺為一小方長亷又次啇七尺自乗再乗得三百四十三尺為一小方隅法卻將平亷以次啇七尺因之為平亷立濶得七萬五千六百尺又將長亷以次啇七尺因之為長亷橫濶再因為長亷立濶得八千八百二十尺併平亷七萬五千六百長亷八千八百二十隅法三百四十三尺共得八萬四千七百六十三尺卻以小方六十因之得五百零八萬五千七百八十尺除積訖餘積三百一十萬五千三百四十一尺另將初次啇共六十七尺自乗得四千四百八十九尺再乗得三十萬零七百六十三尺以次啇七尺因之得三百一十萬五千三百四十一尺除實恰盡得方西六十七尺又增法置積為實初啇六十於左自乗再乗三乗得一千二百九十六萬次啇七尺於左初啇六十之次即將初次啇共六十七尺子乗得四千四百八十
