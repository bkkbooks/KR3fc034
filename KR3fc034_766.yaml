body:
  text: 十舊法置底濶一十八個加頂尖一個共一十九個以濶十八乗之得三百四十二個折半得積一百七十一個三角一面半垜問積法今有物靠壁一面尖半垜上濶四個下濶一十八個問積物若干舊法置底濶一十八個加上濶四個共二十二個為實另置底濶減上濶餘一十四個加一個共一十五個為法乗之得三百三十折半得積一百六十五個磚垜問積法今有磚一垜長三丈高九尺入深四尺每塊長一尺濶五寸厚二寸問共積若干舊法置長三丈以每塊二寸為法歸之得一百五十塊另置高九尺以每塊五寸歸之得一十八塊二數相乗得二千七百塊又以入深四尺乗之得磚積一萬零八百塊增法置長三丈作三百寸以高九尺作九十寸乗之
