body:
  text: 行用對減非是今備列於後以備參考今有瓜二個梨四個價銀四分梨二個榴七個價銀四分榴四個桃七個價銀三分瓜三個桃九個價銀四分二厘問四色各價若干增法先以一行瓜二乗四行桃九得一十八乗價二分二厘得八分四厘卻以四行瓜三乗一行梨四得一十二乗價四分得一錢二分與八分四厘對減餘價三分六厘就將四行一十八桃移置一行四位立負十八次以二行梨二乗一行梨十二得二十四乗桃十八得三十六乗餘價三分六厘得七分二厘卻以梨十二乗二行梨二得二十四兩對減盡乗榴七得八十四乗價四分得四錢八分與七分二厘對減餘四錢零八厘就將一行桃三十六移置二行四位立負三十六又以三行榴四乗二行榴八十四得三百三十六乗桃三十六得一百四十四乗價四錢零八厘得一両六錢三分二厘卻以榴八十四乗三行榴
