body:
  text: 九毫零共合九兩之數另將原本一十五兩減還遇本七兩八錢二分六厘得仍存原本銀七兩一錢七分四厘照原日起利計年扣算本利法今有人貸去銀每兩每年加利二錢七分計有一年零三個月二十日共還完本利銀三百六十二兩四錢七分問原本若干利銀若干舊法置還本利共銀三百六十二兩四錢七分為實另置年月日數照依前法用三歸二十日得六六不尽於三月之下位再通以十二月除之得三零五五不尽於一年之下位共得一三零隔位五五不尽以每年每兩起利二錢七分乘之得每兩利三錢五分二厘五毫加原本一兩共一兩三錢五分二厘五毫為法除實得原本銀二百六十八兩再以每兩利三錢五分二厘五毫乘之得利銀九十四兩四錢七分分賞問總法今有中式舉人一百名第一名官給銀一百兩以下挨次
