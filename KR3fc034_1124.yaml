body:
  text: 解義上法三數五數七數下衰有加倍不加倍之不同此旡加倍者以二三相乗淂六以五數餘一二五相乗淂一十以三數餘一三五相乗淂一十五以二數餘一各皆餘一故各以相乗本數為衰也如雲有物七數剩六個八數剩七個九數剩八個問共物若干增法置七八九維乗以七乗八得五十六再以九乗得五百零四為滿法數另以七乗八得五十六以九數之餘二加五個五十六共二百八十以九數之餘一即以二百八十為九數剩一之衰又以七乗九得六十三以八數之剩七加七個六十三共四百四十一以八數之餘一即以四百四十一為八數剩一之衰又以八乗九得七十二以七數之餘二加倍四個七十二共二百八十八以七數之餘一即以二百八十八為七數剩一之衰卻將七數剩六下六個二百八十八共一千七百二十八又將八數剩七下七個四百四十二共三千零八十七又將九數剩八下八個二百八十
