body:
  text: 可憲兩亷一隅再啇一步今止六步尚少三十九步四十五分步之六乃四十五步內徑有六步也今有大小方田二假相併共積四百步只雲大方西比小方西多四步問大小方西併積各若干舊法置大方西多小方西四步自乘得一十六步以減共積四百步餘積二百八十四步折半得一百九十二步為實另置大方西多小方西四步為縱方以帶縱開平方法除之初啇一十於左下法亦置一十於縱方之上共一十四步皆與上啇一十相呼一一除一百一四除四十共除一百四十步餘實五十二步卻以下法初啇一十倍作二十倍法不倍縱共二十四步次啇二步於做初啇一十之次下法亦置二步於右法次位縱上共二十六步皆與次啇二步相呼二二除四十二六除一十二步除實恰盡得小方西一十二步加
