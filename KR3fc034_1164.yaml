body:
  text: 匿價盈不足雙套帶分子母法今有銀不知其數欲買田取銀三分之二買之盈三両取銀五分之三買之不足一兩問總銀田價各若干舊法置列右之二左之三互三分淂九通盈三両淂二十七両五分淂十通不足一両淂十両卻又將互乗數分列右九左十互多二十七両少一十両以右九互乗少十兩淂九十両以左十互乗多二十七両得二百七十両併二位得三百六十両卻以分子之二之三相乗淂六以除三百六十両得六十両為銀實卻以子母互乗得九得十對減餘一為法除之得總銀六十兩次以多二十七両少十両為田價實亦以法一除之得田價三十七兩解義以分子互乗分母各以盈不足通之即是將盈不足各以分母通之以分子互乗之知盈三両乃三分之二多餘數也以三分通之淂九即是將所盈三両亦通作三分又以左分子之三互乗淂二十七即是將所通九分又再通作三分不足一両乃五分之二不足數也以五分通之得五即是將不足一両亦通作五分又以右分子之二互乗淂十両即是將所通五分又再通作二分卻又將所通
