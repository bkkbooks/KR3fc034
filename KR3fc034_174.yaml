body:
  text: 法置銀二百九十四兩八錢為實以每匹一兩一錢除價首一兩不用只以次位一錢定身減除實首二百即於次位九十除二餘七又次位四無七可減即於七位去一存六下位加十減六存八又於末位除八恰盡得該絹二百六十八匹解義除法陛上以為故于法前定位減法本身定法首之住故于本身定數又如有米一千零三十八石工一百七十三人分之問每人該米若干舊法置米一千零三十八石為實以人數一百七十三除去首位一百不用只用七十三人為法定身除之實首一千下位空無除即浖一千退下位作十本身留六下以七三除之六七除四十二三六除一十八除恰盡得每人該米六石解義除法十是進故凡除皆于隔位減法于本身故即於本身挨為除步得誤差隔位
