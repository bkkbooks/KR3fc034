body:
  text: 法所乗物二正皆用合併一正一負皆用減除價係二餘二不足六用合併一餘一不足亦用減除如前法右中牛二牛一為法係二正互乗正羊負羊正豬負豬俱同合併價係一餘一適足可合減右左牛二牛五為法係一正一負互乗羊是二正用合併豬是一正一負用對減價係一餘一不足亦用對減今將前法更置筭得人曉暢前法先以中牛正一右牛正二為法互乗此為二正為汯中牛一乗右羊正五得五右牛二乗中羊負三得六合併得十一又為法此是一正一負用合併又中牛一乗右豬負十三得十三右中牛二乗中豬正一得二合併得十五此是一正一負亦用合併中牛一乗右剩五両得五両右牛二乗中空此是一餘一適足無合亦無減又以中牛正一左牛負五為法互乗此是一正一負為法中牛一乗左羊正六得六左牛五乗中羊負三得一十五對減羊六餘九又為法此是一正一負用對減中牛一乗左豬正八得八左牛五乗中豬正一得五合左八共十三此是二正用合併中牛一
