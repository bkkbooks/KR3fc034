body:
  text: 內亦不足內方週四多四圓徑週三多三是圓周反不足一數內方周少四圓周少三是圓周反多出一數故多湏加入不足湏減去且上以本數加減以法除之始合餘徑之數徑方今有圓田內截方塘內方得餘徑四十約法六分步之一十七圓周多方週二百九相求十六步四分五釐問內方餘徑通徑圖增法置圓周多二百九十六步四分五釐為實另將內方一十七步以四因得六十八步餘徑四十六步連內方一十七步共六十三步以三因得一百八十九步與方六十八步對餘一百二十一步為法除實二百九十六步四分五釐得二步四分五釐為平法以因十七步得內方面四十一步六分五釐以因四十六步得餘徑共一百一十二步七分折半得每面餘徑五十六步三分五釐連餘徑內方得
