body:
  text: 斤歸之得該三引另置價七十五兩以三引歸之得每引銀二十五兩又置三引為實以每石六十斤歸之得五石另置原價七十五兩以五歸之得每石銀一十五兩又置五石為實以每石四鈞乘之得二十鈞另置每石銀一十五兩以四歸之得每鈞銀三兩七錢五分又置二十鈞為實以每鈞二稱乘之得四十稱另置每鈞銀三兩七錢五分以二歸之得每稱銀一兩八錢七分九釐又置四千稱為實以每稱七五裹乘之得三百裹另置每稱銀一兩八錢七分五釐以七五歸之得每裹銀二錢五分又置三百裹為實以每裹三十二兩乘之得九千六百兩另置每裹銀二錢五分以三十二除之得每兩銀七釐八毫一絲二忽五微又置九千六百兩為實以每兩四分乘之得三萬八千四百分另置每兩銀七釐八毫一系二忽五微以四歸之得每分銀一釐九毫五絲三忽一
