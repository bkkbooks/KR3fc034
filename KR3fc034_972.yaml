body:
  text: 陽位陰位之説俱可奏也今有白米一百八十石三人從上互和減半挨次遞減分之只雲甲多丙米三十六石問各訣若干舊法置米一百八十石為實另以三五七併得一石五斗為法除之得一百二十石乃甲丙二人首尾共數於內減甲多三十六石餘八十四石折半得丙四十二石加多三十六石得甲米七十八石互和甲丙一百二十石折半得乙米六十石舊法置米為實另置三人折半得一五除之即得首尾共數或倍原實以三人歸之亦得解義首尾甲丙共米一百二十石是互和將互和米折半得乙米是互和折半甲多乙十八石乙多丙十八石是挨次遞減四位互和挨次差分法今有銀二百四十兩四人從上互和減半挨次分之只雲甲多丁一十八兩問各訣若干舊法置銀為實以二四六八併
  hash: sha256:09dc5ab5dae9320e5272242d25cab61866cabcbb2d840e6c3f3f400d027ffa8a
