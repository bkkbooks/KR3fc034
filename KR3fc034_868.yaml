body:
  text: 五斤加六併入零兩錢共得一千二百一十三兩四錢四分為實另置八斤自乘得六分四釐再乘得五分一釐二毫為法除之得二千三百七十兩以斤法十六除之得一百四十八斤一二五卻將一二五加六為二兩得原生銅一百四十八斤二兩又法置斤變兩數以八歸三次亦得解義除法有二等有以法除總實得零實者是將原實總數均作法分數分之因總刪每之法也有以法除見實得原實者是將見實十分數破作法分數分之因少測多之法也銅入每十斤得八斤是一次入爐得原銅十分之六分二次入爐又得十分中八分較原銅十分中止存六分四釐三次入爐又得十分中八分稜原銅十分中止存五分一釐二毫則一乘再乘升乘則積而上降乘則成而下八自乘當得六分四釐再乘當得五分一釐二毫舊法自乘得六十四再乘得五百一十二誤矣以五百一十二為法除一千二百一十三兩四錢四分當得二兩三錢七分何由得二千三百七十兩乎今俱改正鋉鎔銅鐵礦問今斤兩法今有鐵一經入爐每十斤得七斤今三經入
