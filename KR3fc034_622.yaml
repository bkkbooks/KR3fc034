body:
  text: 又開立方捷法歌捷法可求開立方不用亷隅費思量初啇再乗除方積就約餘積定次啇合併初次自乗訖又用初乗初次啇再置初啇亦自乗三數總合次乗良得數除積知方西三啇四啇依樣詳今有立方積一百九十五萬三千一百二十五尺問西方若干增法置積為實初啇一百於左就於下法置初啇一百自乗再乗得一百萬除實訖餘實九十五萬三千一百二十五尺次啇二十於左初啇一百之次位就於下法置初次啇共一百一十自乗得一萬四千四百又置初次共啇一百二十以初啇一百乗之得一萬二千又置初啇一百自乗得一萬併三次共三萬六千四百以次啇二十乗之得七十二萬八千尺除實訖仍餘實二十二萬五千一百二十五尺再約啇五尺於左一百二十之下位就於下法置初
