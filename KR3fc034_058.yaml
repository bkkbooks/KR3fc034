body:
  text: 九章詳註筭法成化戊戊金陵訐許荣作棅取吴氏之法九章詳通筭法成化癸夘鄱陽余進作棅取詳明通明法啓蒙發明筭法嘉靖丙戍稫山鄭高异作馬僸改正筭法河間吴橋人嘉靖戊戍作無秉除只改銭塘吴信民請反正邪數歡勾股筭法嘉靖癸巳吴興尚書箬溪颓應祥作無乗除正明筭法嘉靖巳夾金莹張爵作筭理明觧嘉靖庚子江西字都陳必智作重明筭法訂正筭法嘉靖庚子浙東畣稭林高作詳觧定位測圆海鏡嘉靖庚戍学士栾城冶公作無乗除
