body:
  text: 九章詳注算法成化戊戊金陵訐許榮作柄取吳氏之法九章詳通算法成化癸卯鄱陽余進作柄取詳明通明法啓蒙發明算法嘉靖丙戍稫山鄭高異作馬僸改正算法河間吳橋人嘉靖戊戍作無秉除只改錢塘吳信民請反正邪數歡勾股算法嘉靖癸巳吳興尚書箬溪頽應祥作無乘除正明算法嘉靖巳夾金瑩張爵作算理明解嘉靖庚子江西字都陳必智作重明算法訂正算法嘉靖庚子浙東畣秸林高作詳解定位測圓海鏡嘉靖庚戍學士欒城冶公作無乘除
