body:
  text: 原表髙四尺減口髙三尺三寸餘七寸上減斜弦上四寸一分九釐有零口上餘二寸八分有零照依後表斜弦安立袍位百發百中可立奏功解義行前後退行八尺共八尺一寸俱以寸通者餘勾二寸餘較或八尺或八尺一寸是前表餘勾二分餘貶八十分後表餘勾二分餘八十一分以寸通之乃合本苛分數也本以乘除表問十七尺便知後表至表應數若干上頭退餘下去口中餘即位處允此寺法須遠近依口高下定立表竿麼便後表斜弦減退以合炮位乃有濟用拙翁論曰表竿一法於攻守最為有用或寇城邑安營近地或寇堡寨或寇占山頭我軍另占山頭或寇在水洋短兵難接須借或炮攻但或髙或下徒費錢糧無濟實用立定表竿前後窺望照依望穴斜弦置列炮位遠近髙下自可百發百中倘遇山隅敧側高低不平將芊先取下平隨依地勢安立自下平以上作數推筽則施之無不宜其表
