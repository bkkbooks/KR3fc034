body:
  text: 解義九乘法以法乘實自實尾遞乘至實首位止實前位止法首位相乘實二位止有法首位二位相乘實三位止有法首二三位相乘令吹首位挨乘仍與尾位相乘無昊苐是分尖遁呈此是一吹總乘坰尾遁乘大數無定於逆記故實首乘起先采實首訣千記千訣百記百訣十記十乘完一位明數目再乘一位可順次無誤增掌上自秉法歌自乘上法不同法位一般名實身實首挨次對雙向中以次行有對宜加雙數無對一位單自乘若逢空位須隔位乘完一位一位從如有方田一長澗各三十五步零八釐二毫問積數若千增法置長澗三十五省零八釐二毫自手上寅位定三十邜位五辰位空已位八午位二此是法實同各先從寅首位乘起先以指搯邜位呼法首實首同名三三得九實首前無位此是音位自乘即放於邜位定又以指搯辰位以前邜
