body:
  text: 方容圓錠二攬圖錠長一十四歩今有方十四歩內容圓內容一錠二攬問各積若干曾法置方自乘得方積一百九十六歩三因四歸得圓積一百四十七歩另置錠一十四歩再以長折半七歩乘之得錠積九十八歩又以錠長一十四歩用斜求方法以四歩九分五厘乘之以七歩除之得錠長濶各九歩九分以減一十四歩餘得攬濶四歩一分置錠尖長即攬長九歩九分加攬濶一半五歩零五厘共一十一歩九分五厘以半濶二歩零五厘乘之得一攬積二十四歩四分九厘七毫五系另將錠尖長濶九歩九分自乘得九十八歩零一厘以二十四歩五分除之二毫五系乘之得多一厘以四歸之得二毫五系加入攬積得正攬積二十四歩五分以二攬因之得共積四十九歩併錠積合圓積錠積得圓三分之二得外方二分之一二攬積得圓三分之一得錠二分之一
