body:
  text: 方容圓錠二攬圖錠長一十四步今有方十四步內容圓內容一錠二攬問各積若干曾法置方自乘得方積一百九十六步三因四歸得圓積一百四十七步另置錠一十四步再以長折半七步乘之得錠積九十八步又以錠長一十四步用斜求方法以四步九分五厘乘之以七步除之得錠長濶各九步九分以減一十四步餘得攬濶四步一分置錠尖長即攬長九步九分加攬濶一半五步零五厘共一十一步九分五厘以半濶二步零五厘乘之得一攬積二十四步四分九厘七毫五系另將錠尖長濶九步九分自乘得九十八步零一厘以二十四步五分除之二毫五系乘之得多一厘以四歸之得二毫五系加入攬積得正攬積二十四步五分以二攬因之得共積四十九步併錠積合圓積錠積得圓三分之二得外方二分之一二攬積得圓三分之一得錠二分之一
