body:
  text: 法除實得二百零八步內減不及七十二步餘一百三十六步折半得內週六十八步加不及七十二步得外週一百四十步增法置通積一千二百九十八步為實另置不及七十二步以六除之得徑一十二步以除實得一百零四步將七十二步折半得三十六步以減一百零四步得內週六十八步以增一百零四步得外週一百四十步解義倍積即後法加倍故後法以十二除積減除不及一半即併內周前法以十二陰倍積減除不及全步又折半乃淂內週一也環田截外歌環田截外積倍重差乗倍積徑除行以減外周自乗積餘實開方截周明截周外周餘零數以六除之徑可圓田今有圓田外周七十二步內週二十四步徑八步從外截內周截積二百八十五步問截中周併徑若干舊法置截外圖截積二百八十五步倍之得五百七十步卻以外周減內周二十四步餘
  hash: sha256:daa5dcb7850f59e50ee9f2d7ea8789a02a0c855453d4609a5279aaeb1c01a17f
