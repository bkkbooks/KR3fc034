body:
  text: 試將深七尺五寸分作深四尺深三尺五寸二排各用前去相差合二數少積三千一百五十八根零固知乗後用加為數不確只冝先加本數騎或深或濶一加倍一三倍無不皆合又無用分加深加濶之異矣冀排止用深本數以免折加似為當存試者各等尖深總歌長濶尖垜要推詳底腳先將濶長餘數折半添半個併入原長濶乗良濶加一個又乗之法用三歸積相當方尖底方亦加一原方乗之數可識又將原方加半乗以三歸之得本積圓週六歸倍為先加一加二相乗看另加個半復相乗不倍加一作實添合併二數為實以四歸之積可叅三角底面一數加底面乗之數不差又將底面加二個相乗六歸法為佳三角靠璧一面垜底面加一面乗過折半便為本垜積諸法依求總無錯
