body:
  text: 解義河圖天地之數各五陰陽對待之骵也洛書陽數五陰數四共九流行变化之用也河圖為數骵洛書為数用河圖為静洛書為動河圖數自一至十數以十為足此萬數歸成之總也若以進退秉除之理推之數成十則進一千前仨再成十又進一于前位是一者本位之一十者前位之一百者又前位之一一位止有九數川浴書之九位昕以為数法九九之宗而不可易也太極兩儀四象以理言之太極者陰陽未分也兩儀者一陰一陽也四象者老少四位也以數論之則廬五與十即太極一陽内有一三五七九之陽數一陰内有二四六八十之陰數六七八九以分老少不外一二三四得五而成二老六子不外六七八九之老少即不外一二三四得五而成
