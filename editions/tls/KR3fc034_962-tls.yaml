body:
  text: 先以右上二人互乗左中三得六又以右上二乗左下二十六兩一錢得五十二兩二錢次以左上三人互乗右中十一得三十三與左中六對減餘二十七為法又以左上三人互乗右下二十三兩七錢得七十一兩一錢與左下對減餘一十八兩九錢為實以法二十七除之得七錢為一差之數另置甲乙共銀二十三兩七錢加入兼七錢共二十四兩四錢折半得甲銀一十二兩二錢內減七錢得乙銀一十一兩五錢再減七錢得丙銀十兩零八錢再減七錢得丁銀十兩零一錢再減七錢得戊銀九兩四錢再減七錢得己銀八兩七錢再減七錢得庚銀八兩觧義以上為下差率者己比庚多一個七錢戊比庚多二個七錢共三個差率也十一為上差率者乙比庚多五個七錢甲比庚多六個七錢共十一個差率也只炤各衰前數七位六差六位五差以決加之至為明曉舊決置戊己庚三人添一為四以三乗之得十二抵豐得六內嵗三人餘得三為下差率又另以甲乙二人乗總七人得十四內嵌下差率三得十一為上差率立法遇煩且若改作甲乙
