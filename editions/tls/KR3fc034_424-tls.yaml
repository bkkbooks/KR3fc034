body:
  text: 係二餘方四面俱有多數將每歩多數以角面七歩四面共二十八歩乘之共多七毫零七忽零八域八沙七塵四埃三渺八漠零六八四四不畫故須減加位乃合本數目此加位減積之數乃問方應得之正數開方不足自應減積加位以此知渂無㱕難於還原之疑未爲是也至之又終於難畫乃數之微茫終無可畫茅萛位圶渺漠已在希微有無之間下㞰銉有各目世多不用今於漠浸更加四五乃截止推算積末微多增歸不圶漠位亦可以的准無矣角兩邊正長加旁長折半以餘方乘得一邊積不折半以餘方乘即兩邊共積八角中叚積與兩邊積均平無多少者中叚長是兩個餘方一個角面以角面乘是兩個餘方角面相乘一個角面自乘兩邊長角長加一角面是兩個角面兩個餘方面以餘方乘亦是兩個餘方角面相乘與中同又有兩個餘方自乘合中叚一角面自乘積二方積合一斜積試將八角非字分叚正叚中心方七歩自乘得四十九歩如一斜積上下各餘角面長餘方面濶二叚四隅四半方合成二小方毎方自乘得二十四歩五分合斜積一半二方共得四十九歩兩旁亦係角面長餘方面濶二叚合一無差通斜長二十三歩八分九厘九毫有零比通方長整多七歩無零餘者八角八面皆與通方同長以斜計兩尖各多一小方之半斜三歩五分兩共多一小方之整斜共得七歩也大抵方斜循環相倚斜七歩方得四歩九分有零若以斜作方七歩則七歩方之斜得二個小方之長如
