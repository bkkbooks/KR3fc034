body:
  text: 法擇嫩竹節平直者作篾接頭處用銅絲劄住篾上寫明步尺字椂用明油油之卻用前車貯車外套似無蓋底小墨亙內空僅容十字轉動下底鑿一服後高前低出篾頂上釘環以便抬運下釘尖腳以便插立內十字木各長一及三寸方九分四頭竪開長槽口四道濶三分長四寸貯轉竹篾橫開四小口用拴置鎻毎出篾丈量引篾到界篾車內遇某頭小口湊著外套鎻眼即用拴拴之置鎻十字中心鑿方眼安三折曲尺樣轉心一根外套中心鑿圓孔以便攪轉猶同紡車之形用則由底眼出篾丈量用完則轉心攪四車內求畆法丈量之法以五尺為一歩乃長濶計方五尺積方二十五尺為一歩歩下五寸為一分一尺為二分一寸為二厘積歩問畆二四歸除
