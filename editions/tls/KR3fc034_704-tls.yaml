body:
  text: 方束以積問周法今有方束箭八十一根問外周若干舊法置積八十一根減去中心一根餘八十根以十六乗之得一千二百八十根為實另以八為縱方用帶縱開平方法除之得外週三十二根增法置積去中心一根餘八十根以四帰之得二十為實另以一為縱方用帶縱開平方法除之得四以八乗之得外週三十二根又增通法置積八十一根用開平方法除之得方西九根減去一根餘八根以四西因之得外週三十二根無中心方束問周法今有方束箭六十四根問外周若干增法置積六十四根以十六乗之得一千零二十四根用開平方法除之得三十以八折半得四減之餘得外週二十八根又法置積六十四根以率四除之得一十六用開平方法除之得四以八因之得三十二減去半八四根得週二十八根
