body:
  text: 乗原價兴以原麫今麦即是以今麦乗原麫所謂因乗不拘法寔以法乗寔以寔乗法皆一也又難題西江月白麵稱来四觔使油一斤相和今来有麵九斤多六两五錢不錯已用香油和合二斤十二無訛再添多少麵来和不會應湏問我兴言原有麫四斤用油一斤和合今有油二斤六十二两麫九斤六两五錢問仍該添麫若干舊法置今有油二斤十二两先將十二两化為七五於二斤之次以乗原麵四斤得麵一十一斤為實以原用油一斤為法除之如故仍得麵一十一斤减去已用麵九斤六两五錢餘得應添麵一觔九两五錢解義兴與上一法但兴又多已用麫九斤六两五錢問添麫若干同乗異除欱同乘異除法可認識原物原價乗為實今物除實求今價今價除實求今值
