body:
  text: 分若先求金重即置重六両五錢以銀十一錠乗之得七十一両五錢為實仍以前法二除實得金毎錠重三十五両七錢五分內減六両五錢得銀毎錠數各將重數以錠數乗之以九錠乗三十五両七錢五分以十一錠乗二十九両二錢五分得金銀各共重三百二十一両七錢五分解義銀內換八金二錠則重一十三両是為毎錠比銀重六両五錢法應以交換二錠除十三両淂六両五錢為一錠重數將十三両折半即以二除淂一錠重數也銀多二錠與金重相等是金多九個六両五錢即二錠銀數故以九乗二除淂毎錠銀數以十一錠乗六両五錢又多二個六両五錢以二除之各多一個六両五錢故淂金毎錠數此與綾七尺羅九尺同一法也難題匿輕重西江月七釧九釵成器釧子分両重多九両四錢是相和仔細與公説過二物相交一隻秤之適等無那不能筭得是嘍囉二人卻來問我此言七釧九釵共重九両四錢交易其一秤之適等乃六釧一釵重四両七錢八釵一釧重四両七錢問各毎隻重若干
