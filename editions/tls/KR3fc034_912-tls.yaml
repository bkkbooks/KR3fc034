body:
  text: 法除實得五十為每兩之衰以李宅蔴數乗之得李該布五丈四尺以張院蔴數乗之得張該布一丈八尺難題僧分饅頭歌一百饅頭一百僧大僧三個更無爭小僧三人分一個大小和尚各幾丁舊法置僧一百僧為實另置一大僧三個三小僧一個合併得四個為法除實得大僧二十五人以三因之得小僧七十五人另以三因大僧得饅頭七十五個以三歸小僧得饅頭二十五個難題增錢剝減歌鄰家有客亂爭喧相見問其所以然二百三十六擔貨程途遠近論舡錢九十五擔六分筭八十五擔四分完更有五十六擔貨二分五厘筭為先只因剝減爭船價二兩五錢二分添請問高明能筭士作何分沠得相安比如趙一錢二絲三共貨二百三十六石催舡一雙各按貨物輕重程途遠近舡價不等
  hash: sha256:7de25c7417fa27801e2a7f0a8ec81ea5a4e4da3f82467838abe6b924c2a819d4
