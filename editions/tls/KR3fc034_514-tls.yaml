body:
  text: 為法除之得水深一丈二尺加出水三尺得葭長一丈五尺觧義三法一例斜木二葭皆餘股木索即弦多股二尺並列子此以備互泰木索二葭又用對減法者亦非出備叅也餘股求股弦圖今有廰門外懸蒹下垂離地五寸引蒹離闞六尺離地二尺五寸問蒹高若干舊法置去悶六尺為勾自乗得三十六尺以離地二尺五寸減去原離地五寸餘二尺為法除之得一十八尺加股弦較二尺共二十尺折半得蒹高一丈又餘股求股弦難題西江月平地鞦韆未起扳繩離地一尺送行二步餘怡竿齊五尺板高離地仕女佳人爭此終朝語笑歡戲良工高士請言借問索長有幾舊法置送行二步得十尺如勾自乗得一百尺為實以股圖和較五尺減原離地一尺餘四尺為法除之得二十五尺加較四尺共得如圖徑二十九尺折半得索長一丈四尺五寸股股圖今有開門去閡一尺不合二寸問門廣若干舊法置去閾十寸為勾以不合二寸折半得一寸為股弦較勾十寸自乗得一百寸以較一寸除之仍一百寸減較一寸餘九十九寸折半得門一扇廣四尺九寸五分倍之得二扇共廣九尺九寸觧義以上三法典前亦同例而引申言之使人觸悟如蒹離地二尺五寸原離地五寸鞦韆離地五尺原離地一尺示人過此類當除原離地分數門不合二寸以門二扇分之一扇得不合一寸示人過此難當折半作一邊論懸蒹典索皆股也較除之一卻十八尺與二十五尺皆股弦和也前法減較折半得股此反加較折半者以共斜齊為股外加餘股乃著索寔數也餘股求圓圖今有圓木泥在璧中不知徑以鋸鋸之深一寸鋸道長一尺問木徑若干舊法置鋸道長一尺為勾
