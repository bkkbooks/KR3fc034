body:
  text: 今有勾股田長六十步濶三十二步從一邊截積五百四十步問截長截濶各若干增法置截積五百四十步以原長六十步加倍得一百二十步乗之得六萬四千八百步以原濶三十二步除之得二千零二十五步為實以開平方法除之得截長四十五步另將截積以原濶三十二步加倍得六十四步乗之得三萬四千五百六十步以原長六十步除之得五百七十六步為實以開平方法除之得截濶二十三步觧義此與圭田截勾股法第圭濶折半即勾股斜差在一面濶不折半求截長倍原長求截濶倍截濶皆是倍用乗法本積止倍積一半倍長濶乗之仍同原長濶乗倍積一理也上圖以斜問勾股今有斜田上廣八步下廣一十八步長四十步問上
  hash: sha256:1b0bc3ee095ca2fe5a2365497f83c081173768a3a55addfada343ad4e73c90a2
