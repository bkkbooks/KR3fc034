body:
  text: 主法另將積每二十四歩五分內減除二毫五絲以合木積看方容八角餘方差角面亦差不可以方斜之法減除故舟加較減使知方容八角在較筭方面角面不在積之相和還爲准定庻不貽誤後人方容八角角面七歩圖今有方容八角計角面七歩問通方長斜長餘方長各若干方積餘方隅積斜積各若干增法置八角斜面正面同即隅小方之斜七歩自乘得四十九歩折半得二十四歩五分以開平方法除之得餘方長四歩九分四厘七絲四忽七微四六沙八厘三埃零五漠八三二六七不畫截作七一佯二餘方加角面七歩得方面長一十六歩八分九釐九毫四絲九忽四微九繊三沙六廑六埃一渺一漠六六五三四約二即置方面自乖得方積二百八十五
