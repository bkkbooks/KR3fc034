body:
  text: 上一釧過乗右行乗右上六釧亦淂六釧乗右中一釵淂一釵乗右下重四両七錢仍四両七錢即仍是六釧一釵之重也両下對減皆是六釧左中四十八釵減退一釵左下六釧四十八釵之重減退六釧一釵之重止四十七釵之重故將四十八對減餘四十七為法除淂釵重乃是以釧為法乗搃重將両邊釧重俱平減盡止餘該重故以法求之淂釵若以釵為法乗搃重便將両邊釵重亦微平減盡止餘釧重以法求之即可淂釧一理也難題多少匿數差分歌甲乙二人沽酒不知誰少誰多乙鈔少半甲相和二百無零堪可乙得甲錢中半亦然二百無那英賢筭得的無訛將甚法兒方可此言酒價二百文甲乙二人共出甲借乙三分之一邊是乙借甲二分之一邊足問甲乙各幾若干舊法置列右甲二分左乙三分互之一之一錢二百錢二百先以右二分互乗左下二百得四百又以左三分互乗右下二百得六百對減餘二百為實以二分三分併之得五為法除實得四十以乙三分乗之得乙錢一百二十文以減原錢二百文餘八十以甲二分乗之得
