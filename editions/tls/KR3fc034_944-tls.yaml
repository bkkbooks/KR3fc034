body:
  text: 原酒一斗六升六合二勺五抄增法置第三次飲酒一斗九升折半得第二次添酒九升五合將九升五合再加二次飲一斗九升共二斗八升五合折半得二次添酒一斗四升二合五勺將一斗四升二合五勺再加初次欽一斗九升共三斗三升二合五勺又折半得初次添酒及壺中原酒各一斗六升六合二勺五抄觧義一斗六升六合二勺五抄皆原帝之也一斗九升者三次所飲之酒也以七乗一斗九升三次折半得原酒者將飲酒一斗九以八得一斗三升七合五勺將原酒一斗六升六合二勺五擬以七歸本得二十三升七合五勺是原帶酒得每次飲酒八分之七三折本第一次折是二分之一第二次折是四分之一第三次折是八分之一即是將一斗九升七因八歸合原帶八分之七酒數也飲酒是八分原帶酒是七分初次加倍得十切分飲去八分餘六分二次又加倍六分共十二分飲去八分餘四分三次又倍四分共成八分故飲酒恰盡又難題歌昨日沽酒會親鑰路遠迢遙有四程行過一程添一倍卻被
