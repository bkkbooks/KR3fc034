body:
  text: 得三也若內方俉於餘徑若干倍內有盈不足止用本數加減另解在棧方徑今有圓田內截一方塘塘外餘田三分內均平方餘徑步均平圓周多方週一十二步問加倍內方餘徑通徑各若干增法置圓周多一十二步為實另置方一步以周四因之得四步又置餘徑均平一步連內方一步共二步以圓周三因之得六步兩數相減餘二步為法除實一十二步得內方六步外餘徑均平六步折半得每面餘徑各三步加內方六步得通徑一十二步自乗得一百四十四步三因四歸得圓田一百零八步減去內方六步自乗三十六步得方外餘積七十二步以畝法二四通之得方外餘田三分增法餘徑得內方三倍圓周多方週二十四步問內方餘徑通徑置圓周多二十四步為實另置
