body:
  text: 用弦較和九十六步除前實即得弦較較一賦和和絃和較相通如勾股之差二十八步自乗得七百八十四步以減弦自乗四千六百二十四步餘三千八百四十步以弦和和一百六十步除之得二十四步為弦和較若用弦和較二十四步除前貴即得一百六十步為弦和和再若勾三十二步加股弦較八步即弦較較勾三十二步減股弦較八步即弦和較勾加弦較和九十六步共一百二十八步即股弦和股六十加勾弦較三十六步共九十六步即弦較和股減勾弦較三十六步餘二十四步即弦和較股加弦較較四十步共一百步即勾弦和勾股較加股弦較共三十六步即勾弦較股弦和一百二十八步減勾股較二十八步餘一百即勾弦和勾股和九十二步加股弦較共一百亦即勾弦和股弦和一百二十八步減勾股和九十二步餘三十六步
