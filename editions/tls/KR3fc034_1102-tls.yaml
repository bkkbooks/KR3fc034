body:
  text: 七尺乗之得二百五十三文減去欠價九十文餘一百六十二文為實以六尺七尺對減餘一尺為法除之仍故得綾毎尺錢一百六十二文另置三十六文以綾六尺因之得二百一十六文減去欠價九十文餘得一百二十六文為實亦以法一尺除之仍故得羅毎尺錢一百二十六文解義三法互相發明貴價不足則加入貴價有餘則減去其以貴價為主者何也賤以尺數補貴以價數較不足數補入乃合賤物所多尺數之價有餘者減去亦然輕重匿數差分法今有金九錠銀十一錠稱數適等交換二錠則銀比金多一十三両問金銀各重共重若干舊法置銀重一十三両折半得六両五錢乗金九錠得五十八両五錢為實卻置金九錠銀十一錠對減餘二為法除實得銀毎錠重二十九両二錢五分加入重六両五錢得金毎錠生蛄十五両七錢五
