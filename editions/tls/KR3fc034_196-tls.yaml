body:
  text: 成三已位空午位存七未位定二又以指搯申位以前未位與寅位相對未實盡空位寅無對呼次中午位與邜位相對邜五午二此是有對加雙呼二五一十再呼二五一十共十二又次中已位與辰位相對辰位空已無對呼就於未位二加二成四又以指搯酉位以前申與寅對未與邜對未申俱實盡空位寅邜無對呼次中午與辰對辰位空午無對呼次中已單位八自乘呼八八六十四就於申定六酉位定四又以指搯戌位以前酉與寅對申與邜對俱實盡無呼未與辰對一實盡一位空無呼次中午位與已相對已八午二此是有對加呼二八一十六再呼二八一十六共三十二就於酉位四加三成七戌位定二又以指搯亥位以前戌與寅對酉與邜對申與辰對未與已對俱實盡無對
