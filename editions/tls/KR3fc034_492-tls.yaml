body:
  text: 笑不知多少舊法置田分厘以畝法二四通之得一百零八步四因三歸得一百四十四步為實以開平方法除之得一十二步為圓田全徑折半得六步乃枯柱繫馬之處以每步五尺乗之得三十尺為股自乗得九百尺另以柱一十六尺為勾自乗得二百五十六尺併二數得一千一百五十六尺為實以開平方法除之得索長三十四尺又勾股求弦雞題歌二丈木長三尺圖葛生其下繞纒之徐徐纒繞七週遍葛稍卻與木稍齊試問先生能筭者葛長多少請君題鬥言有木長二丈圓三尺葛由下斜徑七邊至湏問葛長苦於舊法置木圖三尺與週七相乗得二千一尺為股自乗得四百四十一尺以木長二十尺為勾自乗得二百尺併二數得八百四十一尺為實用開平方法除之得葛長二十九尺
  hash: sha256:ad8008c9e1b7781dfbc59dba8a878447ef45c2dca0966a1d7d1a1dd4b43bf982
