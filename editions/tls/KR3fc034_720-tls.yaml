body:
  text: 分餘外內週三尺外周九尺折半得六尺以餘徑一尺乗之得六尺是外周每積一尺內週五寸外週一尺五寸束物每徑一尺三因四歸得每物一個積亦七寸五分七個共積五尺二寸五分較田積少一寸五分則圓物外所餘之空隙也是圓束論個數外周係六個其容六個之分數亦是內週三尺外周九尺圓田論分數外周係九尺其所容積數亦是共容六尺此理之可推者也故做圓田法以周求積遇零則作一個以積求周遇零亦加作一個以一個以個數無零也三稜束問積周圓此是九個束中包一今有物一三稜束外週三十六個問總積若干舊法置三稜周三十六根加內周九根共四十五根以三十六根乗之得一千六百二十為實以三稜束率十八除之得九十加入
