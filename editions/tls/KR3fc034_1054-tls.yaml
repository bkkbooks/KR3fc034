body:
  text: 解義上是馬步軍均平此是多寡不等欲求馬步共數湏先以二百九十四乗共布後以三千零八十四除之若徑求馬步各數只以三千零八十四除共布便淂馬步平一十二以各衰乗之各淂馬步軍數子母養分以人問物法今有兵士三千四百七十四各毎三人支襖布七十尺毎四人支褲布五十尺問該總布若干舊法置列右三人左四人互七十尺五十尺先以右三人互乗左五十盡之得一百五十尺又以左四人互乗右七十尺得二百八十尺併之共四百三十尺以乗兵士共數三千四百七十四名得一百四十九萬三千八百二十尺為實另以三人四人相乗得十二為法除實得總布一十二萬四千四百八十五尺或以兵士三千四百七十四名為實用七因三歸得襖布八萬一千零六十尺另用五因四歸得褲布四萬三千四百二十五尺併二數得總布數亦得解義上以布問軍士數用母相乗以乗共布卻以母互乗千併之為除法此以軍士問布數用母互乗子併之以乗共人卻以母相
