body:
  text: 陣每陣先鋒有八人每人旗頭俱八個每個旗頭八隊成每隊更訣八個甲每個甲頭八個兵舊法置統領一以八因得將八員再八因得營六十四再八因得陣五百一十二再八因得先鋒四千零九十六人再八因得旗頭三萬二千七百六十八人再八因得隊長二十六萬二千一百四十人再八因得甲二百零九萬七千一百五十二人再八因得兵一千六百七十七萬七千二百一十六人除營陣不筭外再加入統領一將八先鋒四千零九十六旗頭三萬二千七百六十隊長一十六萬二千一百四十四甲二百零九萬七千一百五十二得共一千九百一十七萬三千三百八十五人八倍連本問利法今有錢一文每日連本生利八文共計八日問訣本利若干舊法置物日利八文次日以八因得六十四文三日再八因得五百一十二文四日再八因得四千零九十六文五日再八因得三萬二千七百六十八文六百再八
