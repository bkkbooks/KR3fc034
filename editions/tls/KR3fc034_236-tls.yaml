body:
  text: 餘二百歩以四歸之得內方五十歩外方加入四十歩得二百八十歩以四歸之得外方七十歩將外方自乗得原田四千九百歩除存內方五十歩自乗二千五百歩計截外圜二千四百歩又方田截環以濶問內方及積法今有方田外方六十歩從四圜截濶三尺六寸問內方及及內外積各若干増法置方面六十歩四因得外周二百四十歩另置截濶三尺六寸以毎尺二分通之得七分二厘以八因之得五歩七分六厘以減二百四十歩餘二百三十四歩二分四厘以四歸之得內方面五十八歩五分六厘自乗得積三千四百二十九歩二分七厘三毫六將以二四除之得該田一十四畆二分八厘八毫六絲四忽另將外周二百四十歩併內周二百三十四歩二分四厘折半得二百三十七歩一分二厘以七分二厘乗得一百七十歩零七分二厘六毫四系該田七分一厘一毫三絲六忽
  hash: sha256:c08307420dc1ee6f52f2cb7de854e2b63892cfd3e5428265ced14f8e99d6491c
