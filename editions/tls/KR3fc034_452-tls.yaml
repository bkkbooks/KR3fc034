body:
  text: 用橫濶面因歸用中長者三角數寔即用中長乗下濶容圓數虛寔則寔用之虛則虛就之圓外餘長二步此寔步也故仍用二步容圓之面虛故不用橫濶用中長以就內虛之數也凣有一形必具一數皆天造地設不可人力為者又用折半者求角求圭皆然與乗復折半一也角面七步中長六步零六厘有零不止六步然圓中心得角夫三分之一則確不可移因加入餘零數多零星不便覽悟故仍就舊法立圖在學者會悟酌用之可耳三角容四三角圖今有三角內容四三角大三角面一十四步間每角積若干舊法置大三角面一十四步六因七歸得中長一十二步乗面得一百六十八步折半得大三角積八十四步另將每面折半得七步以中長十二步折半得六步乗之得四十二步折半得積二十一步合四小角共得八十四步合大三角積觧義以勾股法準之三角面七步中長六步零六厘二毫一系七忽七微有零中長六步面六步九分二厘八毫二系零三微不盡
