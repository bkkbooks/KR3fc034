body:
  text: 共用十斤另將則六十以三停因之得盞一百八十個以毎盞油一十八銖乗之得三千二百四十銖以毎両二十四銖除之得一百三十五両以截両為斤法求之得盞油共八斤七両增法置四盞三甌相乗得一十二以甌二停乗之得二十四以盞三停乗之得三十六併之共得六十為實另將甌二十四隻以四両三甌用四因三歸得三十二両又將盞三十六個以三両四盞用三因四歸得二十七両併之共五十九両為法以除共油二百九十五両得五又為法乗實六十得盞甌共三百隻再將三停二停共五為法除之得六十為盞甌平法以二停因之得甌一百二十隻以三停因之得盞一百八十隻各將盞甌因歸得各油數解義舊法將両以銖分之因甌四両以三歸之多時零不盡也增法以五十九為法除共油淂五以乗六十即置共油為實以六千乗之五十九除之也甌盞共六十隻油止五十九両是油比甌盞數少一以五十九除共油淂五個五十九両即以五乗六十淂五個
