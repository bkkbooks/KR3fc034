body:
  text: 狐鵰各頭尾共十除之得狐鵰共一十六個卻以狐尾九因之得一百四十四內減總尾八十八餘五十六為實另以尾九內減一頭餘八為法除實得鵰鳥七隻以減共數十六餘得狐狸九個或以九因一十六得一百四十四內減總領七十二餘七十二為實以頭九內減一尾餘八為法除實即先得狐狸九個以減共數餘得鵰鳥數又增加法併總頭總尾共一百六十以狐鵰頭尾各十歸之得狐鵰共一十六個另置總頭總尾相減餘尾一十六以頭尾一九相減餘八為法除之得二以減狐鵰共一十六個餘一十四折半得鵰七隻加入二隻得狐狸九隻觧義一頭九尾九頭一尾各頭尾俱是十數將頭尾共數用十歸之得狐鵰共數為正的以頭尾相減餘一十六為狐鵰共數此偶合不可為唯若改九狐八鵰立法前有八十二頭後有八十九尾以頭減尾止餘八何以合共數乎
