body:
  text: 總歌半平長垜法不同倍長加下上濶乗倍下加上乗下另將上下對減明併入二數高乗之法用六歸積可凴可方上下自乗推上下相乗又繼之上下方減餘加一以乗併數得為實另將減餘加一數三因併入三歸宜半圓六歸上下周各倍添一自乗優又用上下數相乗再將高數折半留四數合併高乗之以四歸之積可求三角各面自乗便又以上面乗下麵上面再倍下而合併上三數作實筭上下面減餘加一乗實六歸積亦見一面半垜法可齊上濶下濶併為實對減上下餘加一乗實折半積無疑長尖垜物求積法今有酒瓶一長尖垜地腳長一十三個濶八個問共
