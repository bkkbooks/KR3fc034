body:
  text: 法除之得米三百二十石以減米麥共數得麥數觧義米麥共五百石原是貴賤二等價銀所買共用銀四百零五兩七錢將共石數或用貴價賤價乗之與原共價相減以貴賤相差一錢三分五厘除之多一百八十個一錢三分五厘便是一百八十石麥少三百二十個一錢三分五厘便是三百二十石米一理也以物數問價法今有銀四百零五兩七錢糴米三百二十石麥一百八十石只雲米每石比麥每石多價一錢三分五厘問米麥各價若干增法置米三百二十石以米多麥價一錢三分五厘乗之得四十三兩二錢以減原銀四百零五兩七錢餘三百六十二兩五錢為實以共米麥五百石為法除之得麥價每石七錢二分五厘加多一錢三分五厘得米價每石銀八錢六分各石數乗之得米麥各共價合原銀又法置麥一百八十石以多價一錢三分五厘乗之得二十四兩三錢加入原共銀四百零五兩七錢共四百三十兩為實以共米麥五百石為法除之得米價
