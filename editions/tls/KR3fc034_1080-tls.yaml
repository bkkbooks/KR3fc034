body:
  text: 價物俱通分法今有米六分石之二毎每斗價四分錢之三問該銀若干舊法置分子石之二錢之三相乗得六両為實卻以分母六分四分相乗得二十四両為法除之得該銀二錢五分解義六分石之二即三分石之一乃三斗三升三合三三不盡也法應置米一石以六除之得一六六不盡以二乗之淂三三不盡又置銀一錢以四除之淂二分五厘以三乗之淂毎斗七分五厘卻以乗三斗三升三三不盡淂銀二錢五分原應之二之二是乗六分四分是除今以分子之二之三相乗卻以六分四分相乗除之猶通乗通除法也以二乗錢之三當得六錢法雲六両者價以斗分米亦應以斗分石者十斗以石之二乗錢之三即二十個三錢淂六両也又法今有豆九石六斗六分斗之四毎石價銀二錢三分錢之之問該銀若干舊法先置豆九石六斗以分母六因之得五十七石六斗加子之四共五十八石另置毎石價二錢以分母三因之得六錢加子之一共得七錢以乗五十八石得四十萬零
