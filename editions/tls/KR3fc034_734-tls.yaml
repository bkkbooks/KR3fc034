body:
  text: 作十四根又以濶五丈亦倍作一百根相乗得一千四百根為實另置長六丈以一丈五尺除之得四根為法乗實得五千六百根又以濶五丈加之得木八千四百根荒排法今有荒排深二丈一尺濶四丈四尺長六丈問木若干舊法置深二丈一尺以三歸之得七尺加倍作一十四根又以濶四尺倍作八十八根相乗得一千二百二十二根為實另置長六丈以一丈五尺除之得四根為法乗得四千九百二十八根又以深二丈一尺亦用三歸得七尺加之得木八千三百七十七根六分解義攢直問拼為方順拼無旗為一封書配拼為荒又用加法者大小頭倒正相錯每尺二根內仍有容餘也一封書荒排皆加深方拼簡加濶者積立相間深無餘餘在濶也或先乗後卻先加後乗一理然方梱倍濶加原濶以倍深乗再以長四根乗即得八千四百根一封習倍濶另將倍深以原深乗得十一尺二寸五分卻入相乗再以長六根乗乃得一萬四千八百零五根止加原深七尺五寸則不合原積矣以此恩之數以十為成五為中倍五止成十五乗十仍得五若倍七五得十五以七五乗十五加數必多五以下如數少
