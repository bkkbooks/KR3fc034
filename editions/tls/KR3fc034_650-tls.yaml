body:
  text: 自乗再乗得五百一十二尺為隅法除實恰盡得立圓徑四十八尺此文立圓如圓毬解義平圓不離平方立圓亦不離立方其以十六乗九除淂一十一萬零五百九十二尺即立方積也以開立方法除之淂立方西即立圓徑也其以十六乗九除者立圓淂立方十六分中九分四隅淂七分平圓淂平方四分之三圓得三分四隅淂一分立圓如圓毬四隅所餘如多將十六三因四帰淂十二是平圓數又將十二三個四帰得九是立圓數是十六分之九分乃兩次三因四帰之數猶之一乗再乗之義立方是一乗再乗而得立圓亦本立方一三因四帰再三因四帰而淂將立方西四十八尺一乗再乗得主方積一十一萬零五百九十二尺將一十一萬零五百九十二尺一三因四帰再三因四帰淂六萬二千二百零八尺即立圓之積若因徑問積將徑四十八尺一乗再乗淂積用九因十六除淂立圓積立圓開方問周法今有立圓積六萬二千二百零八尺問立圓周若干增法置積數以四十八尺乗之得二百九十八萬五千九百八十四尺為實以開平方除之初啇一百尺於左自乗得一萬在乗得一百萬除實訖次啇四十於左初啇一百之
