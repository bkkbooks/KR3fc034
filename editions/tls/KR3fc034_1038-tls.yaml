body:
  text: 得甘草價銀八両二錢再以右中甘草三百五十二両互乗左下一百両四錢得三萬五千六百九十二両八錢以左中銀八錢互乗右下七千二百四十一両得五千七百九十二両八錢以少減多餘二萬九千九百為實亦以法一千一百九十六除之得參併價平汯二十五以三錢乗之得人參一十二兩五錢以銀一両七錢乗之得參價四十二両五錢又將麝香毎八分貝母毎三斤以錢法齊同置麝八分以五因之得四錢亦將價九錢以五因之得四十五錢又將貝母毎三斤以毎斤一百六十錢通之得四百八十錢再以五因之得二千四百錢價二両五錢亦以五因之得一百二十五錢另置麝貝連共價二百零二両三錢內減連價九両八錢得麝貝共價四百九十二両五錢亦以五因之得九千六百二十五錢共麝貝一千一百一十六両亦以五因之得五萬五千八百錢卻又照前分左右列位右射香四錢左價四十五錢互貝母二千四百錢價一百二十五錢共射貝五萬五千八百錢共價九千六百二十五錢先以
