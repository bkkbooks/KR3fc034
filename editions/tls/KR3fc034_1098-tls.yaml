body:
  text: 四文為實另以綾七尺羅九尺相減餘二尺為法除實得綾毎尺價一百六十二文另置綾七尺以三十六文乗之得二百五十二文為實仍將二尺為法除之得羅每尺價一百二十六文解義綾價毎尺多羅價三十六文綾七尺羅多二尺邊等是七個三十六文為二尺羅價故以綾七尺乗三十六文以二尺除淂毎每尺羅價九尺比七尺多二七個三十六文為二尺羅價再加二個三十六文即毎尺各加一三十六文為二尺綾價故以羅九尺乗三十六文以二尺除即毎尺綾價此是綾羅價相等若或綾羅數增減不一價有餘歀不等又當合餘歀數為法求之併列後貴價不足差分法今有綾毎尺價比羅毎尺多錢三十六文用價買綾六尺買羅八尺綾價比羅共價少三十六文問各毎尺價若干增法置多錢三十六文以賤價羅八尺乗之得二百八十八文加入綾少價三十六文共三百二十四文為實另以六尺八尺相減餘二尺為法除實得綾價毎尺錢一百六十二文另
