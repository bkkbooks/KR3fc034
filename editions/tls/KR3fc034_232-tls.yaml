body:
  text: 除之得毎方五十歩増法以周求積周自乗以十六除得積觧見後方來下觧義方田之積由方面自乗而得故因積求方即將積歩以開方法除之此即還源注也無論圖直弧角等形因積求長求闊求弦矢勾股等皆同此定法法徔寔首頓數至歩位止於歩下一法定十數如前方舊止五十歩矣位下位是歩位再下一位定十逆上至十原位即千蓋乗法數本上升而位則下減一陞一減湊合本位上當陞起二數如寔首十則乗數為千位寔首百則乗數為萬位但詳寔首數明按數陞起即不必數至下再逆陛至上可也今有方田一叚斜長七十歩零七分一厘零六絲捌忽問積歩若干増法置斜長七十歩零七分一厘零六系八忽自乗得五千歩折半得積二千五百歩觧義方田之斜即勾股之弦斜自乗數內包両個方自乗數法方五十歩斜七十歩自乗止得四千九百歩不是方自乗加倍之數今改正方五十歩斜應得七十歩零七分一厘零六繫七忽不要以八忽筭者數分不盡數筭作法也詳說見後方斜下
