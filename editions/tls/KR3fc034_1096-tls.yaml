body:
  text: 之得騾毎頭價一十二両三錢加多七両七錢得馬毎匹價二十両又法今有銀二千九百二十八両共買綾一百五十疋羅三百疋絹四百五十疋只雲綾疋價比羅疋價多四錢七分羅疋價比絹疋價多一両三錢五分問三色疋價各若干舊法置羅三百疋以多絹價一両三錢五分乗之得四百零五両又置綾一百五十疋以二項多價共一両八錢二分乗之得一百七十三両併之得六百七十八両以減總銀二千九百二十八両餘二千二百五十両為實併綾羅絹共九百疋為法除之得絹價毎疋銀二両五錢加多一両三錢五分得羅價毎疋銀三両八錢五分又加多四錢七分得綾價毎疋銀四両三錢二分又法今有綾七尺羅九尺共價邊等只雲羅毎尺價比綾毎尺價少錢三址六文問各毎尺價若干舊法置羅九尺以少價三十六文乗之得三百二十
