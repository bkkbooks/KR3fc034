body:
  text: 勾弦較求勾弦前數止言股六十尺弦多勾三十六尺問勾弦各若幹舊法置股六十尺自乗得三千六百尺為寔以弦多勾三十六尺為法除之得一百尺減較差三十六尺餘六十四尺折半得勾濶三十二尺加差三十六尺得弦長六十八尺又法置股自乗二千六百尺另以多勾三十六尺自乗得一千二百九十六尺相減餘二千三百零四尺為實以多勾三十六尺為法除之亦得六十四尺折半得勾加較得弦或將差加倍七十二尺為法除餘積正得勾三十二尺股弦較求股弦法前數止言勾三十二尺弦多股八尺問股弦各若干舊法置勾三十二尺自乗得一千零二十四尺為實以弦多股八尺為法除之得股弦共數一百二十八尺加差八尺共一百三十六尺折半得弦六十八尺內減差八尺得股六十尺
