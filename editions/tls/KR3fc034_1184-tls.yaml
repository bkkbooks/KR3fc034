body:
  text: 六十二両五錢是四匹馬五隻牛價以右行馬三適乗左行則寫得三四十二匹牛淂三五一十五隻價淂四百八十七両五錢乃十二匹馬十五隻牛之價両下對減馬是一十二隻牛對減餘七隻價對減餘三十一両五錢即七隻牛之價故以七為法除之淂毎隻牛價以牛為法互乗亦然難題借硯西江月甲借乙塚七硯還他三管毛錐貼錢四百整八十恰好齊同了畢丙卻借乙九筆還他三箇端溪一百八十貼乙齊二色價該各錢舊法置列右硯正七左硯正三互筆負三淂九下價正四百八十筆負九淂六十三下價負一百八十先以右行硯七為法通乗左筆九得六十三價一百八十得一千二百六十又以左行硯二為法通乗右行筆三得七用減左行筆六十三餘筆五十四為法又乗右下價正四百八十得一千四百四十異加左行價負一千二百六十共得二千七百為實以法置法得筆毎枝錢五十文將右行價正四百八十異加筆負三一百五十共得六百
