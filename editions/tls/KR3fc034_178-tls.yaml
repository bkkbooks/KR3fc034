body:
  text: 如有米三石五斗每斗價銀七分問該共銀若干舊法置米三石五斗為實浖斗價七分為原法另浖七分倍之得一錢四分為倍法先於實末位五斗上呼起雙下加倍起了二斗挨身下一錢次位下四分再起二斗又下一錢四分却呼見一只還原起了一斗隔位下七分次於三石上呼起雙下加倍起了二石挨身下一兩次位下四錢却呼見一只還原起了一石隔位下七錢得共銀二兩四錢五分又如有棉布五十七疋每疋價銀二錢五分問共該銀若干舊法置布五十七疋為實以疋價二錢五分為原法另以二錢五分倍作五錢為倍法先於末位七疋起了三個雙共六疋挨身下三個五錢又起了一疋又挨身下二錢次位下五分次於首位五十起二個雙共四十疋挨身下二個五兩起一個十疋挨身下二兩次位下五錢得共價一十四兩二錢五分前法原價是分倍實錢則倍數
