body:
  text: 併之得四十七為法除實得各經學生一百二十名列三位以三人歸之得詩經四十本以四人歸之得春秋三十本以五人歸之得周易二十四本又以三因各經學生得共三百六十人解義此典三位以碗知客者無異將共書以二乗又以三乗又以五乗即以二三五互乗之數乗之也帶分子母問年法今有昆仲三人小弟謂長兄曰我年紀比兄四分之三次兄年紀比兄六分之五多我八歲問三人歲數各若干舊法置列右六分左四分之五之三以左母四互乗右子之五得二十為次兄之差又以右母六互乗左子之三得十八為小弟之差又以母四六相乗得二十四為長兄之差另以二十減去十八餘二為法置長兄差二十四以八歲因之得一百九十二為實以法二除之得長兄年九十六歲又置次兄差二十以八歲因之得一百六十
  hash: sha256:f2126895ca6bc1616238afb464a9c0ebae53d04e42dca4ec1df4a8f3d2f1af70
