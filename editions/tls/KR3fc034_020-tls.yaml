body:
  text: 算海説詳自序数理著也家儒獍者先强拙更數天行上道也形下器也數金六三一九筭又數之一治其遠有大者遗小奚譏孔子聖少也都事不辭游一枝苟免终日之訾聖人寕賢之矢余質艻而負且癖
