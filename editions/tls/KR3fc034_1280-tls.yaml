body:
  text: 七寸二千一百八十七分寸之一千零七十五隔八下生夾鍾夾鍾屬陰律長七寸二千一百八十七分寸之一千零七十五卻以分母通七寸加分子共得一萬六千三百八十四寸以空圍九分因之得一百四十七萬四千五百六十分以分母二千一百八十七除之不盡五百二十二分法實皆九約之得積六百七十四分二百四十三分寸之五十八其候春分卻以通寸一萬六千三百八十四寸以二因之得三萬二千七百六十八寸為實另以三因二千一百八十七得六千五百六十一為法除之得四寸六千五百六十一分寸之六千五百二十四隔八下生無射無射屬陽律長四寸六千五百六十一分寸之六千五百二十四卻以分母通四寸加分子共得三萬二千七百六十八寸以空圍九分因之得二百九十四萬九千一百二十分卻以分母六千五百六十一分為法除之不盡三千二百三十一分以法命之得積四百四十九分六千五百六十一分寸之三千二百三十一其候霜降卻以通寸三萬二千七百六十八寸以四因之得一十三萬一千零七十二寸另以三
