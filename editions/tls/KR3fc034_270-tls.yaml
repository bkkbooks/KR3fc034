body:
  text: 縱方便是以矢乗全弦矢自乗便是以矢乗全矢故除寔淂盡可淂矢也不信積以弦折半為縱方是個半弦將商步上折半加縱方是個半矢除寔得盡正是全矢乗半矢半弦之數故亦可以淂失圓田徑矢求截弦歌圓徑與矢求弧弦半徑自乗得積先另置半徑減去矢餘徑自乗減其前剩積再用開方法得數加倍弧弦全今有圓田不言截積步若干止言中徑二十六步從一邊截矢八步問截弦若干舊法置中徑二十六步折半得一十三步自乗得一百六十九步為實另以半徑減去矢八步餘五步自乗得二十五步以減一百六十九步餘一百四十四步用開平方法除之得一十二步倍之得截弦二十四步又法置全徑自乗得六百七十六步另置矢八步加倍得一十六步以減徑二十六步餘十步自乗得一百步以減六百七十六步餘五百七十六步用開平方法除之得截弦二十四步
