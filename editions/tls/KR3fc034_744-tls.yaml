body:
  text: 解義此與前長容同法比窖法又多上下長或餘加併之數者窖法論尺數下長下濶皆泛腳應邊筭垜物論個數下長下濶以分數計之在各物中腰上至每個之末各減半個下至底邊應寬半個上長上濶頂亦各減半個故不可以窖法筭再加長多濶數乃合也四面尖垛求積法今有物四面尖垜底方一十二個問共積若干舊法置方一十二個加一個共一十三個以一十二個乗之得一百五十六個又以十二加半個共一十二個半乗之得一千九百五十個為實以三為法歸之得積六百五十個解義方加一個即下方加頂尖一個也以方十二乗之方十二層亦十二以層數乗之也又同十二加半乗之者即下用全方上加半尖與直長垜法同也方尖垜形同方錐而求法不同亦各論分數個數之異也如方錐法下方十二自乗得一百四十四以高十二乗得一千七百二十八三歸得錐積五百七十六此垜積少七十四其少七十四何也如垜積底層方十二寔積一百四十四錐底層下邊十二尺底層上邊即第二層下邊止十一尺用友容十一自乗得一百二十一十二自乗得一百四十四十一乗十二得一百三十二併之共三百九十七以高一尺乗之仍故用三歸得積止一百三十二尺三三不盡比垜橫少一十一尺六六不盡第二層方一盡
