body:
  text: 本法原應先除後乘先置原價四兩三錢八分以原米五石八斗四升為法除之得每石價銀七錢五分後以今米一石七斗二升乘之此法維易知但先除恐有畸零不盡湏用先乘為妙解義先乘後除之法各章皆多用此特為表列明白以便取用不同先乘后除又曰異乘同除者先後以乘除次序言異同㕆問價物分如有原物原價今物今價以原乘除环以今乘除会是同以原乘除今口今乘除原是異大要只是于呼問價物恋異乘同除則先以異乗應同乗異除則先用同乘不外先乘後除之法耳又如有小麥八斗六升磨麵六十四觔八兩今有小麥三十五石四斗八升問該麵若干置共麥三十五石八百八十四斤六两為寶以原麥八斗六升為法除之得今該麵二千六百六十一觔解義上是以多問少時是以少問多二法一但示應行六十四斤以原麦八斗六升除之後同今賣乘之此亦用先乘法上以今米
