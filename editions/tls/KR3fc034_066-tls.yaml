body:
  text: 筭法用字例身本位也如本身下位進稭進前一位退下後一位挨随变数乜上位之左下位之有左上大位右下下位首第一位尾末一位呼呼唤其数也置刋也列位各列位次以用也為數未定也得数巳或也原數也今問數也加增添也减退少也相二数以少减多併二數或三数相和率数也倍再加一倍折半截去一半截分也通问共数也差多少不问数也平彼此相遇数也有数也言亦呼也較相較也直長也縱高長也横也庚横俱也斜長之斜即勾股弦高上起可數深下入數面方面也方四面同数也方直也隅隅角也
