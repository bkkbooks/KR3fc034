body:
  text: 餘方面四歩九分五厘乘之得五十九歩一分五厘二毫五絲加倍得二面積共一百十八歩三分零五毫併中叚積得六角積二百三十六歩六分零五毫又置餘方隅答四歩九分五厘自乘得二十四歩五分零二毫五絲折半得一隅積一十二歩二分五一毫二絲五忽以四因之得四隅共積四十九歩零五毫併六角積共二百六十五歩六分一厘另置通方一十六歩九分自乘得方積二百八十五歩六分一厘合六角四隅積解義圓方而十七歩角面七歩仍以方五斜七作筭通方積與八角四隅得積二百八十九歩筭積亦合其合者只也角隅分數掦從方面共數分定通筭分筭自皆符合但方十七歩以七因五歸得斜長二十三歩八分自乘得五百六十六歩四分四釐折半得二百八十三歩二分二釐每一半較方自乘二百八十九歩少五歩七分八厘相差已違今改正以斜七歩方四歩九分五厘主法筭積亦合然斜七歩方四歩九分五厘筭積毎二十四歩五分內仍多二毫五絲今有隅自乘得二十四歩五分零二毫五絲零數自宜除去第除去又與方積不合且隅面差多角面亦有多數在內以此算積差今更左圓較減於後湏知止於方斜相較獨可以四歩九分五厘
