body:
  text: 若餘數不折半即得倍積梯田下倍積求長濶之法本此求斜日同今有斜田長三十二步小廣四步大廣一十二步從斜邊截積五十步問截長截濶各若干舊法置截積加倍得一百步以原長三十二步乗之得三千二百步為實以大濶減小闊餘八步為法除之得四百步用開平方法除之得截長二十步又以濶差八步乗之得一百六十步以原長三十二步除之得截濶五步增法如先求濶即置倍積一百步另將濶差八步以原長三十二步除之得二分五厘以乗倍積一百步得二十五步用開平方法除之得截濶五步將五步以濶差除原長得四步乗之得截長二十步觧義梯截勾股濶差用半斜截勾股用全者梯差在二面斜差在一面也積截或大頭小頭皆同梯法故不再
  hash: sha256:f4d9f92a460bc9d2956e1750680758e56a7afb656182a0379651260ac7c87def
