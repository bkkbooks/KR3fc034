body:
  text: 三因之得九併之共五十八為上菓與價平法以價十一文因之得上菓價六百三十八文以菓九個因之得上菓五百二十二個解義共物多於共價湏先將三位內價少物多之位較量分數平多物餘共物共價斉平之數以價多與價少折平合法以除之不盡則以分平法進退加減約之或分或合或加或減又有應一倍二倍三倍之不同頭緒多端湏記清至上中下菓數菓價俱與上汯不符者共價共物此買物紋目積倍過多中澗多寡互湊合自多如雄鷄十二母鷄四小鷄八十四雄鷄四母鷄一十八小鷄七十八皆可淂千文百鷄是也五位貴賤相和差分法今有銀二百五十三両買藥材二百九十八斤內麝香每八分銀九錢人參毎五錢銀一両七錢黃連毎九両銀二両八錢貝母毎三斤銀二両五錢甘草毎十一斤銀四錢只雲參草價比麝連貝三等價四分之一多一錢二分五厘連價比麝貝共價得二十
