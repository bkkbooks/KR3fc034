body:
  text: 右上六人左上四人互中出九両淂三十六両中出七両淂四十二両互下盈三両淂一百二十六両下盈六両淂二百一十六両先以右上六人左上四人相乗得二十四人以右下盈三兩左下盈六両共九両乗之得七十二為人實次以右上六人互乗左中出七両得四十二両即用互乗右下盈三両得一百二十六両又以左上四人互乗右中出九両得三十六両即用互乗左下盈六両得二百一十六両二數對減餘九十両為物實卻以右上乗左中四十二両左上乗右中三十六両對減餘六為法除人實七十二得一十二人除物實九十両得物價銀一十五両增法置六人四人相乗得二十四人又以右六人互乗左中出七両得四十二両以左四人互乗右中出九両得三十六両對減餘六両為法另將盈三両盈六両對減餘三両以法六両除之得五即以五乗二十四人得一十二人以五乗右三十六両得一十八両內減多三両淂物價銀一十五両以五乗左四十二両得二十一両內減多六両亦得
