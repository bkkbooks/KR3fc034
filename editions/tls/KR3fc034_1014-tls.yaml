body:
  text: 倍桃七個共四十一錢買四十一物是四十一首物與價之總平法也應二倍平以梨價十一互共物梨九互共價對減九倍物餘二倍即桃應二倍法也二倍數內有二倍梨數二倍桃數又有價比物少五數九互共價對減內多餘九乗五共四十五數併三數在內以四十一除合桃與價平法梨應三倍倣平以桃價四互共物桃數七互共價對減去四倍價餘三倍即梨應三倍法也三倍數內有三倍桃價三倍梨價內有價四乗多物五個共減去二十餘存倍桃梨共價數以四十一除合梨與價平法增注以二三為法用加四十五減二十者此也惟共物共價有多少不等故二倍三倍為法亦有參差不齊湏用加減法合之若共物共價斉同則以二三為法不用再有加增減退今複列法於後若両邊俱係價少物多或俱係價多物少無或互乗取平則惟以差數約量五法求之貴賤共物共價齊同差分法今有錢四千九百六十一文買梨桃四千九百六十一個只雲每錢十一文買梨九個每錢四文買桃七個問梨桃及各共價若干增法置梨價十一梨九個相減餘二文桃價四文桃七個相減餘三個列右梨十一餘二左梨九個互錢四文共價四千九百六十一文或七個餘三共棃殼四千九百六十一個以
