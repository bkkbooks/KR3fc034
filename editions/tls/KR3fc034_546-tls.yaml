body:
  text: 股弦和求股弦法今有勾股止言勾三十二尺股弦共一百二十八尺股弦各若干薦法置勾三十二尺自乘得一千零二十四尺以股弦共一百二十八尺為法除之得八尺即股弦較以減股弦和共一百二十八尺餘一百二十尺折半得股六十尺加入較八尺得弦六十八尺又法置股弦共一百二十八尺自乘得一萬六千三百八十四尺另以勾三十二尺自乘得一千零二十四尺以少減多餘一萬五千三百六十尺折半得七千六百八十尺為實以股弦共一百二十八尺為法除之得股長六十八尺以減共一百二十八尺餘得弦長六十八尺今有竹高一丈為風折僕地稍尖去報三尺問折震高若干薦法置去根三尺為勺自乘得九尺另以竹高一大如股弦和為法除之得九寸以減
  hash: sha256:e658a9d0d7ce382abb5c89de71453bea0d62dbbd66854f80e95a1f6efeb02e9e
