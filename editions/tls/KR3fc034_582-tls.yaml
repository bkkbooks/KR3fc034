body:
  text: 共十二自乗得一百四十四步內減初啇自乗一百餘四十四步以減餘實又餘實九十六步卻以三因得二百八十八步另併大方多小方八步中方多小方四步共十二倍之得二十四步與初啇十步相呼一二除二一四除四又與次啇二步相呼二二除四二四除八得小方西十二步加多四步得中方西十六步又加多四步得大方西二十步各以方西自乗得積增法置大方多小方八步中方多小方四步各自乗共八十步減共積八百步餘積七百二十步以三歸之得二百四十步為實另以多四步加倍得八步為縱方初啇十步即置八步於實右縱方先以左啇十步自呼除一百步又與右縱八步相呼一八除八十步餘實八十步次啇二步於左初啇十步之下即以二與初啇呼一二除二十又以二與十二呼一二除二十二二除四步又以二與縱八步二八除一十六步除實恰盡得小方而一十二步
