body:
  text: 又方田截環以外方問截濶法今有方田從四圍截一十二畆四分七厘四毫外方七十二歩問截濶若干増法置截田二四通之得二千九百九十三歩七分六厘為實另將外方四因得外周二百八十八歩以毎周一歩應減四歩約十歩應減四十歩餘二百四十八歩除實不盡即約定十二歩以四因得四十八歩以減外周餘二百四十歩以十二歩乗得二千八百八十歩除實訖餘實一百一十三歩七分六厘另將一十二歩以八因得九十六歩以減外周二百八十八歩餘一百九十二歩以約餘實再定六分以四因得二歩四分以減一百九十二歩餘一百八十九步六分以六分乗之得一百一十三歩七分六厘除實恰盡得截濶一十二歩六分又法置外方自乗得全積內減截積餘積用開平方法除之得內方併外方折平以除截積得截濶亦得觧義外周問內周毎歩減八歩折平減四歩無論截濶若干只四周以減外周即內外周折平數方田內方地法無謂令改増法
