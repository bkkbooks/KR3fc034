body:
  text: 梯田截積歌梯田倍積截可齊差乗長除法為宜截大減大自乗數截小自乗併為實開方俱可見截廣折廣除積長無疑梯田今有梯田長九十步小廣二十步大廣三十八步從截大小頭截積八百二十二步五分問截長截廣各若干截小圖舊法置截積八百二十二步五分倍之得一千六百四十五步以二廣相減餘一十八步為濶差以乗倍積得二萬九千六百一十步以原長九十步除之得三百二十九步另以小廣二十步自乗得四百步二數相併共得七百二十九步為寔以開平方法除之得截中廣二十七步就以截廣二十七步併小頭原濶二十步共四十七步折半得二十三步五分為法以除截積八百二十二步五分得截長三十五步梯截大頭法今有梯田長九十步大廣三十八步小廣二十步從大頭
