body:
  text: 今止有六十個是比原積止有六十七分之六十故以六十七因乗以六十帰合原積而除恰盡也立圓開方文徑周歌立圓問徑法何如十六乗積九歸除立圓若問圍周數四十八乗為則度二數俱用開立方問徑問周兩不誤立圓開方問徑法今有立圓積六萬二千二百零八尺問立圓徑若干舊法置積六萬二千二百零八尺以十六乗之得九十九萬五千三百二十八尺以九歸之得一十一萬零五百九十二尺為實以開立方法除之初啇四十於左亦置四十於右自乗得一千六百再乗得六萬四千除實餘實四萬六千五百九十二尺另將初啇四十以三因之得一百二十為方法列位次啇八尺於初啇之次亦置八尺於下法共四十八尺就以次啇八尺乗之得三百八十四尺為亷法以方乗亷得四萬六千零八十尺除實又另置次啇八尺
