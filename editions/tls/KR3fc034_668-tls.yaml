body:
  text: 長法揔一二數合併高乗之六歸得積不用思若欲因積求原窖各照原法還源妙方窖求米法今有方窖上方九尺下方一十二尺深一十三尺問積尺及米若干舊法置上方九尺自乗得八十一尺另置下方一十二尺自乗得一百四十四尺又置下方一十二尺以上方九尺乗之得一百零八尺併三數共三百三十三尺以深一十三尺乗之得四千三百二十九尺為實以三歸之得積一千四百四十三尺以斛法二尺五寸除之得盛米五百七十七石二斗解義先以上下方自乗互乗後用三帰即三廣折平之法然他皆就廣數折平此獨以乗數折者一西方有濶狹即同種田故即可以上下折平方窖是上方較下方四西俱狹誠將四西角分劈筭之以上方九尺為齊下方亦四西截正方九尺自乗淂八十一尺以深十三尺乗之得積一千零五十三尺下方濶上方三尺每西各淂一尺五寸將下濶亦截照上方九尺以一尺五寸乗之得一十三尺
