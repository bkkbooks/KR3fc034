body:
  text: 六十隻共三百隻三位分子母求燈併油法今有燈三等大燈毎四盞油七両中燈毎五盞油六両小燈毎三盞油二両共用油七百零六両只雲中燈比大燈六分之五小燈比大燈九分之七問大中小燈及油各若干增法置列六分九分之五之七先以母六分九分相乗得五十四為大燈之衰次以母九分乗子五分得四十五為中燈之衰又以母六分互乗子之七得四十二為小燈之衰卻將大燈五十四以四盞歸之得一十三盞半以七両因之得九十四両五錢又將中燈四十五以五盞歸之得九以六両因之得五十四両又將小燈四十一以三盞歸之得一十四以二両因之得二十八両併三數共一百七十六両五錢為法以除共油七百乗六両得四為平法各以衰乗之以五十四乗得大燈二百一十六盞以四十五乗得中燈一百
