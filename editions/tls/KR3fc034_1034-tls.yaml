body:
  text: 分之一多銀一錢七分五厘麝貝共數比黃連併價共數得二十八分之二十七多藥材九錢問各藥材併價各若干增法置共價二百五十三両另置多銀一錢二分五厘以麝連貝共四分因之得五錢加入共二百五十三両五錢為實以麝連貝共四分參草共一分併之得五分為法除實得參草共價五十両零七錢以減共價二百五十五両餘得麝連貝共價二百零二両三錢又置多銀一錢七分五厘以麝連貝共二十分因之得三両五錢加入麝連貝共價得二百零五両八錢為實以麝貝價二十分連價一分併之得二十一分為法除實得黃連價九両八錢卻以九両因之以二両八錢歸之得黃連三十一両五錢又併連與價共四十一両三錢以二十七分乗之得一千一百一十五両一錢加入多藥材九錢得麝香貝母共一千一百一十六両卻將共藥材二百九斤以化斤為両法加之得共四千七百六十八両內減黃連三十一両五錢麝貝一千
