body:
  text: 為實亦以法二除之得次兄年八十歲再以小弟差十八亦以八歲乗之得一百四十四為實亦以法二除之得小弟年七十二歲增法置列六分四分之五之三先以六分乗八歲得四十八以之五乗八歲得四十各為實卻以長兄次兄共二為法各乗之以二乗四十八得長兄九十六歲以二乗四十得次兄八十歲又以四分乗八歲得三十二以之三乗八歲得二十四各為實卻以長兄次兄小弟共三為法各乗之以三乗三十二得長兄九十六歲以三乗二十四得小弟年七十二歲解義以二十四為長兄差者長兄此次兄是六分比小弟是四分二十四乃四六之減數也以加分乗五淂二十為次兄差者長兄二十四是六個四次兄二十是五個四正六分之五也以十八為小弟差者長兄二十四是四個六小弟十八是三個六正四分之三也皆以乗八歲者次兄比小弟多八歲則六分五分四分三分俱合八歲為多寡也俱法將各分數互乗以乗八歲故復用除法增法直以
