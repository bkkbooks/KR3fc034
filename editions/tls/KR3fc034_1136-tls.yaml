body:
  text: 得原錢八十八文以毎両八文歸之得該肉一十一両解義此同上法一理上併盈不足為人寔此併盈不足為物價寔淂毎両錢八文優同問人淂九人也若以一斤作十六両互乗十六文淂二百五十六以九両互乗四十文淂三百六十併之共六百一十六以買一斤買九両相減餘七両為法除之即淂原錢八十八優問物得共物也買九両多錢十六買十六両少錢四十合多少實差五十六即十六両比九両多七両之價數以二買數對減餘七為法擾上以出率分率對減為法舊以多錢十六文與買肉九両對減非是今攺正帳幅增摺問盈不足法今有絹一疋欲作帳幅先摺作六幅比舊帳長六寸後摺作七幅比舊帳短四寸問絹及舊帳幅長各若干舊法置絹六幅以長六寸乗之得三尺六寸另置七幅以短四寸乗之得二尺八寸如盈不足分列右六幅左七幅互長三尺六寸短二尺八寸先以右六幅互乗左短二尺八寸得一丈六尺八寸又以左七幅互乗右長三尺六寸得二文五尺二寸併二數得四文二尺為絹寔另併長三尺六寸短二尺八寸共
  hash: sha256:9857299d8aedc79e7a2dc16bdcab4e78109bf557647661f49abd93770499ec2a
