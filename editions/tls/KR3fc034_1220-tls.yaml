body:
  text: 二十五一十二得三十七此是一正一負凣二正為法遇一正一負則用合併又右正羊五乗左正豬八得四十左正羊六乗右負豬十三得七十八併四十七十八得一百一十八此亦一正一負故用今併又右正羊五乗少價三両得一十五左正羊六乗右剩銀五両得三十両合併共得四十五両此亦一餘一不足用合併牛三十七該價銀二百二十二両豬一百一十八該價銀一百七十七両牛價比豬價正多四十五両解義二仍是上法但同有減併或減之不恐用者論有誤故為分別詳言之四色方程歌四色方程法更奇三次迭乗問因依初乗三乗皆對減惟有次乗莫差池或減或併湏早辨初乗首末定根基末位餘價次湏併首位餘價次減除五色六色皆同理凴斯推廣更無疑舊止載次乗合併一法歌亦未該今攺作
  hash: sha256:a4d0dcb74570f0ee608cc7e7b71731237db66bb1c2ebee10e3d8e848c381078b
