body:
  text: 得二厘加入得一弧矢績一百九十六步以四弧矢因之得共績七百八十四步合內方二分之一若求弦長將內方績開方得弦三十九步五分九厘七毫九絲七忽不盡將圓徑成弦長餘折半得矢濶八步二分零一毫零一忽不盡弧矢績併內方績合圓績解義將大方分作四分四隅弧矢各淂四分之一圓得四分之三內方淂四分之二圓內正方同房內斜方淂大方一半如此互相考較毫忽無差方長斜長弦長矢濶供言法者因數又畸零雖盡住多則績減法約畧大塈無差值數立為求法或戉或補以合原積至求方求斜求弦求矢法作寔恐步數加多積差亦多故俱用開方為確舊泥方五斜七作筭舛錯殊甚今並列於後免悮後學舊法載圓徑五十六步內容方面四十步自乗得一千六百步弧弦四十步加矢折半得二十四步以矢八步乗之得一百九十二步四弧矢共積七百六十八步併內方合圓田積二千三百五十二步多一十六步其多
