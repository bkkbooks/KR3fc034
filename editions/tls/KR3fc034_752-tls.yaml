body:
  text: 之以高乗之也高止十五層又加半者圓尖垜自上向下每層多半個加入一個半個相乗乃和垜物多問雖積數也有零六者皆此也又將六歸周七加一共八併入者非意加也徑十五高亦十又曾共得八個中心有零六者十四層共得七個中也加一得八六個半得七加入者加中心也中心不在整六半六周內故外加理可易也又法以周求積將下周加三個者五個意四十五得併物以分數合圓田法當加三也其之六個乗者物應加三個為等加六個寔止外加三個前法以求層多一加一個又法以成求每層多三故加三個也前法乗加中心此又九乗者以徑求是四歸八典七侯八寔歸合本以問求是三十六除用九乗之四九得三十六乃合除率九者一邊加三一邊加六故合璧六半六為法無此六千六層數不然此數也然六歸四十二得七加一成八六歸三十九得六個半上加半不加一者下同習整六則加整一下周有半六則加半內週三個是半層再加半共合一層故加半也湏六歸外圓無零則加一有零加半廣無誤矣圓半垜物求積法今有圓半垜物上周十八個下周四十二個高九層問積物若干增法置上周一十八個以六歸得三個倍之得六個再加一個共七個
