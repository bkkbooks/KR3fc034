  text: 物或列多等貴贱輕重多寡近参差不湏因數别等随差立法故衰分章次之着多位参差等分桗或多或寡魚盈兼歉法問彼此立形區数待椎有同射覆筭至此鈎深索隐研幾通至矣書矣故以區覆章終馬外着諸家多有發明正法未尚者類分列各章以便考重者不録别有筭則附録九章之末
