body:
  text: 大綠一百二十二斤用加六法得一千九百五十二兩併零一十三兩共一千九百六十五兩以每兩一錢七分五厘乗之得三百四十三兩八錢七分五厘又置靛花八百四十斤以七錢五分乗之得六千三百以三十五斤除之得一十八兩二共得甲該使費銀三百六十一兩八錢七分五厘另置乙銀硃二千一百四十八斤不動將零一十二兩用截兩法化作七五共二千一百四十八斤七五以每斤六分乗之得一百二十八兩九錢二分五厘又置錫四千六百八十斤以使費二錢八分乗之得一萬三千一百零四以每一十二斤除之得一百零九兩二錢二共得乙該使費銀二百三十八兩一錢二分五厘甲乙共該六百兩以觔問引石鈞秤裹兩分銖併價法今有胡椒六百觔價銀七十五兩問引石鈞秤裂兩分銖及價各若干增法置價銀七十五兩為實以六百為法除之得每斤價一錢二分五厘即置胡椒六百斤為實以每引二百
  hash: sha256:f833a34d8d3847f56eedc6922c48363c96e6442ee1cae2a52b1690414a21903a
