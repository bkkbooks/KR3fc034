body:
  text: 以觔求兩法如有金一十二觔半問該兩若干舊法置原金二十二斤半為實以六為法於次位加之得金二百兩或以一十六兩為法乗之亦得筭定位只認原觔位得十兩依次求之今列筭式於後呼先呼五六加三十加三於前依起不動本身五加三成八兩次乎二六一十二上位加一本位加二共成十進位不動本身二加一成二下位二八成十共四十兩又次乎一六加六就千本位加六共成十進前位不動本身一加入下位一共得二百兩截兩為觔歌一退六二五二留一二五三留一八七五四留二五五留三一二五六留三七五七留四三七五八留五九留五六二五十留六二五十一留六八七五十二留七五十
