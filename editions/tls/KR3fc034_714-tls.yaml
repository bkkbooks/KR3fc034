body:
  text: 心不用加然若依三歸外周加一自乗用三因四歸之法則不有中心無中心求法皆同故以為通法可通用也圓束以積周法今有圓束箭一百二十七根問外周若干舊法置積減中心一餘一百二十六根以率十二乗之得一千五百一十二根為實以六為縱方用帶縱開平方法除之得外週三十六根增法置積減中心餘一百二十六根以率三歸之得四十二為實以一為縱方用帶縱開平方除之得六以六乗之得外週三十六根又增通法置積四固三歸得一百六十九用開平方法除之得一十三減一得十二以三乗之得外週三十六根無中心圓束問周法今有圓束箭一百零八根問外周若干增法置積一百零八根以率十二除之得一千二百九十六用開平方法除之得三十六另以六折半得三減之餘得外週三十三根又增法置積以率三除之得三十
