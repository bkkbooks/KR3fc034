body:
  text: 先以右上八人互左上九人得七十二人以右下盈四両五錢左下不足三両共七両五錢乗之得五百四十為人實次以右上八人互乗左中出六両得四十八両即互乗右下盈四両五錢得二百一十六又以左上九人互乗右中出七両得六十三両即又互乗左下不足三両得一百八十九二數相併共四百零五為物實卻以右上乗左中四十八両左上乗右中六十三両二數對減餘一十五為法除人實五百四十得三十六人除物實四百零五得物價銀二十七両增捷法置八人九人相乗得七十二人又以右八人互乗左中出六両得四十八両以左九人互乗右中七両得六十三両對減餘一十五両為法另併盈四両五錢不足三両共七両五錢以法十五両除之得五即以五乗七十二人得三十六人以五乗六十三両得三十一両五錢內減多四両五錢得物價二十七両以五乗四十八両得二十四両加入不足三兩亦得物價銀二十七両
