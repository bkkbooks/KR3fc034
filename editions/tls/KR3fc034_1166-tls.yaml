body:
  text: 之數再與九十互乗乃將五分三分之二之三交互通繳之法比前法多一次互乗多分子一除少分母一乗所以然者搃銀數錢前法共人數也共人不越人率會通之數共銀亦不越二母會通之數如將盈三両以三分通之得九卻以五分互乗之淂四十五將不足一両以五分通之淂五両卻以三分交乗之淂一十五両併之共得六十両以母子互乗淂九淂十對減餘一為法除之淂共銀六十両蓋將盈三両以三通又以五乗即以三五一十五乗也將不足一両以五通又以三乗亦即以五三一十五乗也合併言之仍是三五相乗淂十五以乗盈不足共四淂六十為搃銀即同人實旡以異九今以分子之二互乗二母得九得十以為通法多加之二之三一乗故亦多加之二之三一除以帰臺本等也然若仍用前法求之亦可免疊乗疊除之煩並列於後又法置列右三分左五分互中之二淂十両中之三淂九両互下盈三両下不足一両先以左上三両互乗左上五分得一十五以盈三両不足一両共四両乗之得六十両為總銀實次以右上三分互乗左中之三得九即又互乗右下盈三両得二十七両以左上五分互乗右中之二得一十即又互乗左下不足一両仍得十両併二數共三十七両為田價實卻以右
