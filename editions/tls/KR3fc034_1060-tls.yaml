body:
  text: 以管三乗套五得一十五為法乗之得歸各一十五萬五千六百二十五個以三歸得用管竹五萬一千八百七十五竿以五歸得用套竹三萬一千一百二十五竿解義此即上二位以碗知僧之法復載此以備觸悟先以八除後以三五相乗乗之與先乗後餘一毎竹一竿筆管三個五竿哉十五個毎竹一竿截套五個三竿亦哉十五固是用竹八竿截管套各十五個故將共竹以八竿以十五乗即淂管套配數也難題分書知人歌毛詩春秋周易書九十四冊共無餘毛詩二冊三人共春秋一本四人呼周易五人讀一本書分毎樣幾多書就見學生多少數請君布筭莫躊躕舊法置共書九十四本以詩三乗之得二百八十二再以春秋四人乗之得一千一百二十八又以周易五人乗之得五千六百四十本為實另列三人四人五人維乗三人四人相乗得一十二又四人五人相乗得二十又五人三人相乗得一十五
