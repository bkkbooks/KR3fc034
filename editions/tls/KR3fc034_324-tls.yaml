body:
  text: 法通之得一百二十步連八步共一百二十八步為實另倍積得二百五十六步以開平方法除之得一十六步為法除寔得矢八步加法十六得弦長二十四步將矢八步加離田五步得索長一十三步加倍即圓徑解義倍積開方淂十六步邊合弧矢田以矢乗半弦半矢之數此惟弦淂矢三倍半弦半矢合矢二倍乃倍積可求若弦長參差不等則倍積開方難以合數此等法湏言索長若干真騐曰五步用弦股測勾法求之為正不言索長則每也故存解明白恐誤後人難題積並矢弦差步求矢弦歌弦矢一畝積一叚更加九十七步半矢不及弦十五步弦矢各長怎麼的筭舊法置田一畝以畝法通之得二百四十步再加九十七步半得田積共三百三十七步半四因三歸得四百五十步為寔以不及弦一十五步為縱方用帶縱開平方法除之商十步於左亦置十步於右縱方一十五步之位共二十五步皆與上商十步相呼十與二十相呼除二百又與五相呼除
