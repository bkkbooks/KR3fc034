body:
  text: 附河圖縱橫九位乘除法歌縱橫十五分九位八卦連中九位參自一至九一圖轉成十陞進九圖看萬中千坎百歸萬巽錢離安分坤厘兌毫乹上河圖掌上再重觀自古洛書有自一至九之女計數則縱橫十五論位則八卦九宮令以此數九位為笑先熱計其位數坎一坤二震三巽四中五乾六兌七艮八離九依罔書排列九圖每圖排列九位九圖分萬千百十兩錢分厘毫由中宮起萬次坎起千由左而上旋右以次由大至小笑時用錢九文若遏兩只動兩圈上一個錢應若干數即㸹錢安於數上即是若干兩遇錢於錢圖上遇分於分圖上九則加離一則加坎遇加二成五則移坤安中遇退九存一則移離安坎他類此
