body:
  text: 置共車一百輛以大車載五石六斗乗之得五百六十石減共米四百七十六石餘八十四石為實另置大車載五石六斗內減小車三石二斗餘二石四斗為法除實得小車三十五輛以減總車一百輛餘得大車六十五輛觧義若將共車以小車載三石二斗乗之即可先得大車數典貴賤差分同又多少差分法今有鷄兎同籠上有三十五頭下有九十四足問鷄兎各若干舊法置頭三十五個以兎足四隻因之得一百四十足減原九十四足餘四十六足為實卻將兔四足以鷄二足減之餘二足為法除實得鷄二十三隻以減三十五頭餘得兎一十二隻又法今有狐狸一頭九尾鵰鳥一尾九頭只雲前有七十二頭後有八十八尾問狸鵰各若干增法置總頭七十二併合總尾八十八共一百六十以
