body:
  text: 中菓二百二十八個以毎錢五文因之每菓六個歸之得中菓價一百九十大卻將共價一千三百五十文減中下菓價共四百七十文得上菓價八百八十文將共菓一千四百三十八個減中下菓共七百一十八個得上菓七百二十個解義上梨桃是二等法此是三等法上雄母小鷄亦是三等價比物多然一十文一個撻是一猶同五文買一三文買一一文買三價物斉等此又是共物共價不等其將多錢十二文半用四因五歸者下菓價一分多錢十二文半上中菓四分少四個十二文半共少五十以五分之毎分該十文一分中添多十文四分便各少二文半又加多十文共各少十二文半故以四因五歸淂十文加入下菓價合數也下菓比中菓一倍外多三十四特三十四二歸淂一半一十七下菓二倍各加十七中菓一倍便少三十四也若不言下菜價比上中價若干下菓比中菓若干即仍用求鷄並價法約求之法併列後又三位價物不等約求差分法今有上菓每九個錢十一文中菓毎六個錢五文下菓毎七個錢四文共用錢一千三百五十文買上中下菓
