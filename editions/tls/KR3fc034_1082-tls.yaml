body:
  text: 六錢為實以分母六分二分相乗得一十八為法除實得共該銀二両二錢五分不盡一法實皆折半而命曰不盡九分錢之五解義豆是六分通之銀是三分通之又以通數相乗三分數內又以六分通數通之毎錢通作三六一十八分數即以分母三分六分相乗淂十八為汯除之也不盡之數法實皆折半命之者十八法也不盡一實也以折半約法淂九以折半約實淂五故為九分錢之五其折半者何也一錢止十分故將十八分以十分約之淂九分也廣縦俱通分問畆法今有直田縦九十七步四十九分步之四十七廣二步二十分步之九問共積若干舊法置縱九十七步以分母四十九乗之得四千七百五十三加入分子四十七共四千八百另置廣二步以分母二十乗之得四十加分子九共四十九以乗縱四千八百得二十三萬五千二百為實卻以分母二十乗分母四十九得九百八十為法除之得積二百四十步
