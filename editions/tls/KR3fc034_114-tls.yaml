body:
  text: 隔位乗法言於應乗實位下以法首從隔位挨次至尾順乗而下乗完除實身一位破頭乗法言以法首数將應乗位破身順乗而下也解義四法一理晋頭乗今皆用此掉尾乗但倒記法位明白以次逆上極為宜捷推法位遇多先退数隔寔下位坎為煩隔位乗退下一位即自法首乗起極順因乗完除身多此一番為煩然三法皆乗完破身法寔照劉不致錯誤破頭乗先將寔位改破恐易忘錯歸法單位曰歸凣二歸至九歸法單位者用此歸除法單位曰歸位數多曰歸除通而言之曰歸除置所問率為實以所求率為法皆從實首位而起以次而下以法之首位用歸次位下皆用除歸呼九歸之歌除呼九九之数次第除之故曰歸除降積用除法凣以二為歸便降作二分之一以三為歸便降作三分之
