body:
  text: 中空正騾二借驢一四石二斗得四石二斗左借馬一空負一正驢三四石二斗右得四石二斗中得八石四斗舊法先以右馬一為法通乗左行正驢三得三載四石二斗得四石二斗即以左借馬一為法通乗右借騾一得一載四石二斗得四石二斗將載對減俱盡又以中行正騾二通乗左負一得二正驢三得六載四石二斗得八石四斗即以左行負一通乗正騾二得二與左行減盡借驢一得一併左行大共七為法載四石二斗得四石二斗與左行八石四斗對減餘四石二斗為實以法除之得驢毎匹載六斗卻於中行原載四石二斗內除借驢一匹減去六斗餘三石六斗以原騾二匹除之得騾毎匹載一石八斗又將右行四石二斗內除借騾一匹減去一石八斗餘得馬毎匹載二石四斗
