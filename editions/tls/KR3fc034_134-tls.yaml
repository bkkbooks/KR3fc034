body:
  text: 如原有小珍珠五十顆重一两價銀一十二两今有大珍珠三十顆重一两問該價銀若干舊法置原有珎珠五十顆以原價十二两乗之得六百两為實以今珎珠三十顆除之得該價銀二十两解義兴即以價十二两用五因三歸之法猶同小珎珠一顆得大珎珠五分之三將大珠價二十两三因五歸得小珠價將小珠價五因三歸淂大珠價皆是先同乗後異除他可類推通乗法謂如應四乗之又應五乗之再又應七乗之者却變法以四乗五得二十再以七乗之得一百四十就以一百四十為法乗之以免三次相乗之煩此約繁歸蕑之法無論同乗異乗皆相通為法乗之後圓堆半堆等用三十六率十八率等類皆此法也通除法謂如應四歸之又應五歸之又應十二除之者却變法以四乗
  hash: sha256:e7ed92a6ae6ed3d3bf52dff5d5e7ecb2c6c2b8f624a0cb3af6a02b7042b361ef
