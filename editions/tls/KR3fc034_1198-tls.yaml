body:
  text: 價卻有丹價旡粉價両價對減將硃價盡減去右邊餘出價一錢六分乃九斤粉價內對減去一十四斤丹價尚餘銀一錢六分也卻又以中行粉五英粉負九為法互乗両邊徹平俱是四十五斤粉中行乗出五十四斤丹乗出四十五斤粉五十四斤丹之價左邊乗出七十斤丹其價卻是毎九斤粉價內除去一十四斤丹價共四十五斤粉內除去七十斤丹之價就以此與中行對減是將中行價內四十五斤粉減去除七十斤丹所餘之價淨餘七十斤丹價併原乗出五十四斤丹價共計一百二十四斤丹價故以五十四併七十淂一百二十四為法除之淂丹價也共雲負九者即九也因丹在中行左行粉卻在右行中行左行卻是空位故將右行乗出粉九移入左行空位筭中行粉五為法互乗故雲負也實則以中行之粉丹與價淂與代乗淂粉丹之數並對減餘價作一行互乗耳此是右左二行互乗後以粉再為法故先淂丹價若以丹再為法即先與粉價但法有減除合併之不同並列以篇參考增法先以右左二行硃為法互乗右粉得九價得六両一錢二分左丹得一十四價得五両九錢六分両價對減右餘一錢六分卻以中行丹六與左行丹一十四為法互乗両邊俱得八十四丹六乗粉負九得五十四乗餘價一錢六分得九錢六分丹一十四
