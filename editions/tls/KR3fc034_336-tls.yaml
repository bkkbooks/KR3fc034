body:
  text: 應多兩箇差數猶之小頭截長三十五步以小廣乗長得七百步比截積不足一百二十二步五分截廣乗長得九百四十五步多一百二十二步五分對減則小廣乗長比截廣乗長正不足兩個一百二十二步五分共二百四十五步大頭截長五十五步以大廣乗長得二千零九十步比截積多三百零二步五分截廣乗長得一千四百八十五步不足三百零二步五分對減則大廣乗長比截廣乗長正多兩箇三百零二步五分一理也且小頭差數一百六十四步五分合小廣乗長截廣乗長二數共得一千六百四十五步大頭差數三百五十七步五分合大廣乗長截廣乗長二數共得三千五百七十五步是差數得二廣乗長之數十分之一小頭兩廣乗長比本積多少一百二十二步五分截長三十五步自乗得一千二百二十五步大頭兩廣乗長多少三百零二百五分截長五十五步自乗得三千零二十五步是兩廣乗長餘不足之數得截長自乗十分之一此皆數理妙合莫可思議知此則不言一廣但言截長截積亦可得截廣原廣至以截積截長問截廣亦用倍積者將二積傾倒相配每西各有一小廣一大廣故以長除得二廣共數減原廣得截廣增法以截長十分之一為法者積由長乗兩廣而得差數是積十分之二以長十分之一除差數將一分仲作二分便是二廣共數故亦減一廣得一廣後二法因廣求長用長乗差除緣已有截廣差步故用本差除因長求廣用原差乗原長除即得本差
