body:
  text: 分假如四分両之一則二錢五分也若三分両之一則三錢三分上以至三三之無窮必湏以分子通之不然則畸零不盡終無可置位矣今有布四十五疋毎疋價三分両之二問共該銀若干舊法置布四十五疋以分子之二因之得九十両為實卻以分母三為法歸之得共銀三十両解義三分両之二即毎疋六錢六分六厘六六不盡故用通分法以分子二因之以分母三歸之即二因三歸淂三分之二也又法今有叚四十五疋毎疋價四両零三分両之二問共銀若干舊法置毎疋價四両以分母三通之得一十二両加入分子二共得一十四両以乗總叚四十五疋得六百三十両為實以分母三為法除之得共銀二百一十両解義零是三分中二分故將毎両除泎三分加入零二併三分共一十四分以乗共布卻仍以三分歸之淂將零二分亦通融歸作本數矣
