body:
  text: 乗為除法與上相及即上法還源也難題以碗知僧歌巍巍古寺在山中不知寺內幾多僧三百六十四隻碗恰合用盡不差爭三人共湌一碗飯四人共嚐一碗羹請問先生能筭者寺內共有幾多僧舊法置三人四人相乗得一十二人以乗總碗三百六十四隻得四千三百六十人為實另以三人四人併之得七為法除之得僧六百二十四人以三歸得飯碗二百零八隻以四歸得羹碗一百五十六隻解義三四相乗取平之數也三三個四人淂一十二人即用三個羹碗四個三人淂一十二人即用四個飯碗是十二個僧計用飯碗四個羹碗三個共七個乃碗數淂僧數十二分之七故以人數十二乗總碗以七歸淂僧數乃將七分碗數乗除作十二分人數也難題以碗知客三位歌婦人洗碗在河濱試問家中客幾人荅曰不知人數目六十五碗自分明二人共湌一碗飯三人共吃一碗羹四人共
