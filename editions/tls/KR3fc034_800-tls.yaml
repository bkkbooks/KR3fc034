body:
  text: 有二萬八千八百之積乎因知舊法之差誤為甚遠也東廣折半西上下廣折半乗之與乗後折半同理東無上廣將下廣折半亦即上下廣折半一理也築牆截高問上廣法今有原築牆上廣二尺下廣六尺高一丈八尺今築高一丈零八寸問今上廣若干舊法置原下廣六尺內減原上廣二尺餘四尺以今高一十尺零八寸乗之得四十三尺二寸以原高一十八尺除之得二尺四寸卻於原下廣六尺內減二尺四寸餘得今上廣三尺六寸又法置原下廣六尺減原上廣二尺餘四尺另以原高一十八尺減今高一十尺零八寸餘七尺二寸以乗四尺得二十八尺八寸為實以原高一十八尺為法除之得一尺六寸加原上廣二尺得今上廣三尺六寸解義亦皆係先乗後除同錐臺等法然錐是原方減盡此尚有上廣二尺故置下廣減去上廣餘乃原高之差數以原高除得每尺差若干以今高乗得今高差若干以減原下廣所餘即上廣之數後法搃同一理前法以今高乗是自下而上之差數故就下廣減法差
