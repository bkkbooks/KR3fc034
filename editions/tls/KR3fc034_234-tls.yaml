body:
  text: 今有方田四面各十五歩從一邊截一直形祭三十二歩計截濶四歩問截長若干法置截積三十二歩為實以濶四歩為法除之得截長八歩如以長問濶即以長除積得濶舊法前田從一角斜截勾股形積三十歩問截濶即置截積三十歩加倍得六十歩為實以方面十五歩為法除之得濶四歩觧義方田直曰截積易曉截直形則以長得濶以濶得長截勾股圭角等形則倍積求之因勾股等田皆本直積折半亦以倍積還源稊鈄寺回皆大小二折平求積截此寺形將原積以長乗之得平濶或以小闊問大大濶問小將平濶加減可得今有方田一坵從四圍截田十畆四面濶各十歩問外方內方及原田各若干増法置截田十畆以畆法二四通之得截積二千四百歩以濶十歩為法除之得二百四十歩內方減退四十歩
