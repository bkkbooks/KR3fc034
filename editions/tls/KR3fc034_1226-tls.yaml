body:
  text: 解義此與三色同理先以瓜二瓜一法將瓜價反平減去但一將有梨旡桃四行有桃旡梨一行四分是二瓜四梨之價四行四分八厘是二瓜十六桃之價對減去四分內除減盡瓜價又將十六桃對減去四個梨價尚餘銀八厘卻又以梨二與梨負四為法互乗以負四乗梨二淂八乗榴七淂二十入乗價四分淂一錢六分是全物全價以梨二乗負四淂八乗負一十六淂三十二乗餘價八厘淂一分六厘其價乃是一十六桃內減洽四梨之餘價共三十二桃內減八厘價淂一分六厘將兩數合併淂一錢七分六厘即將三行乗出入梨價合入三十二桃內完全三十二桃之本價便是將梨價亦都減盡了止存二十八榴三十二桃共價一錢七分六厘卻又以榴四與負榴二十八為法互乗一邊淂價八錢四分是一百一十二榴一百九十六桃之價一邊淂七錢零四厘是一百一十二榴一百二十八桃之價両下對減榴俱減盡桃餘六十八個價餘一錢三分六厘即六十八桃之價故以六十八為法除之淂桃價也頭一次互乗對減是要減除瓜價二次互乗不對減必合併作數是因桃十六內減去四梨之價故仍用四梨為法互乗四梨價合入十六桃湊成桃本價亦即是減梨價三次又對減是因互乗內止有榴與桃故用榴為法互乗對減除去榴價止存桃價也然次乗以合併為實是因桃價有餘於梨湏合入梨價乃全桃價故用合併若梨價有餘於桃又湏除去梨餘價乃止存桃價又湏用對減舊法以奇行用合併偶
