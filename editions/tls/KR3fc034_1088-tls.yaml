body:
  text: 淂六即以外週二分乗內周之三淂六乃將零四分之三俱以二分之也如外周零二分步之一乃毎一步作二分以內週四分互乗二分淂八分是毎步分作八分互乗之一淂四分是八分步之四分內周零四分步之三乃毎一步作四分以外週二分互乗四分淂八分亦毎步分作八分互乗之三淂六分是八分步之六分是合內外俱以八通之故以分母二四相乗淂八為法除之其不言以二分乗之三四分乗之一者乗法顛倒可用隱含其義待人索悟耳通分求銀積法今有一百九十人毎人支銀一両零十九分両之一問共銀若干舊法置銀一両以分母十九通之加分子一共得二十以人一百九十乗之得三千八百為實卻以分母十九為法除之得共銀二百両一両零十九分両之一即毎人一両零五分二厘六毫不盡通分求零餘法今有布二疋九分疋之五用過一疋零六分疋之一問尚餘若干舊法置原布二疋以分母九通之得十八加分子五共得二十三
