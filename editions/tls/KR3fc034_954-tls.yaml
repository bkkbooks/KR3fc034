body:
  text: 戸問各等每戸及共米各若干舊法置米一千一百三十四石為實以五因一等二十四戸得一百二十戸以四因二等三十三戸得一百三十二戸以三因三等四十二戸得一百二十六戸以因四等五十一戸得一百零二戸五等戸不動仍六十戸併五等數共得五百四十衰除實得第五等每戸米二石一斗以六十二因之得共米一百二十六石另以二因二石一斗得四等每戸訣米四石二斗以五十一戸乗之得共米二百一十四石二斗又以三因二石一斗得三等每戸該米六石三斗以四十二戸乗之得共米二百六十四石六斗又以四因二石一斗得二等每戸訣米八石四斗以三十三戸乗之得共米二百七十七石二斗又以五因二石一斗得上等每戸該米十石零五斗以二十四戸乗之得共米二百五十二石額側挨減俸法今有俸糧三百零五石令五等官依品遞減一十三
