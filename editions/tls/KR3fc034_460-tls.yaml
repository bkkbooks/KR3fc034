body:
  text: 六厘二毫二系四忽二微二織通長即圓全徑故用折半一理也角面十步圖今有直田內容六角面各十步問直田長濶及角積餘積各若干增法置角面十步用六角法角面得尖長四分八厘一毫六系二忽一微零五沙除之得尖長即直長二十步零七分六厘三毫二絲一忽二微一織又以六角法正長得尖長八分七厘六毫三系忽九後六錢乗之得角正長即直濶一十八步一分九厘六毫四絲五忽五微五織卻置直長以濶乗之得直田積三百七十七步八分一厘六毫八絲六忽五微零一沙四塵七埃一渺一漠五五另將尖長加面長折半得一十五步三分八厘一毫六系零六微零五沙以角正長即直濶乗之得六角積二百七十九步八分九厘零七絲一忽零七塵三埃五渺五漠七七五又置角外餘長得
