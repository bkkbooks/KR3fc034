body:
  text: 得三百三十六両邊對減盡乗桃七得五百八十八與一百四十四對減餘四百四十四為法乗價三分得二両五錢二分與一両六錢三分二厘對減餘八錢八分八厘為實以法四百四十四除之得桃毎個銀二厘照前法求榴梨瓜價解義此與上同法即次乗對減與上異正物乗首行餘價用對減也物乗首行餘價三分六厘是十二個梨價內減餘十八個桃價仍餘三分六厘次乗以負梨十二乗梨二淂二十四乗榴七淂八十四乗價四分淂四錢八分其價乃二十四梨八十四榴之全價以梨二乗負梨十二淂二十四乗桃十八淂三十六乗價三分六厘淂七分二厘此價乃是二十四個梨價內除三十六個桃價的餘價両下對減將此餘價減去其梨二行全價內有二址四梨之全價亦對減去除三十六桃所存之餘價止存三十六桃八十四榴價即是將梨價卻減去了與上法用合併一理也上法以梨十二等為負立四行餘價在四行也此將乗出桃數為負逓移隨餘價移也五色方程法今有冰糖二斤白糖一斤價銀四錢又白糖二斤葡萄五斤價銀三錢三分葡萄六斤榛仁八斤價銀五錢五分六厘榛仁四斤
  hash: sha256:684b4cddfb91e0b7b662cdde8a2ff69a6930332068b81b9001e0cdfc47cc4ad3
