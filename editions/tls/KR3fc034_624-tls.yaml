body:
  text: 次再共啇一百二十五尺自乗得一萬五千六百二十五尺又置初次再共啇一百二十五尺以初次啇一百二十乗之得一萬五千又置初次啇一百二十自乗得一萬四千四百併三數共四萬五千零二十五以再啇五尺乗之得二十二萬五千一百二十五尺除實恰盡得立方西一百二十五尺解義次啇法以初次啇自乗再以次啇二十乗之便是直橫皆一百二十尺立濶二十尺內有一西方平亷二長亷一隅在內以初啇乗初次啇再以次啇二十長之便是直長一百二十橫濶一百立濶二十內有一平亷一長亷以初啇自乗再以次啇二十乗之便是直積皆一百立濶二十止一平亷合之併完三平亷三長亷一隅之積故併三數總以次啇二十乗之可盡積而淂方西不盡再用三啇歸除開立方法今有立方積一億零二百五十萬零三千二百三十二尺問五方西若干舊法置積為實約六錢四百萬以上該啇四百尺即初啇又四百於左上亦置四百於右下法位自乗得一十六萬為下法與左上四百相呼一
