body:
  text: 解義掌上定位之法筭家所不可廢如偶得數無筭盤可用即于掌上定位求之但或位數遇多烯除法洐寔前以次烯除猶易若乗法洐尾位逆乗大數在前數無頭緒易于忘失令立自首位挨乗之法㝎首一位乗光開挨以乗下應乗光以住記明一位止數不至外錯紀然有州乗自乗二等今各到增法于後新增掌上相乗歌相乗掌上法宜明法首實首一順行法首挨身逐位下次位又向身前乗三位四位以次逆得數俱向本位增
