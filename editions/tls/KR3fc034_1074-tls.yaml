body:
  text: 即係六分之五置列四六分等分八分互之五三等之四之三二等一等先以六分七分相乗得四十二又以八分乗之得三百三十六為苐四等燈之衰又以七分互乗之五得三十五再以八分乗之得二百八十為三等燈之衰又以六分互乗之四得二十四再以八分乗之得一百九十二為二等燈之衰又以七分互乗之三得二十一再以六分乗之得一百二十六為一等燈之衰併四等衰共得九百三十四為共衰另將一等衰一百二十六用九因五歸得二百二十六両八錢為一等燈油之衰又將一百九十二用七因六歸得二百二十四両為二等燈油之衰又將二百八十用五因七歸得二百両為三等燈油之衰又將三百三十六用三因八歸得一百二十六両為四等燈油之衰併四衰共油七百七十六両八錢為共衰卻置共油三百八十八両四錢以燈油共衰為法除之得五分以乗總燈衰九百三十四得總共燈四百六十七盞另以五分乗一百二十六得一等燈六
