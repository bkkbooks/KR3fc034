body:
  text: 共二千二百四十併三數共七千零五十五以滿法數減之除去一十三個五百零四共去六千五百五十二餘得共物五百零三個解義首法有本數為衰有加倍為衰二法全以本數為衰此法全以加倍為衰止或四倍或五倍或七倍者如以七乗八淂五十六以九數之餘二五倍餘出十個乃又湊一九止餘一個以七乗九淂六十三以八數之餘七加一倍則二七湊成一八止餘六乃加一倍則損一個六倍減去六個乃止多一個以八乗九淂七十二七數餘二四倍餘八乃再湊一七餘一個不論若干倍必至多一為準也又如雲有物三數餘一個四數餘一個五數餘三個問共物若干增法置三四五維乗三四相乗得一十二再以五乗得六十為滿法數另以三乗四得一十二以五數之餘二加倍三個一十二共三十六以五數之餘一即以三十六為五數剩一之衰又以三乗五得一十五以四數之餘三加倍三個一十五共四十五以四數之餘一即以四十五為四數剩一之衰又以四乗五得
