body:
  text: 則以五乗四得二十再以六乗得一百二十以此為三位會通就齊之数也四位五位皆凖此分率法謂如各位應得有多有寡難於齊一即各列應得分数合併推求以合本等如後二八三七等分率是也併除分乗法謂如各率分数不同即併諸率分数以除縂数求出一物通率仍以名率分乗以得各数分乗併除又分乗法即係上法但各率有紛多頭緒零雜不齊湏各乗併歸一各併成一率分数合作除法再用分率乗之以得本数併折法謂如位数挨次増減即以少多二数合併作一折半層数以得本数三角環田內外周皆此等類
