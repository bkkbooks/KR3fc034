body:
  text: 石分之問各若干舊法置遞減一十三石另以五等減一餘四以乗五等得二上折半得十為法乗之得一百三十石以減總糧三百零五石餘一百七十五石為實卻以五等除之得第五等俸三十五石舟再加一十二石得第四等俸四十八石再加一十三石得第三等俸六十一石再加一十三石得第二等俸七十四石再加一十三石得第一等俸八十七石觧義此亦挨次遞減但止減十三石不可以一二三四五分乗求之五等以上遞多十三石共多十問十三石故以十為法衰十三石減出二百零五石餘即五等平均之數也其將五等減一餘四為法以乗五等者九挨次遞加除末後最少一位為本數係四位者止三位有如數係五位者止四位有加數將五減一者合有加數之住也即以乗五等折半者凣加數自少而多由末位逆上第二位多一三位多二四位多三五位多四係四位者上等多三數係五位者上等多四數則五即末第二位多一上等位多四共五一面失朵合併二層折半之法也二位作一位止宜以二乗得本數今以四乗故折半即所多之數也或將五等衰分列如一二三四五減除末後一
