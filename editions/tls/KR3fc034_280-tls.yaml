body:
  text: 另以啇八自乗得六十四步以乗餘下廉六十四步得四千零九十六歩併上廉共八千一百九十二步為法除實六萬五千五百三十六步得六八步另置倍積照上法得弦解義以積自乗為寔者將積開方後可以數求也以矢乗積者本積係以矢乗得數又以矢乗積即一乗再乗法也又以矢乗一二五虛隅除徑卻以矢自乗了餘徑者即以矢乗餘徑再以矢乗餘徑亦一乗再乗法也凣自乗再自乗淂數另將原數一乗再乗三乗數即相同如四自乗得十六再將十六自乗淂二百五十六另以四乗四淂十六再以四乗十六淂六十四又以四乗六十四即淂二百五十六又如五自乗淂二十五再用二十五自乗淂六百二十五另以五乗五淂二十五再以五乗二十五得一百二十五又以五乗一百二十五亦得六百二十五此是方自乗両邊數合一故無參差若以短長不等相乗四乗六得二十四再用二十四自乗得五百七十六另以四乗六淂二十四再以四乗二十四淂九十六又再以六乗九十六即淂五百七十六皆是以三乗積合一乗再自乗積啇入即所啇之矢原以矢乗得積又再以矢乗積又以矢乗餘徑再以矢乗餘徑俱是再乗法尚少一個矢乗合原積自乗之數故以之為法除寔可得矢也其以一二五為虛隅法何也圓淂方四分之三即淂方七分五厘四隅虛二分五厘弧矢係半圓止二虛隅應淂一分二厘
