body:
  text: 法二四通之得積七百六十八步四因三歸得一千零二十四步為實以開平方法除之得三十二步為圓之全徑折半得繫半中處半徑一十六步以每步五尺乗之得羊繩長八十丈積矢問截弦今有圓田從一邊截濶八步計積一百二十八步問截長若干舊法置積一百二十八步倍之得二百五十六步為實以濶八步為法除之得三十二步減去濶八步得截長二十四步增步置積一百二十八步為實以截濶八步為法除之得一十六步另將截濶八步折半得四步以減一十六步餘一十二步倍之得截長二十四步解義圓田截積即弧矢田倍積以濶除又減濶淂長者因弧矢以矢加弦折半以矢乗之淂本積將積加倍以矢除之乃淂弦加矢本數故減去夭步得弦步也不倍積以矢除之又減半知加倍淂弦者以本積原是以矢乗半矢半弦將本積以矢除之得半矢半弦數
