body:
  text: 六步不足七步截長八步盈九步問截積併原濶各若干舊法置列右截六步左截七步互不足七步多盈九步先以右截六步互乗左盈九步得五十四步又以左截八步互乗右不足七步得五十六步併六六截積實另以不足七步盈九步併之共一十六步為田源濶實卻以截六步八步相減餘二步為法除一十六步得田濶八步除一百一十步得截積五十五步解義以上數條皆同一法因有買物分物及長短測物測田之不等皆可以類推求故併列以備參悟盈不足問人車法今有人車不知數凣三人共車二車空二人共車九人步行問人車各若干舊法置二人三人相乗得六加九人得車一十五輛另以二人乗車十五輛得三十加步行九人得共三十九人解義此應置二車空以毎車三人乗之得六人加步行九人共十五以二人三人對減餘一為法除之得車十五輛以三人互乗步
  hash: sha256:ccd94c2d90cea87cee99d864562c5fe7b6e0b393a13a781384bc6b9488cf72c0
