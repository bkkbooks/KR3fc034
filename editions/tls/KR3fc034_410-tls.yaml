body:
  text: 十五歩除之得六十四歩以五分乘之得三十二歩此即方自乘多數也弦差長則矢差短故每弧矢少四歩四弧矢共少一十六歩將內方兩多三十二歩折半得一十六歩以四弧矢歸之每弧矢加補四歩乃合正積猶前法半弦自乘兩多之數折半補一弧矢合積全弦自乘兩多之數折半補四弧矢合積一理法謂多十六歩乃內方及弧矢合筽比圓田積少十六歩其寔方積差多三十二歩不止十六歩也弧矢積尚少十六歩乃欲於每弧矢去舟四歩合數豈不悮後學哉以此思之知方五斜七乃古人立法之大槩膠柱刻舟失不攻自破矣又謂細半弧矢丨短弦長數不准將弧矢一法止可筽半圓遍此則無用矣又何用立弧矢法乎
