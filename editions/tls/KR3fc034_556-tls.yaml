body:
  text: 白下隱吏右齊陽丘陵足軒強恕君士李長茂拙翁臀獸開章節此章以平方求方面以平圓求圓徑以帶經減經求直長瀾以一乘再乘求立方立圓以一乘再乘三乘等求立方立圓之績高開方興勾股法相為表乘乃諸數借為棍賣誠笑家可冗考究開方總解平方即方面自乘之績還源曰開開方者開四面而成方也共法有初商再商三商四商不等以商除績盡為定商者約撂之意乃量績數多寡而約各定方百則下十萬則下百之麥是也初商是方法次商以後用亷法隅法方法者先約各績可以四面成方者左定一
