body:
  text: 二個十五以十四乗之得二百一十另將十三加一個半共十四個半又乗之得二千零四十五又將六個半加半個共七個加入共得三千零五十二為實以四為法歸之得積物七百六十三個又增法置下周加三個共四十二個另置下周加六個共四十五個以四十二個乗之得一千八百九十再以六歸外周得六個半倍之得十三加一個半共一十四個半又乗之得二萬七千四百零九又另將六個半加半個以所加半六整六共九乗之得六十三併二數共二萬七千四百六十八為實以立圓率三十六除之得積物七百六十三個觧義舊圓尖垜法今增補六歸外周得七即七層也加倍者每面七層與面即十四層也又加一者便中心共十五層也應週三十九是有零雲者六得六個半倍之得十三加一得十四有半六省無中心十四層此即圓徑求積法也又將十四加二乗十五者原係十五層十四加二即十五層加一也其加一者圓尖垜自上而下每層多三個徑係週三中之一應加一個也又將十五加半個乗
