body:
  text: 或六零三六兩加周相乗各以率除皆得積問周率乗積為實方圓開方除所加三稜帶三為縱差開方再減三數宜即得外周不用疑又增各束問積問周通法歌方周問積四歸周加一自乗得積優以積問周開方良減一四乗周可詳圓週三歸亦加一自乗三因四歸圓積四因再三歸開方減一三乗推稜週三歸加一零另加二數兩相乗得數折半合本積以積問周倍為實帶一作縱開平方減一三乗周亦彰解義加減中心求積求周舊亦載分二歌而義求貫且方三稜各有中心者只有與中心者舊俱邉濶未簡故依法前搃歌後歌又搃括簡明通法伴人易曉易記兩者皆不可廢故併著幹右
