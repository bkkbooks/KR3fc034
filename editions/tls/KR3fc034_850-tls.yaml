body:
  text: 八七五本身變三作一下挨次加八七五又呼首位三留一八七五本身變三作一下挨次加八七五共得首位二次位一隔位下挨次六二五次位十兩上得斤即二十一斤不動下隔位六二五用加六法加成斤下位一再加零四錢得乳香二十一斤一兩四錢又置氷片二百五十九兩四錢八分用通截通加法從末位呼八留五變身作五逆上四變身作二下位加五九變身作五下加六二五五變身作三下加一二五二變身作一下加八七五得一六二一七五實首係百次位十得斤即一十六斤不動下二一七五用加六法得氷片一十六斤三兩四錢八分以兩求斤下帶兩價法今有黃蠟五百三十五斤七兩每兩價八厘九毫問該銀若干舊法置黃蠟五百三十五斤用加六法得八千五百六十兩併零七兩
