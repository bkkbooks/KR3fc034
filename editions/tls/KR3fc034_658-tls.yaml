body:
  text: 白下隱吏齊陽丘睡足軒強恕居士李長茂拙翁南輯著測貯章此章明倉窖囮船之分數定堆垜束桃之凖則方圓尖平僃列長濶高下互詳約法有同印沙測貯無殊然盤量倉窖法古以一斛為一石今以一斛為五斗二斛為一石用今法只以石數筭積古法積方二尺五寸為一石謂長濶方一尺高二尺五寸是也然古今度量不同又各處大小互異若較今時石法可將棹四張橫頭監地以為井字樣式內用今尺四橫各量一尺上下皆同四旁用物擠住不動將米一石傾貯於內米上以平為度卻用今尺量高若
