body:
  text: 互羊四隻一両五錢共一百隻共一百六十八両先以貴物牛三隻乗羊賤價一両五錢得四両五錢次以貴價一十二両乗羊賤物四隻得四十八両二數相減餘四十三両五錢為總平法又以中羊四隻互乗總價一百四十八両得六百七十二另以賤價一両五錢互乗總物一百隻得一百五十二數相減餘五百二十二為實以總法四十三両五錢除之得一両二錢為牛與價平法以貴物牛三乗之得牛三十六隻以牛貴價一十二両乗之得牛價一百四十四両於總物一百隻內減牛三十六隻餘得羊六十四隻於總銀一百六十八両內減牛價一百四十四両餘得羊價二十四両解義此係先以賤物賤價乗淂貴物貴價與前梨桃法同牛價多數九搃價多搃物六十八多數思絕故再列申明前法難題貴賤三位相和差分歌今有千錢買百鷄五十雄鷄不差池草鷄每個三十足小者十文三個知增法置雄鷄價五十雄鷄一隻以每十文一
