body:
  text: 周兩倍不足六十歩問方徑田置兩面濶共十歩加倍得二十步另置不足六十歩折半得三十歩加入倍濶二十歩得內圓徑五十歩加兩面濶十歩得外方面六十歩照上除內圓積得餘方積今有方田一叚從中心截作圓塘餘外四面各濶五分方周比圓周兩倍不足二百一十四歩問外方內徑及內外田各若干増法置兩面濶共一歩加倍得二歩另置不足二百一十四歩折半得一百零七歩加入倍濶二歩得內圓徑一百零九歩加入兩面濶一歩得外方面一百一十歩內徑自乗得一萬一千八百八十一歩三因四歸得圓塘積八千九百十歩零七分五厘外方自乗得共一萬二千一
  hash: sha256:58d91e8e5880f1a4546bca05e54701859debac26eb6786e5470b5435199c0c38
