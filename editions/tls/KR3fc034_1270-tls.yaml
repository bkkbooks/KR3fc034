body:
  text: 徵火三分益一屬商金商居八九還生羽羽水得流六八侵復以三分而益一角音八入妙通神三分損一乃三分之二三分益一乃再添二分內一分也五音相生圖黃鍾之管長九寸以九寸自乗淂八十一寸為宮音卻捋八十一以二因之淂一百六十二寸以三歸之得五十四寸所謂三分損一而生微火卻以五十四以四因之淂二百一十六以三歸之淂七十二寸所謂三分益一而生啇金卻將七十二以二因之以三歸之淂四十八寸雨生羽水復將淂數四十八以四因之以三歸之淂六十四而生角木此乃五音相生之法多者為導為濁少者為畢為法也
