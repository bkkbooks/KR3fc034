body:
  text: 右鵝四一乗中行鴨三中乗得九空七錢五分得二両二錢五分中鵝三乗右行空照左負九得四十五雞四得十六得八十六錢右法乗淂二両四錢減右餘一錢五分左法再乗淂七錢七分左空鴨五得四十五雞六負九乗得五十四八錢一分負九乗淂七両二錢九分舊法先以右行鵝四為法通乗中行雞四得一十六價六錢得二両四錢即以中行鵝三為法通乗右行鴨三得九價七錢五分得二両二錢五分両下對減餘雞一十六隻價一錢五分又列中鴨負九為法通乗左行鴨五得四十五雞六得五十四價八錢一分得七両二錢九分即以左鴨五為法通乗中負九得四十五雞十六得八十餘價一錢五分得七錢五分中左對減鴨盡雞中行八十左行五十四共一百三十四為法以價中七錢五分左七両二錢五分併二數共八両零四分為實以法除之得雞毎只價六分另以左行原價八錢一分內減鴨六只共價三錢六分餘四錢五分以鴨五隻除之得鴨毎隻價
