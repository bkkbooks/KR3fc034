body:
  text: 數理可以類椎用處亦鮮平圓立圓不外平方立方數有不盡亦同方法命之謂之命者餘實若干不盡卻以所啇得平方數若干倍作両意再加一隅共得若干分餘數止若干分即為若干分之幾以命之也開方求率圖拍口玩圖義首層一平方立方是一即如一歸不湏歸二層生兩一即二數位二自乗得四三層一二一共四即平方數二再乗四得八四層一三三一共八即立方數五層共十六六層三十二七層六十四即三四五乗數乃從一漸次生下每層增一倍合二位一再以至無窮明生率妙合之埋其合二位數何也一如太極兩一如兩儀藹數本於一然太極而不用陰陽逄兩得生首至下兩旁總是一即是一自乗再乗搃是一一是兩儀之一即仍太極之一
