body:
  text: 喑馬垛積因乗合總共三條河圈九位乗法圖計一條增添排九笑位圖觶計一條一掌金定位圖計一條第二卷區章丈量曰畆各形總歌計一條丈量篾車式様圖觧計一條求献求積乗除等法共三條方圜求積截積等法共十三條直田求積截積等法共十二條圓環孤天等田法共三十二條梯斜圭勾股等田法共二十一條角梭各形不等田法共二十三圈方五斜七盈不足觧共四條方容圓容錠欖八角共七條圓容方圓與六角三角相容圖觧共七條三角容四三角三四角圖觧共二條直容六角弧矢圖觧共四條勾股容圓圖觧共三條
