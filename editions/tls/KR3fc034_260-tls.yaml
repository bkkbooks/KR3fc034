body:
  text: 歩另置墓周六歩自乗得三十六歩以二十除之得三歩以八墓乗之得二十四歩又十字路濶一歩直長一十六歩橫長一十五歩內除中心一歩共三十歩加八墓二十四歩得五十四歩以畆法二四除之得截去占地二分二厘五毫以減田一畆得實存田七分七厘五毫以毎畆價二兩五錢乗之得該價銀一兩九錢三分七厘五毫觧義墓以周自乗用十二除之者以圓周求積用十二除之也法見圓田下圓田求積求徑歌圓徑自乗法有因三因四歸得積真積加四因三歸法開方求之徑尋今有圓田徑五十六歩週一百六十八歩問積歩及田若干舊法置徑五十六歩自乗得三千一百三十六歩三因四歸得積二千三百五十歩以畆法二四除之得田九畆八分又法
