body:
  text: 此即從中斜分之中叚下方仍各二十四尺截至尖如刃增求積法置下方二十四尺自乗得五百七十六尺以高三十二尺乗之得一萬八千四百三十二尺折半得積九千二百一十六尺居立方積一半此即前中叚又復頂橫糾分下中即方雖外二上有監廣無橫長下有橫長無監廣俱如刃此即外斜截之一叚上無橫長豎廣一十二尺下無廣橫長二十四尺增求積法置下橫長二十四尺以上一十二尺乗之得二百八十八尺以高三十二尺乗之得九千二百一十六尺以六歸之得積一千五百三十六尺居方錐四分之一二叚共得四分之二合方錐一半將先斜分刃二整叚再泛中攢斜分下亦分作前形二叚共四叚合一方錐四隅復截作四倒方錐方皆一十二自乗得一百四十四以高三十二乗得四千六百零八尺三歸得一小方錐積亦一千五百三十六尺合大方錐四分之一四小方錐併合得一方錐故曰方錐得立方三分之一也
