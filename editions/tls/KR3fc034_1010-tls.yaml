body:
  text: 四文乗之得桃價九百八十文於總菓內減桃數得梨三千二百八十五個於總價內減桃價得梨價四千零一十五文或先求梨與梨價即以右中桃七互乗左下總價四千九百九十五文得三萬四千九百六十五次以左中桃價四文互乗右下總梨桃五千個得二萬二數相減餘一萬四千九百六十五為實以總法四十一除之得三百六十五為貴物貴價平法以梨九個乗之得梨三千二百八十五個以梨價十一文乗之得梨價四千零一十五文於總菓內減梨數得桃數於總價內減梨價得桃價增法置錢十一文與梨九個對減餘錢二文又置錢四文與桃七個對減餘物三個照前分列左右以二乗桃七得一十四以三乗梨九得二十七併之得四十一以二乗錢四文得八以三乗錢十一文得三十三併之亦得四十一即以四十一為總平法另以多錢二文互乗總梨桃五千
