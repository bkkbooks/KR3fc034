body:
  text: 呼次中午單位二自乘呼二二如四就於亥位定四得共積一千二百三十步零七分四厘六毫七緣二忽四微解義元自乘法首位即是寔首位法次位即是寔次位各位俱同以寔首與寔各位相對加乘即是以法首乘寔各位故就符寔首與各位對照有對無對有空無空丁點有無差誤有以對加雙者有對是二位彼此相乘應二次如香位已與實對兩呼三八二十四若用因乘符法者三於邜位秉起辰位五已位全午位三八二十四法自己位秉起午位亦呼三八二十四午位上原無兩三八二十四衣無對單白乘如手搯酉位寅申相對起丙中已注單自乘以法寔酉位止一已位八自乘數皆屬一定之可易除法是首位起先得大數乘法是尾位起大數未易忘故眾二法寔首起而犬先了與陰法無矣附鋪地錦焉笑法歌寫笑鋪地錦焉哥不用笑籃數可知實位列直法位照行呼寫莫差池大數左上實首起小數右下法尾齊格圖斜界分等第萬千百十不湏疑
