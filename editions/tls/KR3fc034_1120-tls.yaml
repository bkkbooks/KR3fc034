body:
  text: 竿卻比竿子短一托毎一托計五尺舊法置短一托加倍得二托併長一托得竿三托加長一托得索長四托各以毎托五尺乗之得竿長一丈五尺索長二丈孫子物不知總歌三人同行七十稀五樹梅花廿一枝七子團圓正半月除百零五便得知今有物不知數只雲三數剩二個五數剩三個七數剩二個問共數若干舊法置列三五七維乗以三乗五得一十五又以七乗得一百零五為滿法數另以三乗五得一十五為七數剩一之衰又以三乗七得二十一為五數剩一之衰又以五乗七得三十五倍之得七十為三數剩一之衰將三數剩二下二個七十共一百四十五數剩三下三個二十一共六十三七數剩二下二個十五共三十併之得二百三十三內減一百零五再減一百零五餘得物二十三個
