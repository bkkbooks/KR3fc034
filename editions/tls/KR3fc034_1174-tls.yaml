body:
  text: 得七十戶下十六戶以八因之得一百二十八戶併之共一百九十八戶卻置列左右二右一百七十四戶五分之四淂一百三十九両二錢左一百九十八戶九分之七淂一百五十四両互多四両六錢多一十二両先將右上一百七十四戶以右中之四因之以五分歸之得一百三十九両二錢互乗左下多一十二両得一千六百七十両零四錢又將左上一百九十八戶以左中之七因之以九分歸之得一百五十四両互乗右下多四両六錢得七百零八両四錢二數對減餘九百六十二両為貼差銀實卻以一百三十九両二錢一百五十四両對減餘一十四両八錢為法除之得應貼差銀六十五両又將多四両六錢一十二両對減餘七両四錢為實以前法一十四両八錢除之得五錢為平法以因上戶十分得上戶毎戶泒銀五兩以因下戶八分得下戶毎戶泒銀四両以因趙甲一百七十四戶得共泒銀八十七兩以因右一百三十九両二錢得五分之四共出銀六十九両六錢減多銀四両六錢合應差銀以因錢甲左一百九十八戶得
  hash: sha256:1eb11f055b50f3dd464f07a055cbf03a0b5b3451ef9e709507db4fbe8bbb630d
