body:
  text: 所換羊二隻乗之得三千六百隻為法除實得該換鵝二十隻解義二法一義前是三位後事四位前置今麥以蔴乗自下而上後將乗鵝以原鷄乗自上而下乗法不拘法寔應用乗者或自上乘自下乗一也正法原應一除一乗如置鵝八隻以鷄二十隻除之淂四乃毎隻鷄應換四分鷄將四分鷄以三十隻鷄之淂一十二乃三十隻鷄該換十二隻鵝將十二隻以九十隻鴨除之淂一三三不尽乃毎隻鴨應換鵝一分三厘三毫不尽將二三不尽以鴨六十隻乗之得八乃六十隻鴨應換八隻鵝將八隻鵝以二羊除之淂四乃一隻羊該換四隻鵝將四隻鵝以羊五隻乗之得二十却五隻羊該換二十隻鵝若將羊五隻為寔以羊二隻除之得二五乃是一隻羊作二隻半將二隻半羊以鴨六十隻乗之淂一五是將六十隻鴨都加作二隻半得一百五十隻乃五隻羊應換一百五十隻鴨也將一百五十隻鴨以九十隻鴨除之得一六六不尽乃毎一隻鴨加作一隻六六不尽也將一六六不尽以鷄三十隻乗之淂五乃將三十隻鷄毎隻加作一六六不尽共得五十乃五隻羊該換五十隻鷄也將五十隻鷄以二十隻鷄除之得二五乃是毎一直鷄作二隻半將二隻半以八隻鵝乗之淂二十乃將八隻鵝各加作二隻半共得二十隻正五隻羊該換二十隻鵝也達八隻鷄乗除起到底是乗除個鵝数共五隻半乗除起故首是五隻半應換之鴨鷄鵝数顛时
