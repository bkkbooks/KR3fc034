body:
  text: 松子七斤價銀三錢二分七厘冰糖三斤松子九斤價銀四錢六分五厘問各色價若干冰糖二白糖四得一十二空空空負十八得三十六六價四錢糖三乗得一両二錢與末行減餘二錢七分白糖互乗淂五錢四分空初次五白糖二葡萄五得六十空空負三十六得二百一十六價三錢三分白糖十二乗淂一二両九錢六分與首行減餘三両錢二分得六乗得二十両五錢十空乗為注空葡萄六榛仁八得四百八十空負二百一十六得八百六十四價五錢五分六厘桃六十五不淂二十三両三錢六分與二行數淂於四次法合併淂四千二百二十四為法二両八錢六分四乗淂五十一両六錢六分空空空榛仁四松子七得三千三百六十價三錢二分七厘添四百八十淂一百五十六両九錢六分與三行減餘一百五十六為法冰糖三空空空松子九得十八價四錢六分五厘冰二乗淂九錢三分增法先以一行冰糖二通乗五行松子九得一十八乗價四錢六分五厘得錢三分
