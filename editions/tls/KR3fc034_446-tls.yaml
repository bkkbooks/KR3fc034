body:
  text: 六也知乎此者可與言數學矣圓容三角圖今有圓徑八步內容三角問三角及弧矢各積若干舊法圓徑八步三角面得七步三角正長六步置角面七步以正長六步乗之得四十二步折半得三角積二十一步另置角而即弧弦七步將圓徑八步減三角正長六步餘二步為弧矢併入弧弦折半以矢乗之得弧矢積九步三弧矢共積二十七步併三角積共四十八步合圓積三角得圓十六分之七圓求三角七因十六除三角求圓十六乗七歸觧義三角得圓十六分之七者三弧矢二十七步是三個九步三角二十一步是三個七步以三歸圓積得十六三角得四個三故曰十六分之七以此筭弧矢三角積與圓積無差然以勾較之角四七步中長六步有零中長作六步用徑與斜求平合用
