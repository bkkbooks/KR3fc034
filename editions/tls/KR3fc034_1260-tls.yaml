body:
  text: 八陣圖歌竒行八子順流來遇偶之行逆上排八八書將排列畢把來橫取更休猜一行來八兼求五三二湏尋七八陪卻以八陣圖一二三四五六七八十六十五十四十三十二十一十九十七十六十九二十二一二二二三二四三二三一三十二九二八二七二六二五三三三四三五三六三七三八三九四十四八四七四六四五四四四三四二四一四九五十五一五二五三五四五五五六六四六三六二六一六十五九五八五七四行居隊角均平八陣類竒才上法一三五七行為竒二四六八行為偶六十四於順通排畢橫取上行排列坎陣二艮三震以次順排八陣解義八陣先道坎起坎者數之始生也八層橫筭皆積二百六十一層取拆一陣積數皆同然按序拆去六十四於亦是順逆周廻如一松二艮順至乹宮八皆順也即將九置乹宮兌十坤十一以次逆四至坎宮十六皆逆也又將十七置坎順艮而下仍循一順一逆次序系毫不亂
