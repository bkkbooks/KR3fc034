body:
  text: 水陸較程法今有大京路至杭州四千二百七十五里馬從京徃南日行一百二十里船後杭州徃北日行七十里問船馬幾日相會各行差十里舊法置路四千二百七十五里為實卻併船馬日行共一百九十里為法除之得船馬相會二十二日半又為實各以馬行一百二十里乗得相會處行二千七百里以船行七十里乗得相會行一千五百七十五里難題較日會合西江月張家三女孝順歸家頻望勤勞東村大女隔三朝五日兩村女到小女南鄉路遠依然七日一遭何朝齊至飲香鰌請問英賢四報舊法置三五相乗又以七乗得相會一百零五日觧義舊法又有甲乙二人應複甲十二日一徃乙十五日一徃問何日會法用十二十五相乗得一百八十日以二數對減餘三日為法除寔得六十日一會然若改作甲十三乙十六或十七十八筭俱唯合未可為通法故不載
  hash: sha256:c0984f78f581e47803161b859d3e9d45f07d0d228667dfc166f0549e1cccc27e
