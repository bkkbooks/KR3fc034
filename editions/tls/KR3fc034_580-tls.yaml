body:
  text: 多四步得大方西一十六步各以方西自乗得積大方二百五十六步小方西一百四十四步解義大方多小方四步兩西各多四步如二亷又多一隅以四步自乗減去隅積共存二亷二小方積折半止存一小方一亷如一直田故以四步為縱開方淂小方西猶直田淂濶也今有大中小方田三叚相併共積八百步只雲大方西比中方西多四步中方西比小方西多四步問大中小方西併積各若干舊法置大方西多小方西八步自乗得六十四步又以中方西多小方西四步自乗得一十六步併二數共八十步以減共積八百步餘七百二十步以三歸之得二百四十步為實初啇一十自乗一百步以減積實餘實一百四十步次啇二併初啇
  hash: sha256:2d4207c9bd0999e111d91a6813a1837b580020a3be789d1ccaaa25a623c04ea2
