body:
  text: 通集盤珠集走盤集三元化零歌鈐經鈴嘉定咸淳德佑等年又刋各書詳觧黄帝九章詳觧日用算法乗除通本末續古摘竒筭以上俱楊摘竒内詳明筭法无儒安止猍何平子你有乗除而無九章九章通明筭法永樂二十二年臨江劉仕隆作九章而無乗除苛法後作稚二十三欽掯明筭法正統一未江寧夏源作九章不全九章比數筭法景泰午銭塘吳氏作共八本有乗除分九章每章後有導題章類繁乱差亦多筭学通衍成化壬展京兆劉洪作
