body:
  text: 法除實得毎日毎人用米二升解義本應用遁除浩置共米三石六斗以一十五人除之得二斗四升為毎人所用之米再以一十二日除之淂二升為毎人一日所用之米以十五人十二日相乗為除法兴通除法也着以毎人毎日用米二升共一十五人住一十二日問共用米若干則以十五人乗十二日淂一百八十人以乗二升得共米三石六斗又即通乗法矣兴與上法可以互尜同異通乗通除法難題歌三人二日四升七一十三口要糧实一年三百六十日借問該食幾多粟兴言原三人毎二日食粮四升七合今有一十三口共食三百六十日問共食粮若干舊法置今與糧三百六十日以十三口乗之得四千六百八十口又以四升七合乗之得二百一十九石九斗六升為實以原三人乗二日得六為法除實得共食糧三十六石六斗六升解義兴應以三除一十三口以二日除三百六十日淂数相乘再以四升七合乗之臼一十三口三百六十日四升七合都是乗三
