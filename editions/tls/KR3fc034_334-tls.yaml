body:
  text: 大廣三十八步餘得截中廣二十七步截小頭以濶差若干加小廣得截廣解義長九十步濶差一十八步將十八以九十除得二乃長十步濶差二步將九十以十八除得五乃濶差一步長高五步故求濶以濶差乗原長除得截濶差乃十分減作二分得九十分之十八求長以原長乗濶差除得截長乃一分增作五分得十八分之九十得方圓三因四歸得四分之三四田三歸成三分之四一理如截小頭長三十五步以二乗得差七步將差七步以五乗得截長三十五步是也首二法止言原廣長截積開截廣截長乃先倍積者求長積之差數也差數只在本積用倍積何也積田両廣折平得數差由両廣不等生山理循環互倚故両廣各分雫長與長自乗數相通本積濶差二數與両廣自乗數相通和小頭小廣自乗四百法截廣自乗七百二十九步對減餘三百二十九步折半得一百六十四步五分將截積八百二十二步五分以濶差十八乗長九十除正得一百六十四步五分大頭大廣自乗一千四百四十四步截廣自乗七百二十九步對減餘七百一十五步折半得三百五十七步五分將截積一千七百八十七步五分以濶差乗原長除亦正得三百五十七步五分是大廣小廣多兩個差數故須用倍積乃合或止用木積求差加倍亦得然大廣多二差數何也本積內一個差數乃両廣折平相差木若両自乗取方大多出一差數小少去一差數故大廣
