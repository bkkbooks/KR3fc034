body:
  text: 二十二兩八錢以黃蠟三斤乗之得六百八十四斤為實另置黃蠟三斤以白蠟價五錢乗之得一兩五錢併入黃蠟價四錢共一兩九錢為法除之得黃白蠟各三十六斤以白蠟價銀五錢乗之得白蠟共價一十八兩另以四錢乗之得一十四兩四錢以三斤除之得黃蠟價四兩八錢解義四錢是三斤之價五錢是一斤之價將一斤亦加作三斤乃可得斤均平三因勻蠟一斤之價與黃蠟合併為法將原銀二十二兩八錢亦用三因考一兩九錢乃黃白蠟各三斤價以除原價得十二個一兩九錢即黃白蠟各十二個三斤將原價加作三倍則再除之數亦得三倍合各斤數或即以一兩九錢除二十二兩八錢得一十二以二因之亦得均銀扣糧法今有芝蔴每石價九錢米每石價八錢豆每石價七錢三色各以齊等價均扣筭問芝蔴米豆各若干舊法置米豆價相乗得芝蔴五斗六升另置麻豆價相乗得米六斗三升又置蔴米價相乗得
  hash: sha256:feaa19731a7f5d05e7ba296a542ed01b7ad59fe7ad43abe13122f0ca55e978e5
