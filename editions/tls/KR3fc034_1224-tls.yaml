body:
  text: 二行梨二得八與四行梨八對減盡乗榴七得二十八乗價四分得一錢六分加四行一分六厘共一錢七分六厘就將二行榴二十八移置四行三位作負二十八又以三行榴四為法通乗四行榴負二十八得一百一十二乗桃三十二得一百二十八乗價一錢七分六厘得七錢零四厘卻以四行榴負二十八通乗三行榴四得一百一十二與四行榴一百一十二對減盡乗桃七得一百九十六減四行桃一百二十八餘六十八為法乗價三分得八錢四分減四行價七錢零四厘餘一錢三分六厘為實以法除之得桃毎個銀二厘於三行價三分內減桃七共價一分四厘餘一分六厘以榴四除之得榴毎個銀四厘於二行價四分內減榴七共價二分八厘餘一分二厘以梨二除之得梨毎個銀六厘於一行價四分內減梨四共價二分四厘餘一分六厘以瓜二除之得撤毎個銀八厘
