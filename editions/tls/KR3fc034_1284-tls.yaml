body:
  text: 十步問該裏若干置二千九百二十裏以甲法三百六十步通之加零二十步共得一百零五萬一千二百二十步以四而一得二十六萬二千八百零五步為法另置三百六十五度以四通之加入分子之一共得一千四百六十一度為實以法乗之得三億八千三百九十五萬八千一百零五步卻以裏法三百六十步除之得周天該一百零六萬六千五百五十裏零一百零五步毎度裏數出皇斗真經注解義二千九百二十裏零二十步一度經地之裏數也一百零五萬一千一百二十步一度經地之步數也三萬八千三百九十五萬八千一百零九步三百六十五度四分變之一之步數也二十六萬二千八百零五步四分度之一經地之步數也因有零度四分度之一故將三百六十五度都以四通之毎一度分作四度故將一度經地之步數以四帰之止存四分中一分以乗通出度數淂周天之全步數也附孕推男女法歌四十九數加孕月減行年歲定無疑一除至九
