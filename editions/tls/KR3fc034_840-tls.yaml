body:
  text: 白下隱吏古齊陽丘睡足軒強恕居士李長茂拙翁甫輯著鏡泉章此章以觔兩明衡法以丈尺明度法以石斗明量法粟糧帛布金錫刀錐禦其出入高下貴賤分合本息定其準則公私之用在斯交易之理畢具衡法觔秤歌觔如求兩身加六減六留身兩見觔論銖三百八十四六十四分為一觔二十四銖為一兩三十二兩一裹真一秤觔該一十五二秤之數為一鈞四鈞為石亦名二百整觔一引因
