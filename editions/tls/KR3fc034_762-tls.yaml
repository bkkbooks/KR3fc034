body:
  text: 一百共一百三十二皆與上商一十桐呼除實一千三百二十餘實二千七百六十乃二乗縱廉三十得六十以三乗隅法一百得三百皆併入縱方二共三百六十二為方法下法再置上商一十以三因之得三十加入縱廉三共三十三為廉法次商五於初商十之下下法亦置五自乗得二十五為隅法又次商五乗廉三十三得一百六十五併方三百六十二廉一百六十五隅二十五共五百五十二皆與上商五相呼除實恰盡得底腳面一十五個觧義此即上法還源也硯上再乗求積之則求周之法自明以二為方法者三角每添一周則面添二個也以三為廉法者三角三面也難題又有求宜長矣垜長廣一法雲共積一百六十下長多下廣七個上長多下廣三個問上下長廣法用置下長多下廣七加倍再加上長多下廣三個共一十七個為方再加上長三共二十個為縱廉以三為隅筭用開立方法除之上商五個下法置五個自乗得二十五個又以隅三乗之得七十五個為隅法又以五乗縱廉二十得一百合方廉隅三法共得一百九十二皆與上商
