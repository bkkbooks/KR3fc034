body:
  text: 百歩除內圓得外餘方積三千一百八十九歩零二分五厘増法外濶各五厘方周比圓周多一十七歩六分問方徑田置兩面濶共一分以四因之得四分以減多一十七歩六分得內圓徑一十七歩二分加兩濶一分得外方面一十七歩三分照上法得積増法塘外各濶三分七厘方周比圓周多一十二歩一分九厘問方徑田置兩面濶共七分四厘以四因之得二歩九分六厘以減多一十二歩一分九厘得內圓徑九歩二分三厘加兩濶七分四厘得外方面九歩九分七厘照上法除得積觧義九方內除圓內圓徑以圓外餘濶二倍則外方周適得內圓週二倍首法正方周得圓週二倍故苐倍則得內圓徑若方周比圓周出二倍之外必方濶圓徑有溢幹半倍之外或二倍不足若干即方濶較圓徑不足於半倍之數故即餘數不足數加減濶數乃淂圓徑數共濶數必加倍者因本外方周比內圓週二倍立法故須加倍以合之也餘不足數折半者方週四分問週三分是方周比
