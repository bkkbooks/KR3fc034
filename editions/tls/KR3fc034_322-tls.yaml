body:
  text: 弦一十二步照弧矢法矢加弦折半得八步以矢四步乗之得截弧矢積三十二步另將原弦一十三步加截弦一十二步共二十五步折半得一十二步五分為長將原矢六步五分減截矢四步餘二步五分以乗長一十二步五分得三十一步二分五厘再將原弦截弦對減餘一步折半得五分自乗得二分五厘折半得一分二厘五毫加入三十一步二分五厘得截餘積三十一步三分七厘五毫併截弧矢積共合整半弧矢積六十三步三分七厘五毫解義筭截除積即圓田中截半叚法以此考較細半整平弧矢理同舊謂細半弧矢數矣解詳後外圓內方容弧矢下截積難題積求截矢弦西江月一叚田禾之外臨邊近有荒疇問矢離田五步繁頭牛只為繩長進走吃殘五分八步如同矢弦弦圖彎周索長多少是根由演立妙源窮究舊法置田五分以畝
