body:
  text: 勾弦股弦和法同或勾或股先自乘就以共和為除法得較增減由和察減較折半勾股凴增較折半弦亦明勾股和求勾股法今有勾股止言弦六十八尺勾股共九十二尺問勾股各若干法置勾股共九十二尺自乘得八千四百六十四尺另以弦六十八尺自乘得四千六百二十四尺以減前實餘三千八百四十尺又以此為法減弦自乘四千六百二十四尺餘七百八十四尺以開平方法除之得二十八尺即勾股較差數以減共和九十二尺餘六十四尺折半得勾潤三十二尺加入二十八尺得腹長六十尺解義和自乘內是四個勾股相乘積數一個二十八自乘差數弦自乘內是兩個勾股相乘積數一個二十八自乘差數以此減和自乘是減去了兩個積扶一個差數止存兩個勾股相乘積數又以此為法成弦自乘是減去兩個積數止存一二十八自乘差數故開方淂勾股較二十八尺
