body:
  text: 及襖褲布各若干增法置列馬軍六人步軍七人相乗得四十二人卻以三因四十二得馬軍一百二十六衰另以四因四十二得步軍一百六十八衰併之共得二百九十四衰以乗共給布三萬七千零八尺得一千零八十八萬零三百五十二尺為實另列右六人左七人互九十二尺四十八尺先以左七人乗右九十二尺得六百四十四尺亦以三因之得一千九百三十二又以右六人乗左四十八尺得二百八十八尺亦以四因之得一千一百五十二尺併之共得三千零八十四尺為法除實得馬步軍共三千五百二十八人卻以二百九十四衰為法除之得一十二為馬步軍平法以一百二十六衰乗之得馬軍一千五百一十二人以九十二尺乗之得一十三萬九千一百零四尺以六人歸之得給襖布二萬三千一百八十四尺另以一百六十八乗平法一十二得步軍二千零一十六人以四十八尺乗之得九萬六千七百六十八尺以七人歸之得褲布一萬三千八百二十四尺
