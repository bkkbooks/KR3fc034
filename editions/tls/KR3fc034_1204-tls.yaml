body:
  text: 九分再以右行原價七錢五分減鴨三隻共減二錢七分餘價四錢六分以鵝四隻除之得鵝毎隻價一錢二分解義上硃粉丹一法先以珠互乗両價對減多餘在右行此先以雞互乗両價對減多餘在中行乃十六隻雞價內除九隻鴨價尚餘價一錢五分也再以鴨為法互乗各價淂數併合為實者以負九乗六齊為淂四十五雞淂五十四價淂七両二錢九分乃四十五鴨三十四之價以左鴨五乗負九淂四十五雞十六淂八十價淂七錢六分乃是五個十六隻共八十隻雞內除五個九隻共四十五隻雞之價以此併加合入左行四十五隻鴨價共成八十隻雞價此即上以丹為法同例也若此處以雞為法求之互乗價數又當以少減多如上以粉為法同因方程法實互難測故反覆發明使人通曉又法今有馬一匹騾二匹驢三匹議各載糧四石二斗皆不能勝內馬借騾一匹騾借驢一匹驢借馬一匹始能承載問三等力各若干右正馬一為法先與左借馬乗借驢一得二空四十二斗得四石二斗
