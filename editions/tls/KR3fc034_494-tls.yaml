body:
  text: 觧義木圖圓三尺閣七邊皆以三尺乗之得二十一尺乃直數也葛纒七邊乃斜纒至稍每直圓一邊有一個斜數在內故將斜星七邊伸直下根即遠木二十一尺如直圓七邊之數騐之不差系黍此皆數理天成之少也勾弦求股法今有勾股勾長二十七尺弦長四十五尺問股長若干舊法置弦四十五尺自乗得二千零二十五尺另置勾二十七尺自乗得七百二十九尺以減弦自乗餘一千二百九十六尺以開平方法除之得股三十六尺觧義弦自乗數兼勾自乗股自乗數減去勾自乗數止存股自乗數故開方得股又勾弦求股難題西江月今有坡田一改西高東下曾量十步五寸是斜長南北均長六丈欲要脩為平壤東增一丈新牆不知幾許請推詳湏要筭分停當舊法置斜長十步以每步五尺乗之併加零五寸得五十尺零五寸自乗得二千五百五十尺零二寸五分另以新牆十尺如勾自乗得一百尺相減餘二千四百五十
