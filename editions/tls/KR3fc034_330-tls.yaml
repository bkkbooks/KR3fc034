body:
  text: 截積一千七百八十七步五分問截長截濶各若干舊法置截積加倍得三千五百七十五步以大小二濶相減除一十八步乗之得六萬四千三百五十步以原長九十步除之得七百一十五步另以大濶三十八步自乗得一千四百四十四步減去七百一十五步餘七百二十九步為實以開平方除之得截中濶二十七步就以截濶二十七步併大頭原濶三十八步共得六十五步折半得三十二步五分為法以除截積一千七百八十七步五分得截長五十五步若截作三叚先截大小二頭餘即中叚四叚五叚從兩頭以次筭入梯田以積併截長問截濶法前田小廣二十步大廣三十八步從小頭截長三十五步截積八百二十二步五分問截中濶若干舊法置截積八百二十二步五分倍之得一千六百四十五步為實以截長三十五步為法除之得四十七步內
