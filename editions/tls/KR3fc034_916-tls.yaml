body:
  text: 一百二十五中等四十戸以每戸三分因之得一百二十下等六十戸得六十合併三率共三百零五為法除實得下等戸每戸該米二斗四升三因得中等戸每戸七斗二升五因得上等每戸一石二斗各以戸數乗之以二十五戸乗一石二斗得上等戸共米三千石以四十戸乗七斗二升得中等戸共米二十八石八斗以六十戸乗二斗四升得下等戸共米一十四石四升解義下等戸一分上等戸五分每戸得下戸五倍中等得下戸三倍即用五因三因如每戸分作五戸三戸與下等戸一倒也分縣運糧均例法今有五縣輸粟二萬石照人戶多少道裏遠近價值上下而均輸之每車載二十五石行道一裏與僦裏銀一錢甲縣二萬零五百二十戶粟石價二兩乙縣一萬二千三百一十二戶粟石價一兩遠輸二百里丙縣七千一百八十二戶粟石價一兩二錢遠輸一百
