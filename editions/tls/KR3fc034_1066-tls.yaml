body:
  text: 各分數本等乗故仍用乗法難題子母求燈西江月帝城三五元宵鰲山両樣燈毬總來一秤三斤油七両又來添湊三両分為四盞四両分作三甌三停盞子二停甌請問先生知否此言大小燈不等毎盞四個用油三両毎甌三個用油四両盞三停甌二停共用油二百九十五両問盞甌並油各若干舊法置油一秤為一十五斤又添三斤共一十八斤用加六法併入零七両共二百九十五両以毎両二十四銖乗之得七千零八十銖為實另置油三両以二十四銖乗得七十二銖以四盞歸之毎盞得一十八銖又以三停乗之得五十四銖為盞之法另又置油四両以二十四銖乗之得九十六銖以三甌歸之毎甌得三十二銖又以二停乗之得六十四銖為甌之法併舊甌二法共一百一十八銖為總法除實七千零八十銖得六十為則以二停在得甌一百二十隻以毎甌油三十二銖乗之得二千八百四十銖以毎斤三百八十四銖除之得甌油
