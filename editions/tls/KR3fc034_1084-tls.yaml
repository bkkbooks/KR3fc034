body:
  text: 通分求圓積法今有圓田徑六步十三分步之十二週二十步四十一分步之三十二問該積若干舊法徑求積置徑六步以分母十三通之得七十八加分子十一共九十自乗得八千一百又置分母十三內減分子十二餘一以乗分子十二仍得十二併入前自乗數其得八千一百一十二以三因四歸之淂六千零八十四為實以分母十三自乗得一百六十九為法除之得積三十六步周求積置周二十步以分母四十一通之得八百二十加分子三十二共八百五十二自乗得七十二萬五千九百零四又置分母四十一內減分子三十二餘九以乗分子三十二得二百八十八併入前數共七十二萬六千一百九十二以圍法十二除之得六萬零五百一十六為實以分母四十一自乗得一千六百八十一為法除之得積三十六步解義徑積四十八步六步開方外加十三步合方七步今止十二步每步減十三分之一以補隅缺各步止存十二分故為十三分
