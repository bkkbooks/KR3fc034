body:
  text: 四行松子七得五千三百六十乗價三錢二分七厘得一百五十六両九錢六分卻以四行榛四乗三行負杏仁一百九十二得七百六十八乗餘價一十四両四錢得五十七両六錢兩價對減四行價餘九十九両三錢六分就將三行乗出杏仁七百六十八移置四行立負杏仁七百六十八次以四行松子三千三百六十乗五行杏仁三得一萬零八十乗價二錢八分五厘得九百五十七両六錢卻以五行松子九乗四行負杏仁七百六十八得六千九百一十二與五行一萬零八十對減餘三千一百六十八為法又乗餘價九十九両三錢六分得八百九十四両二錢四分兩價對減餘價六十三両三錢六分為實以法除之得杏仁毎斤銀二分於五行價內除杏仁價得松子價毎斤二分五厘逆上挨次求之如前解義六色係共二色四色同俱對減為法
