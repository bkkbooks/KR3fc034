body:
  text: 餘四十八足以亀四足歸之得亀一十二個解義此即上法上一瓶三人三瓶一人是二與一交互之數此三足一眼四足六眼又各參差不齊帶分子母差分法今有齊僧初日毎五人來八升次日毎九人米七升九二月共用米三十二石一斗問毎日僧霧靄米各若干舊法置共米三十二石一斗以母五人九人相乗得四十五乗之得一千四百四十四石五斗為實卻用母子互乗置列右左母五人九人互子八斗七斗先以右上五人乗左下七斗得三石五斗又以左上九人乗右下八斗得七石二斗併之共十石零七斗為法除實得僧一百三十五人卻以八斗因之得一百零八石以五人歸之得初日米二十一石六斗另以七斗因之得九十四石五斗以九人歸之得次日米十石零五斗解義初日毎五人次日毎九人則共人必五九會合之數如共僧一百三十五人乃三個五九四十五人之數也故須用五相乗
  hash: sha256:bb89fe3ba30ce7a916b01faedd95c38c30e8cf9ff190cb476276e3fd40c408a2
