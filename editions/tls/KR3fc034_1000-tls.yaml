body:
  text: 觧義玉石共重斤數猶上米變共價玉重十二兩得一方寸石重三兩得一方寸猶米八錢六分一石変七錢二分五厘一石也以玉重乗共寸以差數除得石十三寸即以米價乗以差數除得玉石數也若以石重三兩乗即可先得玉十四寸一理也難題輕重差分西江月群羊一百四十剪毛不憚勤勞群中有母有羊羔先剪二羊比較大羊剪毛斤二一十二兩羔毛百五十斤是總毫子母各訣多少舊法置羊一百四十隻以大羊剪毛一斤二兩即一十八兩乗之得二千五百二十內以減共剪毛一百五十斤即二千四百兩餘一百二十兩為實另置大羊毛一十八兩內減小羊毛一十二兩餘六兩為法除實得小羊二十隻以減總羊一百四十隻餘得大羊一百二十隻多少差分法今有米四百七十六石用大小車共運一百車大車每車載五石六斗小車每車載三石二斗問大小車及運米各若干舊法
