body:
  text: 半得濶三十二歩加入相差二十八歩得長六十歩今有直田一叚積一千九百二十歩長濶共九十二歩問長濶各若干舊法置積一千九百二十歩四因得七千六百八十歩另以長濶共九十二歩自乗得八千四百六十四歩內減四因積七千六百八十歩餘七百八十四歩為實用開平方除之得長闊相差二十八歩以減長濶共九十二歩餘六十四歩折半得濶三十二歩加相差二十八歩得長六十歩觧義以積與差問長闊將積用四因又加差自乗積者一個積數係一個長濶相乗數每一積數長多濶二十八歩因作四濶積數如前圓四面互項每一面一個長項一個闊四圓項合內中四面三塊二十八歩一小方故加八二十八歩自乗寔卻用開平方法除之得九十二歩為長濶共數也就九十二歩除去相差二十八歩是長多之數餘六十四歩是長濶両平之數故除差數折平得濶加入差數得長最直舊法將二十八加入九十二折半得長斍煩贅至以積數並長濶共數問長濶將共數自乗減除四因積數餘數開方
