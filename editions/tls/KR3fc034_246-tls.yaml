body:
  text: 圓周多一分方周加倍比圓周便多二分餘出之數與不足之數皆是二倍故必折半始合本數也末二法不用將餘濶加倍亦不用以圓週二倍較量者乃即以方周多圓周之本數求也方周本數四分多圓週一分其多出之數除去分外多數止存淨多一分之數故四因濶多之數以減周多之數餘得徑數也濶多前法用加倍合圓週二倍之法也此用四因者合方面四面之因也二法總一理因內圓數少外周數過多故加倍求之外周多內周數無幾逺不足圓周兩倍之數故只以本數求之其寔二法可互用也今有方圜田一叚外方八十歩內方六十歩濶十歩問積田若干法置外方八十歩內方六十歩併之共一百四十歩折半得七十歩以四因之得二百八十歩為實以濶十歩因之得積二千八百歩以畆法二四通之得田一十一畆六分六厘六毫六六不盡直田求禮求長濶歌直田長濶不相同長濶相乗積數成積濶問長濶除積問濶長除濶亦明
