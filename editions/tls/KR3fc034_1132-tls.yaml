body:
  text: 人實以出率五両三両對減餘二両為法除之得五人卻以出五両乗之得二十五両內減盈六両餘得物價一十九両或以出三両乗之得十五両加不足四両亦得物價一十九両解義併盈不足為人寔者出五両出三両多少相差二両盈六両不足四両上下相差共十両以毎人二両計之便是五個人共差十両故以出銀數對減以除盈不足共數淂人數以出率互乗盈不足併為物價實者出五両出三両所出相差二両各有多六両少四両之不同將両下互乗微平則積出所差數目亦是毎原價一両差二両共成二倍物價數出率相差一両將両下互乗微平減積出所差數目便是毎原價一両差一両邊合一個物價差三差四皆然此數理天臺之妙故亦以出率相減為法除之得物價也分物盈不足盈數法今有人分物毎人分一十二個盈一十二個毎人分一十四個不足六個問人數物數各若干舊法置盈十二個不足六個併得十八為人實以分十二十四對減餘二為法除實得九人卻以毎人分十四乗之
