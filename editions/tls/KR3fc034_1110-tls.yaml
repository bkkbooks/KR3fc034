body:
  text: 甲錢一百六十文解義以上法求原錢亦合然甲借乙三分之一是以四十為一分乙借甲二分之一是以八十為一分矣立此等法湏分法一則當雲乙借甲四分之二俱以四十為一分卻用母互乗子為法乃可額定分數或原錢各有增減以法求之無往不合今併列釋於後前法今有甲乙二人沽酒共應酒價二百文只雲甲借乙錢三分之一乙借甲錢四分之二俱邊是問甲乙各原錢若干增法置酒價二百文為實卻以借乙三分合併借甲之二得五以借甲四分合併借乙之一亦得五就以五為法除實二百得四十為分法以四分乗之得甲錢一百六十文以三分乗之得乙錢一百二十文又法今有甲乙二人沽酒共應酒價二百文只雲甲借乙錢二分之一乙借甲錢四分之三俱邊足問甲乙各原錢若干增法置酒價二百文
