body:
  text: 歸得積與方窖法同或倍上長加下長用長臺法亦得築方錐問積法今有方錐高三十二尺下方二十四尺問積若干舊法置下方二十四尺自乗得五百七十六尺以高三十二尺乗之得一萬八千四百三十二尺為實以三歸之得積六千一百四十四尺觧義下方自乗以高乗之即立方也求方錐用三歸者方錐得立方三分之一也今得立方分析列圖考較俾人死惑此即立方下方又以高三十二二十四尺自乗尺乗計積一萬八千四百三十此從中心斜分二尺外二叚顛倒配合中心亦中分二十四濶十二顛倒配合各長高三十二此即外斜分之一叚增求積法置長二十四尺以濶一十二尺乗之得二百八十八尺以高三十二尺乗之得九千二百一十六折半得四千六百零八尺為主方積四分之一外二叚共得積一半
  hash: sha256:a8d465b63b494c0df1d0249063ee22b7c55290c497a280c9b48e7cd1bf6398c0
