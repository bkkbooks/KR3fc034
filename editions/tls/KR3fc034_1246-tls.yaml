  text: 五數四四圖一二三四五六七八九十十一十二十三十四十五十六易換四四圖十六二三十三五十一十八九七六十二四十四十五一易換衍曰十六子作四行排列先將外四角對換一換十六四換十三次將內四角對換六換十一七換十換畢縱橫斜角皆積三十四數即下圖是也求積法以始數一終數十六併之得十七以十六乗之得二百七十二折半得共積一百三十六以四行為法除之得縱橫斜角皆三十四數若內外四角不動換易四靣八位亦合
