body:
  text: 歩五分九釐二毫九絲二忽九微一繊一沙二塵五一漠三一四七不盡另置角中叚長一十六歩八分九釐九毫有零以角面七歩乘之得一百一十八歩一分九釐六毫四絲六忽四微五繊五沙六二埃八渺一漠六五七三九不畫又置角中長併加旁長即旁角面七歩共二十三歩八分九釐九毫四絲九忽四微九繊三沙六塵六埃一渺一漠六六五三四約二以餘方四歩九分四厘九毫七絲四忽七微四繊有零乘之得一百一十八歩二分九釐六毫四絲六忽四微五繊五沙六塵二埃八渺一漠六五七三九不畫即兩旁二叚共積併角中叚共得八角積二百三十六歩五分九厘二毫九絲二忽九微一繊一沙二五埃六渺三漠三一四七不畫又置餘方長四歩九分四厘九毫七絲四忽七微四繊有零自乘得二十四歩五分折半得餘方積一十二歩二分五釐以四因之得四隅共餘方積四十九歩併八角積合方積又將方面一十六歩有零以七歩因之以四歩九分四厘七絲四忽七微四繊六沙八三埃零五漠八三二六七約一除之
