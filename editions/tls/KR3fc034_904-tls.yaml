body:
  text: 逓減五錢問共該銀若干舊法置舉人一百名減去一名餘九十九名以逓減五錢乗之得四十九兩五錢以減一百兩餘五十兩零五錢為末名之數併入第一名一百兩共一百五十兩零五錢以一百名乗之得一萬五千零五十兩折半得共該銀七千五百二十五兩又法今有眾人出錢買物為首者出錢八文以下逐名逓加一文順至末位出錢六十文問人數及共錢各若干舊法置末位六十文減首位八文餘五十二文加入首位得共數五十三人另置首八文併末六十文共六十八文以五十三人乗之得三千六百零四折半得共錢一千八百零二文解義此將首末相併乃雙捧折平之法典一面尖栔同笑海説詳第七卷終
  hash: sha256:f7e15ae8deaaca9c778321c9823159f7c8c7c3f956c55239d18e815d64c145fa
