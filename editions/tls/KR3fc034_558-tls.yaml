body:
  text: 數右定一法相呼乘法以除績數除數不盡又用次商廉即方外曆如之直謂一方帶兩邊直以的共壮取名曰庶一方不盡而後兩面加益故廉用倍法次商是方外再加之瀾廉即初方雨面之長相呼除績兩邊俱興初商方齊尚缺一角故即用次商相呼成一小方以浦雨庶之角所謂隅法也如啇除不盡再用三啇或終有不盡以法命之此為一乗方法曰乗者呼乗法而除積也再以方面自乗之積以方面乗之為二乗方又以方面乗二乗之積為三乗方二乗方即成立方上下六面俱同一方面如骰子樣是也三乗者立方之上再加高如窖深之類是也求立方其啇除之數湏依一乗再乗約畧定數如平方四步至八步啇二步立方八步至二十六步俱啇二步等是也三乗四乗以止只其
  hash: sha256:0adc6dd550961d6b08df8f7a6d815da89ff6a96075c5504ea53b568c424aef81
