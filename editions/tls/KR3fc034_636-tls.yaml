body:
  text: 解義以三十六尺自乗方西也二十三乗之以高乗方也約量積數先啇三十除寔不盡又次啇三十六尺是大方約啇故以高比方不及十三尺減除方數以乗方積合除積盡為準也又約縱開立方法今有立方積一千七百八十七萬五千尺只雲高濶相等長多濶三十六尺問高濶及長各若干舊法置積為實初啇約得二百尺自乗得四萬尺再乗得八百萬尺又約啇二百五十尺自乗得六萬二千五百尺再以二百五十尺乗之得一千五百六十二萬五千尺除積訖餘積二百二十五萬尺為實另置所啇二百五十尺自乗得六萬二千五百尺以長多三十六尺乗之得二百二十五萬尺除實恰盡得高與濶各二百五十尺加入長多三十六尺得長二百八十六尺是先取大平方西卻以不及減去乗之此是先將不及一乗完小立方卻將小立方西自乗得小平方西以多三十
