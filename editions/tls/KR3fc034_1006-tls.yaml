body:
  text: 難題遲疾差分西江月甲乙同時起步其中甲快乙遲甲行已與百步齊六十步上得乙使乙先行百步甲後追步方起不知幾步方追及筭得揚名說你舊法置先行百步以甲行百步乗之得一萬步為實另以甲行百歩內減乙行六十步餘四十步為法除實得二百五十步追及增法置先行一百步為實另置甲行一百步乙行六十步相減餘四十步以除先行百步得二五為法以乗甲行一百步得二百五十步追及解義增汯即解舊法一理也貴賤輕重多少遲疾皆同一法前後備列人觸類旁通耳貴賤相和差分又名仙人換影歌貴賤相和換影仙賤物互乗貴價錢貴物互乗賤價訖相減餘為總法然卻用貴價乗總物又用貴物乗總錢二數相減餘為實總法除之平法言賤物賤價各乗之
