body:
  text: 以二表相減餘六寸為法除之得前表相去遠九尺加退行一尺八寸得通遠一十尺零八寸觧義此以前表竿為正勾後表竿為通勾二竿先減餘六寸為餘勾搃不外餘勾容直餘股容橫之理其將後竿以退行一尺八寸乗之即連小勾股筭至盡邊與前法一也餘勾餘股求股深圖今有井不知其深井徑五尺從邊立直木五尺於井上從木末望至井下水邊人目八徑四寸問井深若幹舊法置井徑五尺減入目四寸餘四十六寸與木高五十寸相乗得二千三百寸以餘勾四寸為法除之得井深五丈七尺五寸觧義此以井徑為勾以井深為股以人目斜望下為弦井徑五尺即前表竿也立木五尺即餘設也木杪人目望處橫計亦是五尺統後表竿也人目至井口入徑四寸卻前竿四十六寸後竿五十寸也井徑入目之四十即餘勾也以立木五十寸乗餘徑四十六寸得
