body:
  text: 中得十左中得九對減餘一為法除銀實六十両得總銀六十両除價實三十七両得田價三十七両解義以之二之三互乗三分五分各以通盈三両淂二十七両通不足一両淂十両即以三分五分互乗之二之三又互乗下盈不足淂二十七両一十両前八人七両九人出三両即同八分之七六分之三此三分之二五分之三猶同三人出二両五人出三両無以異也故沒照依前法搃列淂人易解又法置三分五分相乗得一十五另以二分互乗之三得九以五分互乗之二得十一二數對減餘一為法卻併盈不足共四兩以法一除之得四両又為法乗一十五両得總銀六十両乗十両得四十両減盈三両得田價三十七両乗九両得三十六両加不足一両亦得田價三十七両解義上即原雙套法此即前增捷法用雙套法求可不於分母之搃用捷法求並可免加套疊乗之湏然數法之旡不合
