body:
  text: 三十六步三分九厘二毫九系一忽一微減角面二十步餘折半得八步一分九厘六毫四系五忽五微五先卻以餘角尖長乗之得每餘角積二十一步零三厘八毫三絲零六微二織五沙零以六餘角因之得六餘角積一百二十六步二分二厘九毫八絲三忽七微五織零併圓積九百九十三步三分三釐二毫九絲七忽八微二織零合六角全積差二忽零六角容圓八分之七零九八不盡觧義永餘角將圓徃減角西餘折半者乃中減角正長一面之餘徑也以餘角長乗猶圓田以弧矢乗餘徑乃一形自具一數此旬然之可測也然餘角並圓積比六角積仍少二忽零者則截就之法原有截加微差在內也舊法差誤圖圓客六角六角得圓七分之六六角各圓圓得六角七分之六舊法圓容六角與六角容圓一例凣求積俱用六因七歸然止立圖説無所立之法及立步推騐皆不合故立前法附辨於後
