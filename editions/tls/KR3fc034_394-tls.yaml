body:
  text: 五步斜七步零七厘一毫一系方五自乗淂二十五步斜家倍應淂五十步以七步零七厘一毫一系自乗淂五十步零四系五忽五微二纖一沙就將斜自乗積以五十步除之以四系五忽五微二纖一沙乗之以減乗積淂正積另將正積開方淂斜長各具圖釋於後今有方田斜長四十二步問積及方面各若干增法以斜較置斜長四十二步自乗得一千七百六十四步折半得積八百八十二步以開方法求之得方面二十九步六分九厘八毫四絲八忽四微八纖不盡以方較置斜長四十二步以方法四步九分五厘乗之得二百零七步九分以斜長七步除之得方法二十九步七分自乗得八百八十二步零九厘卻以二十四步五分除之得三十六步以二毫五系乗之得九厘以減自乗積得方田正積八百八十二步合斜自乗一半之積解義斜七步方淂四步九分四厘九毫七系四忽七微四纖六沙八塵三埃零五漠不盡成積以方法家用減法合積為差托來
