body:
  text: 位本数為子合併為法以除毋数子毋維乗乗相乗除法二位則以相乗之數為毋本位為子三位四位則以維乗之数為毋以毎两位連環相乗合併為子以除毋數因數立法難以槩盡子毋維乗乗相乗除法如有本銀六十两為啇初次毎銀二两連利得三两二次毎銀三两連利得四两三次毎銀四两連利得五两問三次連本利共得銀若干法置原本六十两以連利三两乗連利四两得一十二两再以連五两乗之得六十两為法乗之得三千六百両為實另以毎銀二両乗毎銀三两得六两再以毎銀四両乗之得二十四両為法除實得三次連本利共得銀一百五十兩如以縂問原本即置縂銀一百五十両以毎銀維垂乗為實
