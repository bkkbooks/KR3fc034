body:
  text: 盈數若干即人實出車相減除法明物數人數除實取不足適足法相同盈適足問價問人法今有人買物毎人出銀二両五錢盈十両零二錢五分毎人出銀二両二錢五分適足問物價人數各若干舊法置位列右出二両五錢左出二両二錢五分互盈十両零二錢五分適足只以左出銀二両二錢五分互乗右盈十両零二錢五分得一十三両零六分二厘五毫為物價實以右盈十両零二錢五分為人實卻以出銀二両五錢出銀二両二錢五分對減餘二錢五分為法除人實十両零二錢五分得四十一人除物實二十三両零六分二厘五毫得價銀九十二両二錢五分不足適足問布價米數法今有米換布一十二疋不足米六斗六升換布九疋適足問布毎疋米及共米各若干舊法置位分列右換布十左換布九
