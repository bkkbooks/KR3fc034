body:
  text: 豆七斗二升各以價米乗之得各該價五錢零四厘解義此同前以子求母之法以八乗九得七十二再以七乗即得五百零四即五錢零四厘之數也又法原有綾每疋價四兩一錢絹每疋價二兩一錢今欲將綾換絹問各若干可均舊法置綾絹價相乗得通平價八兩六錢一分以綾價四兩一錢除之得該二疋十分疋之一另以絹價二兩一錢除之得該四疋十分疋之一難題油塩交換歌一斤半塩換斤油五萬斤塩載一舟斤兩不等相交換酒數二數一般留舊法置總塩五萬斤為實以塩一斤半併換油一斤共二斤半為法除之得油塩各二萬斤合本問利法今有元亨利貞四人合本經營元出本銀二十兩亨出本
