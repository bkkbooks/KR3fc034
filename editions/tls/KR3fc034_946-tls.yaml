body:
  text: 安童冒六作行到親家門裏去半點全無在酒瓶借問高明能上錢何原酒要分明舊法置四程倍添列一二四八併得一十五率為法乗冒六六得二十折卑四遭得原酒五升六合二勺五抄又法置盜冒六升以併率十五乗之得九十為實以併率加原酒率一共十六為法除之亦得觧義此與上同一法安童盜冒六升即每經飲盜共六升與上每次飲斗乙一也盜原酒六升以十五乗之得九斗原酒五升六合二勺五抄以十六乗之亦得九斗乃原酒滑原酒十六分之十五也上法原酒滑飲酒八分之七此得十六分之十五何也上是三次論數則一次加倍得二二次加倍得四三次加倍得八論率位則到三位一二四止得七此是四次論數一次加倍得二二次加倍得四三次加倍得八四次加倍得十六論率則列四位一二四八止得十五新三位者原湏七分三次倍添以八分飲三次而逾盡四位者原酒十五分四次倍添以十六分釣四次而遭盡皆數理自然之妙也難題因利問本歌本利年倍債主催遠還一年取五斗三年本利完
