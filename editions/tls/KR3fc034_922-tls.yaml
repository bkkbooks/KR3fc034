body:
  text: 為衰者價多則除戸必多價少則除戸必少譬如甲縣米每石價二兩乙縣運進腳每石個一兩八錢以二兩除戸數每二十戸一石以一兩八錢除戸數每十八戸得一石也積率問價法今有圓木大小二根大者根徑一尺二寸稍徑八寸長二丈五尺小者根徑一尺稍徑七寸長二丈共價銀四十九兩零八分問大小木各價若干舊法置大木根徑一尺二寸自乗得一百四十四寸又將稍徑八寸自乗得六十四寸併之得二百零八寸以長二丈五尺乗之得積五萬二千寸另置小木根徑一尺自乗得一百寸又將稍徑七寸自乗得四十九寸併之得一百四十九寸以長二丈乗之得積二萬九千八百寸併大小積共八萬一千八百寸為法以除原價四十九兩零八分得每寸該價六毫為一衰之數以大積乗之得大木該價銀三十一兩二錢以小積乗之得小木該價銀一十七兩八錢八分
