body:
  text: 難題以里問金歌皇城內丹新周圍有八里鋪金二寸深方寸重幾許秤來有一觔不知多少數特來問原因增法置周八里以四歸之得二里自乗得四里另置每里三百六十步自乗得一十二萬九千六百步以乗四里得五十一萬八千四百步又置每步五十寸自乗得二千五百寸以乗五十一萬八千四百步得一十二萬九千六百萬寸又以深二寸因之得二十五萬九千二百萬寸以每方寸一斤因之得金二十五萬九千二百萬斤解義舊法四歸八里得二里自乗得四里以每里三百六十步乗之得一千四百四十步以每步二千五百寸乗之得三百六十萬寸又以深二寸因之得七百二十萬寸即金七百二十萬斤相差懸絕已甚葢每面二里自乗得四里每一里長濶皆一里乃三百六十簡三百六十步誤一十二萬九千六百步法當以三百六十步自乗以乗四里止以三百六十步乗四是每里作一步濶三百六十步長筭矣試以每西二里誤長七百二十步自乗得五十一萬八千四百步非一千四百四十步明矣
