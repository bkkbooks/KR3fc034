body:
  text: 為實以斛法二尺五寸為法除之得盛米二千四百一十九石二斗因米求長倉發今有米二千四百一十九石二斗欲作長倉盛之只雲長二十八尺高一十二尺問濶若干舊法置米二千四百一十九石二斗以斛法二尺五寸乗之得六千零四十八尺為實另之長一十八尺以高一十二尺乗之得三百三十六尺為法除實得濶一十八尺以高與濶問長以長與濶問高法皆同圓倉求米法今有圓倉週四十二尺高一十三尺問積尺及盛米若干舊法置圓周四十二尺自乗得一千七百六十四尺以高一十三尺乗之得二萬二千九百三十二尺以圓法十二除之得一千九百一十一尺為實以斛法二尺五寸為法除之得盛米七百六十四石四斗因米求圓倉法今有米七百六十四石四斗欲作圓倉盛之只雲高一
  hash: sha256:82f1a74f5e45e41bc7495a290a8b9e87ec61a88d5b4bf0be22db2e657024a831
