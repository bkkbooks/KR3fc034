body:
  text: 三歸七因得四十九為末衰三位併得七十九衰四位者首位三以三因得九又三因得二十七為丁衰却將二十七用三歸七因得六十三為丙衰又將六十三用三歸七因得一百四十七為乙衰又將一百四十七用三歸七因得三百四十三為甲衰併四位共得五百十八衰五位者將首位三以三因又以三因再又三因得八十一為戊衰却將戊衰用三歸七因得一百八十九為丁衰又將丁乗三歸七因得四百四十一為丙衰又將丙衰三歸七因得一千零二十九為乙衰又將乙衰三歸七因得二千四百零一為甲衰併五位共得四千一百四十一衰解義法以三首位而用法則以多屬甲以首位三屬末位者生法自少而多先三後七生法七宜爾分捗多者在先少者在
  hash: sha256:4ce95e3a19acf3819e556b5b4b654444917b913a780ddf54c808fe0b87b19953
