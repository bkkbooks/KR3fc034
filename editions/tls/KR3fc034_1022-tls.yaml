body:
  text: 鷄八十一隻解義貴賤相和差分二位者可以互乗對減得數三位則不能如干文買百鷄每十文該鷄一隻雄鷄五十文母鷄三十文俱是價多於物小鷄十文三隻是物多於價應以小鷄共雄鷄母鷄各較取平併合為法用除原共價不盡則以法約之用各分平法減加合數乃為正則舊法以小鷄三隻因雄鷄母鷄共九為法除共價淂十一為母鷄數以不盡一反減法九淂八為雄鷄數杜選偶合不可為准若攺作雄鷄五十母鷄四十小鷄十文三隻則以母鷄一隻該四十對較多鷄價三個小鷄十文三鷄多鷄二隻以多鷄二互乗母鷄一淂二隻以多價三互乗小鷄三隻淂九併之淂鷄十一隻以多鷄二互乗母鷄價四十淂入以多償三互乗小鷄價一十淂三併之淂價一百一十應以十一為母小鷄分平法併雄鷄小鷄平法七共十八為法除共價淂五不盡一百即以法約退一百一十加三個七十恰盡孰於五內加三淂雄鷄八隻於五內退一作四以二四之淂母鷄六八隻另將公鷄八以二因淂十六母鷄八以一五乗淂十二併之淂二十八以小鷄三隻因之淂八十四隻若桃舊則仍應用小鷄三只因繼母鷄各一共九為法除共價母鷄十一則不合矣前沐園雄母鷄求小鷄將公鷄以二因者雄鷄小鷄取平原雄鷄二小鷄二也併雄鷄母鷄又以三因者小鷄三隻也該將鷄八以二因母鷄八
