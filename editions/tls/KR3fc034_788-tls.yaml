body:
  text: 法除之得今截上周一十八尺圓錐改圓臺問截臺高法今有圓錐下周七十二尺高三十二尺欲改作圓臺只用上周一十八尺問今截臺高若干舊法置原高三十二尺以下周上周對減餘五十四尺乗之得一千七百二十八尺為實以下周七十二尺為法除之得今截臺高二十四尺難題竿上安箍問截高歌圓圓三丈一高竿稍尖底徑尺二寬今有鉄箍徑九寸試問將來何處安舊法置竿高三丈以箍徑九寸乗之得二百七十又為實以底徑一尺二寸為法除之得安箍離下底二丈二尺五寸觧義此同上法上是以周問此以徑問一也三角錐求積法今有三角錐面一十四尺徑一十二尺高二十四尺問
