body:
  text: 偶合不可為准若攺作好酒毎二瓶醉三人酒毎四瓶醉一人共三十三人共酒三十二瓶此原好酒二十瓶淂湏十二瓶以右上二瓶互左中一人淂二左上三人互右中四瓶淂一十二對減餘十為法以右中四互乗左下三十三人淂一百三十二以左上三互右中四淂一十二以乗三十二瓶淂三百八十四共左對減餘二百五十二以法十除之不合矣又難題鷓鴣天三足團魚六眼亀共同山下一深池九十三足亂浮水一百二眼將人窺或出沒或東西徛欄觀看不能知有人筭得無差錯好酒重斟贈數杯此用耗物比與以團魚三足二眼亀四足六眼問團魚亀各若干舊法分位置列右魚三足左二眼互亀四足六眼共九十三足共一百二眼先以右上團魚三足互乗左中亀六眼得一十八眼以左上團魚二眼互乗右中亀四足得八足對減餘十為法又以右中四足互乗左下一百零二眼得四百零八眼以左中六眼互乗右下九十三足得五百五十八足相減餘一百五十以法十除之得團魚一十五個以三足乗之得四十九足以減總足
