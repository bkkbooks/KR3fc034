body:
  text: 得二萬七千寸再以入深四尺作四十寸乗之得一百零八萬寸為實另置每塊濶五寸以原二寸乗之得十寸再以長一尺作十寸乗之得一百寸為除實得磚積一萬零八百塊解義入深四尺即濶也增法即通乗通除法因每塊孕濶俱以寸計將長十尺亦以寸計每塊得方一百寸故將磚垜長高深俱以寸計相乗以每塊長濶厚亦以寸計相乗為法除之得積也筭海説詳第五卷終
