body:
  text: 六尺四寸為舊帳幅實卻以六幅七幅相減餘一幅為法除絹實四丈二尺仍故得絹長四丈二尺除舊帳實六尺四寸亦仍故得舊帳幅長六尺四寸增法置盈六寸不足四寸併之共一尺以先摺六幅因之得六尺以六幅七幅對減餘一幅為法除之仍故得後七摺毎幅長六尺加入不足四寸得舊帳幅長六尺四寸以七幅因六尺得絹共長四丈二尺解義前法以出率或分率互乗盈不足併之得價物寔此又將盈不足各以幅數因之乃用互乗者如上出五両盈六両出三両不足四両是毎人出五両共盈六両毎人出三両共不足四両此摺六幅盈六寸六幅該盈三尺六寸七摺短四寸七幅共短二尺八寸故各以幅通之後用互乗也六摺長六寸七摺短四寸是七摺毎幅比六幅短一尺六幅共餘六尺即多摺一幅之數故以六乗盈不足共一尺淂六尺即七摺毎幅尺數也截田盈不足問截長原長法今有直田一叚欲截一頭賣之只雲截長
