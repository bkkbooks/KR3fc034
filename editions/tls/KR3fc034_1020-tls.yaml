body:
  text: 鷄較之多鷄價四個又置小鷄三隻價十文以每十文一鷄較之多鷄二隻就將二各折半以小鷄一互乗雄鷄一得一隻以雄鷄價二互乗小鷄三得六隻併之得鷄七隻又以小鷄一互乗雄鷄價五十得五十以雄鷄價二互乗小鷄價一十得二十併之共得鷄價七個為半平法另置母雞價三十母鷄一隻以毎十文一鷄較之多鷄價二個與小鷄多鷄二隻亦折半互乗以母鷄價一個乗小鷄三隻得三隻以小鷄一乗草鷄一得一隻併之共得鷄四隻以毋價一互乗小鷄價一十仍得一以小鷄一互乗母鷄價三十得三十併之亦得鷄價四個為半平法併二法共得十一為總法以除共價一千文得九不盡一十即以法約退一個七十加二個四十恰盡就於九內減一餘八得雄鷄八隻加二得母鷄十一隻另將雄鷄八以二因之得十六加母鷄十一共二十七以小鷄三隻因之得小
