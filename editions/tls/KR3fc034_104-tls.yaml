body:
  text: 少原實降下數法前得令逆上知又歌乗從每下得術歸從法前得令定因乗位乗從每下得術術者乃法首位每下該得之名也先將筭盤寫定萬千百十兩錢分厘或頃畆分厘石斗升合之類因乗完從實原首位起徃後順數至法首位之數則止却於下位得法首每該之數是兩呼兩是石呼石是錢呼錢巳上十百千萬巳下分厘斗升如有田一百四十五畆每畆科糧四升六合即以田為實以每畆四升六合為法乗實此實首是百法首是每畆四升六合即從實首數百順數至畆位就於畆下位得升向上以畆變斗以十變石以百畆變十石向下以分變合以厘變勺之類是也
