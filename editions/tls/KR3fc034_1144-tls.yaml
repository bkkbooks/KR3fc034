body:
  text: 人數明若問筭中両不足與盈法例一般行両盈問銀問裏法今有裏長攤貼應差毎裏科出銀五錢多銀三両五錢毎裏科出銀四錢五分多銀二両問合用銀併裏數各若干舊法置列右出五錢左四錢五分互多三両五錢多二両先以右出五錢互乗左多二両得一十両又以左出四錢五分互乗右多三両五錢得一十三両七錢五分二數對減餘五両七錢五分為用銀實另以多三両五錢二両相減餘一両五錢為裏實卻以出五錢四錢五分相減餘五錢為法除裏實一両五錢得三十裏除用銀五両七錢五分得一十一両五錢解義以二盈相減餘五錢為法五錢即半也毎一倍除作二倍故除一両五即除一十五毎五作一十淂三十裏除五両七錢五分毎五錢除作一両淂十五零半但五錢即一十一両五錢也両不足問井深及繩長法今有井不知深先將繩折作四摺至水不及
