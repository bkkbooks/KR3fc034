body:
  text: 又倍凣四日織成絹六丈七尺五寸問各日織若干舊法置絹六丈七尺五寸為實分列一二四八併得十五衰為法除實得初日織四尺五寸倍之得次日織九尺再倍之得苐三日織一丈八尺又倍之得苐四日織三丈六尺難題折半問路歌三百七十八裏閔初行㣵步不為難次日腳痛減一半六朝純得到其問要見每朝行裏數請君筭莫相瞞舊法置路程三百七十八裏為實以六日列六位一二四八十六三十二併六位共六十三衰為法除實得苐六日行六裏倍之得苐五日行十二裏又倍之得苐四日行二十四裏再倍之得苐三日行四十八裏又再倍之得苐二日行九十六裏再倍之得苐一日行一百九十二裏
  hash: sha256:a092071b5d153c29c804f4e354f3c6c8f932a85d6189dab2aab5b8707f80d79a
