body:
  text: 適抵三乗之数也自乗互乗折平法謂如本数不能折平湏用積数折平即将各数自乗又彼此互乗合併三折以合本数如窖臺皆用此法互乗再互乗法謂如本数多位相牵互乗取平減除一宗尚有餘宗未分又將減餘之数再用互乗對減以求一物之数正負層叠互乗法正正数也負虛数也謂如位數遇多互相聮絡牵帶減除一数又粘連未分一数即將未分一数重設虛位再與他数乗減沗求以次逓推以得一数方程等法是也子毋乗除法謂如各位分数零餘如某位某分之幾即以某分為毋以之幾為子交互推求子乗毋除以求一数又二位相乗為毋以二
