body:
  text: 九皆一之属九以上乃另進則乘数加升退則乘数遁减如一步自乗遆得本位数進則乗数加升退則乗数邊減加一步自乗止得一步一尺自乗止得一尺仍本位数本位而上十自乗則前十数一位得一百百自乗則前百数二位得一萬千自乗則前千数三位得百萬毎進前一位則乗出之数加進一位以上皆然本位而下如一分自乗則後分数一位得一釐一釐自乗則後釐数二位得一絲一毫自乗則後毫三位得一微一絲自乗則後絲数四位得一沙以下皆然緣自乗者四面之数也一自乗四面仍是一十自乗四面成十個十十為一之次位故乗出之数亦十倍得十次位之百百自乗四面成百個百百為一上之二位故乗出之数亦百倍得百二位之萬千自乗四面成千個千千
