body:
  text: 二疋疋互不足六斗六升適足只以換布九疋互乗右不足米六斗六升得五石九斗四升為米實以不足六斗六升為布價實卻以十二尺九疋對減餘三疋為法除六斗六升得布毎疋價米二斗二升除五石九斗四升得共用米一石九斗八升解義以米換布毎乏米若優人數也共用米若干優物價也可以融旁通一盈一不足合併為不足求之兩盈両不足對減求之一盈一適足一不足適足盈不足本數即差數故單以盈不足求之釲明勿誤可也屋價雙套盈不足適足總歌盈與不足雙套精人率出率互乗憑乗數再互盈不足兩數相併物實出另將人率相乗明併盈不足再相乗得數人實即在斯另取為法各除之人率出車互乗減除人除物兩難撚盈與不足両同情適足不足適足盈乗除之法皆同理惟有一般相異取盈與不足取合併両盈不足
