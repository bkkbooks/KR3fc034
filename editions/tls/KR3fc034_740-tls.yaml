body:
  text: 積若干舊法置長一十三個減濶八個餘五個折半得二個半加半個共三個併原長得一十六個以濶八個因之得一百二十八個另以濶八個添一個共七個乗之得一千一百五十二個以三歸之得積三百八十四個又法置長一十三個加倍得二十六個另以因減長餘五加一得六個併倍長共三十二個以濶八個乗之得二百五十六個再以八個乗之得二千零四十八個併加初乗二百五十六個共二千三百零四個為實以六歸之得積三百八十四個解義長濶餘加一共六即面上層六個也濶八個以上戒至第八層為宋清一個長十三個以上戒至第八層得六個是垜底長多濶五個垜尖亦多五個連所多一個共六個故長濶減餘加一即垜頂長數也折半併長十三得十六即以頂長折半併下長為法也以八乗者濶八個高亦八層以層數乗也又加一以九乗者店濶八加頂尖一得九也此即將店濶八個加頂一個相折併八層乗之又用上半長併下長再乗之也其上長用中者何也濶加尖一以濶乗八九得七十二以上長下長共十九乗之得一千三百六十
