body:
  text: 個一十一萬零五百九十二尺立方積也金毬問徑難題駐馬聽不比尋常欲造金毬內外光要求高徑尺寸今有金積耀眼睛黃百二十一五分詳立圓高許如等杖折半曾量折半曾量金實虛積五偏向此言金毬積一百二十一寸五分問毬徑若干舊法置金積一百二十一寸五分以十六乗之得一千九百四十四寸以九歸之得二百一十六寸為實以開立方法除之初啇六寸自乗得三十六寸再乗得二百一十六寸除實恰盡得毬徑高六寸金毬以徑問積難題歌有個金毬衷西空毬高尺二厚三分一寸自方十六兩問金毬多少金舊法置毬一十二寸自乗再乗得一千七百二十八寸以九因十六除得九百七十二寸為金毬積另置高一十二寸將厚三分得六分以減高一十二寸餘得毬內空徑一十一寸四分亦用自乗再乗得一千四百八十一寸五分四厘亦以九因十六
