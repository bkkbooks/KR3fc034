body:
  text: 故曰連環九陣化十三陣九宮計九陣內中四空相合包四陣共十三陣也凣排法始坤次離次異次乹次坎況艮次兌次中次震道一數起毎宮二子挨次排去至震又挨次逆回至坤再順回至震又逆四至坤完畢毎排二子俱相對安下首離坎位次異乹次兌震次坤艮逆上層自右而左排完即接排下層次排中層上下層一例中層一例如上下排二子先上後下中層即先下後上相反是也聚五圖二十一子作二十五子用五圖各皆淂積六十五數聚六圖
