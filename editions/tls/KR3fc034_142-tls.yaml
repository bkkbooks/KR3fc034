body:
  text: 同通乗同通除法難題梅氣清三石五斗粟魯換芝蔴三石足又有五斗五升蔴換來小麥量八斗今有小麥換粟米九石六斗無零数兴言有粟米三石五斗換芝蔴三石有芝蔴五斗五升換小麥八斗今有小麥九石六斗問換粟米若干舊法置今有小麥九石六斗以芝蔴五斗五升乗之得五石二斗八升再以乗米三石五斗乗之得一十八石四斗八升為實另置所换芝蔴三石以所換小麥八斗乗之得二石四斗為法除之得該換粟米七石七斗又如原毎鵞八隻換鷄二十隻毎鷄三十隻換鴨九十隻毎鴨六十隻換羊二隻今有羊五隻換鵝問該換若干舊法置原鵝三十隻乗之得二百四十隻又以原鴨六十隻乗之得一萬四千四百隻再以今有羊五隻乗之得七萬二千隻為寶另以所換鷄二十隻以所換鴨九十隻乗之得二千八百隻再以
