body:
  text: 豬十五剩五両四十九負十九両復以羊為法右羊十一通乗左行羊三十七得羊正四百零七乗豬負四十九得豬負五百三十九乗少負一十九両得負二百零九両卻以左行羊正三十七為法通乗右行羊負十一得羊負四百零七與左行羊正四百零七異名對減盡乗豬正十五得豬正五百五十五異減左行豬負五百三十九餘得豬正十六為法乗價正五両得正一百八十五両異減左行負二百零九両餘得正二十四両為實以法十六除之得豬毎口價一兩五錢將右行豬正十五以價一両五錢乗之得二十二両五錢加剩五両共二十七両五錢以右行羊十一除之得羊毎隻價二両五錢卻將原右行豬負十三以價一両五錢乗之得價一十九両五錢加入剩五両共得二十四両五錢內減五羊價共一十二両五錢餘得一十二両以原賣牛二除之得牛毎隻價六兩解義凣互乗對減是就物減除一米價亦減除一宗止餘一宗故可以物除價淂一宗之價然上去俱言共價若干此是多銀少銀
