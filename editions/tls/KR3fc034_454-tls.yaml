body:
  text: 若求三角仍以此為準第其中心及容角分數俱無差故仍就七步六步大槩較之使人易曉下做此三角容三四角圖今有三角內容三四角大三角面一十四步問每四角積若干舊法置每面一十四步六因七歸得中長一十二步相乗得一百六十八步折半得積八十四步另以小角中長八步以濶七步乗之得五十六步折半得一四角積二十八步併三小四角合大角積直田容六角差誤圖今有直田長二十步濶十八步內容六角每角面十步問六角積及餘積若干舊法置通長二十步以濶十八步乗之得直積三百六十步另置中長二十步減去半面濶五步餘長一十五步以濶十八步乗之得六角積二百七十步又置角外餘長九步以餘濶折半二步五分乗之得一角餘積二十二步五分四角共餘積九十步併六角積
