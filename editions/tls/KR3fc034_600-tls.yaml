body:
  text: 相呼合除積九百而積實不及乃命翻法除原積八百六十四步餘負積三十六步為實再置上啇三十以減餘縱三十訖次啇六步下法亦置六為隅法與上啇六步相呼除實恰盡得長三十六步以減共長得濶解義翻積法惟長濶不絕又長或四十五十無零餘可以翻若長步遇多或長多零數則亦無可翻矣此未可立準則也長濶相和自乗以四因積減之餘開方淂長濶差步解見直田及勾股章不再圭田斜田勾股田開方法俱倍積用帶縱或減縱法與直田同開平圓問徑法今有圓田積二千三百五十二步問圓徑若干舊法置田積四因三歸得三千一百三十六步為實於中初啇五十步於左位亦置五十步於右位為方法左右相呼五五除積二千五百步餘積六百三十六步卻以右位五十倍作一百為亷法次啇六步於左初啇五十之下亦置六步於右亷法一百隔位之
