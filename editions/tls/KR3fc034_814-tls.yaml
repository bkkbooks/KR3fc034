body:
  text: 七十日以每日四百尺乗之得二萬八千尺為實卻以乙日開三百五十尺為法除之得八十日與甲同並工求積法原有一夫日耕田三畆日種田七畆日耘田五畆今令一夫兼耕種耘三事俱相等問治田若干舊法置田為分母夫為分子以母互乗子先以三畆乗七畆得二十一畆又以五畆乗之得一百零五畆為實另以三畆乗七畆得二十一畆又以三畆乗五畆得一十五畆又以七畆乗五畆得三十五畆併三數共七十一畆為法除實得並耕種耘田一畆四分七厘不盡六十三命曰零七十一分之六十三解義三五七遞乗得一百零五乃三數會齊之數也三數聯絡互通如以七乗五得三十五以三除一百零五正得三十五以三乗五得二十五以七除一百零五正得一十五以三乗七得二十一以五除一百零五正得二十一是耕三畆者三十五個夫耕得一百零
