body:
  text: 格末寫一行右行下二二行上七三行右四得每疋二兩七錢四分更定歸除圖解義上因乘圖易曉歸除圖自下向左琁上而右得數或在下或在左上右參差不一今更圖以寔列上除數居中以次每格有共末行蓓數在下數為直不至差誤此圖以實位原數在上得數寫下歸除活數居中第圖分列四行間寫歸除於上歸增歸減者寫歸行下除減除增者寫除行下各圖俱自左而右至寫行盡即得數本位順序不亂庻便稽考
