body:
  text: 原濶四十四步八分乗之得一萬八千一百四十四步為實以原長五十六步為法除之得三百二十四步以開平方法除之得截濶一十八步將截濶一十八步以原長五十六步乗之得一千零八步以半濶二十二步四分除之得截長四十五步觧義此與梯截一邊同理梯二濶以相減差步折半圭一濶以原濶折半為法即是半差求截長濶用折半原長加倍以合原積求截濶用原長亦用原濶即半濶加倍以合原積故皆不倍積今有勾股田長六十步濶三十二步問積若幹舊法置長六十步以濶三十二步折半得一十六步乗之得積九十六步或長折半以濶乗亦得觧義先將濶折半或將長折半與原長濶相乗折半一也視圭田直分顛倒相補勾股橫截顛倒相補或直或橫都成一半故筭法或長折半或濶折半皆可合也
