body:
  text: 二乘桃價四得八以三乗棃價十一得三十三併之共四十一以二乗桃七個得一十四以三乗棃九個得二十七併之亦共四十一即以四十一為總平法另以多錢二文乗棃桃共四千九百六十一個得九千九百二十二以總平法四十一除之得桃與價平法二百四十二以價四文乗之得桃價九百六十八文以桃七個乗之得桃一千六百九十四個又以多桃三個乗棃桃共價四千九百六十一文得一萬四千八百八十三以總平法四十一除之得棃與價平法三百六十三以價十一文乗之得棃價三千九百九十三文以棃九個乗之得棃三千二百六十七個解義二倍禿價三倍藥吳價物各淂四十一是二三互乗乃價物取平之法也共物共價合一故以二三互乗不用再有增減又法今有牛羊一百隻共價一百六十八両只雲牛三隻價銀一十二両羊四隻價銀一両五錢問牛羊併價各若干舊法列置右牛三隻左十二両
