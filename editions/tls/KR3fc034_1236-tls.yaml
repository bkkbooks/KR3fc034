body:
  text: 負松子二百一十六得八百六十四併加四行三千三百六十共四千二百二十四為法乗餘價一十二両八錢四分得五十一両三錢六分以減四行價一百五十六両九錢六分餘一百零五両六為實以法四千二百二十四除之得松子毎斤銀二分五厘即於五行價四錢六分五厘內除松子九斤減價二錢二分五厘餘銀二錢四分以冰糖三斤除之得冰糖毎斤銀八分於一行價四錢內除冰糖二斤減銀一錢六分餘銀二錢四分以白糖四斤除之得白糖毎斤得六分於二行價三錢三分內除白糖二斤減銀一錢二分餘銀二錢一分以葡萄五斤除之得葡萄毎斤銀四分二厘於三行價五錢五分六厘內除葡萄六斤減銀二錢五分二厘餘銀三錢零四厘以榛仁八斤除之得榛仁毎斤銀三分八厘解義五色共四色同理然二色四色末後為法皆係對減三色五色為法皆係合併若六色又係用對減矣並列後後色方程法今有冰糖二斤白糖四斤價銀四錢又白糖二斤葡萄五
