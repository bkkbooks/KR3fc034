body:
  text: 乗之得六十步以四步除之得尖長一十五步問中廣則將尖長一十五步以一步六分乗之得二十四步以三步歸之得中廣八步問下廣則將斜長四十五步以一步六分乗之以三步除之得二十四步加中廣八步得下廣三十二步問斜長則將下廣減中廣餘二十四步以七步五分乗之以四步除之得斜長四十五步觧義此與圭梯求尖長中廣梯長下廣皆同法可求因凢用長除濶乗長乗濶除皆是長得濶若干濶淂長若干交互乗除以合共數故列此二圖互明使人曉倣即解前法腳也問下廣將斜長乗除得數加中廣者以斜長截去上尖已減去中廣差數故加入始合下廣以積求截長截濶同圭法放不再贅今有斜尖田長三十步尖濶一十六步問積若干舊法置長三十步以濶一十六步乗之得四百八十步折半得積二百四十步
