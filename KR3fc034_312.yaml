body:
  text: 此言環田計一畝內外周共一百六步問徑及內外周各若干舊法置田一畝以畝法通之得二百四十事為實另置二周共和一百六十步折半得八十步為法除實得圓徑三步又另以三乗三步得九步以減八十步餘得內周七十一步以減總共和一百六十步餘得外周八十九步解義環積係內外周折平以徑乗之以共步折半即両周折平法故為法除積可得徑也難題二周差步併積問徑周鳳樓梧一叚環田餘欠慮眾説分明亦有誰人悟忘了二周併徑步人道二周不及為差處七十有餘單二步三事通知荅曰分明注五畝二分無零數玄機奧妙堪思慕此言環田五畝二分內周不及外周七十二步問徑與內外問各若干舊法置田五畝二分以畝法通之得一千二百四十八步倍之得二千四百九十六步為實另置不及七十二步以六除之得徑一十二步就以為
