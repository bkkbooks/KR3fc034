body:
  text: 八以本積三百八十四除之得三外餘二百一十六個以七十二之亦得三是較求三歸之積多三個七十二個故將頂長折半以乗八九相乗之積共減退三個七十二以合三個積數以三歸之可得本積此皆各物自具天然之數不可易也稜法全用上長加倍下長是加一倍法故用六歸比前法亦加倍也以八乗再以八乗尚少頂一個一乗故將八物乗數加併若同前以八乗再以九乗即合六個積數以六歸得木積不用再加初乗數矣與前搃一理也直長半垜物求積法今有直長半垜酒瓶上長二十五個濶一十二個下長三十個濶一十七個高六個問共積若干舊法置上長倍之得五十個加下長三十個共八十個以上濶一十二個乗之得九百六十個另倍下長得六十個加上長二十五個共八十五個以下濶一十七個乗之得一千四百四十五個得二數得二千四百零五個又置上下長對減餘五個併入共二千四百一十個以高六個乗之得一萬四千四百六十個為實以六為法歸之得積二千四百一十個
