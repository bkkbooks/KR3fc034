body:
  text: 除子母原數卻無畸零所謂齊不齊而致其齊也今有絲二百五十二斤賣過一百四十四斤問分數若干舊法置母二百五十二減去子一百四十四餘母一百零八反減原子一百四十四餘子三十六又用減餘母一百零八減去二個三十六餘母亦三十六就以母子同數三十六為法除原母二百五十二得七除原子一百四十四得四約曰實過七分斤之四又法今有鴨七十二隻生子六十三個問分數若干舊法置母七十二減去子六十三餘母九即以減原子六十三減去六個九餘子亦九就以九為法除原毋得八個九除原子得九個九約曰八分之七筭海説詳苐八卷終
