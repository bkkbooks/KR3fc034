body:
  text: 二十以硯七除之得硯毎得箇價九十文解義一邊是以七硯換三筆多錢四百八十文一邊是以三硯換九筆少錢一百八十文用七硯三硯為法互乗両邊都成二十一硯乃硯取平之法也一邊是二十一硯換九筆多錢一千四百四十文一邊是二十一硯換六十三筆少錢一千二百八十文合多價少價皆是不齊之數故將筆乗筆三筆九之數對減餘五十四筆正是両下不齊之物即合両下不齊之價此數浬天然之妙也若以筆三筆九為法互乗即將乗出二硯之數對減不合両下互乗之價一理也舊有絹三疋添價六錢買布十疋之法同此不贅又今有硯七個換筆九枝餘錢一百八十文硯四個換筆三枝餘錢二百一十文問硯價筆價各若干增法置列右硯七左硯四互中筆九得三十六中筆三得二十一下一百八十文得七百二十文下二百一十文得一千四百七十文先以右行硯七為法通乗左筆三得二十一餘錢二百一十得一千四百七十文又以左行硯四通乗右行筆九得三十六與左行二十一對減餘一十五為法又乗餘錢一百八十得七百二十文與左行一千四百
