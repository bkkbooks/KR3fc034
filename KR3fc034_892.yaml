body:
  text: 豆七斗二升各以價米乘之得各該價五錢零四釐解義此同前以子求母之法以八乘九得七十二再以七乘即得五百零四即五錢零四釐之數也又法原有綾每匹價四兩一錢絹每匹價二兩一錢今欲將綾換絹問各若干可均舊法置綾絹價相乘得通平價八兩六錢一分以綾價四兩一錢除之得該二匹十分匹之一另以絹價二兩一錢除之得該四匹十分匹之一難題油鹽交換歌一斤半鹽換斤油五萬斤鹽載一舟斤兩不等相交換酒數二數一般留舊法置總鹽五萬斤為實以鹽一斤半併換油一斤共二斤半為法除之得油鹽各二萬斤合本問利法今有元亨利貞四人合本經營元出本銀二十兩亨出本
