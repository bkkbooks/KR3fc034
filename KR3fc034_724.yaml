body:
  text: 個即徑一層即以層數折半乗之也此與後一面尖垜同三稜無中心圖上圖中心六下圖中心三今有物一三稜束外週三十三根問積若干增法置外周三十三根加內周六根共三十九根以外周三十三加三俱三十六乗之得一千四百零四根以十八除之得總積七十八根如雲外週三十根問積若干增法置外周三十根加內周三根共三十三根另以外周三十根加六根共三十六根乗之得一千一百八十八根為實以十八除之得總積六十六根或用三歸外周加一加二相乗與有中心求積俱同法觧義方束無中心內周即四圓束無中心內周即三俱是半八半六一等三稜無中心內周有六個三個二等外周加內週六加內週三俱是內外周折半之法另特外周加三加六乗之者三十六乃四九成數三稜每層加九數必以九而合故仍加三十六成數乗
