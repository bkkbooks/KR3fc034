body:
  text: 斜木一尺得至牆股四十九尺五寸股弦圖今有木末垂索委地餘二尺引索去木八尺其索斜柱地邊盡問木高索長各若干舊法置去木八尺為勾自乗得六十四尺以委地二尺為股弦較自乗得四尺以減六十四尺餘六十尺為實以較二尺為法除之得三十尺折半得木高一丈五尺加委地二尺得索長一丈七尺餘股求股弦圖今有葭二莖生池中根並紗齊出水三尺引葭至岸一莖斜去立葭九尺與水邊早問水深藏長各若干舊法置至岸九尺為勾自乗得八十二尺以出水三尺為股弦較自乗得九尺以減八十一尺餘七十二尺為實以較三尺稽作六尺
