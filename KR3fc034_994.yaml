body:
  text: 相減餘為實貴賤二價亦減餘為法實得賤數欲求貴數減共物輕重多寡有同言以理推之類皆然貴賤差分法今有米麥五百石共價銀四百零五兩七錢只雲每米一石價八錢六分每麥一石價七錢二分五釐問米麥及價各若干舊法置米麥共五百石以米價八錢六分乘之得四百三十兩內減原共價四百零五兩七錢餘銀二十四兩三錢為實另將米價八錢六分以麥價七錢二分五釐減之餘一錢三分五釐為法除實得麥一百八十石卻將米麥共五百石內減麥一百八十石餘得米數三百二十石各以原價乘之得米價共二百七十五兩一錢麥價共一百三十兩零五錢增法置米麥共五百石以麥價七錢二分五釐乘之得三百六十二兩五錢以減原共價四百零五兩七錢餘四十三兩二錢為實以米麥價相減餘一錢三分五釐為
