body:
  text: 竿用直木竿修理四直上下粗細如一以二丈為式量明尺寸數目墨畫為界明白下用鉄炎鑚釘地中用四面四小環小純四根鉄釘四個四面斜牽釘地妨其歪斜一樣二根再照前式製一丈二根以使臨期高下取用另製木拐二個如曲尺樣直長三尺亦界明尺寸於上橫拐長一尺頭用鉄環興表竿套合或竿用若干尺寸不等將曲拐套表竿上對照望竿尺寸加減止以曲拐為表其表竿逐寸鑚眼用在何雯用鉄錐關住又製二尺三尺四尺望竿各二根亦界明尺寸作人目雯用利苑具則推騐自無差矣和求勾腹弦欹勾腹和法自乘先弦亦自乘對減前減餘又用減弦實餘數開方較無疑較減共和折半勾加較折半可捷
