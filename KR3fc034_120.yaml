body:
  text: 解義撞者迎也湊也有歸數無除數故立法以迎湊之也數盈有歸有除則進一或二或三等數于上位成十如每人可分一箇二箇三箇也無除則本位作九如每人分一箇不足再作九分分也又無除再也一存八或又再起一存七存六存五不等如每熱分九分又不足再作八分每人八分又不足再作七分六分不等也無除本位作九及本位起一下位皆加原數者如二烯本位逢二則進一于上三歸本出連三則進一于上是上位萬巳之數本位為未烯之數二歸則本位二數是上位一數三歸則本位三數實上位一數者無除作九則本位萬巳烯之數下位萬未烯之數係二烯則下位二數為本位一數故本位作九則下逢二本位起一亦下還二係三歸則下位三數為本位一數故本位作之則下三本位起一下三也九歸皆類此今饀說于後撞歸法如有銀一百八十四兩零五分共四十五人分之問每人該銀若干置銀一百八十四兩零五分為實用四歸法以四十五人為法歸除之先呼四一二十二將實首百位一加作二下位加二又呼連八進二十將次八十併先呼加二數共十內起去八進二於上位共成四本位餘二却於首
