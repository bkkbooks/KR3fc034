body:
  text: 官糧帶耗法今有官糧二千七百六十五石九斗五升每正米一石帶耗米七升問正耗各若干舊法置正耗糧二千七百六十五石九斗五升以正米一石併耗米七升共一石零七升為法除之得正米二千五百八十五石以減共米二千七百六十五石九斗五升餘得耗米一百八十石零九斗五升若以正米問耗若干以耗因正米即得以耗米問正若干以耗七升除總耗米即得買賣就物抽分法今有客買白紬六十七丈五尺於內抽扣一丈七尺五寸買顏色作染止染得紅紬六丈二尺五寸問染成紅紬及抽扣買顏色納各若干舊法置總紬六十七丈五尺以染紅紬六丈二尺五寸乘之得四百二十一丈八尺七寸五分為實以染紅紬六丈二尺五寸併入買顏色紬一丈七尺五寸共八丈為法除之得共染紅紬五十二丈七尺三寸四分三厘七毫五絲以減總納數
