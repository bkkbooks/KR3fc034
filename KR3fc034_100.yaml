body:
  text: 按大學章句曰別為序次如左則左者以後之事也又曰右傳之某章則右者以前之事也今當以初行為右次行為左以理推之法當從右實當在左此乃不易之位也解義按書文篇章行數俱挨次自右而左則右先左後算盤宄位皆自左而右如有數若干萬千百十俱自左行宄萬首位一順挨次而右則左先右後乃便于右首推算之故耳故算盤以左為上位右為下位乘法自左邊右謂之降位除法自右進左謂之升位實具而後法施實先法後故以實在左法在右此一實之序也以此論之實當為母法當為子以法求實乃以子分母舊以法為母實為子以法先實後為分左分右之義似有未實又以法為靜實為動者因以法求實呼法數目列庶不易實則遂位改破動移本數也然定實于盤以法進位乘除之乃實位居靜而動用全在法是又實靜而法動矣似亦不得以法為靜實為動也定法實訣實者所問之數實也法者推分數實之則法也或以物為實價為法或以價為實物為法或以人為實銀與物為法或以或銀或物
