body:
  text: 積倍問利法今有錢一文日增一倍至三十日問該若干舊法置錢一文以十度八四得三十日訣錢十億零七千三百七十四萬一千八百二十四文一度八四乃三次倍數十度八四即三十日倍數也又法以五度六十四乘亦得一度六十四乃六日倍數五度六十四乘即三十日倍數又法以三度三十二乘得數自乘亦得一度三十二乘乃五日倍數三度三十二乘乃十五曰倍數自乘即三十日也或六度三十二乘六得遞減挨次差分法置所分物為實各挨次列置衰二位者一二併二位共三衰二位者一二三併三位共六衰四位者一二三四併四位共十衰五位者一二三四五併五位共一十五衰今有銀九十二兩分散四子依等挨次遞減分之問各若干舊法置總銀九十二兩為實列長子四次子二三子二四子一併得十袞為法除實得第四子該銀九兩
  hash: sha256:08f157f6de671075c7f68bd97ae39707255b0c1773ff3e03105b3bea73cf0f44
