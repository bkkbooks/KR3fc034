body:
  text: 微二織五沙又置二萬八千四百分為實以每分六銖乘之得二十三萬零四百銖另置每分銀一釐九毫五系三忽一微二織五沙以六歸之得每銖銀三毫二絲五忽五微二織零八塵三三不盡解義所雲分者乃六銖為分四分為兩計每一分得二錢五分非分釐毫系之分也今法不用古分須辨之難題帶銖問年歌有一公公不記年手持竹杖在門前借問公公幾年嵗家中數目記周全一兩八銖泥彈子每嵗盤中放一丸日久嵗深經兩濕總然化作一泥團稱重八斤零四兩總算方知得幾年舊法置總八斤半以每斤三百八十四銖乘之得三千二百六十四緑為實以每嵗一兩作二十四銖併入八銖共三十三銖為法除之得年一百零二嵗加錘物法今有豬一口因無大稱以小稱稱之不及數計原稱鉵重
  hash: sha256:dae7f6c74fb769ee4d626ec0941cfd5daa796f3ea3db140825d8e541f5ad5b24
