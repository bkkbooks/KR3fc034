body:
  text: 微二織五沙又置二萬八千四百分為實以每分六銖乗之得二十三萬零四百銖另置每分銀一厘九毫五系三忽一微二織五沙以六歸之得每銖銀三毫二絲五忽五微二織零八塵三三不盡解義所雲分者乃六銖為分四分為兩計每一分得二錢五分非分厘毫系之分也今法不用古分湏辨之難題帶銖問年歌有一公公不記年手持竹杖在門前借問公公幾年嵗家中數目記周全一兩八銖泥彈子每嵗盤中放一丸日乆嵗深經兩濕總然化作一泥團秤重八斤零四兩總筭方知得幾年舊法置總八斤半以每斤三百八十四銖乗之得三千二百六十四綠為實以每嵗一兩作二十四銖併入八銖共三十三銖為法除之得年一百零二嵗加錘物法今有豬一口因無大秤以小秤稱之不及數計原秤鉵重
