body:
  text: 餘勾乘之得九十尺為實另以後表退行八尺減前表退行五尺餘三尺為法除實得表上木高三十尺加表竿十尺得木竿通高四十尺另置相去一十五尺以前表退行五尺乘之得七十五尺仍以前法三尺除之得前表至隔水木遠二十五尺加後表至前一十五尺並退行八尺得至木竿共遠四十八尺解義此仍上餘勾容直餘股容橫之理前圖亦立二表竿其後表竿與前表竿不一後表即人目處猶一表竿法也録知到高遠並故止一竿可測此立二表竿相同二表各有退行人目望處因並不知到木遠若干故立二表就表中間尺數求之人目窺望處四尺故前後表皆六尺至前表退五尺後表則退八尺是下一十五解前表竿多退三尺此三尺是從十五步多出的前五後成八五尺是前表已有的三尺是後表加出的前表以前餘勾所容橫積蒹前表竿前表至後表十五尺所容橫積屬後表竿以前表退五尺論之前表至木二十五尺高長遠短前表前是正勾退五尺是餘勾餘股六尺乘正勾二十五尺得一百五十尺以餘勾五尺除得表上之高三十尺以後表退八尺論之前表至木又加至後意十五尺共四十尺高短遠長後表前四十尺是正股退八尺是餘
