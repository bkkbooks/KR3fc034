body:
  text: 今有直田一假長六十步濶三十二步問積步及田若干舊法置長六十步以濶三十二步乘之得積一千九百二十步以畝法二四除之得田八畝若問長以濶除積得長問濶以長除積得濶今有直田一假只雲斜長六十八步長多濶二十八步問積步若干舊法置斜長六十八步自乘得四千六百二十四步另以長多濶二十八步自乘得七百八十四步以減斜積餘三千八百四十步折半得積一千九百二十步解義斜問積以長多濶步自乘減斜自乘折半合積者長濶相乘淂原積斜自乘數內包一個長自乘一個濶自乘數其長自乘三千六百步較原積多一個二十八步乘六十步該積一千六百八十步濶自乘一千零二十四步較原積少一個二十八步乘三十二步該積八百九十六步以長自乘內多二十八乘六十步數內二十八乘三十二數補濶自乘不足之數合成兩個原積數止餘一個二
