body:
  text: 今有直田一叚長六十歩濶三十二歩問積歩及田若干舊法置長六十歩以濶三十二歩乗之得積一千九百二十歩以畆法二四除之得田八畆若問長以濶除積得長問濶以長除積得濶今有直田一叚只雲斜長六十八歩長多濶二十八歩問積歩若干舊法置斜長六十八歩自乗得四千六百二十四歩另以長多濶二十八歩自乗得七百八十四歩以減斜積餘三千八百四十歩折半得積一千九百二十歩觧義斜問積以長多濶歩自乗減斜自乗折半合積者長濶相乗淂原積斜自乗數內包一個長自乗一個濶自乗數其長自乗三千六百歩較原積多一個二十八歩乗六十歩該積一千六百八十歩濶自乗一千零二十四歩較原積少一個二十八歩乗三十二歩該積八百九十六歩以長自乗內多二十八乗六十歩數內二十八乗三十二數補濶自乗不足之數合成両個原積數止餘一個二
