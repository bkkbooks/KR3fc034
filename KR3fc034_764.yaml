body:
  text: 相呼除實恰盡得下廣五個加多七個為下長加多三個為上長然君改作下廣六個積二百一十七個六個得一千二百零二個下長多下廣六個上長多下廣一個以前法求之不盡積七十二改作下廣四個積得一百一十六因得六百六十下長多下廣八個上長多下廣五個以前法求之不是積三十二則前法亦屬偶合未可為完則故不列載三角半垜求積法今有物半三角垜上角面五個下角面一十二箇問積物若干舊法置上角面五個自乘得二十五個另置下角面十二個自乘得一百四十四個又以上五乘下十二得六十個又置下角面十二加倍得二十四加上角面五共二十九箇併四數共一百五十八箇另置下角面十二減上角面五餘七加一得高八個乘之得二千零六十四個為實以六歸之得積物三百四十四個解義上下自乘互乘又以高乘得五個積數零一百一十二加入二十九以八乘得二百三十二湊是六個積數故六歸得積三角一面尖垜求積法今有物靠壁一面尖垜應濶一十八個問積物
