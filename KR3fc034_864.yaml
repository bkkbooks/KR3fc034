body:
  text: 稱物求錘法今有原秤失去錘欲買錘配秤不知輕重另以別秤稱物重八斤二兩將原秤用別錘重二斤五兩稱之只得六斤問原錘重若干舊法置後稱物六斤以加六法通之得九十六兩以後別錘二斤五兩計三十七兩乗之得三千五百五十二兩為實另以原物八斤二兩亦用加六法通之得一百三十兩為法除之得二十七兩三錢以截兩法通之得原錘重一觔一十一兩三錢零觧義此典上加錘同一法然以一百三十兩為法除三千五百五十二兩得先錘二十七兩三錢二分三厘不盡一舊俱三錢止非傾煎問色法今有足色紋銀三十五兩二錢欲傾八八色銀問用銅若干舊法置紋銀三十五兩二錢為實以八八色為法除之得色銀四十兩內減原銀三十五兩二錢餘得用銅四兩八錢傾煎問紋法今有銅七錢五分欲入銀傾作八八色問用紋銀若干
