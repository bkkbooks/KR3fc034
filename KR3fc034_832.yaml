body:
  text: 又法今有人盜馬乘去三十七里馬主方覺騎馬追去至一百四十五里不及二十三里仍復追之問若千里可及舊法置不及二十三里以馬主追行一百四十五里乘之得三千三百三十五里為實另置已行三十七里內減不及二十三里餘一十四里為法除之得再追二百三十八里不盡一十四分里之三解義以不及二十三里減退三十七里餘一十四里此趕行一百四十五里比盜馬者快行一十四里故以一百四十五里乘以十四里除得趕及之里遲疾以里問日行法今有慢行者已行七日快行者趕行六日追及其路程已一千一百七十里問快行慢行各日行若干里舊法置路行一千一百七十里為實以六日為法除之得快行者日行一百九十五里另將先行七日後行六日共一十三日為法除實得慢行者日行九十里
  hash: sha256:ea62f74b045860fbb2461e9bedd0ac79eed1f4e1f754308f4eee2db8c5866e56
