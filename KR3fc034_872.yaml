body:
  text: 爐煉到足色銀一十六兩問原礦若干舊法置初次入爐三兩以二次入爐七兩乘之得二十一兩又以三次入爐五兩乘之得一百零五兩以乘一十六兩得一千六百八十兩為實另以初次煉得二兩以二次煉得五兩乘之得一十兩又以三次煉得四兩乘之得四十兩為法除實得原礦四十二兩解義三五七相乘得一百零五此入爐會通之數也二五四相乘得四十此煉遇會通之數也以煉遇數除入爐數便得每煉遇一兩該入爐若干兩却以十六兩乘之得十六個入爐若干兩便是初入爐數或以煉遇之數除十六兩以入爐之數乘之得或置煉之銀十六兩以三次入爐五兩乘之以煉遇四兩除之又以二次七兩乘之五兩除之再以初次三兩乘之二兩除之亦得若以入爐四十二兩問煉之若干即將煉遇二五四相乘又以四十二兩乘之用入爐三七五相乘為法除之度法歌尺數十寸丈十尺寸下亦用分毫釐四丈為匹五為端今法長短難畫一端匹求尺以尺乘尺求端匹端匹除
