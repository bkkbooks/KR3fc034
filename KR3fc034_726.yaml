body:
  text: 之搃之無物內週六內週三皆是將外週一邊加六一邊加三經文亦是共加九根有中心者叻一處無中心者加二邊一經也捷法結論有無中心皆止一法無分別異等三稜束以積問周法今有物一三稜束總積九十一根問外周若干舊法置積九十一根減去中心一根餘九十以十八乗之得一千六百二十為實以九為縱方用帶縱開平方法除之得外週三十六根增法置積減中心一餘九十另以九折半得四五為率除之得二十為實以一為縱方用帶縱開平方法除之得四以九乗之得外週三十六根又增通法置積加倍得一百八十二為實以一為縱方用帶縱開平方除之得十二減去一根得十二以三因之得外週三十六根如以積問面帶縱除得十三即面問層數亦同無中心三稜束問周法今有三稜束總積七十八根問外周若干增
