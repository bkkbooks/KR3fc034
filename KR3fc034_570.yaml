body:
  text: 於右亷法五百二十之下位皆與上啇八步相呼先以左八對右五相呼五八除積四千步又以左八與右二相呼二八除一百六十步又以左八與右八相呼八八除實六十四步恰盡得方西二百六十八步解義此同一假方田分作七假內方二百步一假積四萬步次啇六十內有濶六十步長二百步兩假故倍初啇二百作四百為亷法與次啇六十相呼除實二萬四千是兩假直田積隅法六六相呼除實三千六百步是二層小方田積又啇八步內有濶八步長二百六十步兩假故再倍六十併先兩亷共為亷法以又啇八步與五百二十邉呼共除四千一百六十步是外層二假直田積八八相呼除積六十四步是外層隅角小方田積濶自可了然上圖二層此圖三層萬千百十步分釐毫每一等分一層每層皆有二亷一隅歸除開平方法歌歸除開方法最良初啇對呼除內方下法加倍為亷法歸除實位得次啇啇法相呼除隅積並啇仍依前法詳今有方田積五萬四千七百五十六步問平方每西長若干舊法置積
