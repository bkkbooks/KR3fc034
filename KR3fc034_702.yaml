body:
  text: 今有箭一方束外周二十八根問總積若干外周二十八根以八歸餘四即加內周四共三十二根自乘得一千零二十四根為實以十六除之得總積六十四根又法置外周二十八根以八歸得三五加入內四以八歸亦得五共得四自乘得一十六以四乘之得總積六十四根若將外周二十八加內周四共三十二以四層折半淂二乘之亦得積六十四又增通法置外周二十八根以四歸之得七再加一根得八自乘得總積六十四根或用外周加四自乘不必用加內周之說亦得解義前圓方西是單數中餘一為中心此方西是雙數內周半八四內外每層加八俱有本八四根故以八歸二十八餘四即淂內周亦四根以加外周共三十二亦內外周併合折平之法也然前外周加內周八仍以外周本數乘此外周加內周四即內外周併數自乘者方束每層添八加作整四八相乘乃合十六率數也又法亦周此通法旡論有中心旡中皆同
