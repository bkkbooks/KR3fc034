body:
  text: 又方田截環以外方問截濶法今有方田從四圍截一十二畝四分七釐四毫外方七十二步問截濶若干增法置截田二四通之得二千九百九十三步七分六釐為實另將外方四因得外周二百八十八步以每周一步應減四步約十步應減四十步餘二百四十八步除實不盡即約定十二步以四因得四十八步以減外周餘二百四十步以十二步乘得二千八百八十步除實訖餘實一百一十三步七分六釐另將一十二步以八因得九十六步以減外周二百八十八步餘一百九十二步以約餘實再定六分以四因得二步四分以減一百九十二步餘一百八十九步六分以六分乘之得一百一十三步七分六釐除實恰盡得截濶一十二步六分又法置外方自乘得全積內減截積餘積用開平方法除之得內方併外方折平以除截積得截濶亦得解義外周問內周每步減八步折平減四步無論截濶若干只四周以減外周即內外周折平數方田內方地法無謂令改增法
