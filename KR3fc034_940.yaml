body:
  text: 難題塔頂問燈歌遠望巍塔七層紅光點倍加增共燈三百八十一請問尖頭幾盞燈舊法置共燈三百八十一盞為實以七層列七位為衰一二四八十六三十二六十四併七位共一百二十七衰為法除實得頂層燈三盞難題三等賠償鷓鴣天八馬九牛十四羊趕在村南牧草場吃了人家一假榖議定賠他六石糧牛一隻比二羊四牛二馬均賠償若還算得無差錯姓字趕群到處揚此言比如趙馬八匹錢牛九頭孫羊十四隻同此塤他家稻榖畝共賠糧六石每馬一匹比牛二頭每牛一隻比羊二隻問各該賠若干舊法置賠糧六石為實另置馬八以四因得三十二衰牛九以二因得一十八衰羊一十四衰併三數共得六十四衰為法除實得九升三合七勺五抄為一羊賠數以羊十四衰乘之得羊主該賠一石三斗一升二合五勺以牛十八衰乘得牛生該賠一石六斗八升七合五勺以馬三十二衰乘得馬
