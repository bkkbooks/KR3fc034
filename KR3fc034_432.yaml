body:
  text: 分之二解義內方答圭即將圓田十字分劈毎兩尖對處淂圭長即是方面中心為圭尖淂斜長一半相乘折半用開方淂圭徑即半方面州以圭斜為弦半面及徑為勾股則之也數以勾股易準故復列州圓及覆推騐庶可洞了無惑圓容六角圖今有圓徑四十步內容六角問六角面及長併六角積六弧矢積各若干增法置圓徑長四十步以六角正長得圓徑八分七厘六毫三系七忽九微六纖截就法乘之得內六角正長三十五步零五厘五毫一系八忽四微另置圓周一百二十步以六歸之得六角一面弧背二十步以六角面即弧弦得弧背九分六厘三毫二系四忽二微一纖截就法乘之得六角面即弧弦一十九步二分六厘四毫八系四忽二微卻將六角尖長即圓徑四十步減角面濶一十九步二分六厘四毫八系四忽二微餘二十步零七分三厘
  hash: sha256:c16b730fbf1f78c4fede6538f2226101150d7c3a33bb935b6198a02776da52fe
