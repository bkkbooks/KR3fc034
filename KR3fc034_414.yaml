body:
  text: 解義以錠上下二弧失補缺二弧矢邊合圓內名之方錠長以半長乘之得積斜自乘折半即以斜求方之法也此至準無差攬積又用方法自乘多數補之昔方法自乘每二十四步五分多二毫五系四弧矢少多數之一半故前圓內容方容弧將方法自乘多積折半分補四弧矢攬田係二弧矢相併故不折以四歸之以補一攬之積此二至準無差舊用方五斜七將十四步五用七歸得錠夫長十步以上下二弧補腰缺用方法十步自乘得一百步多積二步攬用長十步加半濶二步只濶四步乘之得二攬積四十八步少積一步俱不合三分之二之一本積乃以總筽比圓積步謂係十步自乘得百步多一步豈不相差應絶合併改正方容八角圖斜長二十三步九分今有方一十六步九分內容八角問八角面餘方八角積餘積各若干增法置方面一十六步九分另置方法四步九分五釐以通二角得九步九分置斜七步以通正面得七步是通長餘方九步九分六角七步即置六角中假正長一十六步九分以角面七步乘之得一百一十八步三分又置角長一十六步九分加旁角面七步共二十三步九分折半得一十一步九分五釐卻以
