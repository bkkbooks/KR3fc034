body:
  text: 觧義以錠上下二弧失補缺二弧矢邊合圓內名之方錠長以半長乘之得積斜自乘折半即以斜求方之法也此至准無差攬積又用方法自乘多數補之昔方法自乘每二十四歩五分多二毫五系四弧矢少多數之一半故前圓內容方容弧將方法自乘多積折半分補四弧矢攬田係二弧矢相併故不折以四歸之以補一攬之積此二至准無差舊用方五斜七將十四歩五用七歸得錠夫長十歩以上下二弧補腰缺用方法十歩自乘得一百歩多積二歩攬用長十歩加半濶二歩只濶四歩乘之得二攬積四十八歩少積一歩俱不合三分之二之一本積乃以搃筽比圓積歩謂係十歩自乘得百歩多一歩豈不相差應絕合併改正方容八角圖斜長二十三歩九分今有方一十六歩九分內容八角問八角面餘方八角積餘積各若干增法置方面一十六歩九分另置方法四歩九分五厘以通二角得九歩九分置斜七歩以通正面得七歩是通長餘方九歩九分六角七歩即置六角中叚正長一十六歩九分以角面七歩乘之得一百一十八歩三分又置角長一十六歩九分加旁角面七歩共二十三歩九分折半得一十一歩九分五厘卻以
