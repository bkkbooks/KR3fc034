body:
  text: 今有絹四百七十文零一尺八寸四分令三等人戶作十分之六出之上等二十五戶中等三十戶下等四十八戶問各等每戶及各共米各若干更法置總絹四千七百零一尺八寸四分為實另置上等二十五戸以一百乗之得二千五百衰中等三十戸以六十乗之得一千八百衰下等四十八戸以三十六乗之得一千七百二十八衰併三位共六千零二十八衰為法除實得七寸八分為一衰之數以一百因之得上等每戸訣七丈八尺另以六十因之得中等每戸訣四丈六尺八寸另以三十六乗之得下等每戸訣二丈八尺零八分各以戸因上等二十五戸得共訣一百九十五丈中等三十戸得共訣一百四十丈零四尺下等四十八戸得共訣一百三十四丈七尺八寸四分觧義以三等共衰數出寔止得三等共數中一分以上等一百衰因乃得上等一戸數以中等六十衰因乃得中等一戸數以下等
  hash: sha256:cc1deed2d918e6d3ea60bddfd5dc8bf62a7bdf8477c945e712b558746b1182f4
