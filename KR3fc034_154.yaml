body:
  text: 二分乗則得十分之二二釐乗則百分之二又不可不明也自乗再乗法謂法實数同相乘得数再以原数乗之凢取方則用自乗立方則用再乗或三乗四乗以次求高皆可漸加互乗法謂如多位参差不齊則分列行位彼此遍乗交互取齊或得一物本数或得差数平数乃互撤取平之法也對减法謂如貴賤輕重多寡各類参差不等或单乗或互乗所得之数或與原数對减或两数互减俱用减去一宗乃可求出一宗是也合併法謂如自乗互乗得数两邊不一應對减則以一数减一数應合併則二数合用各因所問立法以合本数維乗法維乗相維互乗謂如位則多等各異不齊如有四有五有六
