body:
  text: 得一百三十六內減不足六個餘得物一百二十個或以毎人分一十二乗之得一百零八加入盈十二個亦得物一百二十個解義出銀買物與分物分銀皆同法可求然以出率乗人數來價物皆問乃買物則賤盈增不足始合物價分物則增盈減不始合物數如分物一百二十個即出物價一百二十文以九人毎人分一十二個共分一百零八個尚多餘一十二個若九人買物毎人出錢一十二文九人共出一百零八文仍少一十二文九人毎人分十四個應該一百二十六個尚少物六個九人毎人出錢一十四文共出錢一百二十六文便是多六文是分物之盈乃買物之不足分物之不足乃買物之盈故盈減各異也難題分小分銀共此同難題買肉問原錢肉價歌啞子來買肉難言錢數目一斤少四十九両多十六試問能筭者合與多少肉此言買肉一斤不足錢四十文買肉九両盈錢一十六文問原錢若干毎肉一両錢若干原錢應買肉若干舊法置不足四十盈十六併之得五十六為實以一斤九両相減餘七両為法除之得肉毎一両錢八文卻以九両因之得七十二加多十六共
