body:
  text: 總歌半平長垜法不同倍長加下上濶乘倍下加上乘下另將上下對減明併入二數高乘之法用六歸積可憑可方上下自乘推上下相乘又繼之上下方減餘加一以乘併數得為實另將減餘加一數三因併入三歸宜半圓六歸上下周各倍添一自乘優又用上下數相乘再將高數折半留四數合併高乘之以四歸之積可求三角各面自乘便又以上面乘下麵上面再倍下而合併上三數作實算上下面減餘加一乘實六歸積亦見一面半垜法可齊上濶下濶併為實對減上下餘加一乘實折半積無疑長尖垜物求積法今有酒瓶一長尖垜地腳長一十三個濶八個問共
