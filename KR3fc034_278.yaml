body:
  text: 圓田積徑問矢弦法今有圓田中徑二十六步從一邊截積一百二十八步問截矢截弦各若干舊法置積一百二十八步自乘得一萬六千三百八十四步為實另以原積一百二十八步為上廉以徑二十六步為下廉以一二五為虛隅法約啇八步於左上為法以乘上廉得一千零二十四步又以啇八乘虛隅一二五得十步以減下廉二十六步餘一十六步卻將啇八自乘得六十四步以乘餘下廉一十六步得一千零二十四步併上廉共二千零四十八步又為法除實一萬六千三百八十四步得截矢八步另置積倍之以矢八步除之得三十六步減矢八步截弦二十四步又法倍積得二百五十六步自乘得六萬五千五百三十六步為實另以四因原積得五百一十二步為上廉又以四因徑得一百零四步為下廉以五為虛隅法約啇八步於左上為法以乘上廉得四千零九十六步又以啇八乘隅五得四十步以減下廉一百零四步餘六十四步
